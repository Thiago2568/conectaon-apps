<title>Revisor Fiscal Prime v3.17</title>
<!-- SheetJS para exportação Excel (carregado de CDN; funciona offline depois de cacheado) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
/* ===== app.css ===== */
/* =====================================================================
   Revisor Fiscal Prime — app.css
   Identidade Prime: navy #16365B + coral #FF6B35 (símbolo de barras + seta)
   Tipografia: Space Grotesk (display) + Inter (corpo)
   ===================================================================== */

:root {
  --primaria: #16365B;
  --primaria-clara: #2C5C8A;
  --primaria-esc: #0E2745;
  --accent: #FF6B35;
  --accent-claro: #FF8C5E;
  --accent-esc: #F2581F;
  --gold: #E8A33D;
  --texto: #14202E;
  --texto-fraco: #5E7088;
  --bg: #F4F7FB;
  --bg-card: #ffffff;
  --bg-alt: #EBF1F8;
  --bg-destaque: #E4EDF7;
  --bg-warn: #FFF1EA;
  --borda: #D6E0EC;
  --success: #1F8A56;
  --success-bg: #DCF0E4;
  --warn: #B8801F;
  --warn-bg: #FBEFD8;
  --danger: #C2403A;
  --danger-bg: #F7E0DE;
  --sombra: 0 1px 2px rgba(16,39,69,.06), 0 2px 8px rgba(16,39,69,.05);
  --sombra-md: 0 10px 30px rgba(16,39,69,.12);
  --radius: 12px;
  --radius-lg: 18px;
  --ff-display: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --ff-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --ff-mono: 'SF Mono', ui-monospace, Menlo, Monaco, 'Courier New', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--ff-body);
  background: var(--bg);
  color: var(--texto);
  line-height: 1.5;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

/* ===== HEADER ===== */
.app-header {
  background: var(--primaria);
  color: #fff;
  padding: 0;
  box-shadow: var(--sombra-md);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.header-marca {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-marca-logo {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.5px;
}
.header-marca-tag {
  font-size: 11px;
  color: rgba(255,255,255,.7);
  text-transform: uppercase;
  letter-spacing: .5px;
}

/* ===== SELETOR DE CLIENTE ===== */
#seletor-cliente {
  padding: 10px 24px;
  background: rgba(0,0,0,.12);
}
.seletor-grid {
  display: flex;
  align-items: flex-end;
  gap: 16px;
  flex-wrap: wrap;
}
.seletor-campo {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.seletor-campo label {
  font-size: 11px;
  color: rgba(255,255,255,.7);
  text-transform: uppercase;
  letter-spacing: .5px;
}
.seletor-campo select {
  background: #fff;
  border: none;
  border-radius: 6px;
  padding: 7px 12px;
  font-size: 13px;
  color: var(--texto);
  min-width: 220px;
  cursor: pointer;
}
.seletor-vazio {
  color: rgba(255,255,255,.85);
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.filiais-barra {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid rgba(255,255,255,.15);
}
.filiais-rotulo {
  font-size: 11px;
  color: rgba(255,255,255,.7);
  text-transform: uppercase;
  letter-spacing: .5px;
}
.filial-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,.12);
  color: rgba(255,255,255,.9);
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  cursor: pointer;
  user-select: none;
  transition: background .15s;
}
.filial-chip:hover { background: rgba(255,255,255,.22); }
.filial-chip.sel {
  background: #FF6B35;
  border-color: #FF6B35;
  color: #fff;
  font-weight: 600;
}
.filial-chip input { margin: 0; accent-color: #fff; cursor: pointer; }
.filial-chip input:disabled { opacity: .4; }

/* ===== NAV ===== */
#nav-principal {
  display: flex;
  gap: 4px;
  padding: 0 24px;
  background: var(--primaria-clara);
}
.nav-item {
  background: transparent;
  border: none;
  color: rgba(255,255,255,.8);
  padding: 12px 18px;
  cursor: pointer;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 7px;
  border-bottom: 3px solid transparent;
  transition: all .15s;
}
.nav-item:hover { color: #fff; background: rgba(255,255,255,.06); }
.nav-item.ativo {
  color: #fff;
  border-bottom-color: var(--accent-claro);
  font-weight: 600;
}
.nav-icone { font-size: 15px; }

/* ===== LAYOUT ===== */
#conteudo {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
}

.carregando, .erro-tela {
  padding: 40px;
  text-align: center;
  color: var(--texto-fraco);
}
.erro-tela { color: var(--danger); }

/* ===== CARDS ===== */
.card {
  background: var(--bg-card);
  border: 1px solid var(--borda);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 18px;
  box-shadow: var(--sombra);
}
.card h3 {
  color: var(--primaria);
  font-size: 15px;
  margin-bottom: 12px;
}
.card h4 { color: var(--primaria-clara); font-size: 13px; }

/* ===== ETAPA HEADER ===== */
.etapa-header { margin-bottom: 18px; }
.etapa-header h2 {
  color: var(--primaria);
  font-size: 20px;
  margin-bottom: 4px;
}
.etapa-desc {
  color: var(--texto-fraco);
  font-size: 13px;
  max-width: 720px;
}

/* ===== INÍCIO ===== */
.inicio-hero {
  text-align: center;
  padding: 28px 20px 8px;
}
.inicio-hero h1 {
  color: var(--primaria);
  font-size: 30px;
  letter-spacing: -.8px;
  margin-bottom: 10px;
}
.inicio-sub {
  color: var(--texto-fraco);
  max-width: 620px;
  margin: 0 auto;
  font-size: 14px;
}
.inicio-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
  gap: 14px;
  margin: 24px 0;
}
.inicio-card {
  background: var(--bg-card);
  border: 1px solid var(--borda);
  border-radius: var(--radius);
  padding: 20px;
  cursor: pointer;
  transition: all .15s;
  box-shadow: var(--sombra);
}
.inicio-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: var(--sombra-md);
}
.inicio-card-icone { font-size: 28px; margin-bottom: 10px; }
.inicio-card h3 { color: var(--primaria); font-size: 15px; margin-bottom: 6px; }
.inicio-card p { color: var(--texto-fraco); font-size: 12.5px; }

.rodape-versao {
  margin-top: 8px;
  padding: 14px 18px;
  background: var(--bg-destaque);
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--primaria-clara);
}

/* ===== DROPZONE ===== */
.dropzone {
  border: 2px dashed var(--borda);
  border-radius: var(--radius);
  padding: 40px 20px;
  text-align: center;
  cursor: pointer;
  transition: all .15s;
  color: var(--texto-fraco);
}
.dropzone:hover, .dropzone.dragover {
  border-color: var(--accent);
  background: var(--bg-warn);
}
.dropzone-icon { font-size: 36px; margin-bottom: 10px; }
.dropzone-hint { font-size: 12px; color: var(--texto-fraco); margin-top: 4px; }

/* ===== TABELAS ===== */
.tabela-dados {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.tabela-dados th {
  background: var(--primaria);
  color: #fff;
  text-align: left;
  padding: 9px 12px;
  font-weight: 600;
  font-size: 12px;
}
.tabela-dados td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--borda);
}
.tabela-dados tbody tr:nth-child(even) { background: var(--bg-alt); }
.tabela-dados tbody tr:hover { background: var(--bg-destaque); }

/* ===== FORM ===== */
.form-grid { display: flex; flex-direction: column; gap: 12px; }
.form-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.form-row label {
  width: 130px;
  font-size: 13px;
  color: var(--texto-fraco);
  flex-shrink: 0;
}
.form-row input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid var(--borda);
  border-radius: 6px;
  font-size: 13px;
}
.form-row input:focus {
  outline: none;
  border-color: var(--accent);
}

/* ===== BOTÕES ===== */
.btn {
  background: #fff;
  border: 1px solid var(--borda);
  border-radius: 6px;
  padding: 8px 16px;
  font-size: 13px;
  cursor: pointer;
  color: var(--texto);
  transition: all .15s;
}
.btn:hover { background: var(--bg-alt); border-color: var(--primaria-clara); }
.btn-primary {
  background: var(--primaria);
  color: #fff;
  border-color: var(--primaria);
}
.btn-primary:hover { background: var(--primaria-clara); }
.btn-danger {
  background: #fff;
  color: var(--danger);
  border-color: var(--danger);
}
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-small { padding: 6px 12px; font-size: 12px; }
.btn-mini { padding: 4px 10px; font-size: 11px; }

/* ===== BADGES ===== */
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.badge-sped { background: #dde9ec; color: var(--primaria); }
.badge-xml { background: #f0e2d2; color: var(--accent); }

/* ===== STAT BOXES ===== */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 12px;
}
.stat-box {
  background: var(--bg-destaque);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}
.stat-num {
  font-size: 26px;
  font-weight: 700;
  color: var(--primaria);
}
.stat-label {
  font-size: 11px;
  color: var(--texto-fraco);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-top: 2px;
}

/* ===== PERÍODO CHIPS ===== */
.periodo-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.periodo-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--bg-alt);
  border: 1px solid var(--borda);
  border-radius: 16px;
  padding: 4px 6px 4px 12px;
  font-size: 12px;
  font-family: 'SF Mono', Menlo, monospace;
}
.chip-x {
  background: var(--danger);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
}
.chip-x:hover { background: #c23b3b; }

/* ===== CONSTRUÇÃO (placeholder) ===== */
.construcao { text-align: center; padding: 20px; }
.construcao-icone { font-size: 40px; margin-bottom: 12px; }
.construcao h3 { color: var(--accent); font-size: 18px; margin-bottom: 10px; }
.construcao p { color: var(--texto-fraco); max-width: 640px; margin: 0 auto; }
.familia-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 12px;
  margin-top: 14px;
}
.familia-box {
  background: var(--bg-destaque);
  border-radius: var(--radius);
  padding: 14px;
  text-align: left;
}
.familia-box strong { color: var(--primaria); display: block; margin-bottom: 4px; font-size: 13px; }
.familia-box span { color: var(--texto-fraco); font-size: 12px; }

/* ===== MONO ===== */
.mono {
  font-family: 'SF Mono', Menlo, Monaco, 'Courier New', monospace;
  font-size: 12px;
}

/* ===== FOOTER ===== */
.app-footer {
  text-align: center;
  padding: 20px;
  color: var(--texto-fraco);
  font-size: 12px;
  border-top: 1px solid var(--borda);
  margin-top: 20px;
}

/* ===== ABAS ===== */
.abas {
  display: flex;
  gap: 2px;
  border-bottom: 2px solid var(--borda);
  margin-bottom: 18px;
  flex-wrap: wrap;
}
.aba {
  background: transparent;
  border: none;
  padding: 10px 18px;
  cursor: pointer;
  font-size: 13px;
  color: var(--texto-fraco);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: all .15s;
}
.aba:hover { color: var(--primaria); }
.aba.ativa {
  color: var(--primaria);
  border-bottom-color: var(--accent);
  font-weight: 600;
}

/* ===== FONTES BADGE (origem do dado) ===== */
.fonte {
  display: inline-block;
  width: 18px;
  height: 18px;
  line-height: 18px;
  text-align: center;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 700;
  margin-right: 2px;
}
.fonte-f { background: #13343b; color: #fff; }
.fonte-c { background: #b3611c; color: #fff; }
.fonte-x { background: #2a6b3a; color: #fff; }

/* ===== AUDITORIAS CRUZADAS ===== */
.aud-regras { display: flex; flex-direction: column; gap: 8px; }
.aud-regra {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border: 1px solid var(--borda); border-radius: 6px;
  cursor: pointer; font-size: 13px; transition: background .12s;
}
.aud-regra:hover { background: var(--bg-alt); }
.aud-regra input { width: 16px; height: 16px; cursor: pointer; }

.aud-prog { margin-top: 14px; }
.aud-prog-barra { height: 8px; background: var(--bg-alt); border-radius: 6px; overflow: hidden; }
.aud-prog-fill { height: 100%; width: 0; background: var(--primaria); transition: width .2s; }
.aud-prog-txt { font-size: 12px; color: var(--texto-fraco); margin-top: 6px; }

.aud-lista { display: flex; flex-direction: column; gap: 12px; }
.aud-achado {
  border: 1px solid var(--borda); border-left: 4px solid var(--borda);
  border-radius: 8px; padding: 12px 14px; background: #fff;
}
.aud-achado.sev-alta { border-left-color: var(--danger); }
.aud-achado.sev-media { border-left-color: var(--accent); }
.aud-achado.sev-baixa { border-left-color: var(--primaria-clara); }
.aud-achado-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
.aud-tipo { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; color: var(--primaria); }
.aud-periodo { font-size: 12px; color: var(--texto-fraco); }
.aud-valor { margin-left: auto; font-size: 15px; font-weight: 700; color: var(--primaria); }
.aud-achado-titulo { font-size: 14px; font-weight: 600; color: var(--texto); margin-bottom: 4px; }
.aud-achado-desc { font-size: 13px; color: #3a4a4a; line-height: 1.5; }
.aud-achado-legal { font-size: 11px; color: var(--texto-fraco); margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--borda); }
.aud-achado-refs { font-size: 11px; color: var(--texto-fraco); margin-top: 6px; font-family: ui-monospace, Menlo, monospace; }

.sev-badge-alta { background: #f6dcdc; color: var(--danger); }
.sev-badge-media { background: #f3e2cf; color: var(--accent); }
.sev-badge-baixa { background: #dde9ec; color: var(--primaria); }
.nat-badge-credito { background: #d8ece0; color: var(--success); }
.nat-badge-erro { background: #f6dcdc; color: var(--danger); }
.nat-badge-risco { background: #f3e2cf; color: var(--accent); }

/* =====================================================================
   ESPECIALIZAÇÃO (aba de inventário de conhecimento)
   ===================================================================== */
.esp-foco { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
@media (max-width: 720px) { .esp-foco { grid-template-columns: 1fr; } }
.esp-foco-rotulo {
  font-size: 11px; text-transform: uppercase; letter-spacing: .5px;
  color: var(--texto-fraco); font-weight: 700; margin-bottom: 8px;
}
.esp-cards { display: flex; flex-direction: column; gap: 10px; }
.esp-card {
  border: 1px solid var(--borda); border-left: 4px solid var(--accent);
  border-radius: 6px; padding: 12px 14px; background: var(--bg-card);
}
.esp-card-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
.esp-card-top strong { color: var(--primaria); font-size: 14px; }
.esp-card-meta { font-size: 11px; color: var(--texto-fraco); font-family: 'SF Mono', Menlo, monospace; margin-bottom: 6px; }
.esp-card-obs { font-size: 12.5px; color: #3a4a4a; line-height: 1.5; }

.esp-nivel { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; letter-spacing: .03em; }
.esp-nivel-ok { background: #d8ece0; color: var(--success); }
.esp-nivel-parc { background: #f3e2cf; color: var(--accent); }
.esp-nivel-road { background: var(--bg-alt); color: var(--texto-fraco); }

.esp-roadmap { margin-top: 10px; font-size: 12px; color: var(--texto-fraco); padding: 8px 10px; background: var(--bg-alt); border-radius: 6px; }
.esp-roadmap strong { color: var(--primaria-clara); }
.esp-conta { font-size: 12px; font-weight: 400; color: var(--texto-fraco); }

.esp-cap-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 10px; }
.esp-cap { display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px; background: var(--bg-destaque); border-radius: 6px; }
.esp-cap-check {
  flex-shrink: 0; width: 20px; height: 20px; border-radius: 50%;
  background: var(--success); color: #fff; font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; margin-top: 1px;
}
.esp-cap strong { display: block; color: var(--primaria); font-size: 13px; margin-bottom: 2px; }
.esp-cap-desc { font-size: 11.5px; color: var(--texto-fraco); line-height: 1.45; }

.esp-cob { display: flex; flex-direction: column; gap: 9px; margin-top: 10px; }
.esp-cob-linha { display: grid; grid-template-columns: 210px 1fr 48px; align-items: center; gap: 12px; }
@media (max-width: 620px) { .esp-cob-linha { grid-template-columns: 130px 1fr 40px; } }
.esp-cob-rotulo { font-size: 12.5px; color: var(--texto); }
.esp-cob-barra { height: 14px; border-radius: 7px; overflow: hidden; display: flex; background: var(--bg-alt); }
.esp-cob-impl { background: var(--success); height: 100%; }
.esp-cob-doc { background: #d9c3a6; height: 100%; }
.esp-cob-conta { font-size: 12px; font-weight: 600; color: var(--texto-fraco); text-align: right; }
.esp-legenda { display: flex; gap: 18px; margin-top: 12px; font-size: 12px; color: var(--texto-fraco); }
.esp-legenda span { display: flex; align-items: center; gap: 6px; }
.esp-leg-box { width: 12px; height: 12px; border-radius: 3px; display: inline-block; }
.esp-leg-impl { background: var(--success); }
.esp-leg-doc { background: #d9c3a6; }

.esp-prog-geral { margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--borda); }
.esp-prog-cab { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: var(--texto); margin-bottom: 8px; }
.esp-prog-cab strong { color: var(--primaria); font-size: 16px; }
.esp-prog-barra { height: 10px; background: var(--bg-alt); border-radius: 6px; overflow: hidden; }
.esp-prog-fill { height: 100%; background: linear-gradient(90deg, var(--primaria), var(--primaria-clara)); }
.esp-prog-nota { font-size: 12px; color: var(--texto-fraco); margin-top: 10px; line-height: 1.5; }

/* =====================================================================
   DOSSIÊ DO PROGRAMA (aba de documentação viva)
   ===================================================================== */
.dprog-acoes { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.dprog-meta { font-size: 12px; color: var(--texto-fraco); margin-left: auto; }

.dprog-telas { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 10px; }
.dprog-tela { border: 1px solid var(--borda); border-radius: 6px; padding: 12px 14px; background: var(--bg-card); }
.dprog-tela-cab { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.dprog-tela-ic { font-size: 17px; }
.dprog-tela-cab strong { color: var(--primaria); font-size: 13.5px; }
.dprog-tela-grupo { margin-left: auto; font-size: 10px; text-transform: uppercase; letter-spacing: .4px; color: var(--texto-fraco); background: var(--bg-alt); padding: 2px 8px; border-radius: 10px; }
.dprog-tela-desc { font-size: 12px; color: #3a4a4a; line-height: 1.5; }

.dprog-area { margin-bottom: 18px; }
.dprog-area-cab { display: flex; align-items: baseline; gap: 12px; border-bottom: 2px solid var(--bg-alt); padding-bottom: 5px; margin-bottom: 10px; }
.dprog-area-cab h4 { color: var(--primaria); font-size: 14px; margin: 0; }
.dprog-area-conta { font-size: 11px; color: var(--texto-fraco); }
.dprog-auds { display: flex; flex-direction: column; gap: 10px; }

.dprog-aud { border: 1px solid var(--borda); border-radius: 7px; padding: 12px 14px; background: #fff; }
.dprog-aud-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
.dprog-aud-id { font-family: 'SF Mono', Menlo, monospace; font-size: 11px; font-weight: 700; color: #fff; background: var(--primaria); padding: 2px 8px; border-radius: 4px; }
.dprog-aud-nome { font-size: 13.5px; color: var(--texto); flex: 1; min-width: 180px; }
.dprog-aud-corpo { display: flex; flex-direction: column; gap: 6px; }
.dprog-aud-linha { display: grid; grid-template-columns: 92px 1fr; gap: 10px; font-size: 12.5px; }
.dprog-aud-linha > span { font-size: 11px; text-transform: uppercase; letter-spacing: .4px; color: var(--texto-fraco); font-weight: 700; padding-top: 1px; }
.dprog-aud-linha > div { color: #3a4a4a; line-height: 1.5; }

.dp-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: .03em; }
.dp-tipo-rec { background: #d8ece0; color: var(--success); }
.dp-tipo-risco { background: #f3e2cf; color: var(--accent); }
.dp-tipo-ambos { background: #dde9ec; color: var(--primaria); }
.dp-tipo-conf { background: var(--bg-alt); color: var(--texto-fraco); }
.dp-tipo-info { background: var(--bg-alt); color: var(--texto-fraco); }
.dp-sev-alta { background: #f6dcdc; color: var(--danger); }
.dp-sev-media { background: #f3e2cf; color: var(--accent); }
.dp-sev-baixa { background: #dde9ec; color: var(--primaria-clara); }
.dp-st-impl { background: var(--success); color: #fff; }
.dp-st-dev { background: var(--accent); color: #fff; }
.dp-st-plan { background: var(--bg-alt); color: var(--texto-fraco); border: 1px solid var(--borda); }

/* ===== Auditorias: clique na regra + modal de detalhe + inventário ===== */
.aud-tabela-regras .aud-regra-linha { cursor: pointer; transition: background .12s; }
.aud-tabela-regras .aud-regra-linha:hover { background: var(--bg-destaque); }
.aud-chevron { color: var(--texto-fraco); font-weight: 700; margin-left: 6px; }

.aud-modal-overlay {
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(10, 20, 22, .55);
  display: flex; align-items: flex-start; justify-content: center;
  padding: 40px 16px; overflow-y: auto;
}
.aud-modal-box {
  background: var(--bg-card); width: 100%; max-width: 760px;
  border-radius: var(--radius); box-shadow: var(--sombra-md);
  border: 1px solid var(--borda); overflow: hidden;
  animation: aud-modal-in .14s ease-out;
}
@keyframes aud-modal-in { from { transform: translateY(-8px); opacity: 0; } to { transform: none; opacity: 1; } }
.aud-modal-head {
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  padding: 16px 20px; border-bottom: 1px solid var(--borda);
  position: sticky; top: 0; background: var(--bg-card);
}
.aud-modal-head h3 { margin: 0; font-size: 16px; color: var(--primaria); }
.aud-modal-x {
  border: none; background: transparent; cursor: pointer;
  font-size: 18px; color: var(--texto-fraco); line-height: 1; padding: 4px 8px; border-radius: 6px;
}
.aud-modal-x:hover { background: var(--bg-destaque); color: var(--texto); }
.aud-modal-body { padding: 16px 20px; max-height: 70vh; overflow-y: auto; }
.aud-modal-vazio { color: var(--texto-fraco); padding: 8px 0; }
.aud-modal-sumario { font-weight: 700; color: var(--primaria); margin-bottom: 12px; }

.aud-modal-achado { border: 1px solid var(--borda); border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; }
.aud-modal-achado-top { display: flex; justify-content: space-between; gap: 10px; font-size: 12px; color: var(--texto-fraco); margin-bottom: 4px; }
.aud-modal-achado-top .aud-valor { font-weight: 700; color: var(--primaria); }
.aud-modal-achado-titulo { font-weight: 600; margin-bottom: 6px; }
.aud-modal-achado-desc { margin: 0 0 8px; line-height: 1.5; }
.aud-modal-legal { background: var(--bg-destaque); border-left: 3px solid var(--accent); padding: 8px 10px; border-radius: 4px; font-size: 13px; line-height: 1.5; }
.aud-modal-refs { margin-top: 8px; font-size: 12px; color: var(--texto-fraco); }

/* ===== Auditorias v2: KPIs, abas de visão, temas e filtros ===== */
.aud-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 14px; }
.aud-kpi { border: 1px solid var(--borda); border-radius: 12px; padding: 14px 16px; background: var(--bg-card, #fff);
  cursor: pointer; transition: transform .12s, box-shadow .12s; position: relative; overflow: hidden; }
.aud-kpi:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(22,54,91,.13); }
.aud-kpi::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
.aud-kpi.k-cred::before { background: #1a7f4b; } .aud-kpi.k-risco::before { background: #c0392b; }
.aud-kpi.k-erro::before { background: #b26a00; } .aud-kpi.k-tot::before { background: var(--primaria); }
.aud-kpi .k-rot { font-size: 11px; letter-spacing: .5px; text-transform: uppercase; color: var(--texto-fraco); }
.aud-kpi .k-val { font-family: var(--ff-display); font-weight: 800; font-size: 21px; margin: 3px 0 1px; }
.aud-kpi.k-cred .k-val { color: #1a7f4b; } .aud-kpi.k-risco .k-val { color: #c0392b; }
.aud-kpi.k-erro .k-val { color: #b26a00; } .aud-kpi.k-tot .k-val { color: var(--primaria); }
.aud-kpi .k-sub { font-size: 11.5px; color: var(--texto-fraco); }
.aud-vtabs { display: flex; gap: 6px; background: var(--bg-destaque); border-radius: 10px; padding: 5px; width: max-content; margin: 6px 0 14px; }
.aud-vtabs button { border: none; background: transparent; padding: 8px 18px; border-radius: 8px; font-weight: 700; cursor: pointer; color: var(--texto-fraco); font-size: 13.5px; }
.aud-vtabs button.ativa { background: #fff; color: var(--primaria); box-shadow: 0 1px 5px rgba(0,0,0,.12); }
.aud-sec-tit { display: flex; align-items: center; gap: 8px; font-size: 15px; margin: 20px 0 10px; color: var(--primaria); }
.aud-sec-tit .n { font-size: 12px; font-weight: 400; color: var(--texto-fraco); }
.aud-temas { display: grid; grid-template-columns: repeat(auto-fill, minmax(255px, 1fr)); gap: 12px; }
.aud-tema { border: 1px solid var(--borda); border-left-width: 4px; border-radius: 11px; padding: 12px 14px; background: #fff;
  cursor: pointer; transition: transform .12s, box-shadow .12s; }
.aud-tema:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(22,54,91,.14); }
.aud-tema.t-cred { border-left-color: #1a7f4b; } .aud-tema.t-risco { border-left-color: #c0392b; } .aud-tema.t-erro { border-left-color: #b26a00; }
.aud-tema-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.aud-tema-id { font-family: monospace; font-size: 11px; color: var(--texto-fraco); }
.aud-tema-esf { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
.aud-tema-esf.est { background: #e8f0fa; color: #1f4e78; } .aud-tema-esf.fed { background: #f1e9fa; color: #6b3fa0; }
.aud-tema { position: relative; }
.aud-tema.t-off { opacity: .38; filter: grayscale(.85); }
.aud-tema.t-off:hover { opacity: .6; }
.aud-tema-toggle { border: 1px solid var(--borda); background: #fff; color: #1a7f4b; border-radius: 50%;
  width: 24px; height: 24px; font-size: 13px; line-height: 1; cursor: pointer; font-weight: 700; }
.aud-tema-toggle:hover { border-color: #1a7f4b; box-shadow: 0 0 0 2px rgba(26,127,75,.15); }
.aud-tema-toggle.off { color: #98a5b0; border-style: dashed; }
.aud-esf-bloco { border: 1px solid var(--borda); border-radius: 14px; padding: 14px 16px 16px; margin: 16px 0; }
.aud-esf-bloco.est { border-left: 5px solid #1f4e78; background: linear-gradient(180deg, #f7fafd, #fff 60px); }
.aud-esf-bloco.fed { border-left: 5px solid #6b3fa0; background: linear-gradient(180deg, #faf7fd, #fff 60px); }
.aud-esf-tit { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
  font-family: var(--ff-display); font-weight: 800; font-size: 15px; color: var(--primaria); margin-bottom: 4px; }
.aud-esf-tit .aud-esf-tot { font-size: 12.5px; font-weight: 700; color: var(--texto-fraco); }
.aud-tot-linha td { font-weight: 800; background: var(--bg-destaque); }
.aud-tot-esf { cursor: pointer; } .aud-tot-esf:hover td { background: var(--bg-destaque); }
.aud-btn-selic { margin-left: 10px; font-size: 11.5px; font-weight: 700; border: 1px solid var(--borda);
  background: #fff; color: var(--primaria); border-radius: 8px; padding: 4px 10px; cursor: pointer; }
.aud-btn-selic:hover { border-color: var(--primaria); }
.aud-tema-corr { font-size: 11.5px; color: #1f4e78; font-weight: 700; margin-top: -2px; }
.aud-valor-corr { font-size: 11px; color: #1f4e78; font-weight: 700; }
.selic-grid input { width: 58px; padding: 3px 4px; border: 1px solid var(--borda); border-radius: 5px; font-size: 11.5px; text-align: right; }
.selic-grid td, .selic-grid th { padding: 3px 4px; }
.selic-inp.selic-ov { background: #fdf3e7; border-color: #FF6B35; }
.selic-inp.selic-vazio { background: #f5f8fb; border-style: dashed; }
.aud-det-bloco { font-family: var(--ff-display); font-weight: 800; font-size: 13px; letter-spacing: .4px;
  padding: 9px 14px; border-radius: 10px; margin: 14px 0 8px; }
.aud-det-bloco.est { background: #e8f0fa; color: #1f4e78; border-left: 5px solid #1f4e78; }
.aud-det-bloco.fed { background: #f1e9fa; color: #6b3fa0; border-left: 5px solid #6b3fa0; }
.aud-tema-val { font-family: var(--ff-display); font-weight: 800; font-size: 19px; }
.aud-tema.t-cred .aud-tema-val { color: #1a7f4b; } .aud-tema.t-risco .aud-tema-val { color: #c0392b; } .aud-tema.t-erro .aud-tema-val { color: #b26a00; }
.aud-tema-nome { font-weight: 600; font-size: 13px; margin: 3px 0 5px; line-height: 1.35; }
.aud-tema-meta { font-size: 11.5px; color: var(--texto-fraco); }
.aud-tema-cta { font-size: 11px; color: var(--accent); font-weight: 700; margin-top: 7px; }
.aud-filtros { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; background: var(--bg-destaque);
  border: 1px solid var(--borda); border-radius: 11px; padding: 10px 12px; margin-bottom: 12px; }
.aud-chip { border: 1px solid var(--borda); background: #fff; border-radius: 20px; padding: 5px 13px; font-size: 12.5px; font-weight: 600; cursor: pointer; color: var(--texto-fraco); }
.aud-chip.ativa { color: #fff; border-color: transparent; }
.aud-chip.c-todos.ativa { background: var(--primaria); } .aud-chip.c-cred.ativa { background: #1a7f4b; }
.aud-chip.c-risco.ativa { background: #c0392b; } .aud-chip.c-erro.ativa { background: #b26a00; }
.aud-filtros select, .aud-filtros input[type=text] { border: 1px solid var(--borda); border-radius: 8px; padding: 6px 9px; font-size: 12.5px; background: #fff; max-width: 210px; }
.aud-filtros .aud-f-limpar { margin-left: auto; font-size: 12px; color: var(--accent); cursor: pointer; font-weight: 700; background: none; border: none; }
.aud-det-contador { font-size: 12.5px; color: var(--texto-fraco); margin: 2px 2px 10px; }
.aud-achado.clicavel { cursor: pointer; transition: box-shadow .12s; }
.aud-achado.clicavel:hover { box-shadow: 0 4px 14px rgba(22,54,91,.14); }
.aud-fil-linha { cursor: pointer; } .aud-fil-linha:hover td { background: var(--bg-destaque); }
.aud-modal-tese { background: #f2f7f4; border-left: 4px solid #1a7f4b; border-radius: 6px; padding: 10px 13px; margin: 10px 0; line-height: 1.55; font-size: 13.5px; }
.aud-modal-mini { width: 100%; border-collapse: collapse; font-size: 12px; margin: 8px 0; }
.aud-modal-mini th { background: var(--primaria); color: #fff; text-align: left; padding: 5px 8px; font-size: 11px; }
.aud-modal-mini td { border-bottom: 1px solid var(--borda); padding: 4px 8px; }
.aud-modal-cta { display: block; width: 100%; margin-top: 12px; background: var(--accent); color: #fff; border: none;
  border-radius: 9px; padding: 11px; font-weight: 800; font-size: 13.5px; cursor: pointer; }
.aud-vermais { display: block; margin: 12px auto; background: var(--bg-destaque); border: 1px solid var(--borda); border-radius: 9px; padding: 9px 22px; font-weight: 700; cursor: pointer; }
@media (max-width: 1100px) { .aud-kpis { grid-template-columns: repeat(2, 1fr); } }
.aud-ref-k { color: var(--texto); font-weight: 600; }

/* inventário */
.inv-intro { color: var(--texto-fraco); font-size: 13px; line-height: 1.5; margin: 0 0 12px; }
.inv-tabela { width: 100%; border-collapse: collapse; }
.inv-tabela th, .inv-tabela td { text-align: left; padding: 10px; border-bottom: 1px solid var(--borda); vertical-align: top; }
.inv-tabela th { font-size: 12px; color: var(--texto-fraco); text-transform: uppercase; letter-spacing: .03em; }
.inv-freq { font-size: 11px; color: var(--texto-fraco); }
.inv-faixa { display: inline-block; background: var(--bg-destaque); border-radius: 4px; padding: 2px 8px; margin: 2px 4px 2px 0; font-size: 13px; white-space: nowrap; }
.inv-falta { color: var(--danger); font-weight: 600; font-size: 13px; }
.inv-ok { color: var(--success); font-size: 13px; }

/* inventário: declaração não importada */
.inv-naoimp { color: var(--danger); font-style: italic; font-size: 13px; }
.inv-linha-naoimp td { background: rgba(155, 44, 44, .045); }

/* ===================== Painel de auditoria (hero + esferas + abas) ===================== */
.aud-hero {
  background: linear-gradient(135deg, #1a0a5e 0%, #4a1fb8 55%, #7b2ff7 100%);
  border-radius: 16px; padding: 22px 24px; color: #fff; margin-bottom: 18px;
  box-shadow: 0 12px 34px rgba(26, 10, 94, .28);
  display: flex; gap: 24px; align-items: center; flex-wrap: wrap;
}
.aud-hero-l { flex: 1 1 230px; }
.aud-hero-rot { font-size: 12px; letter-spacing: .06em; text-transform: uppercase; opacity: .78; }
.aud-hero-total { font-size: 38px; font-weight: 800; line-height: 1.08; margin: 4px 0 6px; letter-spacing: -.5px; }
.aud-hero-meta { font-size: 13px; opacity: .82; }
.aud-hero-split { display: flex; gap: 14px; flex: 2 1 360px; flex-wrap: wrap; }
.aud-esf-card {
  flex: 1 1 168px; background: rgba(255, 255, 255, .10); border: 1px solid rgba(255, 255, 255, .20);
  border-radius: 12px; padding: 14px 16px;
}
.aud-esf-head { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; opacity: .95; margin-bottom: 8px; }
.aud-esf-bar { width: 10px; height: 10px; border-radius: 3px; display: inline-block; flex: none; }
.aud-esf-card.est .aud-esf-bar { background: #ff6b35; }
.aud-esf-card.fed .aud-esf-bar { background: #c4b5fd; }
.aud-esf-valor { font-size: 25px; font-weight: 800; letter-spacing: -.3px; }
.aud-esf-sub { font-size: 12px; opacity: .8; margin-top: 2px; }

.aud-abas { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.aud-aba {
  border: 1px solid var(--borda); background: var(--bg-card); color: var(--texto);
  border-radius: 999px; padding: 9px 16px; cursor: pointer; font-size: 14px; font-weight: 600;
  display: inline-flex; align-items: center; gap: 8px; transition: all .14s; line-height: 1;
}
.aud-aba:hover { border-color: var(--primaria); }
.aud-aba-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
.aud-aba.est .aud-aba-dot { background: #ff6b35; }
.aud-aba.fed .aud-aba-dot { background: #7b2ff7; }
.aud-aba-badge { font-size: 12px; font-weight: 700; opacity: .7; }
.aud-aba.ativa { color: #fff; }
.aud-aba.ativa.est { background: #1a0a5e; border-color: #1a0a5e; }
.aud-aba.ativa.fed { background: #7b2ff7; border-color: #7b2ff7; }
.aud-aba.ativa.est .aud-aba-dot { background: #ff6b35; }
.aud-aba.ativa.fed .aud-aba-dot { background: #fff; }
.aud-aba.ativa .aud-aba-badge { opacity: .95; }

/* =====================================================================
   ===== IDENTIDADE PRIME v3.13 — overrides modernos (navy + coral) =====
   ===================================================================== */

/* tipografia de display nos títulos e números */
h1, h2, h3, .stat-num, .inicio-hero h1, .etapa-header h2, .card h3, .inicio-card h3,
.aud-hero-total, .aud-esf-valor, .esp-prog-cab strong, .aud-modal-head h3 { font-family: var(--ff-display); }
.stat-num, .aud-hero-total, .aud-esf-valor { letter-spacing: -.4px; }

/* ===== HEADER ===== */
.app-header {
  background: linear-gradient(120deg, #0E2745 0%, #16365B 55%, #1E4A78 100%);
  box-shadow: 0 6px 24px rgba(14,39,69,.22);
}
.header-top { padding: 14px 28px; border-bottom: none; gap: 16px; }
.header-marca { gap: 13px; }
.brand-logo { width: 44px; height: 44px; flex: none; filter: drop-shadow(0 4px 10px rgba(255,107,53,.28)); }
.brand-logo .bar { transform-origin: center bottom; animation: barUp .6s cubic-bezier(.22,1,.36,1) both; }
.brand-logo .bar:nth-child(1){ animation-delay:.02s } .brand-logo .bar:nth-child(2){ animation-delay:.10s }
.brand-logo .bar:nth-child(3){ animation-delay:.18s } .brand-logo .bar:nth-child(4){ animation-delay:.26s }
.brand-arrow { stroke-dasharray: 60; stroke-dashoffset: 60; animation: arrowDraw .7s ease-out .28s forwards; }
@keyframes barUp { from { transform: scaleY(0) } to { transform: scaleY(1) } }
@keyframes arrowDraw { to { stroke-dashoffset: 0 } }
.brand-txt { display: flex; flex-direction: column; line-height: 1.05; }
.brand-l1 { font-family: var(--ff-display); font-weight: 500; font-size: 13px; letter-spacing: .02em; color: rgba(255,255,255,.72); }
.brand-l2 { font-family: var(--ff-display); font-weight: 700; font-size: 21px; letter-spacing: .04em; color: #fff; }
.chip-ver { font-family: var(--ff-mono); font-size: 11px; color: rgba(255,255,255,.82); background: rgba(255,255,255,.10); border: 1px solid rgba(255,255,255,.16); padding: 5px 11px; border-radius: 999px; white-space: nowrap; }
#banner-nova-versao { position: fixed; left: 50%; transform: translateX(-50%); bottom: 18px; z-index: 9999; display: flex; align-items: center; gap: 14px; background: var(--primaria); color: #fff; padding: 12px 18px; border-radius: 12px; box-shadow: 0 8px 28px rgba(0,0,0,.28); font-family: var(--ff-body); font-size: 13.5px; max-width: 92vw; }
#banner-nova-versao b { color: var(--accent); }

<script>
// ===================== utils.js =====================
// =====================================================================
// Revisor Fiscal Prime — utils.js
// Utilitários base: hash, formatação, datas, helpers genéricos.
// =====================================================================

const Utils = (function () {
  'use strict';

  // ------------------------------------------------------------------
  // HASH — SHA-256 (cadeia de custódia) e shortHash (IDs determinísticos)
  // ------------------------------------------------------------------

  /** SHA-256 completo de uma string. Retorna hex de 64 chars. */
  async function sha256(texto) {
    const enc = new TextEncoder();
    const data = enc.encode(texto);
    const buf = await crypto.subtle.digest('SHA-256', data);
    return Array.from(new Uint8Array(buf))
      .map(b => b.toString(16).padStart(2, '0'))
      .join('');
  }

  /** Hash curto determinístico (16 chars) para IDs. Não-criptográfico. */
  function shortHash(texto) {
    let h1 = 0xdeadbeef ^ texto.length;
    let h2 = 0x41c6ce57 ^ texto.length;
    for (let i = 0; i < texto.length; i++) {
      const ch = texto.charCodeAt(i);
      h1 = Math.imul(h1 ^ ch, 2654435761);
      h2 = Math.imul(h2 ^ ch, 1597334677);
    }
    h1 = Math.imul(h1 ^ (h1 >>> 16), 2246822507) ^ Math.imul(h2 ^ (h2 >>> 13), 3266489909);
    h2 = Math.imul(h2 ^ (h2 >>> 16), 2246822507) ^ Math.imul(h1 ^ (h1 >>> 13), 3266489909);
    const n = 4294967296 * (2097151 & h2) + (h1 >>> 0);
    return n.toString(16).padStart(16, '0');
  }

  // ------------------------------------------------------------------
  // CNPJ / CPF
  // ------------------------------------------------------------------

  function soDigitos(s) {
    return String(s || '').replace(/\D/g, '');
  }

  function formatarCNPJ(cnpj) {
    const d = soDigitos(cnpj).padStart(14, '0');
    return `${d.slice(0,2)}.${d.slice(2,5)}.${d.slice(5,8)}/${d.slice(8,12)}-${d.slice(12,14)}`;
  }

  function raizCNPJ(cnpj) {
    return soDigitos(cnpj).padStart(14, '0').slice(0, 8);
  }

  function validarCNPJ(cnpj) {
    const d = soDigitos(cnpj);
    if (d.length !== 14) return false;
    if (/^(\d)\1{13}$/.test(d)) return false;  // todos iguais
    // valida dígitos verificadores
    const calc = (base) => {
      let soma = 0, peso = base.length - 7;
      for (let i = 0; i < base.length; i++) {
        soma += parseInt(base[i]) * peso--;
        if (peso < 2) peso = 9;
      }
      const r = soma % 11;
      return r < 2 ? 0 : 11 - r;
    };
    const dv1 = calc(d.slice(0, 12));
    const dv2 = calc(d.slice(0, 12) + dv1);
    return d === d.slice(0, 12) + dv1 + dv2;
  }

  // ------------------------------------------------------------------
  // NÚMEROS / VALORES
  // ------------------------------------------------------------------

  /** Converte string numérica SPED (vírgula decimal) pra Number. */
  function parseNum(s) {
    if (s === null || s === undefined || s === '') return 0;
    if (typeof s === 'number') return s;
    return parseFloat(String(s).replace(/\./g, '').replace(',', '.')) || 0;
  }

  /** Converte número pra string com vírgula decimal (formato SPED). */
  function numParaSped(n, casas = 2) {
    return (n || 0).toFixed(casas).replace('.', ',');
  }

  function fmtBRL(n) {
    return (n || 0).toLocaleString('pt-BR', {
      minimumFractionDigits: 2, maximumFractionDigits: 2,
    });
  }

  function fmtNum(n, casas = 2) {
    return (n || 0).toLocaleString('pt-BR', {
      minimumFractionDigits: casas, maximumFractionDigits: casas,
    });
  }

  // ------------------------------------------------------------------
  // DATAS — SPED usa DDMMAAAA
  // ------------------------------------------------------------------

  /** DDMMAAAA → AAAA-MM-DD. */
  function dataSpedParaISO(s) {
    const d = soDigitos(s);
    if (d.length !== 8) return null;
    return `${d.slice(4,8)}-${d.slice(2,4)}-${d.slice(0,2)}`;
  }

  /** AAAA-MM-DD → DDMMAAAA. */
  function isoParaDataSped(iso) {
    if (!iso || iso.length < 10) return '';
    const [a, m, d] = iso.slice(0, 10).split('-');
    return `${d}${m}${a}`;
  }

  /** Extrai AAAA-MM de uma data ISO. */
  function mesDeISO(iso) {
    return iso ? iso.slice(0, 7) : null;
  }

  // ------------------------------------------------------------------
  // UNIDADES (reusa lógica do v7)
  // ------------------------------------------------------------------

  function normalizarUnidade(u) {
    if (!u) return '';
    return String(u).trim().toUpperCase()
      .replace(/\s+/g, '')
      .replace(/\./g, '');
  }

  // ------------------------------------------------------------------
  // EXCEL (exportação via SheetJS, carregado sob demanda)
  // ------------------------------------------------------------------

  async function exportarParaExcel(dados, nomeAba, nomeArquivo) {
    if (typeof XLSX === 'undefined') {
      alert('Biblioteca de exportação não carregada.');
      return;
    }
    const ws = XLSX.utils.json_to_sheet(dados);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, (nomeAba || 'Dados').slice(0, 31));
    const ts = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    XLSX.writeFile(wb, `${nomeArquivo || 'export'}_${ts}.xlsx`);
  }

  // ------------------------------------------------------------------
  // MISC
  // ------------------------------------------------------------------

  /** Lê um File como texto, tentando detectar encoding (UTF-8 / Latin1). */
  function lerArquivoTexto(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        let txt = e.target.result;
        // SPED brasileiro frequentemente é Latin1/Windows-1252
        // Se detectar caracteres de substituição, retenta como Latin1
        if (txt.includes('\uFFFD')) {
          const r2 = new FileReader();
          r2.onload = (e2) => resolve(e2.target.result);
          r2.onerror = reject;
          r2.readAsText(file, 'ISO-8859-1');
        } else {
          resolve(txt);
        }
      };
      reader.onerror = reject;
      reader.readAsText(file, 'UTF-8');
    });
  }

  function lerArquivoBuffer(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => resolve(e.target.result);
      reader.onerror = reject;
      reader.readAsArrayBuffer(file);
    });
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ------------------------------------------------------------------
  // XML / NF-e  (portado e adaptado do Apurador v7)
  // ------------------------------------------------------------------

  /** Normaliza chave NFe pra 44 dígitos. */
  function normalizarChaveNFe(chave) {
    if (!chave) return '';
    return String(chave).replace(/\D/g, '').padStart(44, '0').slice(-44);
  }

  /** Parse data XML ISO "2026-02-21T14:30:00-03:00" → "2026-02-21". */
  function parseDataXML(s) {
    if (!s) return null;
    return String(s).slice(0, 10);
  }

  /** Normaliza CNPJ pra 14 dígitos (zero-pad). */
  function normalizarCnpj(cnpj) {
    if (!cnpj) return '';
    return String(cnpj).replace(/\D/g, '').padStart(14, '0').slice(-14);
  }

  /**
   * Gera id_pareamento determinístico: hash(cnpj|periodo|chaveNFe|nItem).
   * É a costura universal entre XML e C170 do SPED.
   */
  function gerarIdPareamento(cnpj, periodo, chaveNFe, nItem) {
    return shortHash(`${cnpj}|${periodo}|${chaveNFe}|${nItem}`);
  }

  // ------------------------------------------------------------------
  // EAN  (código de barras — ponte do De/Para)
  // ------------------------------------------------------------------

  /** Limpa EAN: só dígitos, remove zeros à esquerda. */
  function limparEAN(s) {
    if (!s) return '';
    return String(s).replace(/\D/g, '').replace(/^0+/, '') || '0';
  }

  /** Compara dois EANs tratando DUN-14 ↔ EAN-13 ↔ UPC-12. */
  function eansBatem(a, b) {
    if (!a || !b) return false;
    const ca = limparEAN(a);
    const cb = limparEAN(b);
    if (ca === '0' || cb === '0') return false;
    if (ca === cb) return true;
    // DUN-14 ↔ EAN-13
    if (ca.length === 14 && cb.length === 13) {
      if (ca.substring(1, 13) === cb.substring(0, 12)) return true;
    }
    if (cb.length === 14 && ca.length === 13) {
      if (cb.substring(1, 13) === ca.substring(0, 12)) return true;
    }
    // UPC-12 ↔ DUN-14
    if (ca.length === 14 && cb.length === 12 && ca.endsWith(cb)) return true;
    if (cb.length === 14 && ca.length === 12 && cb.endsWith(ca)) return true;
    return false;
  }

  // ------------------------------------------------------------------
  // TEXTO / SIMILARIDADE (pareamento por descrição — Fase 6)
  // ------------------------------------------------------------------

  function removeAcentos(s) {
    if (!s) return '';
    return String(s).normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  function normDesc(s) {
    if (!s) return '';
    return removeAcentos(s).toUpperCase()
      .replace(/[.,;:!?'"()\-_\/\\]/g, ' ')
      .replace(/\s+/g, ' ').trim();
  }

  function tokenize(s) {
    const n = normDesc(s);
    return n ? n.split(' ').filter(t => t.length > 0) : [];
  }

  /**
   * Similaridade entre duas descrições — Jaccard ponderado de tokens.
   * Tokens com número valem mais (identificadores), stopwords valem menos.
   * Retorna 0..1.
   */
  function compararDescricoes(descA, descB) {
    const ta = tokenize(descA), tb = tokenize(descB);
    if (ta.length === 0 || tb.length === 0) return 0;
    const setA = new Set(ta), setB = new Set(tb);
    const todos = new Set([...setA, ...setB]);
    const STOP = ['DE','DA','DO','COM','PARA','EM','NO','NA'];
    let pesoTotal = 0, pesoIntersecao = 0;
    for (const t of todos) {
      let peso = 1.0;
      if (/\d/.test(t)) peso = 2.5;
      if (t.length <= 2) peso = 0.3;
      if (STOP.includes(t)) peso = 0.1;
      pesoTotal += peso;
      if (setA.has(t) && setB.has(t)) pesoIntersecao += peso;
    }
    return pesoTotal === 0 ? 0 : pesoIntersecao / pesoTotal;
  }

  return {
    sha256, shortHash,
    soDigitos, formatarCNPJ, raizCNPJ, validarCNPJ,
    parseNum, numParaSped, fmtBRL, fmtNum,
    dataSpedParaISO, isoParaDataSped, mesDeISO,
    normalizarUnidade,

    lerArquivoTexto, lerArquivoBuffer,
    escapeHtml,
    // XML / NF-e
    normalizarChaveNFe, parseDataXML, normalizarCnpj, gerarIdPareamento,
    // EAN
    limparEAN, eansBatem,
    // texto / similaridade
    removeAcentos, normDesc, tokenize, compararDescricoes,
  };
})();

    'J100': ['REG','COD_AGL','IND_COD_AGL','NIVEL_AGL','COD_AGL_SUP','IND_GRP_BAL','DESCR_COD_AGL','VL_CTA','IND_DC_BAL'],
    'J150': ['REG','NU_ORDEM','NIVEL_AGL','COD_AGL','IND_COD_AGL','COD_AGL_SUP','DESCR_COD_AGL','VL_CTA','IND_DC_CTA'],
  };

  // ==================================================================
  // ECF — Escrituração Contábil Fiscal (apuração IRPJ/CSLL)
  // Fonte: Manual da ECF. periodo = ANO. Foco: plano referencial,
  // saldos recuperados (K155) e Lalur/Lacs Parte A (M300/M350).
  // OBS: leiaute extenso e variável por forma de tributação — os
  // registros de apuração (bloco N) podem precisar de calibração.
  // ==================================================================
  const ECF = {
    // 0000: campo 2 é o literal "LECF"
    '0000': ['REG','LECF','DT_INI','DT_FIN','RETIFICADORA','NUM_REC_ANTERIOR','TIP_ECF','COD_SCP','NOME','CNPJ','UF','COD_MUN'],
    // J050: plano de contas / mapeamento referencial
    'J050': ['REG','DT_ALT','COD_NAT','IND_CTA','NIVEL','COD_CTA','COD_CTA_SUP','CTA'],
    'J051': ['REG','COD_CTA_REF','CTA_REF'],
    'J100': ['REG','COD_CTA_REF_BAL','IND_CTA','NIVEL','COD_CTA_SUP','COD_CTA_REF','DESC_CTA_REF','VL_SLD_FIN','IND_DC'],
    // K155: saldos contábeis recuperados (balancete na ECF)
    'K155': ['REG','COD_CTA','COD_CCUS','VL_SLD_INI','IND_DC_INI','VL_DEB','VL_CRED','VL_SLD_FIN','IND_DC_FIN'],
    'K355': ['REG','COD_CTA','COD_CCUS','VL_SLD_FIN','IND_DC'],
    // M010: conta da parte A do e-Lalur/e-Lacs
    'M010': ['REG','COD_CTA_B','DESC_CTA_B','DT_INI_B','DT_FIN_B','TIPO_LANC_B'],
    // M300: e-Lalur Parte A (adições/exclusões do IRPJ)
    'M300': ['REG','CODIGO','TIPO_LANC','IND_RELACAO','VL_LANC','HIST_LANC'],
    // M350: e-Lacs Parte A (adições/exclusões da CSLL)
    'M350': ['REG','CODIGO','TIPO_LANC','IND_RELACAO','VL_LANC','HIST_LANC'],
  };

  /** Retorna o layout de um registro para a origem dada. */
  function obter(origem, registro) {
    const tabela = origem === 'efd_contrib' ? CONTRIB
                 : origem === 'ecd' ? ECD
                 : origem === 'ecf' ? ECF
                 : FISCAL;
    return tabela[registro] || null;
  }

  /** Lista os registros conhecidos de uma origem. */
  function registrosConhecidos(origem) {
    const tabela = origem === 'efd_contrib' ? CONTRIB
                 : origem === 'ecd' ? ECD
                 : origem === 'ecf' ? ECF
                 : FISCAL;
    return Object.keys(tabela);
  }

  /** Converte uma linha SPED em objeto {campo: valor} usando o layout. */
  function parsearLinha(origem, linha) {
    // linha: |REG|v1|v2|...|  → split gera ['', 'REG', 'v1', ..., '']
    const partes = linha.split('|');
    const registro = partes[1];
    if (!registro) return null;
    const layout = obter(origem, registro);
    if (!layout) {
      // registro não mapeado: retorna bruto
      return { REG: registro, _raw: linha, _naoMapeado: true };
    }
    const obj = { REG: registro };
    // partes[1] = REG, partes[2] = primeiro campo após REG (índice 1 do layout)
    for (let i = 1; i < layout.length; i++) {
      obj[layout[i]] = partes[i + 1] !== undefined ? partes[i + 1] : '';
    }
    // Validação de robustez: o nº de campos preenchidos deve bater com o layout.
    // Linha bem formada: partes.length = layout.length + 2 (REG inicial vazio + final vazio)
    // Ex.: layout C170 tem 38 (com REG); linha correta → 40 partes.
    const esperado = layout.length + 1;  // partes inclui o '' inicial; final pode ou não existir
    const recebido = partes.length;
    if (recebido < esperado || recebido > esperado + 1) {
      obj._campoAlerta = `Campos: esperado ~${esperado - 1}, recebido ${recebido - 2}`;
    }
    return obj;
  }

  return {
    FISCAL, CONTRIB,
    obter, registrosConhecidos, parsearLinha,
  };
})();

  // ------------------------------------------------------------------

  let _db = null;

  // ------------------------------------------------------------------
  // OPEN / MIGRAÇÃO
  // ------------------------------------------------------------------
  function open() {
    if (_db) return Promise.resolve(_db);
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(DB_NAME, DB_VERSION);

      req.onupgradeneeded = (event) => {
        const db = event.target.result;
        for (const [name, def] of Object.entries(STORES)) {
          let store;
          if (db.objectStoreNames.contains(name)) {
            store = req.transaction.objectStore(name);
          } else {
            store = db.createObjectStore(name, { keyPath: def.keyPath });
          }
          if (def.indexes) {
            for (const idx of def.indexes) {
              if (!store.indexNames.contains(idx.name)) {
                store.createIndex(idx.name, idx.keyPath, { unique: !!idx.unique });
              }
            }
          }
        }
      };

      req.onsuccess = () => {
        _db = req.result;
        console.log('DB aberto:', DB_NAME, 'v' + DB_VERSION);
        resolve(_db);
      };
      req.onerror = () => reject(req.error);
    });
  }

  function listarTabelas() {
    return Object.entries(STORES).map(([nome, def]) => ({
      nome, descricao: def.descricao, keyPath: def.keyPath,
    }));
  }

  // ------------------------------------------------------------------
  // CRUD BÁSICO
  // ------------------------------------------------------------------
  async function put(storeName, valor) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, 'readwrite');
      tx.objectStore(storeName).put(valor);
      tx.oncomplete = () => resolve(valor);
      tx.onerror = () => reject(tx.error);
    });
  }

  async function putBatch(storeName, valores, opts) {
    if (!valores || valores.length === 0) return 0;
    const SUB = (opts && opts.lote) || 2000;   // grava em sub-lotes commitados independentes
    const db = await open();
    let gravados = 0;
    for (let i = 0; i < valores.length; i += SUB) {
      const fatia = valores.slice(i, i + SUB);
      try {
        gravados += await new Promise((resolve, reject) => {
          const tx = db.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          let erros = [];
          for (const v of fatia) {
            const r = store.put(v);
            r.onerror = () => { erros.push(r.error); };
          }
          tx.oncomplete = () => {
            if (erros.length) console.warn(`putBatch(${storeName}): ${erros.length} erros`, erros[0]);
            resolve(fatia.length - erros.length);
          };
          tx.onerror = () => reject(tx.error);
          tx.onabort = () => reject(tx.error || new Error('transação abortada'));
        });
      } catch (e) {
        // estouro de cota ou abort: para aqui, mas os sub-lotes anteriores
        // já foram commitados (persistem). Propaga com o progresso.
        const err = new Error(`Gravação interrompida após ${gravados} de ${valores.length} registros em ${storeName}: ${(e && e.message) || e}`);
        err.name = (e && e.name) || 'Error';
        err.gravados = gravados;
        err.cotaEstourada = /quota/i.test((e && e.name) || '') || /quota/i.test((e && e.message) || '');
        throw err;
      }
    }
    return gravados;
  }

  /** Estimativa de uso do armazenamento do navegador (cota do IndexedDB). */
  async function estimarArmazenamento() {
    try {
      if (navigator.storage && navigator.storage.estimate) {
        const e = await navigator.storage.estimate();
        const usage = e.usage || 0, quota = e.quota || 0;
        return { usage, quota, pct: quota ? Math.round((usage / quota) * 100) : 0, ok: true };
      }
    } catch (e) {}
    return { usage: 0, quota: 0, pct: 0, ok: false };
  }

  async function get(storeName, chave) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, 'readonly');
      const r = tx.objectStore(storeName).get(chave);
      r.onsuccess = () => resolve(r.result || null);
      r.onerror = () => reject(r.error);
    });
  }

  async function getAll(storeName) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, 'readonly');
      const r = tx.objectStore(storeName).getAll();
      r.onsuccess = () => resolve(r.result || []);
      r.onerror = () => reject(r.error);
    });
  }

  /** Busca por índice (ex.: todos os itens de um cnpj+periodo). */
  async function getByIndex(storeName, indexName, valor) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, 'readonly');
      const idx = tx.objectStore(storeName).index(indexName);
      const r = idx.getAll(valor);
      r.onsuccess = () => resolve(r.result || []);
      r.onerror = () => reject(r.error);
    });
  }

  async function deleteOne(storeName, chave) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, 'readwrite');
      tx.objectStore(storeName).delete(chave);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  async function count(storeName) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, 'readonly');
      const r = tx.objectStore(storeName).count();
      r.onsuccess = () => resolve(r.result);
      r.onerror = () => reject(r.error);
    });
  }

  /** Limpa todos os registros de uma store. */
  async function clearStore(storeName) {
    const db = await open();
    return new Promise((resolve, reject) => {
      const tx = db.transaction(storeName, 'readwrite');
      tx.objectStore(storeName).clear();
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  /** Registra um evento no log de processamento. */
  async function registrarLog(cnpj, nivel, evento, detalhe) {
    const ts = new Date().toISOString();
    const id_log = `${ts}_${Math.random().toString(36).slice(2, 8)}`;
    try {
      await put('rev_log', {
        id_log, ts, cnpj_empresa: cnpj || '(sem cliente)',
        nivel: nivel || 'info', evento: evento || '', detalhe: detalhe || '',
      });
    } catch (e) { /* log nunca derruba o fluxo principal */ }
  }

  /** Lê o log de um cliente (mais recente primeiro). */
  async function lerLog(cnpj, limite) {
    const all = await getByIndex('rev_log', 'cnpj_empresa', cnpj);
    all.sort((a, b) => (b.ts || '').localeCompare(a.ts || ''));
    return limite ? all.slice(0, limite) : all;
  }

  // ------------------------------------------------------------------
  // OPERAÇÕES MULTI-CLIENTE
  // ------------------------------------------------------------------

  /** Conta registros de um cliente numa store (via índice cnpj_empresa). */
  async function countByCliente(storeName, cnpj) {
    const regs = await getByIndex(storeName, 'cnpj_empresa', cnpj);
    return regs.length;
  }

  /** Remove TODOS os dados de um cliente (todas as stores exceto catálogo). */
  async function limparCliente(cnpj) {
    const db = await open();
    let total = 0;
    for (const nome of Object.keys(STORES)) {
      if (nome === 'rev_clientes') continue;  // mantém o catálogo
      const def = STORES[nome];
      const temIndice = def.indexes && def.indexes.some(i => i.name === 'cnpj_empresa');
      if (!temIndice) continue;
      const regs = await getByIndex(nome, 'cnpj_empresa', cnpj);
      if (regs.length === 0) continue;
      await new Promise((resolve, reject) => {
        const tx = db.transaction(nome, 'readwrite');
        const store = tx.objectStore(nome);
        for (const r of regs) {
          store.delete(r[def.keyPath]);
        }
        tx.oncomplete = () => { total += regs.length; resolve(); };
        tx.onerror = () => reject(tx.error);
      });
    }
    return total;
  }

  /** Remove dados de um cliente em um período específico. */
  async function limparClientePeriodo(cnpj, periodo) {
    const db = await open();
    let total = 0;
    for (const nome of Object.keys(STORES)) {
      if (nome === 'rev_clientes') continue;
      const def = STORES[nome];
      const temIndice = def.indexes && def.indexes.some(i => i.name === 'cnpj_periodo');
      if (!temIndice) continue;
      const regs = await getByIndex(nome, 'cnpj_periodo', [cnpj, periodo]);
      if (regs.length === 0) continue;
      await new Promise((resolve, reject) => {
        const tx = db.transaction(nome, 'readwrite');
        const store = tx.objectStore(nome);
        for (const r of regs) store.delete(r[def.keyPath]);
        tx.oncomplete = () => { total += regs.length; resolve(); };
        tx.onerror = () => reject(tx.error);
      });
    }
    return total;
  }

  // Stores unificadas derivadas das EFDs (reconstruídas na normalização).
  // NÃO inclui staging, XML, arquivos, log — só o que vem do EFD.
  const STORES_UNIFICADAS_EFD = [
    'rev_empresas', 'rev_participantes', 'rev_produtos', 'rev_unidades',
    'rev_documentos', 'rev_itens', 'rev_apuracao_icms', 'rev_apuracao_pis_cofins',
    'rev_estoque', 'rev_ativo',
    // contábil (ECD/ECF) — período é ANO, não colide com os mensais
    'rev_plano_contas', 'rev_saldos_contabeis', 'rev_apuracao_irpj_csll',
  ];

  /** Apaga registros de uma store por keys. */
  async function _deletarKeys(nome, regs) {
    if (!regs.length) return 0;
    const db = await open();
    const def = STORES[nome];
    await new Promise((resolve, reject) => {
      const tx = db.transaction(nome, 'readwrite');
      const store = tx.objectStore(nome);
      for (const r of regs) store.delete(r[def.keyPath]);
      tx.oncomplete = () => resolve();
      tx.onerror = () => reject(tx.error);
    });
    return regs.length;
  }

  /** Retorna o arquivo já importado com este SHA-256, ou null (controle de duplicidade). */
  async function arquivoPorSha(sha256) {
    if (!sha256) return null;
    const regs = await getByIndex('rev_arquivos', 'sha256', sha256);
    return regs.length ? regs[0] : null;
  }

  /** Limpa o staging de uma origem específica (efd_fiscal/efd_contrib) num período. */
  async function limparStagingOrigemPeriodo(cnpj, origem, periodo) {
    const regs = (await getByIndex('efd_staging', 'cnpj_periodo', [cnpj, periodo]))
      .filter(r => r.origem === origem);
    return _deletarKeys('efd_staging', regs);
  }

  /**
   * Limpa só as stores unificadas derivadas do EFD para um período.
   * Preserva staging, XML (rev_xml_itens/xml_staging), De/Para, arquivos e log.
   * Usado na retificação: substitui os dados sem perder XML nem a outra origem.
   */
  async function limparUnificadasPeriodo(cnpj, periodo) {
    let total = 0;
    for (const nome of STORES_UNIFICADAS_EFD) {
      const def = STORES[nome];
      const temIndice = def.indexes && def.indexes.some(i => i.name === 'cnpj_periodo');
      const regs = temIndice
        ? await getByIndex(nome, 'cnpj_periodo', [cnpj, periodo])
        : (await getByIndex(nome, 'cnpj_empresa', cnpj)).filter(r => r.periodo === periodo);
      total += await _deletarKeys(nome, regs);
    }
    return total;
  }

  /** Lista os nomes das stores que guardam dados por cliente (têm índice cnpj_empresa). */
  function storesDeCliente() {
    return Object.entries(STORES)
      .filter(([n, def]) => def.indexes && def.indexes.some(i => i.name === 'cnpj_empresa'))
      .map(([n]) => n);
  }

  /**
   * Serializa TODO o conteúdo de um cliente (todas as stores) num objeto.
   * Base do backup em arquivo.
   */
  async function dumpCliente(cnpj) {
    const dump = {
      _formato: 'revisor_fiscal_prime_db',
      _versao_db: DB_VERSION,
      _cnpj: cnpj,
      _exportado_em: new Date().toISOString(),
      cliente: await get('rev_clientes', cnpj),
      stores: {},
    };
    for (const nome of storesDeCliente()) {
      try {
        dump.stores[nome] = await getByIndex(nome, 'cnpj_empresa', cnpj);
      } catch (e) { dump.stores[nome] = []; }
    }
    return dump;
  }

  /** Restaura um dump de cliente no banco (sobrescreve por id).
   *  Suporta dump de GRUPO (campo `clientes` com o cadastro de cada filial). */
  async function restaurarCliente(dump) {
    if (!dump || dump._formato !== 'revisor_fiscal_prime_db') {
      throw new Error('Arquivo de banco inválido ou de outro formato.');
    }
    let total = 0;
    if (Array.isArray(dump.clientes) && dump.clientes.length) {
      for (const c of dump.clientes) { if (c && c.cnpj) { await put('rev_clientes', c); total++; } }
    } else if (dump.cliente) {
      await put('rev_clientes', dump.cliente); total++;
    }
    for (const [nome, regs] of Object.entries(dump.stores || {})) {
      if (!STORES[nome] || !Array.isArray(regs) || regs.length === 0) continue;
      await putBatch(nome, regs);
      total += regs.length;
    }
    return total;
  }

  /**
   * Separa o conteúdo do cliente por ANO (para carga seletiva).
   * Registros com `periodo` vão para o ano correspondente; cadastros sem
   * período (ex.: De/Para acumulado) vão para o bloco "global", sempre carregado.
   */
  async function dumpClientePorAno(cnpj) {
    const global = { cliente: await get('rev_clientes', cnpj), stores: {} };
    const porAno = {};   // ano -> { store -> [regs] }
    for (const nome of storesDeCliente()) {
      let regs = [];
      try { regs = await getByIndex(nome, 'cnpj_empresa', cnpj); } catch (e) {}
      for (const r of regs) {
        const per = r.periodo;
        const ano = (per && /^\d{4}/.test(per)) ? per.slice(0, 4) : null;
        if (ano) {
          (porAno[ano] = porAno[ano] || {});
          (porAno[ano][nome] = porAno[ano][nome] || []).push(r);
        } else {
          (global.stores[nome] = global.stores[nome] || []).push(r);
        }
      }
    }
    return { cnpj, versao_db: DB_VERSION, global, porAno };
  }

  /** Restaura um conjunto de stores ({ cliente?, stores: {nome:[regs]} }). */
  async function restaurarStores(payload) {
    let total = 0;
    if (payload && payload.cliente) { await put('rev_clientes', payload.cliente); total++; }
    for (const [nome, regs] of Object.entries((payload && payload.stores) || {})) {
      if (!STORES[nome] || !Array.isArray(regs) || regs.length === 0) continue;
      await putBatch(nome, regs);
      total += regs.length;
    }
    return total;
  }

  /** Lista períodos disponíveis de um cliente (a partir de rev_arquivos). */
  async function periodosDoCliente(cnpj) {
    const arquivos = await getByIndex('rev_arquivos', 'cnpj_empresa', cnpj);
    const periodos = [...new Set(arquivos.map(a => a.periodo).filter(Boolean))];
    periodos.sort().reverse();  // mais recente primeiro
    return periodos;
  }

  /** Estatística de tamanho do banco (estimativa). */
  async function estatisticas() {
    const out = {};
    for (const nome of Object.keys(STORES)) {
      out[nome] = await count(nome);
    }
    return out;
  }

  /** Zera o repositório inteiro (todas as stores). Uso de emergência. */
  async function zerarRepositorio() {
    const db = await open();
    return new Promise((resolve, reject) => {
      const nomes = Object.keys(STORES);
      const tx = db.transaction(nomes, 'readwrite');
      for (const n of nomes) tx.objectStore(n).clear();
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => reject(tx.error);
    });
  }

  // ------------------------------------------------------------------
  // EXPORT (pra Excel/inspeção)
  // ------------------------------------------------------------------
  async function exportarStore(storeName, cnpj, periodo) {
    // Se cnpj+periodo informados, filtra; senão retorna tudo
    if (cnpj && periodo) {
      return getByIndex(storeName, 'cnpj_periodo', [cnpj, periodo]);
    }
    if (cnpj) {
      return getByIndex(storeName, 'cnpj_empresa', cnpj);
    }
    return getAll(storeName);
  }

  /**
   * getByIndex para VÁRIOS CNPJs (grupo de filiais): concatena os resultados
   * de cada CNPJ. Aceita string única (delega ao getByIndex normal).
   */
  async function getByIndexCnpjs(storeName, cnpjs) {
    if (!Array.isArray(cnpjs)) return getByIndex(storeName, 'cnpj_empresa', cnpjs);
    const out = [];
    for (const c of cnpjs) {
      try {
        const regs = await getByIndex(storeName, 'cnpj_empresa', c);
        for (const r of regs) out.push(r);   // loop: spread estoura a pilha com stores grandes
      }
      catch (e) { /* store pode não ter o índice; segue */ }
    }
    return out;
  }

  /** União ordenada dos períodos de vários CNPJs. */
  async function periodosDosCnpjs(cnpjs) {
    const lista = Array.isArray(cnpjs) ? cnpjs : [cnpjs];
    const uni = new Set();
    for (const c of lista) for (const p of await periodosDoCliente(c)) uni.add(p);
    return [...uni].sort().reverse();
  }

  return {
    DB_NAME, DB_VERSION,
    open, listarTabelas,
    put, putBatch, get, getAll, getByIndex, getByIndexCnpjs, deleteOne, count, clearStore,
    estimarArmazenamento,
    registrarLog, lerLog,
    countByCliente, limparCliente, limparClientePeriodo,
    arquivoPorSha, limparStagingOrigemPeriodo, limparUnificadasPeriodo,
    periodosDoCliente, periodosDosCnpjs, estatisticas, zerarRepositorio, exportarStore,
    storesDeCliente, dumpCliente, restaurarCliente,
    dumpClientePorAno, restaurarStores,
  };
})();

window.DB = DB;


// ===================== clientes.js =====================
// =====================================================================
// Revisor Fiscal Prime — clientes.js
// Gerencia o catálogo de clientes e o cliente/período ativo.
// É o "contexto" que todas as telas consultam pra saber o que mostrar.
// =====================================================================

const Clientes = (function () {
  'use strict';

  // Estado em memória do contexto ativo
  let _clienteAtivo = null;   // { cnpj, razao_social, uf, ... }
  let _periodoAtivo = null;   // 'AAAA-MM' ou faixa
  let _filiaisSel = null;     // Set de CNPJs selecionados do grupo (null = todas)

  // Persistência leve do contexto (localStorage é permitido aqui — é só preferência de UI)
  const LS_CLIENTE = 'revisor_cliente_ativo';
  const LS_PERIODO = 'revisor_periodo_ativo';
  const LS_FILIAIS = 'revisor_filiais_sel_';   // + raiz do CNPJ

  async function listar() {
    const lista = await DB.getAll('rev_clientes');
    lista.sort((a, b) => (a.razao_social || '').localeCompare(b.razao_social || ''));
    return lista;
  }

  async function obter(cnpj) {
    return DB.get('rev_clientes', Utils.soDigitos(cnpj));
  }

  /** Cadastra ou atualiza um cliente no catálogo. */
  async function salvar(dados) {
    const cnpj = Utils.soDigitos(dados.cnpj);
    if (!Utils.validarCNPJ(cnpj)) {
      throw new Error('CNPJ inválido: ' + dados.cnpj);
    }
    const existente = await obter(cnpj);
    const registro = {
      cnpj,
      razao_social: dados.razao_social || (existente && existente.razao_social) || '',
      uf: dados.uf || (existente && existente.uf) || '',
      ie: dados.ie || (existente && existente.ie) || '',
      ativo: dados.ativo !== undefined ? dados.ativo : true,
      criado_em: (existente && existente.criado_em) || new Date().toISOString(),
      atualizado_em: new Date().toISOString(),
      ultima_importacao: dados.ultima_importacao || (existente && existente.ultima_importacao) || null,
    };
    await DB.put('rev_clientes', registro);
    return registro;
  }

  /** Remove um cliente do catálogo E todos os seus dados. */
  async function remover(cnpj) {
    const c = Utils.soDigitos(cnpj);
    const total = await DB.limparCliente(c);
    await DB.deleteOne('rev_clientes', c);
    if (_clienteAtivo && _clienteAtivo.cnpj === c) {
      _clienteAtivo = null;
      _periodoAtivo = null;
      localStorage.removeItem(LS_CLIENTE);
      localStorage.removeItem(LS_PERIODO);
    }
    return total;
  }

  // ------------------------------------------------------------------
  // CONTEXTO ATIVO
  // ------------------------------------------------------------------

  function _ordenarPeriodos(lista) {
    const meses = lista.filter(p => /^\d{4}(-\d{2})?$/.test(p)).sort().reverse();
    const outros = lista.filter(p => !/^\d{4}(-\d{2})?$/.test(p)).sort();
    return [...meses, ...outros];
  }

  async function definirAtivo(cnpj) {
    const c = await obter(cnpj);
    if (!c) throw new Error('Cliente não encontrado: ' + cnpj);
    const trocouGrupo = !_clienteAtivo || Utils.raizCNPJ(_clienteAtivo.cnpj) !== Utils.raizCNPJ(c.cnpj);
    _clienteAtivo = c;
    if (trocouGrupo) _filiaisSel = null;   // recarrega a seleção do grupo novo
    localStorage.setItem(LS_CLIENTE, c.cnpj);
    // Ao trocar de cliente, seleciona o período mais recente automaticamente
    const periodos = _ordenarPeriodos(await DB.periodosDoCliente(c.cnpj));
    _periodoAtivo = periodos[0] || null;
    if (_periodoAtivo) localStorage.setItem(LS_PERIODO, _periodoAtivo);
    else localStorage.removeItem(LS_PERIODO);
    return c;
  }

  function definirPeriodo(periodo) {
    _periodoAtivo = periodo || null;
    if (_periodoAtivo) localStorage.setItem(LS_PERIODO, _periodoAtivo);
    else localStorage.removeItem(LS_PERIODO);
  }

  function ativo() { return _clienteAtivo; }
  function periodo() { return _periodoAtivo; }

  function temContexto() {
    return !!_clienteAtivo;
  }

  /** Restaura o contexto salvo (chamado no boot). */
  async function restaurarContexto() {
    const cnpjSalvo = localStorage.getItem(LS_CLIENTE);
    if (!cnpjSalvo) return;
    const c = await obter(cnpjSalvo);
    if (c) {
      _clienteAtivo = c;
      const periodoSalvo = localStorage.getItem(LS_PERIODO);
      const periodos = _ordenarPeriodos(await DB.periodosDoCliente(c.cnpj));
      _periodoAtivo = (periodoSalvo && periodos.includes(periodoSalvo))
        ? periodoSalvo
        : (periodos[0] || null);
    }
  }

  async function periodosDisponiveis() {
    if (!_clienteAtivo) return [];
    const cnpjs = await cnpjsAtivos();
    const uni = new Set();
    for (const c of cnpjs) {
      for (const p of await DB.periodosDoCliente(c)) uni.add(p);
    }
    // meses AAAA-MM primeiro (mais recente no topo); rótulos como
    // "sem-periodo" vão pro fim — senão viram o padrão por ordem alfabética
    const meses = [...uni].filter(p => /^\d{4}(-\d{2})?$/.test(p)).sort().reverse();
    const outros = [...uni].filter(p => !/^\d{4}(-\d{2})?$/.test(p)).sort();
    return [...meses, ...outros];
  }

  // ------------------------------------------------------------------
  // GRUPO EMPRESARIAL (matriz + filiais = mesmo CNPJ raiz)
  // ------------------------------------------------------------------

  /** Todas as filiais cadastradas do grupo do cliente ativo (inclui ele mesmo). */
  async function filiaisDoGrupo() {
    if (!_clienteAtivo) return [];
    const raiz = Utils.raizCNPJ(_clienteAtivo.cnpj);
    const todos = await listar();
    return todos.filter(c => Utils.raizCNPJ(c.cnpj) === raiz)
      .sort((a, b) => a.cnpj.localeCompare(b.cnpj));   // matriz (0001) primeiro
  }

  /** O grupo do cliente ativo tem mais de um CNPJ cadastrado? */
  async function grupoTemFiliais() {
    return (await filiaisDoGrupo()).length > 1;
  }

  function _lsFiliaisKey() {
    return _clienteAtivo ? LS_FILIAIS + Utils.raizCNPJ(_clienteAtivo.cnpj) : null;
  }

  /**
   * CNPJs efetivamente ativos: a seleção de filiais do grupo (ou todas, por
   * padrão). É a função que TODA leitura de dados deve usar no lugar de
   * [ativo().cnpj] quando quiser respeitar a visão consolidada/selecionável.
   * Sempre retorna ao menos [ativo.cnpj].
   */
  async function cnpjsAtivos() {
    if (!_clienteAtivo) return [];
    const grupo = await filiaisDoGrupo();
    if (grupo.length <= 1) return [_clienteAtivo.cnpj];
    const validos = new Set(grupo.map(c => c.cnpj));
    // restaura seleção persistida na primeira consulta
    if (_filiaisSel === null) {
      try {
        const salvo = JSON.parse(localStorage.getItem(_lsFiliaisKey()) || 'null');
        if (Array.isArray(salvo) && salvo.length) _filiaisSel = new Set(salvo.filter(c => validos.has(c)));
      } catch (e) { /* ignora */ }
    }
    if (!_filiaisSel || _filiaisSel.size === 0) return grupo.map(c => c.cnpj);   // todas
    const sel = [...(_filiaisSel)].filter(c => validos.has(c));
    return sel.length ? sel : grupo.map(c => c.cnpj);
  }

  /** Define a seleção de filiais (array de CNPJs; vazio ou null = todas). */
  function definirFiliaisSelecionadas(cnpjs) {
    const k = _lsFiliaisKey();
    if (!cnpjs || !cnpjs.length) {
      _filiaisSel = new Set();
      if (k) localStorage.removeItem(k);
    } else {
      _filiaisSel = new Set(cnpjs.map(Utils.soDigitos));
      if (k) localStorage.setItem(k, JSON.stringify([..._filiaisSel]));
    }
  }

  /** true se a seleção atual é "todas as filiais". */
  function selecaoEhTodas() {
    return !_filiaisSel || _filiaisSel.size === 0;
  }

  return {
    listar, obter, salvar, remover,
    definirAtivo, definirPeriodo, ativo, periodo, temContexto,
    restaurarContexto, periodosDisponiveis,
    filiaisDoGrupo, grupoTemFiliais, cnpjsAtivos, definirFiliaisSelecionadas, selecaoEhTodas,
  };
})();

window.Clientes = Clientes;


// ===================== armazenamento.js =====================
// =====================================================================
// Revisor Fiscal Prime — armazenamento.js
// Persistência do banco em ARQUIVO no disco, via File System Access API.
//
// Resolve dois problemas:
//   1) IndexedDB (banco do navegador) é volátil e pode ser perdido num
//      erro de importação. O arquivo no disco é a fonte de verdade durável.
//   2) Organização pedida: uma PASTA por cliente, com o banco dentro.
//
// Estrutura criada na pasta de trabalho escolhida pelo usuário:
//   <Pasta de trabalho>/
//     16538975000108 - EMPRESA TESTE LTDA/
//       revisor_16538975000108.json     ← banco completo do cliente
//
// Fallback (navegador sem a API ou backup avulso): exportar/importar um
// arquivo .json manualmente (download / upload).
// =====================================================================

const Armazenamento = (function () {
  'use strict';

  let _pasta = null;   // DirectoryHandle da pasta de trabalho (em memória)

  // ------------------------------------------------------------------
  // Suporte
  // ------------------------------------------------------------------
  function suportado() {
    return typeof window !== 'undefined' && 'showDirectoryPicker' in window;
  }

  /**
   * Solicita ao navegador armazenamento PERSISTENTE: cota maior e, sobretudo,
   * o banco não é apagado automaticamente sob pressão de disco. Essencial
   * para volumes grandes (anos de notas). Retorna true se concedido.
   */
  async function solicitarPersistencia() {
    try {
      if (navigator.storage && navigator.storage.persist) {
        const jaPersistente = await navigator.storage.persisted();
        if (jaPersistente) return true;
        return await navigator.storage.persist();
      }
    } catch (e) {}
    return false;
  }

  // ------------------------------------------------------------------
  // Pasta de trabalho
  // ------------------------------------------------------------------
  /** Abre o seletor de pastas e guarda o handle (precisa de clique do usuário). */
  async function definirPastaTrabalho() {
    if (!suportado()) throw new Error('Navegador sem suporte a pasta de trabalho. Use Exportar/Importar.');
    const handle = await window.showDirectoryPicker({ mode: 'readwrite', id: 'revisor-prime' });
    _pasta = handle;

  // ---- BENEFÍCIOS ----
  function mgMICRO1(ctx, idAud, api) {
    const xs = (ctx.xmlItens || []).filter(x => x.tipo_operacao === 'saida' && !x.cancelada && T.ehCerveja(x.ncm)
      && /^5/.test(T.soNum(x.cfop)) && T.soNum(x.dest_cnpj).length === 14);
    if (!xs.length) return limpo('MG-MICRO-1', 'Sem vendas internas de cerveja a contribuinte para avaliar a carga de 8%.');
    // Porta de elegibilidade: microcervejaria tem teto de produção (~3 milhões de L/ano).
    // Se o volume anual de cerveja for grande, NÃO é micro e a carga de 8% não se aplica.
    const unidAno = {};
    for (const x of xs) { const a = String(x.periodo).slice(0, 4); unidAno[a] = (unidAno[a] || 0) + n(x.qtd); }
    const maxAno = Math.max(0, ...Object.values(unidAno));
    const LIM = 6000000;   // ~3 mi L/ano em embalagens de 500ml ≈ 6 mi unidades
    if (maxAno > LIM) return limpo('MG-MICRO-1',
      `Fabricante de grande porte (${Math.round(maxAno).toLocaleString('pt-BR')} un/ano de cerveja) — não se enquadra como microcervejaria; carga de 8% inaplicável.`);
    const acc = Acc();
    for (const x of xs) {
      const base = n(x.vl_item); if (base <= 0) continue;
      const carga = T.cargaEfetiva ? T.cargaEfetiva(n(x.vl_icms), base, 0) : n(x.vl_icms) / base;
      if (carga <= (T.CARGA_MICRO || 0.08) + 0.01) continue;   // já está em ~8% ou menos
      const economia = (carga - (T.CARGA_MICRO || 0.08)) * base;
      const a = bump(acc, x.periodo, { economia: 0 }); a.n++; a.economia += economia;
    }
    const achados = [];
    for (const a of acc.values()) { if (a.economia <= api.PISO) continue; achados.push(mk(api, ctx, idAud, 'mg_micro_8pct', {
      periodo: a.periodo, titulo: 'Possível enquadramento como microcervejaria (confirmar)', severidade: 'media',
      natureza: 'risco', valor: a.economia,
      descricao: `${a.n} venda(s) interna(s) de cerveja a contribuinte no período ${a.periodo} com carga acima de 8%. `
        + `SE for microcervejaria artesanal credenciada (produção ≤ 3 mi L/ano, item 33), a carga poderia ser 8% — `
        + `economia potencial ${api.U.fmtBRL(a.economia)}. Confirmar credenciamento e enquadramento antes de tratar como crédito.`,
      base_legal: 'RICMS/2023 Anexo IV item 33 (crédito presumido microcervejaria, carga 8%, exige credenciamento).',
      referencias: [{ periodo: a.periodo, vendas: a.n, economia_estimada: a.economia }],
    })); }
    return { achados, resumo: resumo('MG-MICRO-1', achados) };
  }

  function mgCREDPRES1(ctx, idAud, api) {
    const apM = apurPorPeriodo(ctx);
    const ehCredPres = (aj) => /presum/i.test(String(aj.descr || '')) || T.ajusteEhCreditoPresumido(aj.cod) || T.ajusteEhCreditoPresumido(aj.descr);
    const RV = window.RegimeVigencia;
    const cnpj = ctx.cnpj;
    const fl = RV ? RV.flags(cnpj) : {};
    const regimeComCredPres = !!fl.credito_presumido;   // o regime do cliente já prevê crédito presumido
    const achados = [];
    for (const p of Object.keys(apM)) {
      const ap = apM[p];
      const ajCP = (ap.ajustes || []).filter(ehCredPres);
      if (!ajCP.length) continue;
      const valorCP = ajCP.reduce((s, aj) => s + n(aj.valor), 0);

      if (regimeComCredPres) {
        // Cliente COM regime de crédito presumido. O crédito de entrada é vedado e estornado — a
        // neutralização pode ser por estorno de crédito OU por ajuste de débito (este último não fica
        // visível na apuração armazenada). Por isso NÃO se aponta "cumulação" dentro da vigência
        // (evita falso passivo). O que se verifica é o presumido lançado FORA da vigência do regime.
        if (!RV.vigente(cnpj, p)) {
          achados.push(mk(api, ctx, idAud, 'mg_credpres_fora_vigencia', {
            periodo: p, titulo: 'Crédito presumido lançado fora da vigência do regime', severidade: api.sev(valorCP),
            natureza: 'risco', valor: valorCP,
            descricao: `Período ${p}: ${api.U.fmtBRL(valorCP)} de crédito presumido lançado, mas o período está FORA da `
              + `vigência do regime configurado (${fl.nome || 'regime'}). Sem regime vigente o benefício não tem amparo — `
              + `reapurar como apuração normal (débito menos crédito de entrada) e recolher a diferença.`,
            base_legal: 'e-PTA-RE art. 36 (vigência); fora do regime, apuração normal — RICMS/2023 art. 42; LC 87/96.',
            referencias: [{ periodo: p, credito_presumido: valorCP, vigencia: RV.obter(cnpj) }],
          }));
        }
      } else {
        // Cliente SEM regime configurado (flag em branco): modo genérico — presumido convivendo com
        // créditos normais de entrada é suspeito de cumulação.
        const credNormal = (ctx.itens || []).filter(it => it.tipo_operacao === 'entrada' && it.periodo === p && n(it.vl_icms) > 0.5)
          .reduce((s, it) => s + n(it.vl_icms), 0);
        if (credNormal <= api.PISO) continue;
        achados.push(mk(api, ctx, idAud, 'mg_credpres_cumulacao', {
          periodo: p, titulo: 'Crédito presumido cumulado com créditos normais', severidade: api.sev(credNormal),
          natureza: 'risco', valor: credNormal,
          descricao: `Período ${p}: há ajuste de crédito presumido e também ${api.U.fmtBRL(credNormal)} de créditos `
            + `normais de entrada, sem regime especial configurado para o cliente. A opção pelo crédito presumido veda os `
            + `demais créditos — configure o regime na aba Pendências ou confira a cumulação.`,
          base_legal: 'RICMS/2023 Anexo IV (opção pelo crédito presumido veda outros créditos; trava de 12 meses).',
          referencias: [{ periodo: p, credito_normal: credNormal }],
        }));
      }
    }
    if (!achados.length) return limpo('MG-CREDPRES-1', regimeComCredPres
      ? 'Crédito presumido dentro da vigência do regime; sem lançamento fora da vigência.'
      : 'Sem indício de crédito presumido cumulado com créditos normais.');
    return { achados, resumo: resumo('MG-CREDPRES-1', achados) };
  }

  function mgENERGIA1(ctx, idAud, api) {
    const en = (ctx.itens || []).filter(it => it.tipo_operacao === 'entrada' && (T.ehEntradaEnergia(it.cfop) || T.temPalavra(descDe(ctx, it), T.PALAVRAS_ENERGIA)) && n(it.vl_icms) > 0.5);

    const RV = window.RegimeVigencia;

    for (const it of en) { const a = bump(acc, it.periodo, { valor: 0, vedado: false }); a.n++; a.valor += n(it.vl_icms); if (RV && RV.creditoVedado(ctx.cnpj, it.periodo)) a.vedado = true; }
    const achados = [];
    for (const a of acc.values()) {

          periodo: a.periodo, titulo: 'Crédito de energia sob regime — deve estar estornado', severidade: 'media',

          base_legal: 'e-PTA-RE art. 20, §2º, I (energia vedada sob o regime); LC 87/96 art. 33, II (energia industrial fora do regime).',
          referencias: [{ periodo: a.periodo, entradas: a.n, credito: a.valor }],

      } else {

          natureza: 'risco', valor: a.valor,

            + `energia exige laudo técnico do consumo no processo industrial; a parcela administrativa não dá crédito. Conferir.`,
          base_legal: 'RICMS/2023 art. 31, III, §4º; Consultas SEF/MG 109/2011, 81/2023 (laudo técnico).',
          referencias: [{ periodo: a.periodo, entradas: a.n, credito: a.valor }],
        }));
      }
    }
    return { achados, resumo: resumo('MG-ENERGIA-1', achados) };
  }

  function mgREDBC1(ctx, idAud, api) {
    const apM = apurPorPeriodo(ctx); const acc = Acc();
    for (const it of (ctx.itens || [])) {
      if (it.tipo_operacao !== 'saida' || !T.cstReducaoBC(it.cst_icms)) continue;
      const reducao = baseItem(it) - n(it.vl_bc_icms);

      achados.push(mk(api, ctx, idAud, 'mg_redbc_sem_estorno', {
        periodo: a.periodo, titulo: 'Redução de base sem estorno proporcional do crédito', severidade: api.sev(estornoEstimado),
        natureza: 'risco', valor: estornoEstimado,
        descricao: `${a.n} saída(s) com redução de base no período ${a.periodo} (redução total ${api.U.fmtBRL(a.reducao)}) `
          + `sem estorno de crédito na apuração. A redução de base exige estorno proporcional do crédito, salvo dispensa do item.`,
        base_legal: 'RICMS/2023 art. 13 e Anexo II (estorno proporcional, salvo manutenção expressa).',

    }

    return { achados, resumo: resumo('MG-REDBC-1', achados) };
  }

  function mgTRANSF1(ctx, idAud, api) {
    const xs = (ctx.xmlItens || []).filter(x => x.tipo_operacao === 'saida' && !x.cancelada && T.ehTransferencia(x.cfop)
      && raiz8(x.emit_cnpj) === raiz8(x.dest_cnpj) && n(x.vl_icms) > 0.5);
    if (!xs.length) return limpo('MG-TRANSF-1', 'Sem transferências entre estabelecimentos do mesmo titular com débito.');
    const acc = Acc();
    for (const x of xs) { const a = bump(acc, x.periodo, { valor: 0 }); a.n++; a.valor += n(x.vl_icms); }
    const achados = [];
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'mg_transf_adc49', {
      periodo: a.periodo, titulo: 'Débito de ICMS em transferência do mesmo titular (ADC 49)', severidade: api.sev(a.valor),
      natureza: 'risco', valor: a.valor,
      descricao: `${a.n} transferência(s) ao mesmo titular no período ${a.periodo} com débito de ICMS (${api.U.fmtBRL(a.valor)}). `
        + `Desde 2024 não incide ICMS na transferência entre estabelecimentos do mesmo titular — conferir tratamento.`,
      base_legal: 'ADC 49/STF; Convênio ICMS 109/2024; Decreto MG 48.768/2024.',
      referencias: [{ periodo: a.periodo, transferencias: a.n, debito: a.valor }],
    }));
    return { achados, resumo: resumo('MG-TRANSF-1', achados) };
  }

  function mgFEM1(ctx, idAud, api) {
    const xs = (ctx.xmlItens || []).filter(x => x.tipo_operacao === 'saida' && !x.cancelada && T.ehCerveja(x.ncm));
    if (!xs.length) return semDados('MG-FEM-1', 'Sem XML de saída de cerveja para verificar o FEM.');
    const acc = Acc(); let avaliou = 0;
    for (const x of xs) {
      const base = n(x.vl_item); if (base <= 0) continue;
      if (!T.femAtivoNoPeriodo(x.periodo)) continue;             // FEM suspenso (ex.: 2023) → não cobra
      if (T.cstIsentaNaoTrib(x.cst_icms)) continue;             // isenta não tem FEM
      const temST = n(x.vl_icms_st) > 0.5 || T.cstComST(x.cst_icms);
      if (temST) continue;                                       // FEM-ST é avaliado em MG-STCALC-1
      avaliou++;
      if (n(x.vl_fcp) > 0.5) continue;                           // FEM próprio presente → ok
      const fem = base * (T.FEM_PCT / 100);
      const a = bump(acc, x.periodo, { fem: 0 }); a.n++; a.fem += fem;
    }
    const achados = [];
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'mg_fem_ausente', {
      periodo: a.periodo, titulo: 'FEM (2%) a verificar em venda direta de cerveja', severidade: 'media',
      natureza: 'risco', valor: a.fem,
      descricao: `${a.n} venda(s) própria(s) de cerveja a consumidor final no período ${a.periodo} sem o FEM (2%) destacado na nota (vFCP=0). `
        + `O FEM é recolhido em DAE distinto/ajuste na EFD, então vFCP=0 não prova que faltou — é exposição a CONFERIR. `
        + `FEM potencial do período: ${api.U.fmtBRL(a.fem)}.`,
      base_legal: 'Lei 24.471/2023 e Decreto 48.736/2023 (FEM 2% sobre cerveja a consumidor final, 2024-2026; suspenso em 2023).',
      referencias: [{ periodo: a.periodo, vendas: a.n, fem_a_verificar: a.fem }],
    }));
    return { achados, resumo: resumo('MG-FEM-1', achados, { notas_avaliadas: avaliou }) };
  }

  // ---- TAPROOM / VENDA DIRETA ----
  function mgTAP1(ctx, idAud, api) {
    const xs = (ctx.xmlItens || []).filter(x => x.tipo_operacao === 'saida' && !x.cancelada
      && T.soNum(x.dest_cnpj).length !== 14 && n(x.vl_icms_st) > 0.5);
    if (!xs.length) return limpo('MG-TAP-1', 'Sem venda a consumidor final com destaque de ST.');
    const acc = Acc();
    for (const x of xs) { const a = bump(acc, x.periodo, { valor: 0 }); a.n++; a.valor += n(x.vl_icms_st); }
    const achados = [];
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'mg_tap_st_indevida', {
      periodo: a.periodo, titulo: 'ST destacada em venda direta a consumidor final', severidade: api.sev(a.valor),
      natureza: 'risco', valor: a.valor,
      descricao: `${a.n} venda(s) a consumidor final (CPF) no período ${a.periodo} com ICMS-ST destacado (${api.U.fmtBRL(a.valor)}). `
        + `Venda direta a consumidor final não tem ST (não há operação subsequente) — só débito próprio + FEM.`,
      base_legal: 'Consulta SEF/MG 15/2021 (sem ST a consumidor final).',
      referencias: [{ periodo: a.periodo, vendas: a.n, st_indevida: a.valor }],
    }));
    return { achados, resumo: resumo('MG-TAP-1', achados) };
  }

  function mgTAP2(ctx, idAud, api) {
    const nfce = (ctx.xmlItens || []).filter(x => x.tipo_operacao === 'saida' && !x.cancelada && String(x.modelo) === '65');
    if (!nfce.length) return limpo('MG-TAP-2', 'Sem NFC-e (modelo 65) — sem indício de venda de bar/restaurante.');
    const total = nfce.reduce((s, x) => s + n(x.vl_item), 0);
    const achado = mk(api, ctx, idAud, 'mg_tap_credpres_bar', {
      periodo: '(consolidado)', titulo: 'Venda no varejo (NFC-e) — conferir crédito presumido item 32', severidade: 'baixa',
      natureza: 'risco', valor: 0,
      descricao: `Há ${nfce.length} item(ns) vendidos por NFC-e (${api.U.fmtBRL(total)}). Se o estabelecimento tem atividade `
        + `principal de bar/restaurante (CNAE 5611), pode caber o crédito presumido do item 32 (carga 3%/4%). Conferir o CNAE.`,
      base_legal: 'RICMS/2023 Anexo IV item 32 (crédito presumido bar/restaurante, CNAE 5611).',
      referencias: [{ itens_nfce: nfce.length, total }],
    });
    return { achados: [achado], resumo: resumo('MG-TAP-2', [achado]) };
  }

  function mgTAP3(ctx, idAud, api) {
    const cons = (ctx.itens || []).filter(it => it.tipo_operacao === 'saida' && T.naLista(it.cfop, ['5910', '5911', '5949']));
    if (!cons.length) return limpo('MG-TAP-3', 'Sem brinde/degustação/consumo próprio (CFOP 5.910/5.949).');
    const apM = apurPorPeriodo(ctx); const acc = Acc();
    for (const it of cons) { const a = bump(acc, it.periodo, { valor: 0 }); a.n++; a.valor += baseItem(it); }
    const achados = [];
    for (const a of acc.values()) {
      if (temEstornoNoPeriodo(apM[a.periodo])) continue;
      const credito = a.valor * 0.18;
      achados.push(mk(api, ctx, idAud, 'mg_tap_degustacao', {
        periodo: a.periodo, titulo: 'Degustação/consumo próprio sem estorno', severidade: api.sev(credito),
        natureza: 'risco', valor: credito,
        descricao: `${a.n} saída(s) de brinde/degustação/consumo (CFOP 5.910/5.949) no período ${a.periodo} `
          + `(${api.U.fmtBRL(a.valor)}) sem estorno. Cerveja consumida/degustada exige estorno do crédito da entrada — estimado ${api.U.fmtBRL(credito)}.`,
        base_legal: 'RICMS/2023 art. 32 (consumo no estabelecimento exige estorno); Parte 7.',
        referencias: [{ periodo: a.periodo, saidas: a.n, estorno_devido: credito }],
      }));
    }
    if (!achados.length) return limpo('MG-TAP-3', 'Brinde/consumo presente, mas com estorno na apuração.');
    return { achados, resumo: resumo('MG-TAP-3', achados) };
  }

  // ---- PIS/COFINS (cruzamento federal) ----
  const temContrib = (ctx) => (ctx.itens || []).some(i => i.cst_pis || i.cst_cofins);
  const cstPisCredito = (cst) => /^5[0-6]$/.test(T.cstFinal(cst));

  function mgPIS1(ctx, idAud, api) {
    if (!temContrib(ctx)) return semDados('MG-PIS-1', 'EFD-Contribuições não importada (sem CST de PIS/COFINS nos itens).');
    const acc = Acc();
    for (const it of (ctx.itens || [])) {
      if (it.tipo_operacao !== 'saida' || !T.ehCerveja(ncmDe2(ctx, it))) continue;
      if (!(T.cstPisTributavelComum(it.cst_pis) || T.cstPisTributavelComum(it.cst_cofins))) continue;
      const v = n(it.vl_pis) + n(it.vl_cofins);
      const a = bump(acc, it.periodo, { valor: 0 }); a.n++; a.valor += v;
    }
    const achados = [];
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'mg_pis_cst_fabricante', {
      periodo: a.periodo, titulo: 'Cerveja com CST de PIS/COFINS de tributação comum (01)', severidade: api.sev(a.valor),
      natureza: 'risco', valor: a.valor,
      descricao: `${a.n} saída(s) de cerveja no período ${a.periodo} com CST PIS/COFINS 01 (tributação comum). `
        + `O fabricante de bebida fria recolhe pelo regime concentrado (CST 02/03, maior entre ad valorem e pauta). Conferir.`,
      base_legal: 'Lei 13.097/2015; Decreto 8.442/2015; Tabela 4.3.10 (NCM 2203 monofásico).',
      referencias: [{ periodo: a.periodo, saidas: a.n, contribuicao: a.valor }],
    }));
    return { achados, resumo: resumo('MG-PIS-1', achados) };
  }
  // ncm para itens EFD (resolve via cadastro)
  function ncmDe2(ctx, it) { return it.ncm || (ctx.prodPorCod[it.cod_item] && ctx.prodPorCod[it.cod_item].ncm) || ''; }

  function mgPIS2(ctx, idAud, api) {
    if (!temContrib(ctx)) return semDados('MG-PIS-2', 'EFD-Contribuições não importada.');
    const temCredito = (ctx.itens || []).some(it => it.tipo_operacao === 'entrada' && cstPisCredito(it.cst_pis));
    if (!temCredito) return semDados('MG-PIS-2', 'Sem entradas com CST de crédito de PIS/COFINS — regime aparentemente cumulativo.');
    const acc = Acc();
    for (const it of (ctx.itens || [])) {
      if (it.tipo_operacao !== 'entrada' || !T.ehInsumoCreditavel(tipoDe(ctx, it))) continue;
      if (cstPisCredito(it.cst_pis)) continue;            // já creditou
      const cred = baseItem(it) * 0.0925;                 // PIS+COFINS não cumulativo (9,25%)
      if (cred <= api.PISO) continue;
      const a = bump(acc, it.periodo, { valor: 0 }); a.n++; a.valor += cred;
    }
    const achados = [];
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'mg_pis_credito_insumo', {
      periodo: a.periodo, titulo: 'Crédito de PIS/COFINS de insumo não aproveitado', severidade: api.sev(a.valor),
      natureza: 'credito', valor: a.valor,
      descricao: `${a.n} entrada(s) de insumo no período ${a.periodo} sem CST de crédito de PIS/COFINS. No regime não `
        + `cumulativo, malte/lúpulo/embalagem/energia geram crédito — estimado ${api.U.fmtBRL(a.valor)} (9,25%).`,
      base_legal: 'Lei 13.097/2015 art. 30 (crédito do fabricante não cumulativo).',
      referencias: [{ periodo: a.periodo, entradas: a.n, credito_estimado: a.valor }],
    }));
    return { achados, resumo: resumo('MG-PIS-2', achados) };
  }

  function mgPIS3(ctx, idAud, api) {
    if (!temContrib(ctx)) return semDados('MG-PIS-3', 'EFD-Contribuições não importada.');
    const acc = Acc();
    for (const it of (ctx.itens || [])) {
      if (it.tipo_operacao !== 'saida' || !T.ehCerveja(ncmDe2(ctx, it)) || !T.ehRevenda(tipoDe(ctx, it))) continue;
      const tributou = T.cstPisTributavelComum(it.cst_pis) || (n(it.vl_pis) + n(it.vl_cofins) > 0.5);
      if (!tributou) continue;
      const v = n(it.vl_pis) + n(it.vl_cofins);
      const a = bump(acc, it.periodo, { valor: 0 }); a.n++; a.valor += v;
    }
    const achados = [];
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'mg_pis_revenda_zero', {
      periodo: a.periodo, titulo: 'Revenda de cerveja tributada (deveria ser alíquota zero)', severidade: api.sev(a.valor),
      natureza: 'credito', valor: a.valor,
      descricao: `${a.n} revenda(s) de cerveja no período ${a.periodo} com PIS/COFINS tributado (${api.U.fmtBRL(a.valor)}). `
        + `A revenda de bebida fria é à alíquota zero (CST 04/06) — possível recolhimento indevido.`,
      base_legal: 'Lei 13.097/2015 arts. 28/29 (revenda a alíquota zero).',
      referencias: [{ periodo: a.periodo, revendas: a.n, contribuicao: a.valor }],
    }));
    return { achados, resumo: resumo('MG-PIS-3', achados) };
  }

  // ==================================================================
  // REGISTRO DAS 36 REGRAS NO MOTOR
  // ==================================================================
  const F = (nome) => ({ fontes: ['rev_itens', 'rev_xml_itens'] });
  const REGRAS_MG = [
    // ST
    { meta: { id: 'MG-STCALC-1', tipo: 'mg_st_calc', nome: 'ST de cerveja mal calculada', fontes: ['rev_xml_itens'] }, fn: P1.mgSTCALC1 },
    { meta: { id: 'MG-STCALC-2', tipo: 'mg_st_pmpf', nome: 'MVA onde cabia PMPF (base × PMPF)', fontes: ['rev_xml_itens'] }, fn: P1.mgSTCALC2 },
    { meta: { id: 'MG-STINS-1', tipo: 'mg_st_ins', nome: 'Crédito de ICMS-ST de insumo não aproveitado', fontes: ['rev_itens'] }, fn: P1.mgSTINS1 },
    { meta: { id: 'MG-STINAPL-1', tipo: 'mg_st_inapl', nome: 'ST indevida na compra de insumo pela indústria', fontes: ['rev_itens'] }, fn: P1.mgSTINAPL1 },
    { meta: { id: 'MG-STENC-1', tipo: 'mg_st_enc', nome: 'Industrialização por encomenda (cervejaria cigana)', fontes: ['rev_itens'] }, fn: P1.mgSTENC1 },
    // restituição
    { meta: { id: 'MG-REST-1', tipo: 'mg_rest_fg', nome: 'Restituição de ST por fato gerador presumido não realizado', fontes: ['rev_itens'] }, fn: P1.mgREST1 },
    { meta: { id: 'MG-REST-2', tipo: 'mg_rest_compl', nome: 'Complemento de ST (venda final acima do PMPF)', fontes: ['rev_xml_itens'] }, fn: P1.mgREST2 },
    { meta: { id: 'MG-REST-3', tipo: 'mg_rest_rest', nome: 'Restituição de ST (venda final abaixo do PMPF)', fontes: ['rev_xml_itens'] }, fn: P1.mgREST3 },
    { meta: { id: 'MG-REST-4', tipo: 'mg_rest_reg', nome: 'Registros de restituição ausentes/inconsistentes', fontes: ['rev_apuracao_icms'] }, fn: P1.mgREST4 },
    // creditamento
    { meta: { id: 'MG-CRED-1', tipo: 'mg_cred_ins', nome: 'Crédito de insumo (MP/PI/ME) não aproveitado', fontes: ['rev_itens'] }, fn: P1.mgCRED1 },
    { meta: { id: 'MG-CRED-2', tipo: 'mg_cred_uso', nome: 'Crédito indevido (uso e consumo / peças pós-01/04/2017)', fontes: ['rev_itens'] }, fn: P1.mgCRED2 },
    { meta: { id: 'MG-CRED-3', tipo: 'mg_cred_emb', nome: 'Embalagem de transporte tratada como material de embalagem', fontes: ['rev_itens'] }, fn: P1.mgCRED3 },
    // ciap
    { meta: { id: 'MG-CIAP-1', tipo: 'mg_ciap_ap', nome: 'Ativo sem apropriação do CIAP', fontes: ['rev_itens', 'Bloco G'] }, fn: P1.mgCIAP1 },
    { meta: { id: 'MG-CIAP-2', tipo: 'mg_ciap_prop', nome: 'Proporção de saídas tributadas incorreta (CIAP)', fontes: ['Bloco G', 'rev_itens'] }, fn: P1.mgCIAP2 },
    { meta: { id: 'MG-CIAP-3', tipo: 'mg_ciap_difal', nome: 'DIFAL do ativo fora do crédito / parcela extemporânea', fontes: ['Bloco G'] }, fn: P1.mgCIAP3 },
    // difal
    { meta: { id: 'MG-DIFAL-1', tipo: 'mg_difal_aus', nome: 'DIFAL a não contribuinte ausente/errado', fontes: ['rev_itens', 'C101'] }, fn: P1.mgDIFAL1 },
    { meta: { id: 'MG-DIFAL-2', tipo: 'mg_difal_rest', nome: 'Restituição de ST não pedida em venda interestadual', fontes: ['rev_itens'] }, fn: P1.mgDIFAL2 },
    // importação
    { meta: { id: 'MG-IMP-1', tipo: 'mg_imp_cred', nome: 'Crédito de importação de insumo não tomado', fontes: ['rev_itens'] }, fn: P1.mgIMP1 },
    { meta: { id: 'MG-IMP-2', tipo: 'mg_imp_dif', nome: 'Crédito indevido sobre entrada diferida (CST 51)', fontes: ['rev_itens'] }, fn: P1.mgIMP2 },
    { meta: { id: 'MG-IMP-3', tipo: 'mg_imp_re', nome: 'Diferimento sem regime / encerramento não recolhido', fontes: ['rev_itens'] }, fn: P1.mgIMP3 },
    // perdas
    { meta: { id: 'MG-PERDA-1', tipo: 'mg_perda_aus', nome: 'Perda anormal sem estorno', fontes: ['rev_itens', 'rev_apuracao_icms'] }, fn: mgPERDA1 },
    { meta: { id: 'MG-PERDA-2', tipo: 'mg_perda_ind', nome: 'Estorno indevido de perda normal', fontes: ['rev_apuracao_icms'] }, fn: mgPERDA2 },
    // exportação
    { meta: { id: 'MG-EXP-1', tipo: 'mg_exp_est', nome: 'Estorno indevido de insumo exportado', fontes: ['rev_itens', 'rev_apuracao_icms'] }, fn: mgEXP1 },
    { meta: { id: 'MG-EXP-2', tipo: 'mg_exp_saldo', nome: 'Saldo credor de exportação parado', fontes: ['rev_apuracao_icms'] }, fn: mgEXP2 },
    // benefícios
    { meta: { id: 'MG-MICRO-1', tipo: 'mg_micro', nome: 'Microcervejaria (item 33) não aplicada ou mal aplicada', fontes: ['rev_xml_itens'] }, fn: mgMICRO1 },
    { meta: { id: 'MG-CREDPRES-1', tipo: 'mg_credpres', nome: 'Crédito presumido (Anexo IV) mal aplicado', fontes: ['rev_apuracao_icms', 'rev_itens'] }, fn: mgCREDPRES1 },
    { meta: { id: 'MG-ENERGIA-1', tipo: 'mg_energia', nome: 'Energia elétrica: crédito sem laudo / parte não industrial', fontes: ['rev_itens'] }, fn: mgENERGIA1 },
    { meta: { id: 'MG-REDBC-1', tipo: 'mg_redbc', nome: 'Redução de base (Anexo II) sem estorno proporcional', fontes: ['rev_itens', 'rev_apuracao_icms'] }, fn: mgREDBC1 },
    { meta: { id: 'MG-TRANSF-1', tipo: 'mg_transf', nome: 'Transferência entre estabelecimentos (ADC 49)', fontes: ['rev_xml_itens'] }, fn: mgTRANSF1 },
    { meta: { id: 'MG-FEM-1', tipo: 'mg_fem', nome: 'FEM (2%) não destacado ou mal apurado', fontes: ['rev_xml_itens'] }, fn: mgFEM1 },
    // taproom
    { meta: { id: 'MG-TAP-1', tipo: 'mg_tap_st', nome: 'ST indevida em venda direta ao consumidor', fontes: ['rev_xml_itens'] }, fn: mgTAP1 },
    { meta: { id: 'MG-TAP-2', tipo: 'mg_tap_cp', nome: 'Crédito presumido de bar/restaurante (item 32) mal aplicado', fontes: ['rev_xml_itens'] }, fn: mgTAP2 },
    { meta: { id: 'MG-TAP-3', tipo: 'mg_tap_deg', nome: 'Degustação/consumo próprio sem estorno', fontes: ['rev_itens', 'rev_apuracao_icms'] }, fn: mgTAP3 },
    // pis/cofins
    { meta: { id: 'MG-PIS-1', tipo: 'mg_pis_cst', nome: 'Cerveja sem o maior valor (ad valorem × pauta)', fontes: ['rev_itens'] }, fn: mgPIS1 },
    { meta: { id: 'MG-PIS-2', tipo: 'mg_pis_cred', nome: 'Crédito de insumo de PIS/COFINS não aproveitado', fontes: ['rev_itens'] }, fn: mgPIS2 },
    { meta: { id: 'MG-PIS-3', tipo: 'mg_pis_rev', nome: 'Revenda a alíquota zero mal tratada', fontes: ['rev_itens'] }, fn: mgPIS3 },
  ];

  let nReg = 0;
  for (const r of REGRAS_MG) { if (A.registrar(r.meta, r.fn)) nReg++; }
  ENV.AuditoriasMG = { REGRAS_MG, registradas: nReg };
  if (typeof module !== 'undefined' && module.exports) module.exports = ENV.AuditoriasMG;
  try { delete ENV.__MG_PARTE1; } catch (e) { ENV.__MG_PARTE1 = undefined; }
  console.log('auditorias_mg: ' + nReg + ' regras estaduais MG registradas.');
})();


// ===================== auditorias_insumo.js =====================
// =====================================================================
// Revisor Fiscal Prime — auditorias_insumo.js
// AUDITORIAS DE INSUMO (indústria), baseadas em XML + classificação por NCM.
// Cobrem TODO o horizonte (inclusive 2021-2025, que é XML puro), porque leem
// rev_xml_itens e classificam por NCM (TabelasInsumo), sem depender do 0200 nem
// do De/Para (que no cliente real está vazio) nem do EFD (que só existe em 2026).
//
//   INS-1  ST sobre insumo (crédito §13 / restituição art.18 IV)
//   INS-2  DIFAL de uso e consumo / ativo interestadual
//   INS-3  insumo de fornecedor do Simples (crédito limitado ao permitido)
//   INS-4  embalagem mal classificada no 0200 (afeta crédito)
//   INS-5  crédito de ICMS de insumo não confirmado (anos sem EFD)
//   INS-6  balanço de lacres (tampa/rolha 8309 × cerveja envasada 2203)
// =====================================================================

(function () {
  'use strict';
  const ENV = (typeof window !== 'undefined') ? window : globalThis;
  const TI = ENV.TabelasInsumo;
  const TM = ENV.TabelasMG;
  const A = ENV.Auditorias;
  if (!TI || !TM || !A || !A.registrar) { console.warn('auditorias_insumo: dependências ausentes'); return; }

  const n = (v) => Number(v) || 0;
  const ano = (p) => String(p || '').slice(0, 4);
  const baseX = (x) => n(x.vl_item);
  const entradasXML = (ctx) => (ctx.xmlItens || []).filter(x => x.tipo_operacao === 'entrada' && !x.cancelada);
  const saidasXML = (ctx) => (ctx.xmlItens || []).filter(x => x.tipo_operacao === 'saida' && !x.cancelada);
  function Acc() { return new Map(); }
  function bump(map, k, init) { if (!map.has(k)) map.set(k, Object.assign({ chave: k, n: 0, valor: 0 }, init || {})); return map.get(k); }
  const resumo = (regra, achados, extra) => Object.assign({ regra, status: achados.length ? 'achados' : 'limpo', n: achados.length, valor: achados.reduce((s, a) => s + Math.abs(n(a.valor)), 0) }, extra || {});
  const limpo = (regra, motivo) => ({ achados: [], resumo: { regra, status: 'limpo', n: 0, valor: 0, motivo } });
  const semDados = (regra, motivo) => ({ achados: [], resumo: { regra, status: 'sem_dados', motivo } });
  const mk = (api, ctx, idAud, tipo, d) => api.novoAchado(ctx.cnpj, idAud, tipo, d);
  const catDe = (x) => TI.classificar(x.ncm, x.descricao).categoria;

  // ------------------------------------------------------------------
  // INS-1 — ST sobre insumo: crédito do ICMS-ST (§13) ou restituição (art.18 IV)
  // ------------------------------------------------------------------
  function ins1(ctx, idAud, api) {
    const ent = entradasXML(ctx);
    if (!ent.length) return semDados('INS-1', 'Sem XML de entrada para avaliar ST de insumo.');
    const acc = Acc();
    for (const x of ent) {
      // Cerveja (2203) comprada por cervejaria é PRODUTO ACABADO (revenda/devolução, ex. CFOP 5411/1411),
      // nunca insumo de industrialização. A ST aí é definitiva e não gera crédito/restituição por industrialização.
      if (TM.ehCerveja(x.ncm)) continue;
      if (!TI.daCreditoInsumo(catDe(x))) continue;
      const st = n(x.vl_icms_st) || n(x.vl_icms_st_ret) || n(x.vl_icms_substituto);
      const temST = st > 0.5 || TM.cstComST(x.cst_icms) || TM.cstSTRecolhida(x.cst_icms);
      if (!temST) continue;
      const valor = st > 0.5 ? st : n(x.vl_bc_icms_st) * 0.18;
      if (valor <= api.PISO) continue;
      const a = bump(acc, ano(x.periodo), { valor: 0 }); a.n++; a.valor += valor;
    }
    const achados = [];
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'ins_st_insumo', {
      periodo: a.chave, titulo: 'ST sobre insumo — crédito/restituição a recuperar', severidade: api.sev(a.valor),
      natureza: 'credito', valor: a.valor,
      descricao: `Ano ${a.chave}: ${a.n} entrada(s) de insumo que vieram com ST retida (total ${api.U.fmtBRL(a.valor)}). `
        + `Insumo industrializado dá DUAS saídas: crédito do ICMS-ST (§13 art. 31) OU restituição por não incidência da ST `
        + `sobre insumo de industrialização (art. 18 IV). Recuperável (5 anos).`,
      base_legal: 'RICMS/2023 art. 31 §13 e Anexo VII art. 18 IV; Consultas SEF/MG 104/2015, 120/2023.',
      referencias: [{ ano: a.chave, entradas: a.n, st_recuperavel: a.valor }],
    }));
    return { achados, resumo: resumo('INS-1', achados) };
  }

  // ------------------------------------------------------------------
  // INS-2 — DIFAL de uso e consumo / ativo interestadual (UF pela chave NF-e)
  // ------------------------------------------------------------------
  function ins2(ctx, idAud, api) {
    const ent = entradasXML(ctx);
    if (!ent.length) return semDados('INS-2', 'Sem XML de entrada para avaliar DIFAL.');
    const acc = Acc(); let avaliou = 0;
    for (const x of ent) {
      const cat = catDe(x);
      if (!(TI.ehUsoConsumo(cat) || TI.ehAtivo(cat))) continue;
      if (!TI.ehDeForaMG(x.chave)) continue;   // só interestadual
      avaliou++;
      const difal = baseX(x) * 0.18 - n(x.vl_icms);   // ~ (alíq interna − alíq origem) sobre a base
      if (difal <= api.PISO) continue;
      const a = bump(acc, ano(x.periodo), { valor: 0, cat });
      a.n++; a.valor += difal;
    }
    const achados = [];
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'ins_difal_uso_ativo', {
      periodo: a.chave, titulo: 'DIFAL de uso e consumo / ativo interestadual', severidade: api.sev(a.valor),
      natureza: 'risco', valor: a.valor,
      descricao: `Ano ${a.chave}: ${a.n} entrada(s) interestadual(is) de uso e consumo/ativo. DIFAL estimado ${api.U.fmtBRL(a.valor)} `
        + `(diferença entre a alíquota interna de MG e a de origem, por dentro). Conferir recolhimento do diferencial.`,
      base_legal: 'RICMS/2023 art. 1º §1º; DIFAL devido na entrada interestadual de uso e consumo/ativo.',
      referencias: [{ ano: a.chave, entradas: a.n, difal_estimado: a.valor }],
    }));
    if (!achados.length) return limpo('INS-2', `Sem DIFAL devido (avaliadas ${avaliou} entradas de uso/ativo interestaduais).`);
    return { achados, resumo: resumo('INS-2', achados) };
  }

  // ------------------------------------------------------------------
  // INS-3 — insumo de fornecedor do Simples: crédito limitado ao permitido
  // ------------------------------------------------------------------
  function ins3(ctx, idAud, api) {
    const ent = entradasXML(ctx);
    if (!ent.length) return semDados('INS-3', 'Sem XML de entrada para avaliar fornecedor do Simples.');
    const acc = Acc();
    for (const x of ent) {
      if (!TI.daCreditoInsumo(catDe(x))) continue;
      if (!TI.fornecedorSimples(x)) continue;     // CSOSN presente = Simples
      const a = bump(acc, ano(x.periodo), { valor: 0, comDestaque: 0 });
      a.n++;
      // diferença entre o crédito "cheio" (18% da base) e o ICMS efetivamente destacado
      const dif = baseX(x) * 0.18 - n(x.vl_icms);
      a.valor += Math.max(0, dif);
    }
    const achados = [];
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'ins_fornecedor_simples', {
      periodo: a.chave, titulo: 'Insumo de fornecedor do Simples — conferir limite do crédito', severidade: 'media',
      natureza: 'risco', valor: 0,
      descricao: `Ano ${a.chave}: ${a.n} entrada(s) de insumo de fornecedor do Simples (CSOSN). O crédito é limitado ao `
        + `permitido pelo CSOSN (101/201 creditam o valor informado; 102/103/300/400/500 não dão crédito). `
        + `Risco de creditar a 18% (até ${api.U.fmtBRL(a.valor)} a mais) em vez do destacado.`,
      base_legal: 'LC 123/2006 art. 23; RICMS/2023 art. 30 (crédito de aquisição do Simples limitado ao destacado).',
      referencias: [{ ano: a.chave, entradas: a.n, credito_excedente_potencial: a.valor }],
    }));
    return { achados, resumo: resumo('INS-3', achados) };
  }

  // ------------------------------------------------------------------
  // INS-4 — embalagem mal classificada no 0200 (NCM de embalagem com TIPO_ITEM ≠ 02)
  // ------------------------------------------------------------------
  function ins4(ctx, idAud, api) {
    const prods = Object.values(ctx.prodPorCod || {});
    if (!prods.length) return semDados('INS-4', 'Sem cadastro 0200 importado (sem EFD) para checar classificação.');
    const erradas = [];
    for (const p of prods) {
      const cat = TI.classificar(p.ncm, p.descricao).categoria;
      if (!TI.ehEmbalagem(cat)) continue;            // só interessa embalagem
      const tipo = String(p.tipo_item || '').padStart(2, '0');
      if (tipo === '02') continue;                   // já está correto
      erradas.push({ cod: p.cod_item, ncm: p.ncm, tipo, desc: p.descricao });
    }
    if (!erradas.length) return limpo('INS-4', 'Embalagens com classificação (TIPO_ITEM 02) consistente.');
    const amostra = erradas.slice(0, 6).map(e => `${e.desc} (NCM ${e.ncm}, tipo ${e.tipo})`).join('; ');
    const achado = mk(api, ctx, idAud, 'ins_embalagem_classif', {
      periodo: '(cadastro)', titulo: 'Embalagem classificada errada no cadastro (afeta crédito)', severidade: 'media',
      natureza: 'risco', valor: 0,
      descricao: `${erradas.length} item(ns) de embalagem no 0200 com TIPO_ITEM ≠ 02 (ex.: ${amostra}). A classificação errada `
        + `compromete a apuração do crédito de material de embalagem e o cruzamento por tipo de item. Corrigir o cadastro.`,
      base_legal: 'Guia EFD ICMS/IPI (TIPO_ITEM 02 = Embalagem); RICMS/2023 art. 31 V.',
      referencias: erradas.slice(0, 30),
    });
    return { achados: [achado], resumo: resumo('INS-4', [achado], { total_itens: erradas.length }) };
  }

  // ------------------------------------------------------------------
  // INS-5 — crédito de ICMS de insumo NÃO confirmado (anos sem EFD)
  // ------------------------------------------------------------------
  function ins5(ctx, idAud, api) {
    const ent = entradasXML(ctx);
    if (!ent.length) return semDados('INS-5', 'Sem XML de entrada para dimensionar o crédito de insumo.');
    const efdAnos = new Set((ctx.itens || []).map(i => ano(i.periodo)));   // anos com EFD (crédito confirmável)
    const acc = Acc();
    for (const x of ent) {
      if (TM.ehCerveja(x.ncm)) continue;          // cerveja = produto acabado (revenda), não insumo
      const cat = catDe(x);
      if (!TI.daCreditoInsumo(cat)) continue;
      const icms = n(x.vl_icms);
      if (icms <= 0.5) continue;
      const a = bump(acc, ano(x.periodo), { valor: 0, porCat: {} });
      a.n++; a.valor += icms; a.porCat[cat] = (a.porCat[cat] || 0) + icms;
    }
    const achados = [];
    for (const a of acc.values()) {
      if (efdAnos.has(a.chave)) continue;        // ano com EFD → crédito é confirmável lá, não acusa aqui
      if (a.valor <= 1000) continue;             // imaterial
      const top = Object.entries(a.porCat).sort((x, y) => y[1] - x[1]).slice(0, 3)
        .map(([c, v]) => `${TI.rotulo(c)} ${api.U.fmtBRL(v)}`).join(', ');
      achados.push(mk(api, ctx, idAud, 'ins_credito_nao_confirmado', {
        periodo: a.chave, titulo: 'Crédito de insumo — magnitude no ano sem EFD (informativo)', severidade: 'baixa',
        natureza: 'risco', valor: a.valor,
        descricao: `Ano ${a.chave}: passaram ${api.U.fmtBRL(a.valor)} de ICMS de insumos (${top}). É o volume de crédito de `
          + `insumo do ano, que você só tem em XML. ATENÇÃO: num fabricante em operação normal esse crédito JÁ FOI apropriado na `
          + `apuração (a EFD de 2026 confirma que a empresa credita insumo todo mês). Logo o recuperável aqui tende a ZERO — só há `
          + `crédito a recuperar se você confirmar, na EFD do ano, que ele não foi tomado. Não tratar como oportunidade.`,
        base_legal: 'LC 87/1996 art. 20; RICMS/2023 art. 31 (crédito de insumo); crédito extemporâneo em 5 anos.',
        referencias: [{ ano: a.chave, entradas: a.n, icms_insumo: a.valor, por_categoria: a.porCat, observacao: 'teto bruto; recuperável tende a zero pois o insumo já é creditado na apuração' }],
      }));
    }
    if (!achados.length) return limpo('INS-5', 'Crédito de insumo dos anos sem EFD imaterial, ou todos os anos têm EFD.');
    return { achados, resumo: resumo('INS-5', achados) };
  }

  // ------------------------------------------------------------------
  // INS-6 — balanço de lacres: tampa/rolha (8309) × cerveja envasada (2203)
  // Cada unidade lacrada usa 1 lacre. Chopp/keg é excluído (não usa lacre 1:1).
  // ------------------------------------------------------------------
  function ehLacre(x) {
    const ncm = TI.soNum(x.ncm);
    if (ncm.startsWith('8309')) return true;
    return /tampa|tampinha|rolha|crown|capsula|cápsula/i.test(x.descricao || '');
  }
  function ehChoppKeg(x) {
    const u = String(x.unidade || '').toUpperCase();
    return /chopp|keg|barril|growler/i.test(x.descricao || '') || /^(LT|L|LITRO|DM3)$/.test(u);
  }
  function qtdNorm(x) {
    let q = n(x.qtd);
    if (q <= 0) return 0;
    const u = String(x.unidade || '').toUpperCase();
    const vl = n(x.vl_item);
    const precoUnit = vl > 0 ? vl / q : 0;
    // Lacre/tampa custa centavos (~R$0,05 a R$0,60). A unidade vem inconsistente (MI, MIL, UND).
    // Só multiplica por 1000 se a unidade for milheiro E o preço por "unidade declarada" for alto
    // (>= R$10), o que prova que a qtd está em milheiros. Se o preço já está em centavos, a qtd
    // já está em unidades mesmo rotulada MIL — não multiplica (evita o erro de 1.000x).
    const ehMilheiro = /^(MI|MIL|MLH|MILHEIR)/.test(u);
    if (ehMilheiro && precoUnit >= 10) q *= 1000;
    return q;
  }
  function ins6(ctx, idAud, api) {
    const ent = entradasXML(ctx), sai = saidasXML(ctx);
    const accL = {}, accB = {}, precoB = {};
    for (const x of ent) if (ehLacre(x)) accL[ano(x.periodo)] = (accL[ano(x.periodo)] || 0) + qtdNorm(x);
    for (const x of sai) {
      if (!TM.ehCerveja(x.ncm) || ehChoppKeg(x)) continue;   // só cerveja ENVASADA
      const a = ano(x.periodo);
      accB[a] = (accB[a] || 0) + n(x.qtd);
      precoB[a] = precoB[a] || []; if (n(x.vl_unit) > 0) precoB[a].push(n(x.vl_unit));
    }
    const anos = [...new Set([...Object.keys(accL), ...Object.keys(accB)])].sort();
    if (Object.keys(accL).length === 0) return semDados('INS-6', 'Sem compras de lacre (tampa/rolha) identificadas para o balanço.');
    // Balanço AGREGADO do período inteiro. Lacres são comprados em lote e estocados,
    // então comparar ano a ano é ruidoso (estoque/timing, anos parciais como meio ano).
    // O agregado de vários anos suaviza isso (estoque inicial ≈ estoque final num regime estável).
    let totalLac = 0, totalBeer = 0; const precosAll = [];
    for (const a of anos) { totalLac += accL[a] || 0; totalBeer += accB[a] || 0; }
    for (const a of anos) for (const p of (precoB[a] || [])) precosAll.push(p);
    const pmedio = precosAll.length ? precosAll.reduce((s, v) => s + v, 0) / precosAll.length : 0;
    const porAno = anos.map(a => ({ ano: a, lacres: Math.round(accL[a] || 0), envasadas: Math.round(accB[a] || 0) }));
    if (totalBeer <= 0) return semDados('INS-6', 'Sem cerveja envasada vendida para o balanço de lacres.');
    const razao = totalLac / totalBeer;
    const faixa = `${anos[0]}–${anos[anos.length - 1]}`;
    const achados = [];
    // tolerância larga no agregado: 0,85 a 1,30 é consistente (crescer estoque é normal num fabricante em expansão)
    if (razao < 0.85) {
      const gapUnid = Math.round(totalBeer - totalLac);
      const valor = pmedio > 0 ? gapUnid * pmedio * 0.18 : 0;
      achados.push(mk(api, ctx, idAud, 'ins_balanco_lacres', {
        periodo: faixa, titulo: 'Lacres comprados a MENOS que cerveja envasada vendida (período)',
        severidade: valor > 0 ? api.sev(valor) : 'media', natureza: 'risco', valor,
        descricao: `No período ${faixa}: ${Math.round(totalLac).toLocaleString('pt-BR')} lacres comprados vs `
          + `${Math.round(totalBeer).toLocaleString('pt-BR')} cervejas envasadas vendidas (razão agregada ${razao.toFixed(2)}). `
          + `Faltam ~${gapUnid.toLocaleString('pt-BR')} lacres — indício de saída sem nota OU consumo de estoque anterior à série. `
          + `ICMS-teto estimado ${api.U.fmtBRL(valor)} (teto bruto, sujeito a estoque/quebras — conferir inventário). Relação assumida 1:1.`,
        base_legal: 'Balanço de insumo 1:1 (lacre × unidade envasada); subsídio à fiscalização de saída sem nota.',
        referencias: [{ razao_agregada: razao, total_lacres: Math.round(totalLac), total_envasadas: Math.round(totalBeer), por_ano: porAno }],
      }));
    } else if (razao > 1.30) {
      const gapUnid = Math.round(totalLac - totalBeer);
      achados.push(mk(api, ctx, idAud, 'ins_balanco_lacres', {
        periodo: faixa, titulo: 'Lacres comprados a MAIS que cerveja envasada vendida (período)',
        severidade: 'baixa', natureza: 'risco', valor: 0,
        descricao: `No período ${faixa}: ${Math.round(totalLac).toLocaleString('pt-BR')} lacres comprados vs `
          + `${Math.round(totalBeer).toLocaleString('pt-BR')} envasadas vendidas (razão agregada ${razao.toFixed(2)}). `
          + `Sobram ~${gapUnid.toLocaleString('pt-BR')} lacres: formação de estoque, perda de envase ou produção ainda não vendida. Conferir inventário e quebras.`,
        base_legal: 'Balanço de insumo 1:1 (lacre × unidade envasada).',
        referencias: [{ razao_agregada: razao, total_lacres: Math.round(totalLac), total_envasadas: Math.round(totalBeer), por_ano: porAno }],
      }));
    }
    if (!achados.length) return limpo('INS-6', `Balanço de lacres consistente no período (razão agregada ${razao.toFixed(2)}, dentro de 0,85–1,30).`);
    return { achados, resumo: resumo('INS-6', achados, { razao_agregada: razao }) };
  }

  // ------------------------------------------------------------------
  // INS-7 — Produto intermediário / coadjuvante de fabricação consumido no processo
  //   Crédito de ICMS sobre itens que NÃO integram a cerveja mas são consumidos imediata e
  //   integralmente, em contato direto com o produto, no processo (enzimas, estabilizantes,
  //   clarificantes, auxiliar de filtração, CO2, antiespumante). Tipicamente jogados em "uso e
  //   consumo" sem crédito. Base: art. 66, V, "b" RICMS/2002 (RICMS/2023) + IN SLT 01/1986;
  //   Consultas 154/2019, 109/2020, 140/2022; STJ EREsp 1.775.781/SP (essencialidade).
  // ------------------------------------------------------------------
  const NCM_INTERMED_CERV = new Set(['3201', '3905', '3507', '2811', '3824', '2106', '2102', '3802', '3913', '2512', '1302', '3204', '1108', '3913']);
  const RE_INTERMED = /enzim|attenu|isomax|amilas|protea|clearmax|clarific|estabiliz|\bpvpp\b|gelatin|isinglass|carragen|kieselg|diatom|perlit|coadjuvante|antiespum|foammax|levedura|fermento biol|\byeast\b|di[oó]xido de carbono|g[aá]s carb[oô]nic|\bco2\b|tanino|bentonita|silica gel/i;
  const RE_INTERMED_EXCLUI = /removil|detergent|limpeza|\bsoda\b|c[aá]ustic|sanitiz|cilindro|vasilham|v[aá]lvula|regulador|medidor|\bmeter\b|filtro\b|mangueira|tubula/i;

  // --- INS-9: combustível consumido na caldeira (geração de vapor para brassagem) ---
  // Tier 1 (alta confiança = caldeira quase certa): biomassa, que não roda frota/empilhadeira.
  //   ATENÇÃO: "pellet" sozinho pega lúpulo em pellet (NCM 1210) e malte — por isso a biomassa é
  //   amarrada a NCM de madeira (4401/4402) ou a termos especificamente de madeira/lenha.
  const NCM_COMB_BIOMASSA = new Set(['4401', '4402']);
  const RE_COMB_BIOMASSA = /lenha|cavaco|casqueiro|maravalha|serrag|\bcisco\b|biomassa|baga[çc]o de cana|res[ií]duo de madeira|p[oó] de serra|carv[aã]o vegetal|cepilho|cancha|pellet de madeira|briquete de madeira/i;
  // Tier 2 (a confirmar = pode ser caldeira OU frota/gerador): combustível fóssil de processo.
  //   Amarrado a NCM de combustível (2710 óleo/diesel/BPF, 2711 GLP/GN) para não pegar filtro (8421)
  //   nem aditivo de óleo (3811) que citam "diesel"/"óleo" na descrição.
  const RE_COMB_FOSSIL = /[oó]leo combust[ií]vel|\bbpf\b|[oó]leo bpf|[oó]leo diesel|\bdiesel\b|\bglp\b|g[aá]s liquefeito|g[aá]s natural|\bgn\b|g[aá]s industrial|g[aá]s para caldeira/i;
  // Insumos de cerveja que nunca são combustível (defesa contra match por descrição):
  const NCM_NAO_COMBUSTIVEL = new Set(['1210', '1107', '1003', '1108', '2106', '1101', '1109']);
  // Nunca (frota/veículo/lubrificante, não é insumo de processo):
  const RE_COMB_EXCLUI = /gasolina|[aá]lcool|etanol|querosene|lubrific|graxa|\barla\b|\bgnv\b|automotiv|ve[ií]culo|\bfrota\b|empilhad|gerador a diesel/i;

  function ins7(ctx, idAud, api) {
    const ent = entradasXML(ctx);
    if (!ent.length) return semDados('INS-7', 'Sem XML de entrada para avaliar produto intermediário.');
    const RV = window.RegimeVigencia;
    const acc = Acc(); const itensFlag = []; let vedadoRegime = 0;
    for (const x of ent) {
      if (TM.ehCerveja(x.ncm)) continue;
      const desc = String(x.descricao || '');
      if (RE_INTERMED_EXCLUI.test(desc)) continue;                 // limpeza/equipamento não dá crédito de PI
      const ncm4 = String(x.ncm || '').slice(0, 4);
      if (!NCM_INTERMED_CERV.has(ncm4) && !RE_INTERMED.test(desc)) continue;
      const icms = n(x.vl_icms);
      if (icms <= 0.5) continue;
      // Dentro da vigência de regime que veda créditos, o produto intermediário é VEDADO (não recuperação).
      if (RV && RV.creditoVedado(ctx.cnpj, x.periodo)) { vedadoRegime += icms; continue; }
      const a = bump(acc, ano(x.periodo), { valor: 0, porNcm: {} });
      a.n++; a.valor += icms; a.porNcm[ncm4] = (a.porNcm[ncm4] || 0) + icms;
      if (itensFlag.length < 12) itensFlag.push({ ncm: x.ncm, desc: desc.slice(0, 32), icms: +icms.toFixed(2) });
    }
    const achados = [];
    for (const a of acc.values()) {
      if (a.valor <= api.PISO) continue;
      const top = Object.entries(a.porNcm).sort((x, y) => y[1] - x[1]).slice(0, 4)
        .map(([c, v]) => `NCM ${c} ${api.U.fmtBRL(v)}`).join(', ');
      achados.push(mk(api, ctx, idAud, 'ins_produto_intermediario', {
        periodo: a.chave, titulo: 'Crédito de produto intermediário/coadjuvante de fabricação a buscar', severidade: api.sev(a.valor),
        natureza: 'credito', valor: a.valor,
        descricao: `Ano ${a.chave}: ${a.n} entrada(s) de coadjuvantes de fabricação (${top}) com ${api.U.fmtBRL(a.valor)} de ICMS. `
          + `São itens consumidos no processo em contato direto com a cerveja (enzimas, estabilizantes, clarificantes, terra `
          + `diatomácea, CO2, antiespumante) que se enquadram como PRODUTO INTERMEDIÁRIO e dão crédito, mas costumam ser lançados `
          + `como uso e consumo sem crédito. CONFIRMAR: (1) que o item não foi creditado; (2) a função no processo via laudo técnico `
          + `(exigência da SEF/MG). Limpeza (CIP) e equipamento de CO2 foram excluídos por não darem crédito.`,
        base_legal: 'RICMS/2023 art. 30, V e art. 66 (ex-art. 66, V, "b"/2002); IN SLT 01/1986; Consultas SEF/MG 154/2019, 109/2020, 140/2022; STJ EREsp 1.775.781/SP (essencialidade do produto intermediário).',
        referencias: [{ ano: a.chave, entradas: a.n, icms_total: a.valor, por_ncm: a.porNcm, amostra: itensFlag }],
      }));
    }
    if (!achados.length) return limpo('INS-7', vedadoRegime > 0
      ? `Produto intermediário em período sob regime é vedado (${api.U.fmtBRL(vedadoRegime)}) — sem recuperação enquanto vigente.`
      : 'Sem coadjuvantes de fabricação com ICMS relevante identificados.');
    return { achados, resumo: resumo('INS-7', achados) };
  }

  // ------------------------------------------------------------------
  // INS-8 — Crédito de ICMS de energia elétrica consumida na industrialização
  //   Lê as contas de energia do livro fiscal (C500/C590, apuradas no normalizador) e calcula o
  //   teto do crédito. O crédito efetivo é o % industrial (laudo técnico) sobre o ICMS da energia.
  //   Base: LC 87/1996 art. 33, II, "b"; RICMS/2023 art. 30/66.
  // ------------------------------------------------------------------
  function ins8(ctx, idAud, api) {
    const aps = ctx.apurIcms || [];
    if (!aps.length) return semDados('INS-8', 'Sem apuração de ICMS (EFD) para avaliar energia elétrica.');
    let oper = 0, icms = 0, operInd = 0, icmsInd = 0, docs = 0; const periodos = [];
    for (const a of aps) {
      const e = a.energia; if (!e) continue;
      oper += n(e.vl_oper); icms += n(e.vl_icms); operInd += n(e.vl_oper_industrial); icmsInd += n(e.vl_icms_industrial); docs += n(e.docs);
      if (n(e.vl_oper) > 0) periodos.push(a.periodo);
    }
    if (oper <= 0 && icms <= 0) return semDados('INS-8', 'Nenhuma conta de energia (C500/C590) no livro fiscal — reimporte a EFD com a energia.');
    const faixa = periodos.length ? `${periodos.sort()[0]}–${periodos[periodos.length - 1]}` : '(período)';
    const achados = [];
    if (icmsInd > api.PISO) {
      // energia industrial com ICMS destacado -> crédito = laudo% × ICMS
      achados.push(mk(api, ctx, idAud, 'ins_energia_credito', {
        periodo: faixa, titulo: 'Crédito de ICMS de energia elétrica industrial (definir % por laudo)', severidade: api.sev(icmsInd),
        natureza: 'credito', valor: icmsInd,
        descricao: `Energia com CFOP de estabelecimento industrial: ICMS destacado ${api.U.fmtBRL(icmsInd)} (operação ${api.U.fmtBRL(operInd)}). `
          + `O crédito é o PERCENTUAL consumido na industrialização (refrigeração, brassagem, envase) sobre esse ICMS. `
          + `FALTA O LAUDO TÉCNICO que fixa esse %. O valor acima é o teto (100%); crédito real = laudo% × ${api.U.fmtBRL(icmsInd)}.`,
        base_legal: 'LC 87/1996 art. 33, II, "b" (energia consumida na industrialização); RICMS/2023 art. 30/66; exige laudo técnico do % industrial.',
        referencias: [{ periodos: periodos.length, icms_industrial: icmsInd, operacao_industrial: operInd, teto_credito: icmsInd, observacao: 'crédito = % do laudo × este teto' }],
      }));
    } else if (oper > 0 || operInd > 0) {
      // energia sem ICMS creditado no livro -> conferir destaque na conta + laudo
      achados.push(mk(api, ctx, idAud, 'ins_energia_credito', {
        periodo: faixa, titulo: 'Energia elétrica sem ICMS creditado — conferir destaque + laudo', severidade: 'media',
        natureza: 'risco', valor: 0,
        descricao: `${docs} conta(s) de energia no livro fiscal (operação ${api.U.fmtBRL(oper)}, sendo ${api.U.fmtBRL(operInd)} com CFOP industrial), `
          + `mas com ICMS creditado ZERADO. Ou (1) a conta tem ICMS destacado não creditado — crédito a recuperar (laudo% × ICMS da conta), `
          + `ou (2) é energia sem ICMS. CONFERIR o destaque de ICMS na conta da distribuidora e levantar o laudo do % industrial. `
          + `Obs.: a operação aqui é pequena — a energia de produção provavelmente está em outro estabelecimento ou não foi importada na EFD.`,
        base_legal: 'LC 87/1996 art. 33, II, "b"; RICMS/2023 art. 30/66; exige laudo técnico do % industrial.',
        referencias: [{ contas: docs, operacao_total: oper, operacao_industrial: operInd, icms_no_livro: icms }],
      }));
    }
    if (!achados.length) return limpo('INS-8', 'Sem energia elétrica com crédito a apurar.');
    return { achados, resumo: resumo('INS-8', achados) };
  }

  // ------------------------------------------------------------------
  // INS-9 — Crédito de ICMS de combustível consumido na caldeira (vapor de processo)
  //   O vapor da brassagem/fervura vem de combustível queimado na caldeira: insumo energético
  //   consumido no processo industrial, gera crédito. Dois níveis:
  //     Tier 1 (biomassa): caldeira quase certa -> crédito do ICMS destacado.
  //     Tier 2 (fóssil): confirmar uso na caldeira; se sob ST, recuperável via ressarcimento.
  //   Exclui frota/empilhadeira/lubrificante. Base: LC 87/1996 art. 20; RICMS/2023 art. 30/66;
  //   Consultas SEF/MG 045/2018 e 140/2022.
  // ------------------------------------------------------------------
  function ins9(ctx, idAud, api) {
    const ent = entradasXML(ctx);
    if (!ent.length) return semDados('INS-9', 'Sem XML de entrada para avaliar combustível de caldeira.');
    const accBio = Acc(), accFos = Acc(); const amostraBio = [], amostraFos = [];
    for (const x of ent) {
      const desc = String(x.descricao || '');
      if (RE_COMB_EXCLUI.test(desc)) continue;                       // frota/veículo/lubrificante
      const ncm4 = String(x.ncm || '').slice(0, 4);
      if (NCM_NAO_COMBUSTIVEL.has(ncm4)) continue;                   // lúpulo/malte/etc. nunca são combustível
      const bio = NCM_COMB_BIOMASSA.has(ncm4) || RE_COMB_BIOMASSA.test(desc);
      const fos = !bio && (ncm4 === '2711' || (ncm4 === '2710' && RE_COMB_FOSSIL.test(desc)));
      if (!bio && !fos) continue;
      const icms = n(x.vl_icms);
      const st = n(x.vl_icms_st) || n(x.vl_icms_st_ret) || n(x.vl_icms_substituto);
      const recuperavel = icms + st;                                 // próprio destacado + ST retido (ressarcível)
      if (recuperavel <= 0.5) continue;
      const alvo = bio ? accBio : accFos;
      const a = bump(alvo, ano(x.periodo), { valor: 0, icms: 0, st: 0, porNcm: {} });
      a.n++; a.valor += recuperavel; a.icms += icms; a.st += st; a.porNcm[ncm4] = (a.porNcm[ncm4] || 0) + recuperavel;
      const amostra = bio ? amostraBio : amostraFos;
      if (amostra.length < 10) amostra.push({ ncm: x.ncm, desc: desc.slice(0, 32), icms: +icms.toFixed(2), st: +st.toFixed(2) });
    }
    const achados = [];
    for (const a of accBio.values()) {
      if (a.valor <= api.PISO) continue;
      const top = Object.entries(a.porNcm).sort((x, y) => y[1] - x[1]).slice(0, 4).map(([c, v]) => `NCM ${c} ${api.U.fmtBRL(v)}`).join(', ');
      achados.push(mk(api, ctx, idAud, 'ins_combustivel_caldeira', {
        periodo: a.chave, titulo: 'Crédito de combustível de caldeira (biomassa) a buscar', severidade: api.sev(a.valor),
        natureza: 'credito', valor: a.valor,
        descricao: `Ano ${a.chave}: ${a.n} entrada(s) de combustível de biomassa (${top}) com ${api.U.fmtBRL(a.valor)} de ICMS `
          + `(${api.U.fmtBRL(a.icms)} destacado${a.st > 0.5 ? ` + ${api.U.fmtBRL(a.st)} ST` : ''}). Lenha/cavaco/briquete/bagaço só servem `
          + `à CALDEIRA (não rodam frota), então o consumo na geração de vapor para a brassagem é insumo energético e dá crédito. `
          + `CONFIRMAR que não foi creditado. Crédito alta confiança.`,
        base_legal: 'LC 87/1996 art. 20 (mercadoria entrada para industrialização); RICMS/2023 art. 30/66; Consultas SEF/MG 045/2018 e 140/2022 (combustível consumido no processo industrial).',
        referencias: [{ ano: a.chave, entradas: a.n, icms_destacado: a.icms, icms_st: a.st, recuperavel: a.valor, por_ncm: a.porNcm, amostra: amostraBio }],
      }));
    }
    for (const a of accFos.values()) {
      if (a.valor <= api.PISO) continue;
      const top = Object.entries(a.porNcm).sort((x, y) => y[1] - x[1]).slice(0, 4).map(([c, v]) => `NCM ${c} ${api.U.fmtBRL(v)}`).join(', ');
      achados.push(mk(api, ctx, idAud, 'ins_combustivel_caldeira', {
        periodo: a.chave, titulo: 'Combustível fóssil — confirmar consumo na caldeira (crédito/ressarcimento)', severidade: 'media',
        natureza: 'credito', valor: a.valor,
        descricao: `Ano ${a.chave}: ${a.n} entrada(s) de combustível fóssil (${top}) com ${api.U.fmtBRL(a.valor)} de ICMS `
          + `(${api.U.fmtBRL(a.icms)} destacado${a.st > 0.5 ? ` + ${api.U.fmtBRL(a.st)} retido por ST` : ''}). Óleo BPF/diesel/GLP/GN PODEM ser da caldeira `
          + `OU da frota/gerador. CONFIRMAR o uso na caldeira (vapor de processo). Se for, a parcela própria credita e a parcela sob ST `
          + `(${api.U.fmtBRL(a.st)}) é recuperável via RESSARCIMENTO (o ICMS-ST presume revenda, mas aqui o combustível é consumido como insumo).`,
        base_legal: 'LC 87/1996 art. 20; RICMS/2023 art. 30/66; Consulta SEF/MG 045/2018 (ressarcimento do ICMS-ST de óleo diesel consumido no processo industrial); Convênio ICMS 110/2007.',
        referencias: [{ ano: a.chave, entradas: a.n, icms_destacado: a.icms, icms_st_ressarcivel: a.st, recuperavel: a.valor, por_ncm: a.porNcm, amostra: amostraFos }],
      }));
    }
    if (!achados.length) return limpo('INS-9', 'Nenhum combustível de caldeira com ICMS relevante identificado nas entradas.');
    return { achados, resumo: resumo('INS-9', achados) };
  }

  // ------------------------------------------------------------------
  // registro
  // ------------------------------------------------------------------
  const REGRAS_INS = [
    { meta: { id: 'INS-1', tipo: 'ins_st', nome: 'ST sobre insumo (crédito/restituição) — 5 anos', fontes: ['rev_xml_itens'] }, fn: ins1 },
    { meta: { id: 'INS-2', tipo: 'ins_difal', nome: 'DIFAL de uso e consumo / ativo interestadual', fontes: ['rev_xml_itens'] }, fn: ins2 },
    { meta: { id: 'INS-3', tipo: 'ins_simples', nome: 'Insumo de fornecedor do Simples (crédito limitado)', fontes: ['rev_xml_itens'] }, fn: ins3 },
    { meta: { id: 'INS-4', tipo: 'ins_classif', nome: 'Embalagem mal classificada no cadastro 0200', fontes: ['rev_produtos'] }, fn: ins4 },
    { meta: { id: 'INS-5', tipo: 'ins_credito', nome: 'Crédito de ICMS de insumo não confirmado (anos sem EFD)', fontes: ['rev_xml_itens'] }, fn: ins5 },
    { meta: { id: 'INS-6', tipo: 'ins_lacres', nome: 'Balanço de lacres (tampa/rolha × cerveja envasada)', fontes: ['rev_xml_itens'] }, fn: ins6 },
    { meta: { id: 'INS-7', tipo: 'ins_produto_intermediario', nome: 'Produto intermediário / coadjuvante de fabricação (crédito a buscar)', fontes: ['rev_xml_itens'] }, fn: ins7 },
    { meta: { id: 'INS-8', tipo: 'ins_energia_credito', nome: 'Crédito de ICMS de energia elétrica industrial (laudo define %)', fontes: ['rev_apuracao_icms'] }, fn: ins8 },
    { meta: { id: 'INS-9', tipo: 'ins_combustivel_caldeira', nome: 'Crédito de ICMS de combustível de caldeira (vapor de processo)', fontes: ['rev_xml_itens'] }, fn: ins9 },
  ];
  let nReg = 0;
  for (const r of REGRAS_INS) if (A.registrar(r.meta, r.fn)) nReg++;
  ENV.AuditoriasInsumo = { REGRAS_INS, registradas: nReg };
  if (typeof module !== 'undefined' && module.exports) module.exports = ENV.AuditoriasInsumo;
  console.log('auditorias_insumo: ' + nReg + ' regras de insumo registradas.');
})();


// ===================== ui_auditorias.js =====================
// =====================================================================
// Revisor Fiscal Prime — ui_auditorias.js
// Tela das AUDITORIAS CRUZADAS. Roda as regras do módulo Auditorias sobre o
// cliente ativo, grava os achados em rev_achados e mostra o resultado:
// resumo (crédito estimado, severidade) + lista de achados rastreável.
// Os achados alimentam a seção 7 do dossiê.
// =====================================================================

const UIAuditorias = (function () {
  'use strict';

  let _ultimoResultado = null;

  const SEV_ROTULO = { alta: 'Alta', media: 'Média', baixa: 'Baixa' };
  const NAT_ROTULO = { credito: 'Crédito', erro: 'Erro', risco: 'Risco' };
  const TIPO_ROTULO = {
    mg_terc_vencido: 'Suspensão vencida (terceiros >180d)',
    mg_terc_saldo: 'Crédito de estoque em terceiros (≤180d)',
    mg_terc_valoracao: 'Retornos de industrialização subvalorados',
    mg_reg_producao: 'Produção × limite do regime',
    mg_reg_meta: 'Meta de arrecadação do regime',
    mg_reg_importacao: 'Conteúdo de importação (regime)',
    fed_subvencao: 'Subvenção não excluída (IRPJ/CSLL)',
    fed_ipi_saldo: 'Saldo credor de IPI acumulado',
    xml_nao_escriturado: 'Nota não escriturada',
    icms_base_pis_cofins: 'ICMS na base PIS/COFINS',
    reinf_retencao: 'Retenção Reinf',
    ecd_ecf: 'ECD × ECF',
    ecd_contrib: 'ECD × Faturamento',
    ins_produto_intermediario: 'Produto intermediário',
    ins_energia_credito: 'Energia elétrica',
    ins_combustivel_caldeira: 'Combustível de caldeira',
  };

  async function render(container) {
    const ativo = Clientes.ativo();

    if (!ativo) {
      container.innerHTML = `
        <div class="etapa-header">
          <h2>Auditorias cruzadas</h2>
          <p class="etapa-desc">Cruza as fontes já importadas (XML, EFD ICMS/IPI, EFD-Contribuições, EFD-Reinf, ECD e ECF) para apontar créditos não aproveitados, erros e riscos.</p>
        </div>
        <div class="card"><p>Selecione um cliente para rodar as auditorias.</p></div>`;
      return;
    }

    const cnpjsSel = await Clientes.cnpjsAtivos();
    const ehGrupo = cnpjsSel.length > 1;
    const ult = await Auditorias.ultimaExecucao(cnpjsSel).catch(() => null);

    container.innerHTML = `
      <div class="etapa-header">
        <h2>Auditorias cruzadas</h2>
        <p class="etapa-desc">
          Cruza as fontes já importadas para apontar <strong>créditos não aproveitados</strong>,
          <strong>erros</strong> e <strong>riscos</strong>. Cada achado aponta o campo real e a base legal,
          e alimenta a seção 7 do dossiê.
        </p>
      </div>

      <div class="card">
        <h3 style="margin-top:0">Regras a executar</h3>
        <div id="aud-regras" class="aud-regras">
          ${Auditorias.REGRAS.map(r => `
            <label class="aud-regra">
              <input type="checkbox" value="${r.id}" checked>
              <span><strong>${r.id}</strong> · ${Utils.escapeHtml(r.nome)}</span>
            </label>`).join('')}
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:14px">
          <button class="btn btn-primary" id="btn-rodar">Rodar auditorias</button>
          <button class="btn btn-small" id="btn-inventario-top">📋 Inventário de declarações</button>
          <button class="btn btn-small" id="btn-dossie">Ir para o dossiê</button>
          <span style="font-size:12px;color:var(--texto-fraco)">
            ${ehGrupo
              ? `Grupo: <strong>${Utils.escapeHtml(ativo.razao_social || ativo.cnpj)}</strong> · <strong>${cnpjsSel.length} filial(is) selecionada(s)</strong> (roda filial a filial e consolida)`
              : `Cliente: <strong>${Utils.escapeHtml(ativo.razao_social || ativo.cnpj)}</strong>`}
            ${ult ? ` · última execução em ${formatarData(ult.executada_em)} (${ult.n_achados} achado(s))` : ''}
          </span>
        </div>
        <div id="aud-prog" class="aud-prog" style="display:none">
          <div class="aud-prog-barra"><div class="aud-prog-fill" id="aud-fill"></div></div>
          <div class="aud-prog-txt" id="aud-txt"></div>
        </div>
      </div>

      <div id="aud-resultado"></div>`;

    container.querySelector('#btn-dossie').onclick = () => App.navegar('dossie');
    container.querySelector('#btn-rodar').onclick = () => rodar(container, ativo);
    container.querySelector('#btn-inventario-top').onclick = abrirInventario;

    // se já houve execução, mostra os achados persistidos sem re-rodar
    if (ult) {
      const achados = await Auditorias.listarAchados(cnpjsSel).catch(() => []);
      if (achados.length) {
        _ultimoResultado = { achados, resumo: ult.resumo, regras: ult.regras_detalhe || [] };
        renderResultado(container.querySelector('#aud-resultado'), _ultimoResultado, true);
      }

  }

  function regrasSelecionadas(container) {
    return [...container.querySelectorAll('#aud-regras input:checked')].map(i => i.value);
  }

  async function rodar(container, ativo) {
    const btn = container.querySelector('#btn-rodar');
    const regras = regrasSelecionadas(container);
    if (regras.length === 0) { alert('Selecione ao menos uma regra.'); return; }

    btn.disabled = true; btn.textContent = 'Rodando…';
    const prog = container.querySelector('#aud-prog');
    const fill = container.querySelector('#aud-fill');
    const txt = container.querySelector('#aud-txt');
    prog.style.display = 'block';
    container.querySelector('#aud-resultado').innerHTML = '';

    try {
      const cnpjsRodar = await Clientes.cnpjsAtivos();
      const res = await Auditorias.executarGrupo(cnpjsRodar, {
        regras,
        onProgress: (pct, msg) => { fill.style.width = pct + '%'; txt.textContent = msg || ''; },
      });
      _ultimoResultado = res;
      renderResultado(container.querySelector('#aud-resultado'), res, false);
    } catch (e) {
      console.error('Erro nas auditorias', e);
      container.querySelector('#aud-resultado').innerHTML =
        `<div class="card"><p style="color:var(--danger)">Erro ao rodar auditorias: ${Utils.escapeHtml(e.message)}</p></div>`;
    } finally {
      btn.disabled = false; btn.textContent = 'Rodar auditorias';
      setTimeout(() => { prog.style.display = 'none'; }, 600);
    }
  }

  // classificação de esfera: federais = teses PIS/COFINS, IRPJ/CSLL e Reinf; resto = ICMS estadual
  const FEDERAL_IDS = new Set(['A2', 'A3', 'A4', 'A5', 'MG-PIS-1', 'MG-PIS-2', 'MG-PIS-3']);
  const esferaDe = (id) => (FEDERAL_IDS.has(id) || /^FED-|^fed_|^INS-|^ins_/.test(String(id || ''))) ? 'federal' : 'estadual';
  const ESFERA_META = {
    estadual: { rotulo: 'Estadual · ICMS', curto: 'Estadual (ICMS)', cls: 'est' },
    federal: { rotulo: 'Federal · PIS/COFINS · IRPJ/CSLL', curto: 'Federal', cls: 'fed' },
  };

  // ====== SUSPENSÃO: itens que dependem do regime especial / de informação do cliente ======
  // O cliente opera sob regime especial (e-PTA) que estorna o crédito de ICMS. Enquanto o
  // documento do regime não é analisado, todo crédito ESTADUAL fica suspenso e separado do total.
  // O crédito federal (PIS/COFINS) não é afetado pelo regime estadual e segue no total.
  let _incluiSusp = false;   // opção: incluir os suspensos no total
  let _ultimoRender = null;  // guarda o último render para alternar a opção
  // ===== Vigência do regime especial (parâmetro EDITÁVEL por cliente) =====
  // As regras do regime (estorno obrigatório, vedação de crédito de insumo/energia/ativo)
  // só valem DENTRO desta janela. Fora dela, os créditos voltam à análise normal.
  // Guardado por CNPJ no localStorage; editável na aba Pendências.
  window.RegimeVigencia = window.RegimeVigencia || (function () {
    const KEY = (cnpj) => 'revisor_regime_vigencia_' + (cnpj || '');
    // ===== Catálogo de regimes especiais PADRÃO de Minas Gerais (extensível) =====
    // Em MG os regimes são padronizados. Cadastre novos regimes aqui: as flags calibram
    // as auditorias (ex.: difere_ativo => o CIAP não estima ICMS sobre ativo diferido).
    // tipo '' (em branco) = SEM regime especial → as regras rodam no modo genérico.
    const CATALOGO = {
      '': { nome: 'Sem regime especial (auditoria genérica)', difere_ativo: false, difere_insumo: false, credito_presumido: false, veda_creditos: false },
      'tts_cervejaria': {
        nome: 'TTS Micro/Pequenas/Médias Cervejarias (e-PTA-RE)',
        difere_ativo: true,        // ativo entra diferido (ICMS zero) → sem crédito de CIAP no passado
        difere_insumo: true,       // insumos entram diferidos
        credito_presumido: true,   // crédito presumido nas saídas (recolhimento efetivo)
        limite_litros_ano: 100000000,   // TTS 2023: 100M litros/ano (texto 2017: 3M — configurar conforme a versão)
        meta_arrecadacao: true,         // art. 14 (faixas do art. 13): manter arrecadação ≥ base × IPCA
        ncm_beneficiado: '2203',        // produtos do Anexo Único
        veda_creditos: true,       // veda/estorna créditos de entrada vinculados às beneficiadas
      },
    };
    const PADRAO = { tipo: 'tts_cervejaria', inicio: '2021-01', fim: '2026-02' };  // vigência confirmada até 04/02/2026 (mês final 2026-02); editável na tela
    function obter(cnpj) {
      try {
        const raw = localStorage.getItem(KEY(cnpj));
        if (raw) { const o = JSON.parse(raw); return { tipo: o.tipo || '', inicio: o.inicio || '', fim: o.fim || '' }; }
      } catch (e) {}
      return { tipo: PADRAO.tipo, inicio: PADRAO.inicio, fim: PADRAO.fim };
    }
    function salvar(cnpj, tipo, inicio, fim) {
      if (!cnpj) return false;
      try { localStorage.setItem(KEY(cnpj), JSON.stringify({ tipo: tipo || '', inicio: inicio || '', fim: fim || '' })); return true; }
      catch (e) { return false; }
    }
    function catalogo() { return CATALOGO; }
    // flags de calibração do regime do cliente (objeto do catálogo)
    function flags(cnpj) { const c = obter(cnpj); return CATALOGO[c.tipo] || CATALOGO['']; }
    // o cliente TEM regime especial configurado?
    function temRegime(cnpj) { const c = obter(cnpj); return !!(c.tipo && c.tipo !== '' && CATALOGO[c.tipo]); }
    // periodo 'AAAA-MM'. true se HÁ regime E o período está dentro de [inicio, fim]. Sem regime → false.
    function vigente(cnpj, periodo) {
      if (!temRegime(cnpj)) return false;
      if (!periodo || periodo === '(consolidado)') return true;
      const v = obter(cnpj);
      if (v.inicio && periodo < v.inicio) return false;
      if (v.fim && periodo > v.fim) return false;
      return true;
    }
    // o crédito de entrada é VEDADO neste período? (regime com veda_creditos E período dentro da vigência)
    function creditoVedado(cnpj, periodo) {
      const c = obter(cnpj); const fl = CATALOGO[c.tipo] || CATALOGO[''];
      return !!fl.veda_creditos && vigente(cnpj, periodo);
    }
    return { obter, salvar, catalogo, flags, temRegime, vigente, creditoVedado, CATALOGO, PADRAO };
  })();

  function suspensaoDe(a) {
    // Só suspende o que o PRÓPRIO SPED evidencia como regime: o estorno cujo E111 diz regime especial,
    // E desde que o período do achado esteja DENTRO da vigência do regime configurada para o cliente.
    // Fora da janela, o estorno deixa de ser obrigação do regime e volta à análise normal.
    if (a._motivo_sped === 'regime') {
      if (!RegimeVigencia.vigente(a.cnpj_empresa, a.periodo)) return null;
      return { motivo: 'regime', rotulo: 'Regime especial (E111)', nota: 'O E111 descreve este estorno como regime especial, dentro da vigência configurada. Em suspensão como obrigação do regime.' };
    }
    return null;
  }

  // ---- temas desativados do totalizador (curadoria do auditor; persiste por CNPJ raiz) ----
  let _temasOff = new Set();
  let _temasOffRaiz = '';
  function _raizDe(res) {
    const a = (res && res.achados && res.achados[0]) || null;
    return String((a && a.cnpj_empresa) || '').slice(0, 8) || 'global';
  }
  function carregarTemasOff(res) {
    const r = _raizDe(res);
    if (r === _temasOffRaiz && _temasOff.size) return;
    _temasOffRaiz = r;
    try { _temasOff = new Set(JSON.parse(localStorage.getItem('revisor_aud_temas_off_' + r) || '[]')); }
    catch (e) { _temasOff = new Set(); }
  }
  function salvarTemasOff() {
    try { localStorage.setItem('revisor_aud_temas_off_' + _temasOffRaiz, JSON.stringify([..._temasOff])); } catch (e) {}
  }

  // ---- estado da tela de resultados (persiste entre re-renders) ----
  let _view = 'resumo';
  let _filtros = { nat: '', filial: '', regra: '', periodo: '', busca: '' };
  let _detLimite = 150;

  function docDe(regraId) {
    const cat = (window.Conhecimento && Conhecimento.AUDITORIAS) || [];
    return cat.find(a => a.id === regraId) || null;
  }
  const NAT_META = {
    credito: { rot: 'Oportunidades', cor: 'cred', ico: '💰' },
    risco:   { rot: 'Riscos',        cor: 'risco', ico: '⚠️' },
    erro:    { rot: 'Erros de cálculo', cor: 'erro', ico: '🛠️' },
  };

  function _achadosVisiveis(res, incluiSusp) {
    return (res.achados || []).filter(a => !suspensaoDe(a) || incluiSusp);
  }

  function renderResultado(alvo, res, persistido) {
    _ultimoRender = { alvo, res, persistido };
    const incluiSusp = _incluiSusp;
    const fmt = Utils.fmtBRL;
    const achados = _achadosVisiveis(res, incluiSusp);
    const regras = res.regras || [];
    carregarTemasOff(res);
    // achados de temas ATIVOS (os desativados saem dos totalizadores, mas seguem visíveis apagados)
    const ativosTot = achados.filter(a => !_temasOff.has(a._regra));

    // totais por natureza (e por esfera, para o subtítulo) — só temas ativos
    const T = { credito: { v: 0, n: 0, est: 0, fed: 0 }, risco: { v: 0, n: 0 }, erro: { v: 0, n: 0 } };
    for (const a of ativosTot) {
      const t = T[a.natureza] || T.risco; const v = Number(a.valor) || 0;
      t.v += v; t.n++;
      if (a.natureza === 'credito') { if (esferaDe(a._regra) === 'federal') t.fed += v; else t.est += v; }
    }
    const suspItens = []; let suspTotal = 0;
    for (const a of (res.achados || [])) if (suspensaoDe(a)) { suspItens.push(a); suspTotal += Number(a.valor) || 0; }

    const kpis = `
      <div class="aud-kpis">
        <div class="aud-kpi k-cred" data-nat="credito" title="Clique para ver só as oportunidades">
          <div class="k-rot">💰 Oportunidades</div>
          <div class="k-val">${fmt(T.credito.v)}</div>
          <div class="k-sub">${T.credito.n} achado(s) · ICMS ${fmt(T.credito.est)} · Federal ${fmt(T.credito.fed)}</div>
        </div>
        <div class="aud-kpi k-risco" data-nat="risco" title="Clique para ver só os riscos">
          <div class="k-rot">⚠️ Riscos</div>
          <div class="k-val">${fmt(T.risco.v)}</div>
          <div class="k-sub">${T.risco.n} achado(s) de exposição</div>
        </div>
        <div class="aud-kpi k-erro" data-nat="erro" title="Clique para ver só os erros">
          <div class="k-rot">🛠️ Erros de cálculo</div>

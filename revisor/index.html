    // pmpf
    PMPF, chavePMPF, pmpfDe, temPMPFCadastrado,
    // ajustes
    AJUSTE_E111, ajusteEhCreditoST, ajusteEhEstorno, ajusteEhCreditoPresumido,
    // util
    soNum, norm2,
  };
})();

if (typeof window !== 'undefined') window.TabelasMG = TabelasMG;
if (typeof module !== 'undefined' && module.exports) module.exports = TabelasMG;


// ===================== tabelas_insumo.js =====================
// =====================================================================
// Revisor Fiscal Prime — tabelas_insumo.js
// Classificação de INSUMO de cervejaria por NCM (e descrição como reforço).
//
// POR QUE NCM E NÃO TIPO_ITEM: no cadastro real do cliente o TIPO_ITEM do 0200
// está furado (tampa de alumínio NCM 8309 vem marcada como 04/00 em vez de 02).
// Além disso, 2021-2025 é XML puro (sem 0200), e o XML não tem TIPO_ITEM. Logo a
// classificação de insumo aqui é por NCM, que está sempre presente no XML.
//
// Categorias e o que cada uma significa para o ICMS:
//   malte_adjunto, lupulo, levedura, aditivo, co2, auxiliar  → insumo de produção (crédito)
//   embalagem_primaria  → embalagem do produto + 1:1 com a unidade vendida (balanço de lacres)
//   embalagem_secundaria→ embalagem do produto (crédito), mas não 1:1
//   uso_consumo         → NÃO dá crédito
//   ativo               → crédito via CIAP
//   outro               → não classificado
// =====================================================================

const TabelasInsumo = (function () {
  'use strict';
  const soNum = (s) => String(s || '').replace(/\D/g, '');
  const low = (s) => String(s || '').toLowerCase();

  // Mapa NCM→categoria. Ordem importa: prefixos mais específicos primeiro.
  // Cada entrada: [prefixoNCM, categoria]. Casa por "começa com".
  const NCM_MAP = [
    // ---- embalagem primária (1 unidade = 1 lacre/recipiente) ----
    ['8309', 'embalagem_primaria'],   // tampas, rolhas, cápsulas, anéis (lacre da lata/garrafa)
    ['7010', 'embalagem_primaria'],   // garrafa/frasco de vidro
    ['7612', 'embalagem_primaria'],   // lata/recipiente de alumínio (<300L)
    ['7310', 'embalagem_primaria'],   // lata/recipiente de aço, barril metálico
    // ---- embalagem secundária / terciária ----
    ['7607', 'embalagem_secundaria'], // folha/lâmina de alumínio (corpo da lata, tampa-rolo)
    ['4819', 'embalagem_secundaria'], // caixa/cartucho de papel ou papelão
    ['4821', 'embalagem_secundaria'], // etiquetas/rótulos de papel
    ['4911', 'embalagem_secundaria'], // rótulos/impressos
    ['3919', 'embalagem_secundaria'], // rótulo/fita autoadesiva de plástico
    ['3920', 'embalagem_secundaria'], // filme/folha de plástico (shrink/stretch)
    ['3923', 'embalagem_secundaria'], // artigos de plástico p/ embalagem (PET, filme, keg plástico)
    ['4415', 'embalagem_secundaria'], // pallet/estrado de madeira
    // ---- malte e adjuntos (amido/açúcar fermentável) ----
    ['1107', 'malte_adjunto'],        // malte (de cevada etc.)
    ['1003', 'malte_adjunto'],        // cevada
    ['1005', 'malte_adjunto'],        // milho (gritz/flocos)
    ['1006', 'malte_adjunto'],        // arroz
    ['1007', 'malte_adjunto'],        // sorgo
    ['1101', 'malte_adjunto'],        // farinha de trigo
    ['1102', 'malte_adjunto'],        // farinha de outros cereais
    ['1103', 'malte_adjunto'],        // grumos/sêmola
    ['1104', 'malte_adjunto'],        // grãos trabalhados (flocos)
    ['1108', 'malte_adjunto'],        // amidos e féculas
    ['1701', 'malte_adjunto'],        // açúcar
    ['1702', 'malte_adjunto'],        // glucose/xarope/maltose
    // ---- lúpulo ----
    ['1210', 'lupulo'],               // lúpulo (cones/pellets)
    ['1302', 'lupulo'],               // extratos vegetais (extrato de lúpulo)
    // ---- levedura / fermento ----
    ['2102', 'levedura'],             // leveduras (vivas/inativas)
    // ---- CO2 ----
    ['2811', 'co2'],                  // CO2 e outros gases inorgânicos
    ['2814', 'co2'],                  // amoníaco (refrigeração) — tratado junto
    // ---- aditivos / enzimas / correção ----
    ['3507', 'aditivo'],              // enzimas
    ['3824', 'aditivo'],              // produtos químicos diversos (auxiliares)
    ['2918', 'aditivo'],              // ácidos (acidulantes)
    ['2836', 'aditivo'],              // carbonatos (correção de água)
    ['2833', 'aditivo'],              // sulfatos (correção de água, gypsum)
    // ---- auxiliares de filtração/clarificação ----
    ['2512', 'auxiliar'],             // terra diatomácea / kieselguhr
    ['3913', 'auxiliar'],             // gelatina/colágeno (clarificante)
    ['3505', 'auxiliar'],             // dextrinas/colas
    // ---- uso e consumo (NÃO dá crédito) ----
    ['3402', 'uso_consumo'],          // detergente/CIP, agentes de limpeza
    ['2815', 'uso_consumo'],          // soda cáustica
    ['3808', 'uso_consumo'],          // desinfetantes/sanitizantes
    ['2207', 'uso_consumo'],          // álcool (sanitização)
    ['2710', 'uso_consumo'],          // lubrificantes/óleos
    ['3403', 'uso_consumo'],          // lubrificantes preparados
    // ---- ativo imobilizado ----
    ['8418', 'ativo'],                // refrigeração (chiller)
    ['8419', 'ativo'],                // caldeira/pasteurizador/trocador
    ['8421', 'ativo'],                // centrífuga/filtro
    ['8422', 'ativo'],                // máquinas de lavar/encher/envasar
    ['8438', 'ativo'],                // máquinas p/ bebidas
    ['8479', 'ativo'],                // máquinas diversas
    ['8413', 'ativo'],                // bombas
  ];

  // reforço por descrição quando o NCM é genérico/ambíguo
  const PALAVRAS = {
    embalagem_primaria: ['tampa', 'tampinha', 'rolha', 'crown', 'capsula', 'cápsula', 'anel', 'lata', 'garrafa', 'long neck', 'longneck', 'keg', 'barril', 'growler'],
    embalagem_secundaria: ['rotulo', 'rótulo', 'etiqueta', 'caixa', 'papelao', 'papelão', 'filme', 'stretch', 'shrink', 'pallet', 'palete', 'berço', 'bandeja', 'cinta', 'fita'],
    malte_adjunto: ['malte', 'cevada', 'gritz', 'milho', 'trigo', 'aveia', 'centeio', 'flocos', 'acucar', 'açúcar', 'xarope', 'maltose'],
    lupulo: ['lupulo', 'lúpulo', 'hop', 'pellet'],
    levedura: ['levedura', 'fermento', 'yeast'],
    co2: ['co2', 'dioxido de carbono', 'dióxido de carbono', 'gas carbonico', 'gás carbônico', 'nitrogenio', 'nitrogênio'],
    aditivo: ['enzima', 'acido', 'ácido', 'estabilizante', 'antioxidante', 'whirlfloc', 'corretor'],
    auxiliar: ['terra diatomacea', 'diatomácea', 'kieselguhr', 'gelatina', 'clarificante', 'finings', 'pvpp'],
    uso_consumo: ['detergente', 'soda', 'cip', 'sanitizante', 'desinfetante', 'lubrificante', 'graxa', 'epi', 'luva', 'limpeza'],
    ativo: ['tanque', 'fermentador', 'maturador', 'chiller', 'caldeira', 'trocador', 'envasadora', 'rotuladora', 'paletizadora', 'centrifuga', 'bomba', 'tcl', 'unitank'],
  };

  const INSUMO_PRODUCAO = new Set(['malte_adjunto', 'lupulo', 'levedura', 'co2', 'aditivo', 'auxiliar']);

  // Classifica um item por NCM (primário) e descrição (reforço/desempate).
  function classificar(ncm, descricao) {
    const n = soNum(ncm);
    let porNCM = null;
    for (const [pref, cat] of NCM_MAP) { if (n.startsWith(pref)) { porNCM = cat; break; } }
    // reforço por descrição
    const d = low(descricao);
    let porDesc = null;
    for (const cat of Object.keys(PALAVRAS)) { if (PALAVRAS[cat].some(p => d.includes(p))) { porDesc = cat; break; } }
    // NCM manda; descrição só desempata quando o NCM não classificou
    const cat = porNCM || porDesc || 'outro';
    return { categoria: cat, porNCM: !!porNCM, porDescricao: porDesc };
  }

  const ehInsumoProducao = (cat) => INSUMO_PRODUCAO.has(cat);
  const ehEmbalagem = (cat) => cat === 'embalagem_primaria' || cat === 'embalagem_secundaria';
  const ehEmbalagemPrimaria = (cat) => cat === 'embalagem_primaria';
  const ehUsoConsumo = (cat) => cat === 'uso_consumo';
  const ehAtivo = (cat) => cat === 'ativo';
  // dá crédito de ICMS de insumo (produção ou embalagem do produto)
  const daCreditoInsumo = (cat) => INSUMO_PRODUCAO.has(cat) || ehEmbalagem(cat);

  const ROTULO = {
    malte_adjunto: 'Malte/adjunto', lupulo: 'Lúpulo', levedura: 'Levedura', co2: 'CO2',
    aditivo: 'Aditivo/enzima', auxiliar: 'Auxiliar de filtração',
    embalagem_primaria: 'Embalagem primária (lacre)', embalagem_secundaria: 'Embalagem secundária',
    uso_consumo: 'Uso e consumo', ativo: 'Ativo imobilizado', outro: 'Não classificado',
  };
  const rotulo = (cat) => ROTULO[cat] || cat;

  // ---- UF emitente pela chave da NF-e (2 primeiros dígitos = código IBGE) ----
  const UF_IBGE = {
    '11': 'RO', '12': 'AC', '13': 'AM', '14': 'RR', '15': 'PA', '16': 'AP', '17': 'TO',
    '21': 'MA', '22': 'PI', '23': 'CE', '24': 'RN', '25': 'PB', '26': 'PE', '27': 'AL', '28': 'SE', '29': 'BA',
    '31': 'MG', '32': 'ES', '33': 'RJ', '35': 'SP',
    '41': 'PR', '42': 'SC', '43': 'RS',
    '50': 'MS', '51': 'MT', '52': 'GO', '53': 'DF',
  };
  function ufDaChave(chave) { return UF_IBGE[soNum(chave).slice(0, 2)] || ''; }
  function ehDeForaMG(chave) { const uf = ufDaChave(chave); return uf && uf !== 'MG'; }

  // fornecedor do Simples: no XML o item traz CSOSN (Simples) em vez de CST
  const fornecedorSimples = (item) => !!(item.csosn && String(item.csosn).trim());

  return {
    NCM_MAP, PALAVRAS, INSUMO_PRODUCAO,
    classificar, ehInsumoProducao, ehEmbalagem, ehEmbalagemPrimaria, ehUsoConsumo, ehAtivo, daCreditoInsumo,
    rotulo, ROTULO,
    ufDaChave, ehDeForaMG, fornecedorSimples, soNum,
  };
})();

if (typeof window !== 'undefined') window.TabelasInsumo = TabelasInsumo;
if (typeof module !== 'undefined' && module.exports) module.exports = TabelasInsumo;


// ===================== auditorias.js =====================
// =====================================================================
// Revisor Fiscal Prime — auditorias.js
// AUDITORIAS CRUZADAS: a camada que lê os campos de divergência das fontes
// já normalizadas e escreve achados estruturados em rev_achados.
//
// Regras implementadas:
//   A1  XML × EFD-ICMS      — nota de entrada não escriturada (crédito perdido + risco)
//   A2  EFD-ICMS × Contrib  — ICMS na base de PIS/COFINS (Tese RE 574.706)
//   A3  Reinf × Contrib     — retenção de PIS/COFINS/IR/CSLL a aproveitar
//   A4  ECD × ECF           — consistência do resultado e do balancete
//   A5  ECD × Contrib       — receita contábil × faturamento fiscal (omissão)
//
// PRINCÍPIOS:
//   - Lê só as stores já normalizadas (não toca em parser/staging).
//   - Sem DOM: testável isoladamente (fake-indexeddb).
//   - Tolerante a fonte ausente: a regra reporta "sem dados" em vez de quebrar.
//   - Cada achado tem valor estimado, base legal e referências rastreáveis.
//   - Re-rodar substitui os achados do cliente (não acumula duplicado);
//     a execução fica registrada em rev_auditorias (histórico).
// =====================================================================

const Auditorias = (function () {
  'use strict';

  const U = () => (typeof window !== 'undefined' ? window.Utils : globalThis.Utils);
  const _DB = () => (typeof window !== 'undefined' ? window.DB : globalThis.DB);

  // Tolerâncias
  const TOL_BASE_ICMS = 0.01;     // base PIS ≈ valor bruto (1%) → ICMS está dentro
  const TOL_CONTABIL = 0.005;     // 0,5% de divergência contábil é ruído de arredondamento
  const PISO_MATERIAL = 0.50;     // ignora centavos residuais

  // Catálogo das regras (id → metadados). A UI usa isso pra montar os checkboxes.
  const REGRAS = [
    { id: 'A1', tipo: 'xml_nao_escriturado', nome: 'Notas de entrada não escrituradas (XML × EFD-ICMS)',
      fontes: ['rev_xml_itens', 'rev_documentos'] },
    { id: 'A2', tipo: 'icms_base_pis_cofins', nome: 'ICMS na base de PIS/COFINS (Tese RE 574.706)',
      fontes: ['rev_itens'] },
    { id: 'A3', tipo: 'reinf_retencao', nome: 'Retenções da EFD-Reinf a aproveitar (× Contribuições)',
      fontes: ['rev_retencoes'] },
    { id: 'A4', tipo: 'ecd_ecf', nome: 'Consistência ECD × ECF (resultado e balancete)',
      fontes: ['rev_saldos_contabeis'] },
    { id: 'A5', tipo: 'ecd_contrib', nome: 'Receita contábil × faturamento fiscal (ECD × EFD)',
      fontes: ['rev_saldos_contabeis', 'rev_itens'] },
  ];

  // ------------------------------------------------------------------
  // HELPERS
  // ------------------------------------------------------------------
  const num = (v) => Number(v) || 0;
  const soma = (arr, campo) => arr.reduce((s, x) => s + num(x[campo]), 0);
  const anoDe = (periodo) => (periodo && /^\d{4}/.test(periodo)) ? periodo.slice(0, 4) : null;

  function severidadePorValor(v) {
    const a = Math.abs(v);
    if (a >= 50000) return 'alta';
    if (a >= 5000) return 'media';
    return 'baixa';
  }

  function novoAchado(cnpj, idAud, tipo, dados) {
    const seq = Math.random().toString(36).slice(2, 8);
    return {
      id_achado: U().shortHash(`${cnpj}|${tipo}|${dados.periodo || 'x'}|${dados.ref_chave || ''}|${seq}`),
      cnpj_empresa: cnpj,
      id_auditoria: idAud,
      tipo,
      periodo: dados.periodo || '(consolidado)',
      titulo: dados.titulo || '',
      severidade: dados.severidade || 'media',
      natureza: dados.natureza || 'risco',   // credito / erro / risco
      descricao: dados.descricao || '',
      valor: num(dados.valor),
      base_legal: dados.base_legal || '',
      referencias: dados.referencias || [],
      _motivo_sped: dados._motivo_sped || null,
      detectado_em: new Date().toISOString(),
    };
  }

  // ==================================================================
  // A1 — XML × EFD-ICMS: nota de entrada não escriturada
  // ==================================================================
  // Para cada nota de ENTRADA presente no XML (não cancelada) cuja CHAVE não
  // aparece em nenhum documento/item do SPED, e cujo PERÍODO tem EFD-ICMS
  // importada (logo a empresa estava escriturando), reporta:
  //   - crédito de ICMS não aproveitado (soma do ICMS destacado da nota)
  //   - risco de glosa por escrituração incompleta
  async function auditarA1(ctx, idAud) {
    const { cnpj, xmlItens, itens, documentos } = ctx;
    const achados = [];

    // chaves que existem no SPED (qualquer período) — nota é única pela chave
    const chavesSped = new Set();
    for (const d of documentos) if (d.chave) chavesSped.add(d.chave);
    for (const i of itens) if (i.chave) chavesSped.add(i.chave);

    // períodos que têm EFD-fiscal escriturada (pra não acusar mês não importado)
    const periodosComFiscal = new Set(
      itens.filter(i => i.tem_efd_fiscal && i.periodo).map(i => i.periodo)
    );
    // se não houver NENHUM período com EFD-fiscal, não dá pra afirmar não-escrituração
    if (periodosComFiscal.size === 0) {
      return { achados, resumo: { regra: 'A1', status: 'sem_dados',
        motivo: 'Nenhum período com EFD ICMS/IPI importada — sem base para apontar não-escrituração.' } };
    }

    // agrupa itens XML de entrada por nota (chave), só notas em períodos com fiscal
    const notas = new Map();
    for (const x of xmlItens) {
      if (x.tipo_operacao !== 'entrada' || x.cancelada) continue;
      if (!x.chave || chavesSped.has(x.chave)) continue;        // escriturada → ok
      if (!periodosComFiscal.has(x.periodo)) continue;          // mês sem EFD → ignora
      if (!notas.has(x.chave)) {
        notas.set(x.chave, {
          periodo: x.periodo, chave: x.chave,
          emit_cnpj: x.emit_cnpj, emit_nome: x.emit_nome,
          num_doc: x.num_doc, dt_emi: x.dt_emi,
          n_itens: 0, vl_total: 0, vl_icms: 0,
        });
      }
      const n = notas.get(x.chave);
      n.n_itens++;
      n.vl_total += num(x.vl_item);
      n.vl_icms += num(x.vl_icms);
    }

    for (const n of notas.values()) {
      const credito = n.vl_icms;
      achados.push(novoAchado(cnpj, idAud, 'xml_nao_escriturado', {
        periodo: n.periodo,
        ref_chave: n.chave,
        titulo: `Nota de entrada não escriturada — ${n.emit_nome || n.emit_cnpj}`,
        severidade: severidadePorValor(n.vl_total),
        natureza: credito > PISO_MATERIAL ? 'credito' : 'risco',
        valor: credito,
        descricao: `Nota fiscal de entrada (NF ${n.num_doc || 's/n'}, ${n.n_itens} item(ns), `
          + `valor ${U().fmtBRL(n.vl_total)}) emitida por ${n.emit_nome || n.emit_cnpj} `
          + `consta no XML mas não foi localizada no SPED Fiscal do período ${n.periodo}. `
          + `ICMS destacado de ${U().fmtBRL(credito)} não aproveitado como crédito, além de risco de escrituração incompleta.`,
        base_legal: 'LC 87/1996 art. 20 (crédito); RICMS/MG (Dec. 48.589/2023) art. 66; obrigatoriedade de escrituração do C100/C170 na EFD ICMS/IPI.',
        referencias: [{ chave: n.chave, num_doc: n.num_doc, emit_cnpj: n.emit_cnpj,
          dt_emi: n.dt_emi, vl_total: n.vl_total, vl_icms: n.vl_icms }],
      }));
    }

    const totalCredito = soma(achados, 'valor');
    return { achados, resumo: { regra: 'A1', status: achados.length ? 'achados' : 'limpo',
      n: achados.length, valor: totalCredito,
      periodos_avaliados: periodosComFiscal.size } };
  }

  // ==================================================================
  // A2 — ICMS na base de PIS/COFINS (Tese do Século, RE 574.706)
  // ==================================================================
  // Em itens de SAÍDA tributados, se a base de PIS/COFINS engloba o ICMS
  // destacado (base ≈ valor bruto), o ICMS deveria ter sido excluído. O valor
  // recuperável por item = ICMS destacado × alíquota efetiva de cada contribuição.
  async function auditarA2(ctx, idAud) {
    const { cnpj, itens } = ctx;
    const achados = [];

    const saida = itens.filter(i => i.tipo_operacao === 'saida');
    if (saida.length === 0) {
      return { achados, resumo: { regra: 'A2', status: 'sem_dados',
        motivo: 'Sem itens de saída escriturados (EFD) — nada a avaliar.' } };
    }

    // acumula por período
    const porPeriodo = new Map();
    let itensAfetados = 0;

    for (const i of saida) {
      const vlIcms = num(i.vl_icms);
      const vlItem = num(i.vl_item) - num(i.vl_desc);
      if (vlIcms <= 0 || vlItem <= 0) continue;

      const bcPis = num(i.vl_bc_pis);
      const bcCof = num(i.vl_bc_cofins);
      const vlPis = num(i.vl_pis);
      const vlCof = num(i.vl_cofins);

      // só itens com contribuição efetivamente apurada
      if (vlPis <= 0 && vlCof <= 0) continue;

      // ICMS está na base quando a base ≈ valor bruto (com ICMS dentro).
      // Comparamos a base contra (valor do item COM ICMS) vs (valor SEM ICMS).
      const baseComIcms = vlItem;            // o vl_item já é o bruto da operação
      const baseSemIcms = vlItem - vlIcms;

      const pisInclui = bcPis > 0 && Math.abs(bcPis - baseComIcms) <= TOL_BASE_ICMS * baseComIcms
                        && bcPis > baseSemIcms + PISO_MATERIAL;
      const cofInclui = bcCof > 0 && Math.abs(bcCof - baseComIcms) <= TOL_BASE_ICMS * baseComIcms
                        && bcCof > baseSemIcms + PISO_MATERIAL;
      if (!pisInclui && !cofInclui) continue;

      // alíquota efetiva (robusto a percent vs decimal): valor/base
      const aliqPisEf = bcPis > 0 ? vlPis / bcPis : 0;
      const aliqCofEf = bcCof > 0 ? vlCof / bcCof : 0;

      const recPis = pisInclui ? vlIcms * aliqPisEf : 0;
      const recCof = cofInclui ? vlIcms * aliqCofEf : 0;
      const rec = recPis + recCof;
      if (rec <= PISO_MATERIAL) continue;

      itensAfetados++;
      const p = i.periodo;
      if (!porPeriodo.has(p)) porPeriodo.set(p, { periodo: p, n: 0, icms_base: 0, rec_pis: 0, rec_cof: 0 });
      const acc = porPeriodo.get(p);
      acc.n++;
      acc.icms_base += vlIcms;
      acc.rec_pis += recPis;
      acc.rec_cof += recCof;
    }

    if (porPeriodo.size === 0) {
      return { achados, resumo: { regra: 'A2', status: 'limpo', n: 0, valor: 0,
        motivo: 'Nenhum item de saída com ICMS dentro da base de PIS/COFINS.' } };
    }

    for (const acc of porPeriodo.values()) {
      const rec = acc.rec_pis + acc.rec_cof;
      achados.push(novoAchado(cnpj, idAud, 'icms_base_pis_cofins', {
        periodo: acc.periodo,
        titulo: 'ICMS incluído na base de PIS/COFINS',
        severidade: severidadePorValor(rec),
        natureza: 'credito',
        valor: rec,
        descricao: `${acc.n} item(ns) de saída no período ${acc.periodo} com o ICMS destacado `
          + `(${U().fmtBRL(acc.icms_base)}) compondo a base de PIS/COFINS. Excluindo o ICMS conforme `
          + `o RE 574.706, há crédito/recuperação estimado de ${U().fmtBRL(rec)} `
          + `(PIS ${U().fmtBRL(acc.rec_pis)} + COFINS ${U().fmtBRL(acc.rec_cof)}).`,
        base_legal: 'STF RE 574.706/PR (Tema 69) — ICMS não compõe a base de PIS/COFINS; '
          + 'modulação a partir de 16/03/2017 (ICMS destacado na nota). Verificar regime (não cumulativo).',
        referencias: [{ periodo: acc.periodo, itens: acc.n, icms_na_base: acc.icms_base,
          recuperavel_pis: acc.rec_pis, recuperavel_cofins: acc.rec_cof }],
      }));
    }

    const total = soma(achados, 'valor');
    return { achados, resumo: { regra: 'A2', status: 'achados', n: achados.length,
      valor: total, itens_afetados: itensAfetados } };
  }

  // ==================================================================
  // A3 — Reinf × Contribuições: retenções a aproveitar
  // ==================================================================
  // Soma as retenções informadas na EFD-Reinf por período. PIS/COFINS/IR/CSLL
  // retidos pela fonte são dedução/crédito do contribuinte. Sinaliza o valor a
  // aproveitar e alerta quando a EFD-Contribuições do período não foi importada
  // (não dá pra confirmar o aproveitamento).
  async function auditarA3(ctx, idAud) {
    const { cnpj, retencoes, apurPisCofins } = ctx;
    const achados = [];

    if (!retencoes || retencoes.length === 0) {
      return { achados, resumo: { regra: 'A3', status: 'sem_dados',
        motivo: 'Sem retenções da EFD-Reinf importadas — nada a cruzar.' } };
    }

    const periodosComContrib = new Set((apurPisCofins || []).map(a => a.periodo));

    const porPeriodo = new Map();
    for (const r of retencoes) {
      const p = r.periodo;
      if (!porPeriodo.has(p)) porPeriodo.set(p, {
        periodo: p, n: 0, vl_pis: 0, vl_cofins: 0, vl_ir: 0, vl_csll: 0, vl_inss: 0,
      });
      const acc = porPeriodo.get(p);
      acc.n++;
      acc.vl_pis += num(r.vl_pis);
      acc.vl_cofins += num(r.vl_cofins);
      acc.vl_ir += num(r.vl_ir);
      acc.vl_csll += num(r.vl_csll);
      acc.vl_inss += num(r.vl_inss);
    }

    for (const acc of porPeriodo.values()) {
      const aproveitavel = acc.vl_pis + acc.vl_cofins + acc.vl_ir + acc.vl_csll;
      if (aproveitavel <= PISO_MATERIAL && acc.vl_inss <= PISO_MATERIAL) continue;
      const temContrib = periodosComContrib.has(acc.periodo);
      const partes = [];
      if (acc.vl_pis) partes.push(`PIS ${U().fmtBRL(acc.vl_pis)}`);
      if (acc.vl_cofins) partes.push(`COFINS ${U().fmtBRL(acc.vl_cofins)}`);
      if (acc.vl_ir) partes.push(`IR ${U().fmtBRL(acc.vl_ir)}`);
      if (acc.vl_csll) partes.push(`CSLL ${U().fmtBRL(acc.vl_csll)}`);
      if (acc.vl_inss) partes.push(`INSS ${U().fmtBRL(acc.vl_inss)}`);

      achados.push(novoAchado(cnpj, idAud, 'reinf_retencao', {
        periodo: acc.periodo,
        titulo: 'Retenções da EFD-Reinf a confirmar/aproveitar',
        severidade: severidadePorValor(aproveitavel),
        natureza: 'credito',
        valor: aproveitavel,
        descricao: `Período ${acc.periodo}: ${acc.n} retenção(ões) na EFD-Reinf — ${partes.join(', ')}. `
          + `PIS/COFINS/IR/CSLL retidos são dedução do contribuinte (${U().fmtBRL(aproveitavel)}). `
          + (temContrib
              ? `EFD-Contribuições do período está importada — conferir se a retenção foi deduzida na apuração.`
              : `ATENÇÃO: a EFD-Contribuições deste período NÃO foi importada — não é possível confirmar o aproveitamento.`),
        base_legal: 'IN RFB 1.234/2012 e Lei 10.833/2003 art. 30 (retenção PIS/COFINS/CSLL/IR na fonte por PJ); '
          + 'retenção é antecipação dedutível na apuração das contribuições/tributos.',
        referencias: [{ periodo: acc.periodo, retencoes: acc.n, vl_pis: acc.vl_pis,
          vl_cofins: acc.vl_cofins, vl_ir: acc.vl_ir, vl_csll: acc.vl_csll, vl_inss: acc.vl_inss,
          efd_contrib_importada: temContrib }],
      }));
    }

    const total = soma(achados, 'valor');
    return { achados, resumo: { regra: 'A3', status: achados.length ? 'achados' : 'limpo',
      n: achados.length, valor: total } };
  }

  // ==================================================================
  // A4 — ECD × ECF: consistência do resultado e do balancete
  // ==================================================================
  // (a) Lucro líquido apurado pela ECD (contas de resultado I355) deve bater com
  //     o apurado pela ECF (K355). Divergência > tolerância = inconsistência.
  // (b) Balancete patrimonial da ECD deve fechar (Σ débitos ≈ Σ créditos).
  async function auditarA4(ctx, idAud) {
    const { cnpj, saldos } = ctx;
    const achados = [];

    if (!saldos || saldos.length === 0) {
      return { achados, resumo: { regra: 'A4', status: 'sem_dados',
        motivo: 'Sem saldos contábeis (ECD/ECF) importados.' } };
    }

    // lucro líquido = Σ saldo de resultado com sinal (crédito = receita +, débito = despesa -)
    const lucroResultado = (regs) => regs.reduce((s, r) => {
      const v = num(r.saldo_fin);
      const dc = (r.dc_fin || '').toUpperCase();
      return s + (dc === 'D' ? -v : v);   // crédito soma, débito subtrai
    }, 0);

    const anos = [...new Set(saldos.map(s => s.periodo))].sort();
    let avaliouAlgo = false;

    for (const ano of anos) {
      const resEcd = saldos.filter(s => s.periodo === ano && s.tipo_saldo === 'resultado' && s.origem === 'ecd');
      const resEcf = saldos.filter(s => s.periodo === ano && s.tipo_saldo === 'resultado' && s.origem === 'ecf');

      // (a) ECD × ECF — só quando ambas existem
      if (resEcd.length && resEcf.length) {
        avaliouAlgo = true;
        const llEcd = lucroResultado(resEcd);
        const llEcf = lucroResultado(resEcf);
        const dif = llEcd - llEcf;
        const ref = Math.max(Math.abs(llEcd), Math.abs(llEcf), 1);
        if (Math.abs(dif) / ref > TOL_CONTABIL && Math.abs(dif) > PISO_MATERIAL) {
          achados.push(novoAchado(cnpj, idAud, 'ecd_ecf', {
            periodo: ano,
            titulo: 'Resultado da ECD diverge da ECF',
            severidade: severidadePorValor(dif),
            natureza: 'erro',
            valor: Math.abs(dif),
            descricao: `Ano ${ano}: lucro líquido apurado pela ECD (${U().fmtBRL(llEcd)}) diverge do `
              + `apurado pela ECF (${U().fmtBRL(llEcf)}) em ${U().fmtBRL(dif)}. As bases devem ser idênticas `
              + `antes das adições/exclusões do Lalur.`,
            base_legal: 'IN RFB 2.004/2021 (ECF) e IN RFB 1.774/2017 (ECD) — o lucro líquido contábil da ECD é a base da ECF.',
            referencias: [{ ano, lucro_ecd: llEcd, lucro_ecf: llEcf, diferenca: dif }],
          }));
        }
      }

      // (b) balancete patrimonial da ECD fecha? — verificação por SALDO FINAL, não por movimento.
      //     O I155 só traz movimento (VL_DEB/VL_CRED) das contas patrimoniais; as contas de
      //     resultado (I355) têm apenas saldo, sem colunas de movimento. Logo Σdébitos − Σcréditos
      //     do movimento NUNCA fecha — a contrapartida do resultado não tem movimento capturado.
      //     Isso gerava falso positivo (a diferença era só o resultado do exercício). O invariante
      //     correto do balancete patrimonial é o saldo: Σ saldos devedores ≈ Σ saldos credores.
      const patrEcd = saldos.filter(s => s.periodo === ano && s.tipo_saldo === 'patrimonial' && s.origem === 'ecd');
      if (patrEcd.length) {
        avaliouAlgo = true;
        const ehDevedor = (r) => (r.dc_fin || '').toUpperCase() === 'D';
        const saldoDev = patrEcd.reduce((s, r) => s + (ehDevedor(r) ? num(r.saldo_fin) : 0), 0);
        const saldoCred = patrEcd.reduce((s, r) => s + (ehDevedor(r) ? 0 : num(r.saldo_fin)), 0);
        const dif = saldoDev - saldoCred;
        const ref = Math.max(saldoDev, saldoCred, 1);
        if (Math.abs(dif) / ref > TOL_CONTABIL && Math.abs(dif) > PISO_MATERIAL) {
          achados.push(novoAchado(cnpj, idAud, 'ecd_ecf', {
            periodo: ano,
            ref_chave: 'balancete',
            titulo: 'Balancete da ECD não fecha (saldos devedores ≠ credores)',
            severidade: severidadePorValor(dif),
            natureza: 'erro',
            valor: Math.abs(dif),
            descricao: `Ano ${ano}: no balancete patrimonial da ECD a soma dos saldos devedores (${U().fmtBRL(saldoDev)}) `
              + `não confere com a soma dos saldos credores (${U().fmtBRL(saldoCred)}), diferença de ${U().fmtBRL(dif)}. `
              + `Conferido por saldo final (o movimento do I155 não inclui a contrapartida das contas de resultado).`,
            base_legal: 'Método das partidas dobradas (Lei 6.404/76 art. 177); o balancete patrimonial deve ter Σ saldos devedores = Σ saldos credores.',
            referencias: [{ ano, saldo_devedor: saldoDev, saldo_credor: saldoCred, diferenca: dif }],
          }));
        }
      }
    }

    if (!avaliouAlgo) {
      return { achados, resumo: { regra: 'A4', status: 'sem_dados',
        motivo: 'Saldos contábeis presentes, mas sem ECD+ECF do mesmo ano nem balancete patrimonial avaliável.' } };
    }
    return { achados, resumo: { regra: 'A4', status: achados.length ? 'achados' : 'limpo',
      n: achados.length, valor: soma(achados, 'valor') } };
  }

  // ==================================================================
  // A5 — ECD × Contribuições: receita contábil × faturamento fiscal
  // ==================================================================
  // Receita reconhecida na contabilidade (contas de resultado credoras da ECD,
  // por ano) deve ser coerente com o faturamento escriturado no fiscal
  // (Σ vl_item de saída da EFD no mesmo ano). Divergência relevante aponta
  // omissão de receita ou erro de classificação.
  async function auditarA5(ctx, idAud) {
    const { cnpj, saldos, itens } = ctx;
    const achados = [];

    const temEcd = (saldos || []).some(s => s.origem === 'ecd' && s.tipo_saldo === 'resultado');
    if (!temEcd) {
      return { achados, resumo: { regra: 'A5', status: 'sem_dados',
        motivo: 'Sem contas de resultado da ECD — sem receita contábil para comparar.' } };
    }

    // receita contábil por ano = Σ saldo credor das contas de resultado natureza receita.
    // heurística: conta de resultado com saldo credor (dc_fin = C) é receita.
    const receitaEcdPorAno = {};
    for (const s of saldos) {
      if (s.origem !== 'ecd' || s.tipo_saldo !== 'resultado') continue;
      const dc = (s.dc_fin || '').toUpperCase();
      const v = num(s.saldo_fin);
      // receita: saldo credor (ou natureza 04 credora). despesas (débito) ignoradas aqui.
      if (dc === 'C' && v > 0) {
        receitaEcdPorAno[s.periodo] = (receitaEcdPorAno[s.periodo] || 0) + v;
      }
    }

    // faturamento fiscal por ano = Σ vl_item de saída da EFD (periodo mensal → ano)
    const fatFiscalPorAno = {};
    for (const i of itens) {
      if (i.tipo_operacao !== 'saida') continue;
      const ano = anoDe(i.periodo);
      if (!ano) continue;
      fatFiscalPorAno[ano] = (fatFiscalPorAno[ano] || 0) + (num(i.vl_item) - num(i.vl_desc));
    }

    const anos = [...new Set(Object.keys(receitaEcdPorAno))].sort();
    let avaliou = false;
    for (const ano of anos) {
      const recCont = receitaEcdPorAno[ano] || 0;
      const fatFisc = fatFiscalPorAno[ano];
      if (fatFisc == null) continue;   // sem EFD de saída naquele ano → não compara
      avaliou = true;
      const dif = recCont - fatFisc;
      const ref = Math.max(recCont, fatFisc, 1);
      if (Math.abs(dif) / ref > 0.02 && Math.abs(dif) > PISO_MATERIAL) {   // 2% de tolerância
        const natureza = dif > 0 ? 'risco' : 'risco';
        achados.push(novoAchado(cnpj, idAud, 'ecd_contrib', {
          periodo: ano,
          titulo: 'Receita contábil diverge do faturamento fiscal',
          severidade: severidadePorValor(dif),
          natureza,
          valor: Math.abs(dif),
          descricao: `Ano ${ano}: receita reconhecida na ECD (${U().fmtBRL(recCont)}) diverge do faturamento `
            + `escriturado na EFD de saída (${U().fmtBRL(fatFisc)}) em ${U().fmtBRL(dif)}. `
            + (dif > 0
                ? `Receita contábil maior que o faturamento fiscal pode indicar saída não escriturada (omissão).`
                : `Faturamento fiscal maior que a receita contábil pode indicar erro de classificação ou receita não contabilizada.`),
          base_legal: 'Confronto receita contábil (ECD) × faturamento (EFD); regime de competência (Lei 6.404/76 art. 177); '
            + 'divergência sujeita a fiscalização de omissão de receita.',
          referencias: [{ ano, receita_ecd: recCont, faturamento_efd: fatFisc, diferenca: dif }],
        }));
      }
    }

    if (!avaliou) {
      return { achados, resumo: { regra: 'A5', status: 'sem_dados',
        motivo: 'ECD com receita, mas sem EFD de saída no mesmo ano para confronto.' } };
    }
    return { achados, resumo: { regra: 'A5', status: achados.length ? 'achados' : 'limpo',
      n: achados.length, valor: soma(achados, 'valor') } };
  }

  // ------------------------------------------------------------------
  // ORQUESTRADOR
  // ------------------------------------------------------------------
  const FUNCOES = { A1: auditarA1, A2: auditarA2, A3: auditarA3, A4: auditarA4, A5: auditarA5 };

  /**
   * Registra uma regra de auditoria externa (ex.: estaduais MG, em auditorias_mg.js).
   * meta = { id, tipo, nome, fontes? }; fn = function(ctx, idAud, api) => { achados, resumo }.
   * A regra passa a aparecer na UI (Auditorias.REGRAS) e a ser executada pelo orquestrador.
   * O 3º argumento (api) entrega os helpers internos (novoAchado, num, soma, sev, Utils…)
   * para que a regra externa gere achados no mesmo formato, sem duplicar código.
   */
  function registrar(meta, fn) {
    if (!meta || !meta.id || typeof fn !== 'function') return false;
    if (FUNCOES[meta.id]) return false;          // já existe — não duplica
    REGRAS.push(meta);
    FUNCOES[meta.id] = fn;
    return true;
  }

  // API entregue às regras externas (3º argumento de cada função registrada).
  function _api() {
    return {
      novoAchado, num, soma, anoDe,
      sev: severidadePorValor,
      severidadePorValor,
      Utils: U(), U: U(),
      PISO: PISO_MATERIAL,
      TOL_BASE_ICMS, TOL_CONTABIL,
    };
  }

  /**
   * Carrega o contexto (uma leitura só das stores) para todas as regras.
   */
  async function carregarContexto(cnpj) {
    const DB = _DB();
    const g = (store) => DB.getByIndex(store, 'cnpj_empresa', cnpj).catch(() => []);
    // registros específicos do staging (evita carregar o staging inteiro):
    // CIAP (Bloco G, não normalizado em store própria) e ajustes/estornos.
    const stg = (origem, reg) =>
      DB.getByIndex('efd_staging', 'cnpj_origem_registro', [cnpj, origem, reg]).catch(() => []);
    const [
      xmlItens, itens, documentos, retencoes, saldos, apurPisCofins,
      apurIcms, produtos, ativo, estoque, empresas,
      g110, g125, c197, e111, c101,
      r1920, r1926, e110r, e210r, e520r,
      n620, n630, n660, n670, m300ecf,
    ] = await Promise.all([
      g('rev_xml_itens'), g('rev_itens'), g('rev_documentos'),
      g('rev_retencoes'), g('rev_saldos_contabeis'), g('rev_apuracao_pis_cofins'),
      g('rev_apuracao_icms'), g('rev_produtos'), g('rev_ativo'), g('rev_estoque'),
      g('rev_empresas'),
      stg('efd_fiscal', 'G110'), stg('efd_fiscal', 'G125'),
      stg('efd_fiscal', 'C197'), stg('efd_fiscal', 'E111'), stg('efd_fiscal', 'C101'),
      stg('efd_fiscal', '1920'), stg('efd_fiscal', '1926'), stg('efd_fiscal', 'E110'),
      stg('efd_fiscal', 'E210'), stg('efd_fiscal', 'E520'),
      stg('ecf', 'N620'), stg('ecf', 'N630'), stg('ecf', 'N660'), stg('ecf', 'N670'),
      stg('ecf', 'M300'),
    ]);

    // índice de produtos por cod_item (pega o tipo_item / ncm / descrição do 0200).
    // Cada item de rev_itens já tem ncm, mas o tipo_item (MP/PI/ME/uso) só está no produto.
    const prodPorCod = {};
    for (const p of produtos) {
      // mantém o registro mais recente por cod_item
      const k = p.cod_item;
      if (!prodPorCod[k] || (p.periodo || '') > (prodPorCod[k].periodo || '')) prodPorCod[k] = p;
    }

    return {
      cnpj, xmlItens, itens, documentos, retencoes, saldos, apurPisCofins,
      apurIcms, produtos, prodPorCod, ativo, estoque, empresas,
      ciap: { g110, g125 }, ajustes: { c197, e111, c101 },
      apuracao: { r1920, r1926, e110: e110r, e210: e210r, e520: e520r },
      ecf: { n620, n630, n660, n670, m300: m300ecf },
    };
  }

  /**
   * Remove os achados de execuções anteriores deste cliente (evita duplicar).
   */
  async function limparAchadosAnteriores(cnpj) {
    const DB = _DB();
    const antigos = await DB.getByIndex('rev_achados', 'cnpj_empresa', cnpj).catch(() => []);
    for (const a of antigos) {
      await DB.deleteOne('rev_achados', a.id_achado).catch(() => {});
    }
    return antigos.length;
  }

  /**
   * Executa as auditorias cruzadas para um cliente.
   * @param {string} cnpj
   * @param {object} opts  { regras?: ['A1','A2'...] (default todas), onProgress?, manterHistorico? }
   * @returns {Promise<{id_auditoria, achados, porTipo, resumo, regras}>}
   */
  async function executar(cnpj, opts) {
    opts = opts || {};
    const DB = _DB();
    const prog = opts.onProgress || (() => {});
    const idsRegras = (opts.regras && opts.regras.length) ? opts.regras : REGRAS.map(r => r.id);
    const idAud = U().shortHash(`${cnpj}|aud|${Date.now()}|${Math.random()}`);

    prog(5, 'Carregando dados do cliente…');
    const ctx = await carregarContexto(cnpj);

    prog(15, 'Limpando achados anteriores…');
    await limparAchadosAnteriores(cnpj);

    const achados = [];
    const resumoRegras = [];
    const API = _api();
    let pct = 20;
    const passo = Math.floor(70 / idsRegras.length);

    for (const id of idsRegras) {
      const fn = FUNCOES[id];
      const meta = REGRAS.find(r => r.id === id);
      if (!fn) continue;
      prog(pct, `Rodando ${id} — ${meta ? meta.nome : id}…`);
      try {
        const r = await fn(ctx, idAud, API);
        for (const a of r.achados) a._regra = id;   // associa o achado à sua regra (para o detalhe na UI)
        achados.push(...r.achados);
        resumoRegras.push({ id, nome: meta ? meta.nome : id, tipo: meta ? meta.tipo : id, ...r.resumo });
      } catch (e) {
        resumoRegras.push({ id, nome: meta ? meta.nome : id, status: 'erro', motivo: e.message });
        await DB.registrarLog(cnpj, 'erro', `Auditoria ${id} falhou`, e.message);
      }
      pct += passo;
    }

    prog(92, 'Gravando achados…');
    if (achados.length) await DB.putBatch('rev_achados', achados);

    // por tipo / severidade / natureza
    const porTipo = {};
    const porSeveridade = { alta: 0, media: 0, baixa: 0 };
    const porNatureza = { credito: 0, erro: 0, risco: 0 };
    let valorCredito = 0;
    for (const a of achados) {
      porTipo[a.tipo] = (porTipo[a.tipo] || 0) + 1;
      if (porSeveridade[a.severidade] != null) porSeveridade[a.severidade]++;
      if (porNatureza[a.natureza] != null) porNatureza[a.natureza]++;
      if (a.natureza === 'credito') valorCredito += num(a.valor);
    }

    const resumo = {
      total_achados: achados.length,
      por_tipo: porTipo,
      por_severidade: porSeveridade,
      por_natureza: porNatureza,
      valor_credito_estimado: valorCredito,
      valor_total: soma(achados, 'valor'),
    };

    // registra a execução em rev_auditorias (histórico)
    const registro = {
      id_auditoria: idAud,
      cnpj_empresa: cnpj,
      periodo: '(todos)',
      executada_em: new Date().toISOString(),
      regras: idsRegras,
      n_achados: achados.length,
      resumo,
      regras_detalhe: resumoRegras,
    };
    await DB.put('rev_auditorias', registro).catch(() => {});
    await DB.registrarLog(cnpj, 'info', 'Auditorias cruzadas executadas',
      `${achados.length} achado(s); crédito estimado ${U().fmtBRL(valorCredito)}`);

    prog(100, 'Concluído.');
    return { id_auditoria: idAud, achados, porTipo, resumo, regras: resumoRegras };
  }

  /** Lê os achados persistidos de um cliente (mais graves primeiro). */
  async function listarAchados(cnpj) {
    const DB = _DB();
    const achados = await DB.getByIndexCnpjs('rev_achados', cnpj).catch(() => []);
    const ordem = { alta: 0, media: 1, baixa: 2 };
    achados.sort((a, b) => (ordem[a.severidade] - ordem[b.severidade])
      || (Math.abs(num(b.valor)) - Math.abs(num(a.valor))));
    return achados;
  }

  /** Última execução registrada (aceita CNPJ único ou lista — pega a mais recente). */
  async function ultimaExecucao(cnpj) {
    const DB = _DB();
    const regs = await DB.getByIndexCnpjs('rev_auditorias', cnpj).catch(() => []);
    regs.sort((a, b) => (b.executada_em || '').localeCompare(a.executada_em || ''));
    return regs[0] || null;
  }

  // ------------------------------------------------------------------
  // ÂMBITO TRIBUTÁRIO DAS REGRAS — decide como consolidar entre filiais:
  //   federal  → crédito é UM SÓ, apurado no CNPJ raiz (PIS/COFINS/IRPJ/CSLL);
  //              filial serve só de rastreio de origem.
  //   estadual → apresenta consolidado pro cliente, mas o APROVEITAMENTO é
  //              por inscrição estadual: cada achado pertence à sua filial.
  // ------------------------------------------------------------------
  function ambitoRegra(idOuTipo) {
    const s = String(idOuTipo || '');
    if (/^MG-/.test(s)) return 'estadual';                                  // regras ICMS-MG
    if (s === 'A1' || s === 'xml_nao_escriturado') return 'estadual';       // crédito de ICMS de nota não escriturada
    if (/^(A2|A3|icms_base_pis_cofins|reinf_retencao)$/.test(s)) return 'federal';
    if (/^(A4|A5|ecd_ecf|ecd_contrib)$/.test(s)) return 'federal';          // consistência contábil/federal
    if (/^INS-|^ins_/.test(s)) return 'federal';                            // insumos PIS/COFINS
    if (/^FED-|^fed_/.test(s)) return 'federal';                            // regras federais v3.18
    return 'estadual';                                                      // conservador: divide por filial
  }

  /** Âmbito de um ACHADO persistido (usa a regra se houver, senão o tipo). */
  function ambitoAchado(a) {
    return ambitoRegra(a && (a._regra || a.tipo));
  }

  /**
   * Executa as auditorias para um GRUPO de filiais: roda o motor filial a
   * filial (cada achado nasce carimbado com o cnpj_empresa da filial) e
   * devolve o resultado consolidado + o detalhe por filial.
   */
  async function executarGrupo(cnpjs, opts) {
    opts = opts || {};
    const lista = Array.isArray(cnpjs) ? cnpjs : [cnpjs];
    if (lista.length === 1) return executar(lista[0], opts);
    const prog = opts.onProgress || (() => {});
    const porFilial = [];
    const achados = [];
    const regrasDet = [];
    let i = 0;
    for (const c of lista) {
      const base = Math.floor((i / lista.length) * 100);
      const fator = 1 / lista.length;
      const r = await executar(c, {
        regras: opts.regras,
        onProgress: (pct, msg) => prog(base + Math.floor(pct * fator), `[${c.slice(8, 12)}] ${msg || ''}`),
      });
      porFilial.push({ cnpj: c, resumo: r.resumo });
      achados.push(...r.achados);
      for (const rd of (r.regras || [])) regrasDet.push({ ...rd, cnpj_filial: c });
      i++;
    }
    // resumo consolidado
    const porTipo = {}; const porSeveridade = { alta: 0, media: 0, baixa: 0 };
    const porNatureza = { credito: 0, erro: 0, risco: 0 };
    let valorCredito = 0;
    for (const a of achados) {
      porTipo[a.tipo] = (porTipo[a.tipo] || 0) + 1;
      if (porSeveridade[a.severidade] != null) porSeveridade[a.severidade]++;
      if (porNatureza[a.natureza] != null) porNatureza[a.natureza]++;
      if (a.natureza === 'credito') valorCredito += num(a.valor);
    }
    const resumo = {
      total_achados: achados.length, por_tipo: porTipo, por_severidade: porSeveridade,
      por_natureza: porNatureza, valor_credito_estimado: valorCredito, valor_total: soma(achados, 'valor'),
      consolidado_de: lista,
    };
    prog(100, 'Concluído (grupo).');
    return { achados, porTipo, resumo, regras: regrasDet, por_filial: porFilial };
  }

  return { REGRAS, registrar, executar, executarGrupo, listarAchados, ultimaExecucao,
    ambitoRegra, ambitoAchado,
    // expostas para teste
    auditarA1, auditarA2, auditarA3, auditarA4, auditarA5, carregarContexto };
})();

if (typeof window !== 'undefined') window.Auditorias = Auditorias;
else globalThis.Auditorias = Auditorias;


// ===================== auditorias_mg.js =====================
// =====================================================================
// Revisor Fiscal Prime — auditorias_mg.js
// AUDITORIAS ESTADUAIS MG (cervejaria). 36 regras plugadas no motor via
// Auditorias.registrar(). Cada regra lê os campos REAIS do contexto já
// carregado (rev_itens, rev_xml_itens, rev_documentos, rev_apuracao_icms,
// Bloco G, ajustes) e classifica produto/CFOP/CST por TabelasMG.
//
// Princípios (iguais às cruzadas A1-A5):
//   - lê só stores normalizadas + staging já no contexto (sem novo I/O);
//   - tolerante: quando falta dado/dicionário, reporta "sem dados" com motivo;
//   - cada achado tem valor estimado, base legal e referências;
//   - natureza ∈ {credito, erro, risco}; severidade por valor (ou fixa).
//
// IDs batem com o catálogo (conhecimento.js): MG-STCALC-1, MG-CRED-1, etc.
// Fundamentos detalhados nas Partes 1-8 da base tributária.
// =====================================================================

(function () {
  'use strict';

  const ENV = (typeof window !== 'undefined') ? window : globalThis;
  const T = ENV.TabelasMG;
  const A = ENV.Auditorias;
  if (!T) { console.warn('auditorias_mg: TabelasMG ausente'); return; }
  if (!A || !A.registrar) { console.warn('auditorias_mg: Auditorias.registrar ausente'); return; }

  // ------------------------------------------------------------------
  // helpers de contexto
  // ------------------------------------------------------------------
  const n = (v) => Number(v) || 0;
  const baseItem = (it) => n(it.vl_item) - n(it.vl_desc);

  // rev_itens deixa ncm vazio → resolve pelo cadastro 0200 (prodPorCod)
  function ncmDe(ctx, it) { return it.ncm || (ctx.prodPorCod[it.cod_item] && ctx.prodPorCod[it.cod_item].ncm) || ''; }
  function tipoDe(ctx, it) { return (ctx.prodPorCod[it.cod_item] && ctx.prodPorCod[it.cod_item].tipo_item) || ''; }
  function descDe(ctx, it) { return it.descricao || (ctx.prodPorCod[it.cod_item] && ctx.prodPorCod[it.cod_item].descricao) || ''; }

  function apurPorPeriodo(ctx) { const m = {}; for (const a of (ctx.apurIcms || [])) m[a.periodo] = a; return m; }
  // O FEM (operação própria) entra como ajuste de DÉBITO (ex.: MG050006 "FEM/OP adicionado ao
  // ICMS/OP"), não é estorno de crédito. O código MG05* é genérico demais, então excluímos pela descrição.
  const ehAjusteFEM = (aj) => /\bfem\b|erradica|mis[eé]ria/i.test(String((aj && aj.descr) || ''));
  function temEstornoNoPeriodo(ap) {
    if (!ap) return false;
    if (n(ap.vl_estornos_cred) > 0.5) return true;
    return (ap.ajustes || []).some(aj => !ehAjusteFEM(aj) && T.ajusteEhEstorno(aj.cod) && n(aj.valor) > 0.5);
  }
  function valorEstornoNoPeriodo(ap) {
    if (!ap) return 0;
    let v = n(ap.vl_estornos_cred);
    for (const aj of (ap.ajustes || [])) if (!ehAjusteFEM(aj) && T.ajusteEhEstorno(aj.cod)) v += n(aj.valor);
    return v;
  }

  function Acc() { return new Map(); }
  function bump(map, periodo, init) {
    if (!map.has(periodo)) map.set(periodo, Object.assign({ periodo, n: 0, valor: 0 }, init || {}));
    return map.get(periodo);
  }
  function resumo(regra, achados, extra) {
    const valor = achados.reduce((s, a) => s + Math.abs(n(a.valor)), 0);
    return Object.assign({ regra, status: achados.length ? 'achados' : 'limpo', n: achados.length, valor }, extra || {});
  }
  const semDados = (regra, motivo) => ({ achados: [], resumo: { regra, status: 'sem_dados', motivo } });
  const limpo = (regra, motivo, nn) => ({ achados: [], resumo: { regra, status: 'limpo', n: nn || 0, valor: 0, motivo } });
  function mk(api, ctx, idAud, tipo, d) { return api.novoAchado(ctx.cnpj, idAud, tipo, d); }

  // ==================================================================
  // SUBSTITUIÇÃO TRIBUTÁRIA
  // ==================================================================

  // MG-STCALC-1 — cálculo da ST a partir da própria nota (dedução do ICMS próprio
  // e presença do FEM/FCP-ST). Não depende de PMPF (usa a base já destacada).
  function mgSTCALC1(ctx, idAud, api) {
    const xs = (ctx.xmlItens || []).filter(x => x.tipo_operacao === 'saida' && !x.cancelada);
    if (!xs.length) return semDados('MG-STCALC-1', 'Sem XML de saída para verificar o cálculo da ST.');
    const achados = []; const accCalc = Acc(), accFem = Acc(); let avaliou = 0;
    for (const x of xs) {
      const bcst = n(x.vl_bc_icms_st);
      const temST = bcst > 0 || n(x.vl_icms_st) > 0 || T.cstComST(x.cst_icms);
      if (!temST || bcst <= 0) continue;
      avaliou++;
      const aliqDoc = n(x.aliq_st) || n(x.aliq_icms);
      const aliq = (aliqDoc > 0 ? aliqDoc : T.aliqInternaPara(x.ncm)) / 100;
      const fem = T.FEM_PCT / 100;
      const esperadoST = bcst * aliq - n(x.vl_icms);
      const difST = n(x.vl_icms_st) - esperadoST;
      if (Math.abs(difST) > Math.max(0.5, 0.02 * Math.abs(esperadoST))) {
        const a = bump(accCalc, x.periodo, { dif: 0, exemplo: '' });
        a.n++; a.dif += difST;
        if (!a.exemplo) a.exemplo = `NF ${x.num_doc || 's/n'}: ST destacada ${api.U.fmtBRL(n(x.vl_icms_st))} vs esperada ${api.U.fmtBRL(esperadoST)}`;
      }
      // FEM-ST: só nos períodos em que o FEM está ativo (suspenso em 2023). E o FEM
      // é recolhido em DAE distinto/ajuste na EFD, então vFCPST=0 NÃO prova falta — é exposição a verificar.
      if (T.femAtivoNoPeriodo(x.periodo)) {
        const esperadoFemST = bcst * fem - n(x.vl_fcp);
        if (esperadoFemST > 0.5 && n(x.vl_fcp_st) <= 0.5) { const a = bump(accFem, x.periodo, { faltaFem: 0 }); a.n++; a.faltaFem += esperadoFemST; }
      }
    }
    for (const a of accCalc.values()) achados.push(mk(api, ctx, idAud, 'mg_stcalc_deducao', {
      periodo: a.periodo, titulo: 'Cálculo da ST de cerveja inconsistente', severidade: api.sev(a.dif),
      natureza: 'erro', valor: Math.abs(a.dif),
      descricao: `${a.n} nota(s) de saída no período ${a.periodo} com ICMS-ST destacado divergente do recalculado `
        + `(base ST × alíquota da própria nota − ICMS próprio). Diferença agregada ${api.U.fmtBRL(a.dif)}. ${a.exemplo}.`,
      base_legal: 'RICMS/2023 Anexo VII art. 19/20; ICMS-ST = (base × alíq) − ICMS próprio (Parte 8). Cerveja em MG: alíquota interna 23%.',
      referencias: [{ periodo: a.periodo, notas: a.n, diferenca_st: a.dif }],
    }));
    for (const a of accFem.values()) achados.push(mk(api, ctx, idAud, 'mg_stcalc_femst', {
      periodo: a.periodo, titulo: 'FEM-ST (2%) a verificar na ST de cerveja', severidade: 'media',
      natureza: 'risco', valor: a.faltaFem,
      descricao: `${a.n} nota(s) de saída com ST no período ${a.periodo} sem o FCP-ST (FEM 2%) destacado na nota. `
        + `O FEM em MG é recolhido em DAE distinto / ajuste na EFD (campos 82.2/98.1/110.1), então vFCPST=0 na nota NÃO prova `
        + `que faltou — é exposição a CONFERIR nos DAEs/EFD do período. Valor potencial: ${api.U.fmtBRL(a.faltaFem)}.`,
      base_legal: 'Lei 24.471/2023 e Decreto 48.736/2023 (FEM 2% sobre cerveja, 2024-2026; suspenso em 2023); recolhimento em DAE/ajuste EFD.',
      referencias: [{ periodo: a.periodo, notas: a.n, fem_st_a_verificar: a.faltaFem }],
    }));
    return { achados, resumo: resumo('MG-STCALC-1', achados, { notas_com_st: avaliou }) };
  }

  // MG-STCALC-2 — base da ST = PMPF da marca. Depende do dicionário marca→PMPF.
  function mgSTCALC2(ctx, idAud, api) {
    if (!T.temPMPFCadastrado()) return semDados('MG-STCALC-2', 'Requer dicionário marca→PMPF (preencha TabelasMG.PMPF com a Portaria SUTRI).');
    const xs = (ctx.xmlItens || []).filter(x => x.tipo_operacao === 'saida' && !x.cancelada && T.ehCerveja(x.ncm));
    const achados = []; const acc = Acc(); let semPmpf = 0;
    for (const x of xs) {
      const bcst = n(x.vl_bc_icms_st); if (bcst <= 0) continue;
      const p = T.pmpfDe(x.descricao, x.ncm, x.periodo); if (!p) { semPmpf++; continue; }
      const pmpfTotal = p.valor * n(x.qtd);
      const dif = bcst - pmpfTotal;
      if (Math.abs(dif) > Math.max(0.5, 0.03 * pmpfTotal)) { const a = bump(acc, x.periodo, { dif: 0 }); a.n++; a.dif += dif; }
    }
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'mg_stcalc_pmpf', {
      periodo: a.periodo, titulo: 'Base da ST diverge do PMPF da Portaria', severidade: api.sev(a.dif),
      natureza: a.dif < 0 ? 'risco' : 'credito', valor: Math.abs(a.dif) * 0.18,
      descricao: `${a.n} nota(s) no período ${a.periodo} com base de ST diferente do PMPF cadastrado. `
        + `Diferença de base ${api.U.fmtBRL(a.dif)} (${a.dif < 0 ? 'base menor que o PMPF — risco' : 'base maior — possível recuperação'}).`,
      base_legal: 'RICMS/2023 Anexo VII art. 19 (base ST = PMPF, Portaria SUTRI 1.485/2025).',
      referencias: [{ periodo: a.periodo, notas: a.n, diferenca_base: a.dif }],
    }));
    const extra = semPmpf ? { motivo: `${semPmpf} item(ns) de cerveja sem PMPF cadastrado (não avaliados).` } : {};
    return { achados, resumo: resumo('MG-STCALC-2', achados, extra) };
  }

  // MG-STINS-1 — crédito de ICMS-ST de insumo (§13 art. 31).
  function mgSTINS1(ctx, idAud, api) {
    const ent = (ctx.itens || []).filter(i => i.tipo_operacao === 'entrada');
    if (!ent.length) return semDados('MG-STINS-1', 'Sem entradas escrituradas (EFD).');
    const acc = Acc();
    for (const it of ent) {
      if (T.ehCerveja(ncmDe(ctx, it))) continue;          // cerveja = produto acabado (revenda/devolução), não insumo
      if (!T.ehInsumoCreditavel(tipoDe(ctx, it))) continue;
      const temST = n(it.vl_icms_st) > 0.5 || T.cstComST(it.cst_icms) || T.cstSTRecolhida(it.cst_icms);
      if (!temST) continue;
      const credito = n(it.vl_icms_st) > 0.5 ? n(it.vl_icms_st) : baseItem(it) * 0.18;
      const a = bump(acc, it.periodo, { credito: 0 }); a.n++; a.credito += credito;
    }
    const achados = [];
    for (const a of acc.values()) { if (a.credito <= api.PISO) continue; achados.push(mk(api, ctx, idAud, 'mg_st_insumo_credito', {
      periodo: a.periodo, titulo: 'Crédito de ICMS-ST de insumo a aproveitar', severidade: api.sev(a.credito),
      natureza: 'credito', valor: a.credito,
      descricao: `${a.n} entrada(s) de insumo com ST retida no período ${a.periodo}. Insumo industrializado dá direito `
        + `ao crédito do ICMS-ST (${api.U.fmtBRL(a.credito)}), inclusive extemporâneo (5 anos).`,
      base_legal: 'RICMS/2023 art. 31, §13; Consultas SEF/MG 104/2015, 115/2025, 51/2023.',
      referencias: [{ periodo: a.periodo, entradas: a.n, credito_st_estimado: a.credito }],
    })); }
    return { achados, resumo: resumo('MG-STINS-1', achados) };
  }

  // MG-STINAPL-1 — ST indevida na compra de insumo (art. 18 IV).
  function mgSTINAPL1(ctx, idAud, api) {
    const ent = (ctx.itens || []).filter(i => i.tipo_operacao === 'entrada');
    if (!ent.length) return semDados('MG-STINAPL-1', 'Sem entradas escrituradas (EFD).');
    const acc = Acc();
    for (const it of ent) {
      if (!T.ehInsumoCreditavel(tipoDe(ctx, it))) continue;
      const stPaga = n(it.vl_icms_st); if (stPaga <= api.PISO) continue;
      const a = bump(acc, it.periodo, { st: 0 }); a.n++; a.st += stPaga;
    }
    const achados = [];
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'mg_st_inaplicavel_insumo', {
      periodo: a.periodo, titulo: 'ST cobrada indevidamente sobre insumo', severidade: api.sev(a.st),
      natureza: 'credito', valor: a.st,
      descricao: `${a.n} entrada(s) de insumo no período ${a.periodo} com ST retida (${api.U.fmtBRL(a.st)}). `
        + `A ST não se aplica à aquisição de insumo para industrialização — cabe restituição/não retenção.`,
      base_legal: 'RICMS/2023 Anexo VII art. 18, IV; Consultas SEF/MG 120/2023, 125/2021.',
      referencias: [{ periodo: a.periodo, entradas: a.n, st_indevida: a.st }],
    }));
    return { achados, resumo: resumo('MG-STINAPL-1', achados) };
  }

  // MG-STENC-1 — industrialização por encomenda (cervejaria cigana). Sinaliza.
  function mgSTENC1(ctx, idAud, api) {
    const enc = (ctx.itens || []).filter(i => T.naLista(i.cfop, T.CFOP.indust_encomenda_retorno) || T.naLista(i.cfop, T.CFOP.indust_encomenda_entrada));
    if (!enc.length) return limpo('MG-STENC-1', 'Sem operações de industrialização por encomenda.');
    const acc = Acc();
    for (const it of enc) { const a = bump(acc, it.periodo, { valor: 0 }); a.n++; a.valor += baseItem(it); }
    const achados = [];
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'mg_st_encomenda', {
      periodo: a.periodo, titulo: 'Industrialização por encomenda — conferir ST do encomendante', severidade: 'media',
      natureza: 'risco', valor: 0,
      descricao: `${a.n} operação(ões) de industrialização por encomenda no período ${a.periodo} (${api.U.fmtBRL(a.valor)}). `
        + `Na cerveja, a ST recai sobre o encomendante na entrada — conferir.`,
      base_legal: 'Consulta SEF/MG 123/2023 (industrialização por encomenda).',
      referencias: [{ periodo: a.periodo, operacoes: a.n, valor: a.valor }],
    }));
    return { achados, resumo: resumo('MG-STENC-1', achados) };
  }

  // ==================================================================
  // RESTITUIÇÃO / COMPLEMENTO DE ST
  // ==================================================================

  // MG-REST-1 — restituição de ST por FG presumido não realizado.
  function mgREST1(ctx, idAud, api) {
    const itens = ctx.itens || [];
    const ent = itens.filter(i => i.tipo_operacao === 'entrada');
    if (!ent.length) return semDados('MG-REST-1', 'Sem entradas escrituradas (EFD).');
    const comST = {};
    for (const it of ent) if (n(it.vl_icms_st) > 0.5 || T.cstSTRecolhida(it.cst_icms) || T.cstComST(it.cst_icms))
      comST[it.cod_item] = (comST[it.cod_item] || 0) + (n(it.vl_icms_st) || baseItem(it) * 0.18);
    if (!Object.keys(comST).length) return limpo('MG-REST-1', 'Nenhum item entrou com ST retida.');
    const acc = Acc();
    for (const it of itens) {
      if (it.tipo_operacao !== 'saida' || !(it.cod_item in comST)) continue;
      const fgNaoRealizado = T.ehInterestadual(it.cfop) || T.ehBaixaEstoque(it.cfop) || T.cstIsentaNaoTrib(it.cst_icms);
      if (!fgNaoRealizado) continue;
      const a = bump(acc, it.periodo, { valor: 0 }); a.n++; a.valor += baseItem(it) * 0.18;
    }
    const achados = [];
    for (const a of acc.values()) { if (a.valor <= api.PISO) continue; achados.push(mk(api, ctx, idAud, 'mg_rest_fg_presumido', {
      periodo: a.periodo, titulo: 'Restituição de ST — fato gerador presumido não realizado', severidade: api.sev(a.valor),
      natureza: 'credito', valor: a.valor,
      descricao: `${a.n} saída(s) no período ${a.periodo} de itens que entraram com ST e tiveram destino `
        + `interestadual/perda/isenção. ST presumida a restituir estimada em ${api.U.fmtBRL(a.valor)}.`,
      base_legal: 'RICMS/2023 Anexo VII arts. 35-42; STF Tema 201 (RE 593.849).',
      referencias: [{ periodo: a.periodo, saidas: a.n, st_restituivel: a.valor }],
    })); }
    return { achados, resumo: resumo('MG-REST-1', achados) };
  }

  // scanner compartilhado para REST-2 (complemento) e REST-3 (restituição)
  function scanRest23(ctx, api) {
    const xs = (ctx.xmlItens || []).filter(x => x.tipo_operacao === 'saida' && !x.cancelada);
    const aConsumidor = xs.filter(x => T.soNum(x.dest_cnpj).length !== 14 || T.ehVendaConsumidor(x.cfop));
    const comSTret = aConsumidor.filter(x => n(x.vl_icms_st_ret) > 0 || T.cstSTRecolhida(x.cst_icms));
    const temPMPF = T.temPMPFCadastrado();
    const acc = Acc(); let temVenda = comSTret.length > 0;
    for (const x of comSTret) {
      const a = bump(acc, x.periodo, { compl: 0, rest: 0, semPmpf: 0 });
      a.n++;
      if (!temPMPF) { a.semPmpf++; continue; }
      const p = T.pmpfDe(x.descricao, x.ncm, x.periodo); if (!p) { a.semPmpf++; continue; }
      const dif = (n(x.vl_unit) - p.valor) * n(x.qtd);
      if (dif > 0) a.compl += dif * 0.18; else a.rest += (-dif) * 0.18;
    }
    return { acc, temVenda, temPMPF };
  }

  // MG-REST-2 — complemento de ST (venda final acima do PMPF).
  function mgREST2(ctx, idAud, api) {

    if (!temVenda) return limpo('MG-REST-2', 'Sem venda a consumidor final de item com ST retida.');

    for (const a of acc.values()) {
      if (!temPMPF || a.compl <= api.PISO) {

          base_legal: 'RICMS/2023 Anexo VII arts. 44-52; STF Tema 201; regime de definitividade art. 21-A.',

        referencias: [{ periodo: a.periodo, complemento: a.compl }],

  // ==================================================================
  // CREDITAMENTO DE INSUMOS
  // ==================================================================

  // MG-CRED-1 — crédito de insumo (MP/PI/ME) não aproveitado.
  function mgCRED1(ctx, idAud, api) {
    const ent = (ctx.itens || []).filter(i => i.tipo_operacao === 'entrada');
    if (!ent.length) return semDados('MG-CRED-1', 'Sem entradas escrituradas (EFD).');
    const RV = window.RegimeVigencia;
    const acc = Acc(); let vedadoRegime = 0;
    for (const it of ent) {
      const tipo = tipoDe(ctx, it);
      const ehInsumo = T.ehInsumoCreditavel(tipo) || (!tipo && T.temPalavra(descDe(ctx, it), T.PALAVRAS_INSUMO_CERVEJA));
      if (!ehInsumo) continue;
      if (!(T.cstTributadaIntegral(it.cst_icms) || T.cstReducaoBC(it.cst_icms))) continue;
      const bc = n(it.vl_bc_icms); if (bc <= 0) continue;
      if (n(it.vl_icms) > 0.5) continue;
      const credito = bc * (n(it.aliq_icms) > 0 ? n(it.aliq_icms) / 100 : 0.18);
      if (credito <= api.PISO) continue;
      // Dentro da vigência de regime que veda créditos, o crédito de insumo é VEDADO (não é recuperação).
      if (RV && RV.creditoVedado(ctx.cnpj, it.periodo)) { vedadoRegime += credito; continue; }
      const a = bump(acc, it.periodo, { credito: 0 }); a.n++; a.credito += credito;
    }
    const achados = [];
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'mg_cred_insumo_nao_tomado', {
      periodo: a.periodo, titulo: 'Crédito de insumo não aproveitado', severidade: api.sev(a.credito),
      natureza: 'credito', valor: a.credito,
      descricao: `${a.n} entrada(s) de insumo tributado no período ${a.periodo} com base de ICMS mas sem crédito `
        + `escriturado. Crédito a aproveitar estimado em ${api.U.fmtBRL(a.credito)} (conferir se fornecedor do Simples).`,
      base_legal: 'RICMS/2023 art. 31, V; IN SLT 01/1986.',
      referencias: [{ periodo: a.periodo, entradas: a.n, credito_estimado: a.credito }],
    }));
    if (!achados.length) return limpo('MG-CRED-1', vedadoRegime > 0
      ? `Crédito de insumo em período sob regime é vedado (${api.U.fmtBRL(vedadoRegime)}) — sem recuperação enquanto vigente.`
      : 'Sem crédito de insumo a recuperar.');
    return { achados, resumo: resumo('MG-CRED-1', achados) };
  }

  // MG-CRED-2 — crédito indevido de uso e consumo (e peças pós-01/04/2017).
  function mgCRED2(ctx, idAud, api) {
    const ent = (ctx.itens || []).filter(i => i.tipo_operacao === 'entrada');
    if (!ent.length) return semDados('MG-CRED-2', 'Sem entradas escrituradas (EFD).');
    const acc = Acc();
    for (const it of ent) {
      const tipo = tipoDe(ctx, it);
      const ehUso = T.ehUsoConsumo(tipo) || (!tipo && T.temPalavra(descDe(ctx, it), T.PALAVRAS_USO_CONSUMO));
      if (!ehUso) continue;
      const icms = n(it.vl_icms); if (icms <= api.PISO) continue;
      const a = bump(acc, it.periodo, { valor: 0 }); a.n++; a.valor += icms;
    }
    const achados = [];
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'mg_cred_uso_consumo', {
      periodo: a.periodo, titulo: 'Crédito indevido de uso e consumo', severidade: api.sev(a.valor),
      natureza: 'risco', valor: a.valor,
      descricao: `${a.n} entrada(s) de material de uso e consumo no período ${a.periodo} com crédito de ICMS `
        + `apropriado (${api.U.fmtBRL(a.valor)}). Uso e consumo não dá crédito (e peças desde 01/04/2017) — estorno devido.`,
      base_legal: 'RICMS/2023 art. 31, V; IN SUTRI 01/2017; Consulta SEF/MG 90/2021.',
      referencias: [{ periodo: a.periodo, entradas: a.n, credito_indevido: a.valor }],
    }));
    return { achados, resumo: resumo('MG-CRED-2', achados) };
  }

  // MG-CRED-3 — embalagem de transporte tratada como material de embalagem.
  function mgCRED3(ctx, idAud, api) {
    const ent = (ctx.itens || []).filter(i => i.tipo_operacao === 'entrada');

    const acc = Acc();
    for (const it of ent) {

  // ==================================================================
  // CIAP / ATIVO
  // ==================================================================

  // MG-CIAP-1 — ativo sem apropriação do CIAP (Bloco G ausente).
  function mgCIAP1(ctx, idAud, api) {
    const ativos = (ctx.itens || []).filter(it => it.tipo_operacao === 'entrada' && (T.ehAtivo(tipoDe(ctx, it)) || T.ehEntradaAtivo(it.cfop)));
    if (!ativos.length) return limpo('MG-CIAP-1', 'Sem entradas de ativo imobilizado.');
    const temG = ((ctx.ciap && ctx.ciap.g125) || []).length > 0 || ((ctx.ciap && ctx.ciap.g110) || []).length > 0;
    if (temG) return limpo('MG-CIAP-1', 'Bloco G presente — CIAP sendo escriturado.', ativos.length);
    const RV = window.RegimeVigencia;
    const fl = RV ? RV.flags(ctx.cnpj) : {};
    // Só há crédito de CIAP a apropriar quando a entrada do ativo teve ICMS destacado.
    // Ativo que entrou DIFERIDO (ICMS zero) não gera crédito — é o caso dos regimes que diferem o
    // ativo (art. 3º/5º do e-PTA-RE). NÃO se estima ICMS onde não houve destaque (correção de bug).
    const acc = Acc();
    let diferidos = 0;
    for (const it of ativos) {
      const icms = n(it.vl_icms);
      if (icms <= 0.5) { diferidos++; continue; }   // sem ICMS (diferido/isento): não gera CIAP
      const a = bump(acc, it.periodo, { valorBem: 0, icms: 0 }); a.n++; a.valorBem += baseItem(it); a.icms += icms;
    }
    const achados = [];
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'mg_ciap_nao_apropriado', {
      periodo: a.periodo, titulo: 'Ativo com ICMS sem apropriação do CIAP (Bloco G ausente)', severidade: api.sev(a.icms),
      natureza: 'credito', valor: a.icms,
      descricao: `${a.n} entrada(s) de ativo com ICMS destacado no período ${a.periodo} (${api.U.fmtBRL(a.valorBem)}) sem Bloco G. `
        + `O crédito do ativo (1/48 ao mês) não está sendo apropriado — ${api.U.fmtBRL(a.icms)} de ICMS de ativo.`,
      base_legal: 'RICMS/2023 art. 31, II e Anexo V §8º (CIAP, Bloco G); LC 87/96 art. 20 §5º.',
      referencias: [{ periodo: a.periodo, entradas: a.n, icms_ativo: a.icms }],
    }));
    if (!achados.length) {
      const msg = (diferidos > 0 && fl.difere_ativo)
        ? `${diferidos} entrada(s) de ativo, todas diferidas (ICMS zero) sob o regime — sem CIAP a apropriar do passado.`
        : (diferidos > 0 ? `${diferidos} entrada(s) de ativo sem ICMS destacado — sem crédito de CIAP.` : 'Sem ativo com ICMS a apropriar.');
      return limpo('MG-CIAP-1', msg, ativos.length);
    }
    return { achados, resumo: resumo('MG-CIAP-1', achados) };
  }

  // MG-CIAP-2 — coeficiente de saídas tributadas aplicado ao CIAP.
  function mgCIAP2(ctx, idAud, api) {
    const g = ((ctx.ciap && ctx.ciap.g125) || []);
    if (!g.length) return semDados('MG-CIAP-2', 'Sem Bloco G (G125) para avaliar o coeficiente.');
    let tot = 0, trib = 0;
    for (const it of (ctx.itens || [])) {
      if (it.tipo_operacao !== 'saida') continue;
      const b = baseItem(it); tot += b;
      if (!(T.cstIsentaNaoTrib(it.cst_icms) || T.ehExportacao(it.cfop))) trib += b;
    }
    const coef = tot > 0 ? trib / tot : 1;
    if (coef >= 0.995) return limpo('MG-CIAP-2', 'Saídas praticamente todas tributadas — coeficiente ≈ 100%.');
    const achado = mk(api, ctx, idAud, 'mg_ciap_proporcao', {
      periodo: '(consolidado)', titulo: 'CIAP — conferir coeficiente de saídas tributadas', severidade: 'media',
      natureza: 'risco', valor: 0,
      descricao: `O coeficiente real de saídas tributadas é ${(coef * 100).toFixed(1)}% (há isentas/exportadas). `
        + `O crédito mensal do CIAP (1/48) deve ser ajustado por esse coeficiente — conferir o Bloco G.`,
      base_legal: 'RICMS/2023 art. 31, II e Anexo V §8º (parcela do CIAP proporcional às saídas tributadas).',
      referencias: [{ coeficiente_tributado: coef, total_saidas: tot }],
    });
    return { achados: [achado], resumo: resumo('MG-CIAP-2', [achado]) };
  }

  // MG-CIAP-3 — DIFAL do ativo fora do crédito do CIAP.
  function mgCIAP3(ctx, idAud, api) {
    const ativosInter = (ctx.itens || []).filter(it => it.tipo_operacao === 'entrada' && (T.ehAtivo(tipoDe(ctx, it)) || T.ehEntradaAtivo(it.cfop)) && /^2/.test(T.soNum(it.cfop)));
    if (!ativosInter.length) return limpo('MG-CIAP-3', 'Sem entradas de ativo interestaduais.');
    const g125 = ((ctx.ciap && ctx.ciap.g125) || []);
    const somaDif = g125.reduce((s, r) => s + n(r.dados && r.dados.VL_IMOB_ICMS_DIF), 0);
    if (somaDif > 0.5) return limpo('MG-CIAP-3', 'DIFAL do ativo presente no Bloco G.', ativosInter.length);
    const valor = ativosInter.reduce((s, it) => s + baseItem(it) * 0.06, 0);
    const achado = mk(api, ctx, idAud, 'mg_ciap_difal_ativo', {
      periodo: '(consolidado)', titulo: 'DIFAL do ativo fora do crédito do CIAP', severidade: api.sev(valor),
      natureza: 'credito', valor,
      descricao: `${ativosInter.length} entrada(s) de ativo interestadual sem DIFAL no G125 (VL_IMOB_ICMS_DIF). `
        + `O DIFAL pago no ativo integra o crédito do CIAP — estimado ${api.U.fmtBRL(valor)}.`,
      base_legal: 'RICMS/2023 art. 31, II; DIFAL do ativo compõe o crédito do CIAP (Parte 5).',
      referencias: [{ entradas: ativosInter.length, difal_estimado: valor }],
    });
    return { achados: [achado], resumo: resumo('MG-CIAP-3', [achado]) };
  }

  // MG-DIFAL-1 — DIFAL a não contribuinte ausente (saídas 6107/6108 sem C101).
  function mgDIFAL1(ctx, idAud, api) {
    const saidasDifal = (ctx.itens || []).filter(it => it.tipo_operacao === 'saida' && /^6/.test(T.soNum(it.cfop)) &&
      T.naLista(it.cfop, T.CFOP.venda_consumidor.concat(['6107', '6108'])));
    if (!saidasDifal.length) return limpo('MG-DIFAL-1', 'Sem vendas interestaduais a consumidor final não contribuinte.');
    const temC101 = ((ctx.ajustes && ctx.ajustes.c101) || []).length > 0;
    if (temC101) return limpo('MG-DIFAL-1', 'C101 (partilha/DIFAL) presente nas notas.', saidasDifal.length);
    const acc = Acc();
    for (const it of saidasDifal) { const a = bump(acc, it.periodo, { valor: 0 }); a.n++; a.valor += baseItem(it) * 0.06; }
    const achados = [];
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'mg_difal_ausente', {
      periodo: a.periodo, titulo: 'DIFAL a não contribuinte possivelmente ausente', severidade: api.sev(a.valor),
      natureza: 'risco', valor: a.valor,
      descricao: `${a.n} venda(s) interestadual(is) a consumidor final no período ${a.periodo} sem registro de partilha `
        + `(C101). DIFAL/FCP destino estimado em ${api.U.fmtBRL(a.valor)} — conferir recolhimento e base por dentro.`,
      base_legal: 'EC 87/2015; Orientação DOLT/SUTRI 002/2016 (base dupla por dentro).',
      referencias: [{ periodo: a.periodo, vendas: a.n, difal_estimado: a.valor }],
    }));
    return { achados, resumo: resumo('MG-DIFAL-1', achados) };
  }

  // MG-DIFAL-2 — restituição de ST em saída interestadual de item que entrou com ST.
  function mgDIFAL2(ctx, idAud, api) {
    const itens = ctx.itens || [];
    const comST = {};
    for (const it of itens) if (it.tipo_operacao === 'entrada' && (n(it.vl_icms_st) > 0.5 || T.cstSTRecolhida(it.cst_icms)))
      comST[it.cod_item] = (comST[it.cod_item] || 0) + (n(it.vl_icms_st) || baseItem(it) * 0.18);
    if (!Object.keys(comST).length) return limpo('MG-DIFAL-2', 'Nenhum item entrou com ST retida.');
    const acc = Acc();
    for (const it of itens) {
      if (it.tipo_operacao !== 'saida' || !T.ehInterestadual(it.cfop) || !(it.cod_item in comST)) continue;
      const a = bump(acc, it.periodo, { valor: 0 }); a.n++; a.valor += baseItem(it) * 0.18;
    }
    const achados = [];
    for (const a of acc.values()) { if (a.valor <= api.PISO) continue; achados.push(mk(api, ctx, idAud, 'mg_difal_rest_st', {
      periodo: a.periodo, titulo: 'Restituição de ST em saída interestadual', severidade: api.sev(a.valor),
      natureza: 'credito', valor: a.valor,
      descricao: `${a.n} saída(s) interestadual(is) no período ${a.periodo} de itens que entraram com ST retida. `
        + `A ST não alcança a operação interestadual — cabe restituição estimada em ${api.U.fmtBRL(a.valor)}.`,
      base_legal: 'Consulta SEF/MG 117/2019; ST de cerveja não alcança operação interestadual (Parte 5).',
      referencias: [{ periodo: a.periodo, saidas: a.n, st_restituivel: a.valor }],
    })); }
    return { achados, resumo: resumo('MG-DIFAL-2', achados) };
  }

  // MG-IMP-1 — crédito de importação de insumo não tomado.
  function mgIMP1(ctx, idAud, api) {
    const imp = (ctx.itens || []).filter(it => it.tipo_operacao === 'entrada' && T.ehImportacao(it.cfop));
    if (!imp.length) return limpo('MG-IMP-1', 'Sem entradas de importação (CFOP 3.xxx).');
    const acc = Acc();
    for (const it of imp) {
      const tipo = tipoDe(ctx, it);
      if (!(T.ehInsumoCreditavel(tipo) || T.ehRevenda(tipo))) continue;
      if (T.cstDiferimento(it.cst_icms)) continue;
      if (n(it.vl_icms) > 0.5) continue;
      const bc = n(it.vl_bc_icms) || baseItem(it);
      const credito = bc * (n(it.aliq_icms) > 0 ? n(it.aliq_icms) / 100 : 0.18);
      if (credito <= api.PISO) continue;
      const a = bump(acc, it.periodo, { valor: 0 }); a.n++; a.valor += credito;
    }
    const achados = [];
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'mg_imp_credito_nao_tomado', {
      periodo: a.periodo, titulo: 'Crédito de importação de insumo não tomado', severidade: api.sev(a.valor),
      natureza: 'credito', valor: a.valor,
      descricao: `${a.n} importação(ões) de insumo no período ${a.periodo} com ICMS no desembaraço sem crédito `
        + `escriturado. Crédito a recuperar estimado em ${api.U.fmtBRL(a.valor)}.`,
      base_legal: 'RICMS/2023 art. 2º/3º (importação); crédito do ICMS pago no desembaraço (Parte 6).',
      referencias: [{ periodo: a.periodo, importacoes: a.n, credito_estimado: a.valor }],
    }));
    return { achados, resumo: resumo('MG-IMP-1', achados) };
  }

  // MG-IMP-2 — crédito indevido sobre entrada diferida (CST 51).
  function mgIMP2(ctx, idAud, api) {
    const ent = (ctx.itens || []).filter(it => it.tipo_operacao === 'entrada' && T.cstDiferimento(it.cst_icms));
    if (!ent.length) return limpo('MG-IMP-2', 'Sem entradas com diferimento (CST 51).');
    const acc = Acc();
    for (const it of ent) { const icms = n(it.vl_icms); if (icms <= api.PISO) continue; const a = bump(acc, it.periodo, { valor: 0 }); a.n++; a.valor += icms; }
    const achados = [];
    for (const a of acc.values()) achados.push(mk(api, ctx, idAud, 'mg_imp_credito_diferido', {
      periodo: a.periodo, titulo: 'Crédito indevido sobre entrada diferida (CST 51)', severidade: api.sev(a.valor),
      natureza: 'risco', valor: a.valor,
      descricao: `${a.n} entrada(s) com CST 51 (diferimento) no período ${a.periodo} que tomaram crédito `

// =====================================================================

(function () {

  if (!T || !A || !A.registrar || !P1) { console.warn('auditorias_mg parte 2: dependências ausentes'); return; }
  const { n, baseItem, tipoDe, descDe, apurPorPeriodo, temEstornoNoPeriodo, valorEstornoNoPeriodo, Acc, bump, resumo, semDados, limpo, mk } = P1._helpers;

  // ---- PERDAS ----
  function mgPERDA1(ctx, idAud, api) {

    const achados = [];

  // classifica o estorno do período pelo que o E111 (SPED) diz no motivo da descrição
  const ehFEMaj = (aj) => /\bfem\b|erradica|mis[eé]ria/i.test(String((aj && aj.descr) || ''));
  function motivoEstornoSped(ap) {
    const soma = { regime: 0, devolucao: 0, perda: 0, outro: 0 };
    for (const aj of ((ap && ap.ajustes) || [])) {
      if (ehFEMaj(aj)) continue;
      const d = String(aj.descr || ''); const v = n(aj.valor);
      if (/regime|e-?pta|\bret\b/i.test(d)) soma.regime += v;

      else if (/perda|quebra|evapor|sinistr|vencid|inutiliz|deterior/i.test(d)) soma.perda += v;
      else if (/estorno/i.test(d)) soma.outro += v;
    }
    let best = 'indef', bv = 0;
    for (const m of ['regime', 'devolucao', 'perda', 'outro']) if (soma[m] > bv) { bv = soma[m]; best = m; }

  }
  const MOTIVO_ESTORNO = {
    regime: { natureza: 'credito',
      titulo: 'Estorno de crédito do regime especial (E111)',

    devolucao: { natureza: 'info',
      titulo: 'Estorno de crédito por devolução (correto)',

      titulo: 'Estorno de crédito por perda — conferir se normal',
      base: 'RICMS/2023 art. 32; Consulta SEF/MG 082/2015 (perda normal NÃO estorna).',

    outro: { natureza: 'credito',
      titulo: 'Estorno de crédito — motivo a confirmar',
      base: 'RICMS/2023 art. 32. Confirmar o motivo do estorno no E111 / com o cliente.',
      desc: (a, api) => `Período ${a.periodo}: estorno de ${api.U.fmtBRL(a.valor)}; o E111 não deixa claro o motivo. Confirmar a composição com o cliente.` },
    indef: { natureza: 'credito',
      titulo: 'Estorno de crédito — conferir se perda normal',
      base: 'RICMS/2023 art. 32; Consulta SEF/MG 082/2015 (perda normal NÃO estorna).',

  function mgPERDA2(ctx, idAud, api) {

        base_legal: info.base,
        referencias: [{ periodo: a.periodo, estorno: a.valor, motivo_e111: a.motivo }],

    return { achados, resumo: resumo('MG-PERDA-2', achados) };
  }

  // ---- EXPORTAÇÃO ----
  function mgEXP1(ctx, idAud, api) {

  function mgEXP2(ctx, idAud, api) {

    if (ap.length < 3) return limpo('MG-EXP-2', 'Apuração de ICMS insuficiente (< 3 períodos) para avaliar saldo credor crônico.');

    const ultimo = comSaldo[comSaldo.length - 1];

      base_legal: 'RICMS/2023 Anexo III (crédito acumulado de exportação); Resolução SEF 3.535/2004 (DCA).',

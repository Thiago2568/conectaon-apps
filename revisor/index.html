// ===================== selic.js =====================
// Tabela Selic mensal + correção de valores (regra RFB: soma simples das taxas
// do mês SEGUINTE ao da competência até o mês ANTERIOR ao atual, + 1% no mês
// atual). Tabela embutida até 2026-06; qualquer mês pode ser ajustado e meses
// futuros podem ser incluídos manualmente (persistem no navegador).
window.Selic = (function () {
  // taxas mensais em % (fonte: RFB/Bacen — conferir os meses recentes e ajustar no editor se necessário)
  // conferida em 09/07/2026 contra a tabela divulgada pela RFB (2019-01 a 2026-06)
  const OFICIAL = {
    '2019-01':0.54,'2019-02':0.49,'2019-03':0.47,'2019-04':0.52,'2019-05':0.54,'2019-06':0.47,
    '2019-07':0.57,'2019-08':0.50,'2019-09':0.46,'2019-10':0.48,'2019-11':0.38,'2019-12':0.37,
    '2020-01':0.38,'2020-02':0.29,'2020-03':0.34,'2020-04':0.28,'2020-05':0.24,'2020-06':0.21,
    '2020-07':0.19,'2020-08':0.16,'2020-09':0.16,'2020-10':0.16,'2020-11':0.15,'2020-12':0.16,
    '2021-01':0.15,'2021-02':0.13,'2021-03':0.20,'2021-04':0.21,'2021-05':0.27,'2021-06':0.31,
    '2021-07':0.36,'2021-08':0.43,'2021-09':0.44,'2021-10':0.49,'2021-11':0.59,'2021-12':0.77,
    '2022-01':0.73,'2022-02':0.76,'2022-03':0.93,'2022-04':0.83,'2022-05':1.03,'2022-06':1.02,
    '2022-07':1.03,'2022-08':1.17,'2022-09':1.07,'2022-10':1.02,'2022-11':1.02,'2022-12':1.12,
    '2023-01':1.12,'2023-02':0.92,'2023-03':1.17,'2023-04':0.92,'2023-05':1.12,'2023-06':1.07,
    '2023-07':1.07,'2023-08':1.14,'2023-09':0.97,'2023-10':1.00,'2023-11':0.92,'2023-12':0.89,
    '2024-01':0.97,'2024-02':0.80,'2024-03':0.83,'2024-04':0.89,'2024-05':0.83,'2024-06':0.79,
    '2024-07':0.91,'2024-08':0.87,'2024-09':0.84,'2024-10':0.93,'2024-11':0.79,'2024-12':0.93,
    '2025-01':1.01,'2025-02':0.99,'2025-03':0.96,'2025-04':1.06,'2025-05':1.14,'2025-06':1.10,
    '2025-07':1.28,'2025-08':1.16,'2025-09':1.22,'2025-10':1.28,'2025-11':1.05,'2025-12':1.22,
    '2026-01':1.16,'2026-02':1.00,'2026-03':1.21,'2026-04':1.09,'2026-05':1.07,'2026-06':1.12,
  };
  const KEY = 'revisor_selic_overrides';
  function overrides() {
    try { return JSON.parse(localStorage.getItem(KEY) || '{}') || {}; } catch (e) { return {}; }
  }
  function tabela() { return Object.assign({}, OFICIAL, overrides()); }
  function taxa(per) { const t = tabela()[per]; return (t == null || t === '') ? null : Number(t); }
  function salvar(per, tx) {
    if (!/^\d{4}-\d{2}$/.test(per || '')) return false;
    const ov = overrides();
    if (tx == null || tx === '') delete ov[per]; else ov[per] = Number(tx);
    try { localStorage.setItem(KEY, JSON.stringify(ov)); return true; } catch (e) { return false; }
  }
  function restaurarPadrao() { try { localStorage.removeItem(KEY); } catch (e) {} }
  function ehOverride(per) { return Object.prototype.hasOwnProperty.call(overrides(), per); }
  function ehOficial(per) { return Object.prototype.hasOwnProperty.call(OFICIAL, per); }

  const mesAtual = () => new Date().toISOString().slice(0, 7);
  function proxMes(per) {
    let [a, m] = per.split('-').map(Number); m++; if (m > 12) { m = 1; a++; }
    return `${a}-${String(m).padStart(2, '0')}`;
  }

  /**
   * Percentual acumulado (soma simples) da competência `perOrigem` até `perFim`
   * pela regra RFB: taxas do mês seguinte à competência até o mês anterior ao
   * fim, + 1% no mês do fim. Retorna { pct, meses, faltantes[] }.
   */
  function acumuladoPct(perOrigem, perFim) {
    perFim = perFim || mesAtual();
    if (!/^\d{4}-\d{2}$/.test(perOrigem || '') || perOrigem >= perFim) return { pct: 0, meses: 0, faltantes: [] };
    const T = tabela();
    let pct = 0, meses = 0; const faltantes = [];
    for (let p = proxMes(perOrigem); p < perFim; p = proxMes(p)) {
      const t = T[p];
      if (t == null || t === '') faltantes.push(p); else pct += Number(t);
      meses++;
      if (meses > 600) break; // trava de segurança
    }
    pct += 1.0; meses++; // 1% do mês do fim (RFB)
    return { pct, meses, faltantes };
  }

  /** Corrige um valor da competência até hoje: { original, pct, juros, corrigido, faltantes } */
  function corrigir(valor, perOrigem, perFim) {
    const v = Number(valor) || 0;
    // achados consolidados/anuais não têm competência mensal → sem correção automática
    if (!/^\d{4}-\d{2}$/.test(perOrigem || '')) return { original: v, pct: 0, juros: 0, corrigido: v, faltantes: [], aplicada: false };
    const a = acumuladoPct(perOrigem, perFim);
    const juros = v * a.pct / 100;
    return { original: v, pct: a.pct, juros, corrigido: v + juros, faltantes: a.faltantes, aplicada: true };
  }

  /** Corrige o período de um ACHADO ('AAAA-MM' | 'AAAA' → dez do ano | consolidado → sem correção). */
  function corrigirAchado(a, perFim) {
    let per = a && a.periodo || '';
    if (/^\d{4}$/.test(per)) per = per + '-12';
    return corrigir(a && a.valor, per, perFim);
  }

  /** Meses sem taxa entre o início da tabela e `perFim` (pra alertar no editor). */
  function faltantesAte(perFim) {
    perFim = perFim || mesAtual();
    const T = tabela();
    const out = [];
    for (let p = '2019-01'; p < perFim; p = proxMes(p)) if (T[p] == null) out.push(p);
    return out;
  }

  return { tabela, taxa, salvar, restaurarPadrao, ehOverride, ehOficial, mesAtual, proxMes, acumuladoPct, corrigir, corrigirAchado, faltantesAte, _OFICIAL: OFICIAL };
})();


// ===================== memoria_calculo.js =====================
// Relatório Excel (SpreadsheetML) com a memória de cálculo da correção Selic:
// aba 1 = achado a achado (original, política, competência, % acumulada, juros,
// corrigido); aba 2 = totais por tese; aba 3 = a tabela Selic usada.
window.MemoriaCalculo = (function () {
  const xe = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  const cS = (v, st) => `<Cell${st ? ` ss:StyleID="${st}"` : ''}><Data ss:Type="String">${xe(v)}</Data></Cell>`;
  const cN = (v, st) => `<Cell ss:StyleID="${st || 'n'}"><Data ss:Type="Number">${Number(v) || 0}</Data></Cell>`;
  const row = (cels) => `<Row>${cels.join('')}</Row>`;

  function politicaDe(a, esfera) {
    if (a.natureza === 'credito' && esfera === 'estadual')
      return { aplica: false, motivo: 'Crédito escritural de ICMS: valor nominal (RICMS/MG, art. 67, § 2º; sem lei estadual de correção)' };
    let per = a.periodo || '';
    if (/^\d{4}$/.test(per)) per = per + '-12';
    if (!/^\d{4}-\d{2}$/.test(per))
      return { aplica: false, motivo: 'Sem competência mensal (achado consolidado): correção manual, se cabível' };
    return { aplica: true, motivo: 'Selic (regra RFB: soma mensal do mês seguinte + 1% no mês atual)', per };
  }

  function montarXml(achados, esferaDe, temasOff) {
    temasOff = temasOff || new Set();
    const mesAt = window.Selic ? Selic.mesAtual() : '';
    // ---- aba 1: memória achado a achado ----
    const cab1 = row(['Tese', 'Nome da tese', 'Esfera', 'Natureza', 'Filial (CNPJ)', 'Período', 'Título do achado',
      'Valor original (R$)', 'Política de correção', 'Competência âncora', 'Selic acumulada (%)', 'Juros (R$)',
      'Valor corrigido (R$)', 'No totalizador?'].map(h => cS(h, 'h')));
    const linhas1 = [];
    const porTese = {};
    const cat = (window.Conhecimento && Conhecimento.AUDITORIAS) || [];
    const nomeDe = (id, a) => { const d = cat.find(x => x.id === id); return (d && d.nome) || a.titulo || id; };
    for (const a of achados) {
      const id = a._regra || a.tipo || '?';
      const esf = esferaDe(id);
      const pol = politicaDe(a, esf);
      const v = Number(a.valor) || 0;
      let pct = 0, juros = 0, corrigido = v;
      if (pol.aplica && window.Selic) {
        const c = Selic.corrigir(v, pol.per, mesAt);
        pct = c.pct; juros = c.juros; corrigido = c.corrigido;
      }
      const t = (porTese[id] = porTese[id] || { id, nome: nomeDe(id, a), esf, nat: a.natureza || 'risco', n: 0, v: 0, vc: 0 });
      t.n++; t.v += v; t.vc += corrigido;
      linhas1.push(row([
        cS(id), cS(t.nome), cS(esf === 'federal' ? 'Federal' : 'Estadual (ICMS/MG)'), cS(a.natureza || 'risco'),
        cS(a.cnpj_empresa || ''), cS(a.periodo || ''), cS((a.titulo || '').slice(0, 140)),
        cN(v), cS(pol.motivo), cS(pol.aplica ? pol.per : '—'), cN(pct, 'p'), cN(juros), cN(corrigido),
        cS(temasOff.has(id) ? 'NÃO (⏻ curadoria)' : 'sim'),
      ]));
    }
    // ---- aba 2: totais por tese ----
    const cab2 = row(['Tese', 'Nome', 'Esfera', 'Natureza', 'Achados', 'Original (R$)', 'Corrigido (R$)', 'Diferença (R$)']
      .map(h => cS(h, 'h')));
    const linhas2 = Object.values(porTese)
      .sort((x, y) => Math.abs(y.v) - Math.abs(x.v))
      .map(t => row([cS(t.id), cS(t.nome), cS(t.esf === 'federal' ? 'Federal' : 'Estadual'), cS(t.nat),
        cN(t.n, 'i'), cN(t.v), cN(t.vc), cN(t.vc - t.v)]));
    // ---- aba 3: tabela Selic usada ----
    const cab3 = row(['Competência', 'Taxa mensal (%)', 'Origem', `Acumulada até ${mesAt} (%)`].map(h => cS(h, 'h')));
    const linhas3 = [];
    if (window.Selic) {
      const T = Selic.tabela();
      for (const per of Object.keys(T).sort()) {
        const ac = per < mesAt ? Selic.acumuladoPct(per, mesAt).pct : 0;
        linhas3.push(row([cS(per), cN(T[per], 'p'), cS(Selic.ehOverride(per) ? 'ajuste manual' : 'tabela embutida'),
          cN(ac, 'p')]));
      }
    }
    const ws = (nome, cab, linhas) => `<Worksheet ss:Name="${xe(nome)}"><Table>${cab}${linhas.join('')}</Table></Worksheet>`;
    return `<?xml version="1.0"?>
<?mso-application progid="Excel.Sheet"?>
<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">
<Styles>
<Style ss:ID="h"><Font ss:Bold="1" ss:Color="#FFFFFF"/><Interior ss:Color="#16365B" ss:Pattern="Solid"/></Style>
<Style ss:ID="n"><NumberFormat ss:Format="#,##0.00"/></Style>
<Style ss:ID="p"><NumberFormat ss:Format="0.00"/></Style>
<Style ss:ID="i"><NumberFormat ss:Format="0"/></Style>
</Styles>
${ws('Memória de cálculo', cab1, linhas1)}
${ws('Totais por tese', cab2, linhas2)}
${ws('Tabela Selic', cab3, linhas3)}
</Workbook>`;
  }

  function baixar(achados, esferaDe, temasOff, nomeArq) {
    const xml = montarXml(achados, esferaDe, temasOff);
    const blob = new Blob(['\ufeff' + xml], { type: 'application/vnd.ms-excel' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = nomeArq || 'Memoria_Calculo_Auditoria_Selic.xls';
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 300);
  }

  return { montarXml, baixar, _politicaDe: politicaDe };
})();


// ===================== laudo.js =====================
// Laudo de Auditoria Fiscal v3.18.2 — narrativo por tese, no formato dos laudos
// Prime: resumo executivo auto-gerado, quadro-síntese, totalizador clicável,
// subseções numeradas com explicação da tese + maiores achados + base legal,
// e plano de ação derivado dos achados. Tudo editável antes de imprimir.
window.Laudo = (function () {
  const fmt = (v) => 'R$ ' + Number(v || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fmt0 = (v) => 'R$ ' + Math.round(Number(v || 0)).toLocaleString('pt-BR');
  const esc = (s) => String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  const LOGO = '<svg viewBox="0 0 64 64" width="46" height="46"><circle cx="32" cy="32" r="30" fill="#16365B"/>'
    + '<rect x="15" y="36" width="7" height="13" rx="1.5" fill="#fff"/><rect x="26" y="28" width="7" height="21" rx="1.5" fill="#fff"/>'
    + '<rect x="37" y="20" width="7" height="29" rx="1.5" fill="#fff"/>'
    + '<path d="M41 17 L50 8 M50 8 h-8 M50 8 v8" stroke="#FF6B35" stroke-width="4.5" stroke-linecap="round" fill="none"/></svg>';

  function ambito(s) {
    s = String(s || '');
    if (/^MG-|^mg_/.test(s)) return 'estadual';
    if (s === 'A1' || s === 'xml_nao_escriturado') return 'estadual';
    if (/^FED-|^fed_|^A[2-5]$|^icms_base|^reinf|^ecd_/.test(s)) return 'federal';
    if (/^INS-|^ins_/.test(s)) return 'federal';
    return 'estadual';
  }
  function docDe(regraId) {
    const cat = (window.Conhecimento && Conhecimento.AUDITORIAS) || [];
    return cat.find(a => a.id === regraId) || null;
  }
  function rotuloTipo(a) {
    const T = (window.UIAuditorias && window.UIAuditorias.TIPO_ROTULO) || {};
    return T[a.tipo] || (a.titulo || a.tipo || 'Achado');
  }
  const NAT_ROT = { credito: '💰 Oportunidade', risco: '⚠️ Exposição', erro: '🛠️ Erro' };
  const fmtCnpj = (c) => (window.Utils && Utils.formatarCNPJ) ? Utils.formatarCNPJ(c) : c;

  // ---- agrupa achados em TEMAS (uma tese = uma regra), com tudo que o laudo precisa ----
  function temasDe(achados) {
    const M = {};
    for (const a of (achados || [])) {
      const id = a._regra || a.tipo || '?';
      const t = (M[id] = M[id] || { id, nat: null, esfera: ambito(id), v: 0, vc: 0, n: 0,
        filiais: new Set(), periodos: [], achados: [], bl: '', nome: '', doc: docDe(id) });
      const nat = (a.natureza === 'credito' || a.natureza === 'erro') ? a.natureza : 'risco';
      t.nat = t.nat || nat;
      t.v += Number(a.valor) || 0;
      // crédito escritural estadual: valor nominal (RICMS/MG art. 67, § 2º) — sem Selic
      const aplicaSelic = window.Selic && !(nat === 'credito' && t.esfera === 'estadual');
      t.vc += aplicaSelic ? Selic.corrigirAchado(a).corrigido : (Number(a.valor) || 0);
      t.n++;
      if (a.cnpj_empresa) t.filiais.add(a.cnpj_empresa);
      if (a.periodo && a.periodo !== '(consolidado)') t.periodos.push(a.periodo);
      if (!t.bl && a.base_legal) t.bl = a.base_legal;
      if (!t.nome) t.nome = (t.doc && t.doc.nome) || rotuloTipo(a);
      t.achados.push(a);
    }
    const temas = Object.values(M);
    for (const t of temas) {
      t.periodos.sort();
      t.achados.sort((x, y) => Math.abs(Number(y.valor) || 0) - Math.abs(Number(x.valor) || 0));
    }
    temas.sort((x, y) => Math.abs(y.v) - Math.abs(x.v));
    return temas;
  }

  // ---- resumo executivo AUTO-GERADO a partir dos números (editável por cima) ----
  function resumoAuto(temas, tot) {
    if (!temas.length) return 'Sem achados persistidos na última execução. Rode as auditorias e gere o laudo novamente.';
    const cred = temas.filter(t => t.nat === 'credito');
    const risc = temas.filter(t => t.nat !== 'credito');
    const topC = cred.slice(0, 3).map(t => `${t.nome} (${fmt0(t.v)})`).join('; ');
    const topR = risc.slice(0, 3).map(t => `${t.nome} (${fmt0(t.v)})`).join('; ');
    const p = [];
    p.push(`Os trabalhos de auditoria fiscal eletrônica sobre a escrituração do contribuinte identificaram ${cred.length} tese(s) de oportunidade, somando ${fmt0(tot.estadual.credito + tot.federal.credito)}, e ${risc.length} tese(s) de exposição ou erro, somando ${fmt0(tot.estadual.risco + tot.federal.risco + tot.estadual.erro + tot.federal.erro)}.`);
    p.push(`Na esfera estadual (ICMS/MG): oportunidades de ${fmt0(tot.estadual.credito)} contra exposições de ${fmt0(tot.estadual.risco + tot.estadual.erro)}. Na esfera federal: oportunidades de ${fmt0(tot.federal.credito)} contra exposições de ${fmt0(tot.federal.risco + tot.federal.erro)}.`);
    if (topC) p.push(`Principais oportunidades: ${topC}.`);
    if (topR) p.push(`Principais pontos de atenção: ${topR}.`);
    p.push('Recomenda-se tratamento coordenado das frentes (mesma mesa de decisão), com assessoria jurídica tributária nos temas sensíveis, antes de qualquer providência isolada perante o Fisco.');
    return p.join(' ');
  }

  // ---- quadro-síntese (top temas com natureza e valor) ----
  function quadroSinteseHtml(temas) {
    if (!temas.length) return '';
    const linhas = temas.slice(0, 12).map(t => `
      <tr><td>${esc(t.nome)} <span class="esf-mini ${t.esfera === 'federal' ? 'fed' : 'est'}">${t.esfera === 'federal' ? 'FED' : 'ICMS'}</span></td>
      <td>${NAT_ROT[t.nat] || t.nat}</td>
      <td class="num" style="color:${t.nat === 'credito' ? '#1a7f4b' : '#c0392b'};font-weight:700">${fmt(t.v)}</td>
      <td class="num" style="color:${t.nat === 'credito' ? '#1a7f4b' : '#c0392b'}">${t.vc > t.v + 0.005 ? fmt(t.vc) : '—'}</td></tr>`).join('');
    return `<h2>2. Quadro-síntese</h2>
      <table><thead><tr><th>Tese</th><th>Natureza</th><th style="text-align:right">Valor original</th><th style="text-align:right">💹 Corrigido (Selic)</th></tr></thead><tbody>${linhas}</tbody></table>
      <p style="font-size:11px;color:#5a6a78">Correção pela Selic acumulada até o mês de emissão (regra RFB: soma das taxas mensais do mês seguinte à competência + 1% no mês atual). <strong>Créditos estaduais não recebem correção</strong>: o aproveitamento escritural de ICMS é pelo valor nominal (RICMS/MG, art. 67, § 2º do Dec. 43.080/2002, regra mantida no Dec. 48.589/2023; STF exige lei estadual autorizativa, inexistente em MG). Consolidados/sem competência mensal também não. A memória de cálculo completa está disponível em Excel na aba Auditorias do programa.</p>`;
  }

  // ---- subseção numerada de uma tese (o coração do laudo narrativo) ----
  function subsecaoTemaHtml(t, num) {
    const pMin = t.periodos[0], pMax = t.periodos[t.periodos.length - 1];
    const perTxt = t.periodos.length ? (pMin === pMax ? pMin : `${pMin} a ${pMax}`) : 'consolidado';
    const explic = (t.doc && (t.doc.regra || t.doc.fundamento)) || (t.achados[0] && t.achados[0].descricao) || '';
    const fund = (t.doc && t.doc.fundamento && t.doc.regra) ? `<p class="fund"><strong>Fundamento:</strong> ${esc(t.doc.fundamento)}</p>` : '';
    const podeSelic = !(t.nat === 'credito' && t.esfera === 'estadual');
    const top = t.achados.slice(0, 5).map(a => {
      const c = (window.Selic && podeSelic) ? Selic.corrigirAchado(a) : { corrigido: Number(a.valor) || 0, aplicada: false };
      return `
      <tr><td>${esc(a.periodo || '—')}</td><td class="mono">${esc(fmtCnpj(a.cnpj_empresa || ''))}</td>
      <td>${esc((a.titulo || '').slice(0, 90))}</td>
      <td class="num">${fmt(Number(a.valor) || 0)}</td>
      <td class="num">${(c.aplicada && c.corrigido > (Number(a.valor) || 0) + 0.005) ? fmt(c.corrigido) : '—'}</td></tr>`;
    }).join('');
    const mais = t.n > 5 ? `<p class="mais">… e mais ${t.n - 5} achado(s) desta tese, disponíveis na aba Detalhe do programa.</p>` : '';
    return `
      <h3>${num} ${esc(t.nome)} <span class="nat-badge ${t.nat}">${NAT_ROT[t.nat]}</span></h3>
      <p>${esc(explic)}</p>
      ${fund}
      <p class="stats"><strong>${fmt(t.v)}</strong>${t.vc > t.v + 0.005 ? ` · corrigido pela Selic: <strong>${fmt(t.vc)}</strong>` : ''} em ${t.n} achado(s) · ${t.filiais.size || 1} filial(is) · períodos: ${esc(perTxt)}.</p>
      <table><thead><tr><th>Período</th><th>Filial</th><th>Achado</th><th style="text-align:right">Valor</th><th style="text-align:right">💹 Corrigido</th></tr></thead><tbody>${top}</tbody></table>
      ${mais}
      ${t.bl ? `<div class="bl"><strong>Base legal:</strong> ${esc(t.bl)}</div>` : ''}`;
  }

  function secaoEsferaHtml(temas, esfera, numSec, titulo) {
    const doEsf = temas.filter(t => t.esfera === esfera);
    if (!doEsf.length) return `<h2 id="sec-${esfera === 'federal' ? 'fed' : 'est'}">${numSec}. ${titulo}</h2><p class="vazio">Nenhum achado nesta esfera na última execução das auditorias.</p>`;
    const riscos = doEsf.filter(t => t.nat !== 'credito');
    const creds = doEsf.filter(t => t.nat === 'credito');
    let sub = 0;
    const bloco = (lista, rot, cls) => !lista.length ? '' :
      `<h3 class="parte ${cls}">${rot}</h3>` + lista.map(t => subsecaoTemaHtml(t, `${numSec}.${++sub}`)).join('');
    return `<h2 id="sec-${esfera === 'federal' ? 'fed' : 'est'}">${numSec}. ${titulo}</h2>`
      + bloco(riscos, '⚠️ Exposições e erros', 'sub-r')
      + bloco(creds, '💰 Oportunidades', 'sub-c');
  }

  // ---- plano de ação derivado dos achados ----
  function planoHtml(temas, cnpj) {
    const prov = (t) => t.nat === 'credito'
      ? 'Levantar a documentação de suporte e executar a captura (retificação da escrituração e/ou PER/DCOMP), observando a prescrição quinquenal.'
      : (t.nat === 'erro'
        ? 'Depurar a causa na escrituração e corrigir (retificações/notas complementares), evitando reincidência nas competências seguintes.'
        : 'Dimensionar com o jurídico tributário e definir o tratamento (regularização espontânea × provisão × defesa) antes de providência isolada perante o Fisco.');
    const linhas = temas.map((t, i) => `
      <tr><td>${i + 1}</td><td><strong>${esc(t.nome)}</strong> (${fmt0(t.v)})<div class="det">${prov(t)}</div></td>
      <td>${t.esfera === 'federal' ? 'Federal' : 'Estadual'}</td>
      <td>${t.nat === 'credito' ? 'Captura' : 'Tratamento'}</td></tr>`).join('');
    const obs = localStorage.getItem('revisor_laudo_plano_' + cnpj) || 'Observações do auditor: prioridades, responsáveis e prazos acordados com o cliente. Clique para editar.';
    return `${temas.length ? `<table><thead><tr><th>#</th><th>Tese e providência</th><th>Esfera</th><th>Frente</th></tr></thead><tbody>${linhas}</tbody></table>` : ''}
      <div class="edit" contenteditable="true" id="ed-plano">${esc(obs)}</div>`;
  }

  function montarHtml(ativo, achados, opts) {
    opts = opts || {};
    const cnpj = ativo.cnpj;
    const vig = (window.RegimeVigencia && RegimeVigencia.obter(cnpj)) || { tipo: '', inicio: '', fim: '' };
    const fl = (window.RegimeVigencia && RegimeVigencia.flags(cnpj)) || {};
    const temas = temasDe(achados);
    const tot = { estadual: { credito: 0, creditoC: 0, risco: 0, riscoC: 0, erro: 0, n: 0 },
                  federal: { credito: 0, creditoC: 0, risco: 0, riscoC: 0, erro: 0, n: 0 } };
    for (const t of temas) {
      tot[t.esfera][t.nat] += t.v;
      if (t.nat === 'credito') tot[t.esfera].creditoC += t.vc;
      else if (t.nat === 'risco') tot[t.esfera].riscoC += t.vc;
      tot[t.esfera].n += t.n;
    }
    const hoje = new Date().toLocaleDateString('pt-BR');
    const resumo = localStorage.getItem('revisor_laudo_resumo_' + cnpj) || resumoAuto(temas, tot);
    const conclusao = localStorage.getItem('revisor_laudo_conclusao_' + cnpj)
      || 'Este laudo é documento técnico de trabalho, elaborado a partir da escrituração fiscal eletrônica do contribuinte, para subsidiar a decisão do cliente e de sua assessoria jurídica. Os valores refletem a última execução das auditorias e as premissas descritas em cada tese.';
    const regimeTxt = vig.tipo ? (esc(fl.nome || vig.tipo) + ' — vigência ' + esc(vig.inicio || 'início aberto') + ' a ' + esc(vig.fim || 'aberto')) : 'Sem regime especial configurado (apuração normal)';
    const totalCred = tot.estadual.credito + tot.federal.credito;
    const totalRisco = tot.estadual.risco + tot.federal.risco;
    const totalErro = tot.estadual.erro + tot.federal.erro;

    const linhaTot = (rot, e, alvoId) => `
      <tr class="tot-click" onclick="var s=document.getElementById('${alvoId}'); if(s&&s.scrollIntoView) s.scrollIntoView({behavior:'smooth',block:'start'})" title="Clique para ir até a seção">
        <td>${rot} <span class="seta">↓</span></td>
        <td class="num" style="color:#1a7f4b;font-weight:700">${fmt(tot[e].credito)}</td>
        <td class="num" style="color:#1a7f4b">${fmt(tot[e].creditoC)}</td>
        <td class="num" style="color:#c0392b">${fmt(tot[e].risco)}</td>
        <td class="num" style="color:#c0392b">${fmt(tot[e].riscoC)}</td>
        <td class="num" style="color:#b26a00">${tot[e].erro ? fmt(tot[e].erro) : '—'}</td>
        <td class="num">${tot[e].n}</td></tr>`;

    return '<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><title>Laudo de Auditoria Fiscal — ' + esc(ativo.razao_social || cnpj) + '</title><style>'
      + '@page{size:A4;margin:14mm}*{box-sizing:border-box}body{font-family:Georgia,"Times New Roman",serif;color:#1d2b36;margin:0;background:#f2f4f6}'
      + '.folha{max-width:860px;margin:0 auto;background:#fff;padding:34px 44px 40px;box-shadow:0 2px 14px rgba(0,0,0,.12)}'
      + '.topo{display:flex;align-items:center;gap:14px;border-bottom:4px solid #FF6B35;padding-bottom:14px}'
      + '.marca{font-family:Arial,Helvetica,sans-serif}.marca .p1{font-size:11px;letter-spacing:2px;color:#5a6a78}.marca .p2{font-size:26px;font-weight:800;color:#16365B;letter-spacing:1px;line-height:1}'
      + 'h1{font-family:Arial;color:#16365B;font-size:21px;margin:22px 0 2px}.subt{color:#5a6a78;font-size:13px;margin:0 0 16px}'
      + '.dados{display:grid;grid-template-columns:1fr 1fr;gap:6px 22px;background:#f5f8fb;border:1px solid #dfe7ee;border-left:4px solid #16365B;border-radius:8px;padding:12px 16px;font-size:13px}'
      + '.dados b{color:#16365B}'
      + 'h2{font-family:Arial;color:#16365B;font-size:15px;border-bottom:2px solid #e3eaf0;padding-bottom:5px;margin:26px 0 10px}'
      + 'h3{font-family:Arial;font-size:13.5px;color:#16365B;margin:18px 0 6px}'
      + 'h3.parte{font-size:13px;border-left:4px solid #FF6B35;padding-left:9px;margin-top:22px}.sub-c{color:#1a7f4b}.sub-r{color:#c0392b}'
      + '.nat-badge{font-family:Arial;font-size:10px;font-weight:700;padding:2px 9px;border-radius:20px;vertical-align:middle;margin-left:6px}'
      + '.nat-badge.credito{background:#e7f5ec;color:#1a7f4b}.nat-badge.risco{background:#fdecea;color:#c0392b}.nat-badge.erro{background:#fdf3e7;color:#b26a00}'
      + '.esf-mini{font-family:Arial;font-size:9.5px;font-weight:700;padding:1px 7px;border-radius:14px;margin-left:5px}'
      + '.esf-mini.est{background:#e8f0fa;color:#1f4e78}.esf-mini.fed{background:#f1e9fa;color:#6b3fa0}'
      + 'p,li,td{font-size:13px;line-height:1.6}.edit{border:1px dashed #c9d6e0;border-radius:8px;padding:10px 13px;white-space:pre-wrap}'
      + '.fund{font-size:12px;color:#5a6a78}.stats{font-size:12.3px}.mais{font-size:11.5px;color:#5a6a78;font-style:italic;margin:4px 0}'
      + 'table{width:100%;border-collapse:collapse;font-size:12.2px;margin:6px 0}th{font-family:Arial;background:#16365B;color:#fff;text-align:left;padding:7px 9px;font-size:11.3px}'
      + 'td{border-bottom:1px solid #e7edf2;padding:6px 9px;vertical-align:top}.num{text-align:right;font-family:Arial;white-space:nowrap}.mono{font-family:monospace;font-size:11px}'
      + '.det{font-size:11.5px;color:#5a6a78;margin-top:3px}.bl{font-size:11px;color:#5a6a78;background:#f5f8fb;border-left:3px solid #FF6B35;padding:5px 9px;margin:6px 0 2px;border-radius:3px}'
      + '.vazio{color:#5a6a78;font-style:italic}.tot-click{cursor:pointer}.tot-click:hover td{background:#f5f8fb}.tot-click .seta{color:#98a5b0;font-size:11px}'
      + '.rodape{margin-top:34px;border-top:2px solid #e3eaf0;padding-top:12px;font-size:12px;color:#5a6a78;display:flex;justify-content:space-between;align-items:flex-end}'
      + '.assin{text-align:center}.assin .linha{border-top:1px solid #1d2b36;width:250px;margin:34px auto 4px}'
      + '.toolbar{position:fixed;top:12px;right:14px;display:flex;gap:8px;font-family:Arial}.toolbar button{background:#FF6B35;color:#fff;border:none;border-radius:8px;padding:10px 16px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.25)}'
      + '.toolbar .dica{background:#16365B;color:#fff;border-radius:8px;padding:10px 12px;font-size:11.5px}'
      + '@media print{.toolbar{display:none}body{background:#fff}.folha{box-shadow:none;max-width:none;padding:0}h3{page-break-after:avoid}}'
      + '</style></head><body>'
      + '<div class="toolbar"><span class="dica">✏️ Os textos pontilhados são editáveis</span><button onclick="window.print()">🖨️ Imprimir / Salvar PDF</button></div>'
      + '<div class="folha">'
      + '<div class="topo">' + LOGO + '<div class="marca"><div class="p1">CONSULTORIA FISCAL E TRABALHISTA</div><div class="p2">PRIME</div></div></div>'
      + '<h1>LAUDO DE AUDITORIA FISCAL</h1><p class="subt">Exposições e oportunidades — esferas estadual e federal · Emitido em ' + hoje + '</p>'
      + '<div class="dados"><div><b>Contribuinte:</b> ' + esc(ativo.razao_social || '-') + '</div><div><b>CNPJ:</b> ' + esc(fmtCnpj(cnpj)) + '</div>'
      + '<div><b>UF:</b> ' + esc(ativo.uf || 'MG') + '</div><div><b>Regime especial:</b> ' + regimeTxt + '</div></div>'
      + '<h2>1. Resumo executivo</h2><div class="edit" contenteditable="true" id="ed-resumo">' + esc(resumo) + '</div>'
      + quadroSinteseHtml(temas)
      + '<h2>3. Totalizador — estadual × federal</h2>'
      + '<table><thead><tr><th>Esfera</th><th style="text-align:right">💰 Oportunidades</th><th style="text-align:right">💹 corrigido</th><th style="text-align:right">⚠️ Riscos</th><th style="text-align:right">💹 corrigido</th><th style="text-align:right">🛠️ Erros</th><th style="text-align:right">Achados</th></tr></thead><tbody>'
      + linhaTot('Estadual — ICMS', 'estadual', 'sec-est')
      + linhaTot('Federal', 'federal', 'sec-fed')
      + `<tr style="font-weight:800;background:#eaf0f6"><td>TOTAL</td>
          <td class="num" style="color:#1a7f4b">${fmt(totalCred)}</td>
          <td class="num" style="color:#1a7f4b">${fmt(tot.estadual.creditoC + tot.federal.creditoC)}</td>
          <td class="num" style="color:#c0392b">${fmt(totalRisco)}</td>
          <td class="num" style="color:#c0392b">${fmt(tot.estadual.riscoC + tot.federal.riscoC)}</td>
          <td class="num" style="color:#b26a00">${totalErro ? fmt(totalErro) : '—'}</td>
          <td class="num">${(tot.estadual.n + tot.federal.n)}</td></tr>`
      + '</tbody></table>'
      + '<p style="font-size:11.5px;color:#5a6a78">ICMS: o aproveitamento é por inscrição estadual (cada filial usa o próprio crédito). Tributos federais consolidam no CNPJ raiz. Clique nas linhas para ir direto à seção.</p>'
      + ((achados || []).length === 0
        ? '<p style="background:#fdf3e7;border-left:4px solid #FF6B35;border-radius:6px;padding:10px 14px;font-size:12.5px"><b>Sem achados persistidos.</b> Rode as auditorias (aba Auditorias → Rodar) antes de gerar o laudo — o totalizador acima ficará zerado até lá.</p>'
        : '')
      + ((opts.excluidos && opts.excluidos.length)
        ? '<p style="font-size:11.5px;color:#b26a00">⏻ Temas excluídos do laudo por curadoria do auditor (na aba Resumo): ' + opts.excluidos.map(esc).join(', ') + '.</p>'
        : '')
      + secaoEsferaHtml(temas, 'estadual', 4, 'Esfera estadual (ICMS/MG)')
      + secaoEsferaHtml(temas, 'federal', 5, 'Esfera federal')
      + '<h2>6. Plano de ação</h2>' + planoHtml(temas, cnpj)
      + '<h2>7. Metodologia e fontes</h2>'
      + '<p>Trabalhos executados sobre a escrituração fiscal digital do contribuinte (EFD ICMS/IPI e EFD-Contribuições), a ECD/ECF, o espelho integral das NF-e (XML) e as tabelas oficiais (PMPF SEFAZ/MG e texto do regime especial, quando configurado). As verificações incluem reconciliação da apuração e sub-apuração, recálculo da ST contra o PMPF, balanço FIFO dos insumos em poder de terceiros com aging de 180 dias, condições do regime especial (produção × limite, meta de arrecadação × IPCA, conteúdo de importação), subvenção × e-Lalur (M300/N630) e apuração de IPI (E520). Cada tese traz a própria base legal na respectiva seção.</p>'
      + '<h2>8. Conclusão</h2><div class="edit" contenteditable="true" id="ed-conclusao">' + esc(conclusao) + '</div>'
      + '<div class="rodape"><div>Prime Consultoria · contato@conectaon.net · (31) 99391-2890<br>Documento de trabalho técnico; não substitui parecer jurídico para contencioso.</div>'
      + '<div class="assin"><div class="linha"></div><b>Prime Consultoria</b><br>Auditoria Fiscal</div></div>'
      + '</div><script>'
      + 'for (const par of [["ed-resumo","revisor_laudo_resumo_"],["ed-conclusao","revisor_laudo_conclusao_"],["ed-plano","revisor_laudo_plano_"]]) {'
      + '  const el=document.getElementById(par[0]);'
      + '  if(el) el.addEventListener("blur",function(){try{localStorage.setItem(par[1]+"' + cnpj + '",this.innerText)}catch(e){}});'
      + '}'
      + '<\/script></body></html>';
  }

  async function gerar(ativo) {
    // 1) cnpjs do grupo (fallback: só o ativo)
    let cnpjs = [ativo.cnpj];
    try {
      if (window.Clientes && Clientes.cnpjsAtivos) {
        const c = await Clientes.cnpjsAtivos();
        if (Array.isArray(c) && c.length) cnpjs = c;
      }
    } catch (e) { console.warn('laudo: cnpjsAtivos indisponível, usando só o ativo', e); }
    // 2) achados persistidos (getByIndexCnpjs(store, cnpjs) — assinatura de 2 argumentos)
    let achados = [];
    try {
      if (DB.getByIndexCnpjs) achados = (await DB.getByIndexCnpjs('rev_achados', cnpjs)) || [];
    } catch (e) { console.error('laudo: getByIndexCnpjs falhou', e); }
    if (!achados.length) {
      for (const c of cnpjs) {
        try { const r = (await DB.getByIndex('rev_achados', 'cnpj_empresa', c)) || []; for (const x of r) achados.push(x); }
        catch (e) { /* segue */ }
      }
    }
    // 3) curadoria do auditor: temas desativados no Resumo saem do laudo
    const raiz = String(ativo.cnpj || (achados[0] && achados[0].cnpj_empresa) || '').slice(0, 8);
    let off = new Set();
    try { off = new Set(JSON.parse(localStorage.getItem('revisor_aud_temas_off_' + raiz) || '[]')); } catch (e) {}
    const curados = achados.filter(a => !off.has(a._regra));
    const html = montarHtml(ativo, curados, { excluidos: [...off], totalBruto: achados.length });
    const w = window.open('', '_blank');
    if (!w) { alert('O navegador bloqueou a janela do laudo. Libere pop-ups para este site.'); return; }
    w.document.open(); w.document.write(html); w.document.close();
  }
  return { gerar, _montar: montarHtml };
})();

// ===================== ui_dossie.js =====================
// =====================================================================
// Revisor Fiscal Prime — ui_dossie.js
// Tela do dossiê: gera o relatório completo do cliente ativo e oferece
// exportação em Markdown (para colar em análise), JSON e Excel.
// =====================================================================

const UIDossie = (function () {
  'use strict';

  let _markdown = '';
  let _dados = null;

  function versaoAtual() {
    const m = (document.title || '').match(/v[\d.]+/);
    return m ? m[0] : '?';
  }

  async function render(container) {
    const ativo = Clientes.ativo();
    container.innerHTML = `
      <div class="etapa-header">
        <h2>Dossiê completo</h2>
        <p class="etapa-desc">
          Consolida tudo do cliente ativo — cadeia de custódia, cobertura de fontes,
          panorama, resultado do cotejo XML×SPED, achados, De/Para e log — num relatório
          único. Use para gerar laudos, apresentações ou para análise externa.
        </p>
      </div>

      ${!ativo ? `
        <div class="card"><p>Selecione um cliente para gerar o dossiê.</p></div>
      ` : `
        <div class="card">
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
            <button class="btn-primary" id="btn-gerar">Gerar dossiê</button>
            <button class="btn-secondary" id="btn-copiar" disabled>📋 Copiar Markdown</button>
            <button class="btn-secondary" id="btn-md" disabled>⬇ Baixar .md</button>
            <button class="btn-secondary" id="btn-json" disabled>⬇ Baixar .json</button>
            <button class="btn-secondary" id="btn-xlsx" disabled>⬇ Baixar .xlsx</button>
            <button class="btn-primary" id="btn-laudo" style="background:#FF6B35">🖨️ Laudo do Cliente (PDF)</button>
          </div>
          <p style="font-size:12px;color:#5a6a6a;margin-top:8px" id="dossie-hint">
            Cliente: <strong>${Utils.escapeHtml(ativo.razao_social || ativo.cnpj)}</strong>.
            O Markdown é o formato ideal para colar numa conversa de análise.
          </p>
        </div>

        <div class="card" id="preview-card" style="display:none">
          <h3 style="margin-top:0">Prévia</h3>
          <div id="dossie-resumo" style="margin-bottom:12px"></div>
          <textarea id="dossie-texto" readonly
            style="width:100%;height:380px;font-family:ui-monospace,Menlo,monospace;font-size:12px;
                   border:1px solid #d4dde4;border-radius:8px;padding:10px;white-space:pre;overflow:auto"></textarea>
        </div>
      `}
    `;

    if (!ativo) return;

    container.querySelector('#btn-gerar').onclick = () => gerar(container, ativo);
    container.querySelector('#btn-copiar').onclick = () => copiar(container);
    container.querySelector('#btn-md').onclick = () => baixar(_markdown, `dossie_${ativo.cnpj}.md`, 'text/markdown');
    container.querySelector('#btn-json').onclick = () => baixar(Dossie.gerarJSON(_dados), `dossie_${ativo.cnpj}.json`, 'application/json');
    container.querySelector('#btn-xlsx').onclick = () => baixarExcel(ativo);
    container.querySelector('#btn-laudo').onclick = () => Laudo.gerar(ativo);
  }

  async function gerar(container, ativo) {
    const btn = container.querySelector('#btn-gerar');
    btn.disabled = true; btn.textContent = 'Gerando…';
    try {
      _dados = await Dossie.coletar(await Clientes.cnpjsAtivos(), { versao: versaoAtual() });
      _markdown = Dossie.gerarMarkdown(_dados);

      container.querySelector('#preview-card').style.display = 'block';
      container.querySelector('#dossie-texto').value = _markdown;
      container.querySelector('#dossie-resumo').innerHTML = montarResumo(_dados);

      ['btn-copiar', 'btn-md', 'btn-json', 'btn-xlsx'].forEach(id => {
        container.querySelector('#' + id).disabled = false;
      });
    } catch (e) {
      console.error('Erro ao gerar dossiê', e);
      alert('Erro ao gerar dossiê: ' + e.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Gerar dossiê';
    }
  }

  function montarResumo(d) {
    const t = d.panorama.totais;
    const ne = d.achados.notas_nao_escrituradas.length;
    const cx = d.achados.c170_sem_xml.length;
    const card = (rotulo, valor, cor) =>
      `<div style="flex:1;min-width:120px;background:${cor};border-radius:8px;padding:10px 12px">
         <div style="font-size:22px;font-weight:700;color:#1f3343">${valor}</div>
         <div style="font-size:12px;color:#46586a">${rotulo}</div>
       </div>`;
    return `
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        ${card('Períodos', d.meta.periodos.length, '#eef3f8')}
        ${card('Documentos', t.documentos, '#eef3f8')}
        ${card('Itens', t.itens, '#eef3f8')}
        ${card('Itens XML', t.xml_itens, '#eef3f8')}
        ${card('Notas não escrituradas', ne, ne ? '#fcecec' : '#eef6f0')}
        ${card('C170 sem XML', cx, cx ? '#fdf6ec' : '#eef6f0')}
      </div>`;
  }

  async function copiar(container) {
    try {
      await navigator.clipboard.writeText(_markdown);
      const btn = container.querySelector('#btn-copiar');
      const orig = btn.textContent;
      btn.textContent = '✓ Copiado!';
      setTimeout(() => { btn.textContent = orig; }, 1800);
    } catch (e) {
      // fallback: seleciona o textarea
      const ta = container.querySelector('#dossie-texto');
      ta.focus(); ta.select();
      alert('Não consegui copiar automaticamente. O texto foi selecionado — use Ctrl/Cmd+C.');
    }
  }

  function baixar(conteudo, nome, mime) {
    const blob = new Blob([conteudo], { type: mime + ';charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = nome;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function baixarExcel(ativo) {
    try {
      const wb = Dossie.gerarExcel(_dados);
      XLSX.writeFile(wb, `dossie_${ativo.cnpj}.xlsx`);
    } catch (e) {
      alert('Erro ao gerar Excel: ' + e.message);
    }
  }

  return { render };
})();

window.UIDossie = UIDossie;

        <div id="bk-status-manual" style="margin-top:.7rem;font-size:.9rem"></div>
      </div>

      <div class="card">
        <h3>Clientes no banco (${clientes.length})</h3>
        ${clientes.length === 0 ? '<p style="color:var(--texto-fraco,#667)">Nenhum cliente ainda.</p>' : `
        <table class="tabela">
          <thead><tr><th>CNPJ</th><th>Razão social</th><th style="text-align:right">Exportar</th></tr></thead>
          <tbody>
            ${clientes.map(c => `
              <tr>
                <td class="mono">${Utils.escapeHtml(c.cnpj)}</td>
                <td>${Utils.escapeHtml(c.razao_social || '—')}</td>
                <td style="text-align:right"><button class="btn btn-mini" data-exp="${Utils.escapeHtml(c.cnpj)}">.json</button></td>
              </tr>`).join('')}
          </tbody>
        </table>`}
      </div>
    `;

    const statusPastaEl = container.querySelector('#bk-status-pasta');
    const progPastaEl = container.querySelector('#bk-prog-pasta');
    const statusManualEl = container.querySelector('#bk-status-manual');

    function barra(el, pct, txt) {
      if (!el) return;
      el.innerHTML = `
        <div style="background:var(--borda,#e0e0e0);border-radius:6px;overflow:hidden;height:8px">
          <div style="width:${pct}%;height:100%;background:var(--accent,#3E5F7A);transition:width .2s"></div>
        </div>
        <div style="font-size:.85rem;color:var(--texto-fraco,#667);margin-top:.3rem">${Utils.escapeHtml(txt || '')}</div>`;
    }

    // ---- definir pasta ----
    const btnDef = container.querySelector('#bk-definir');
    if (btnDef) btnDef.onclick = async () => {
      try {
        await Armazenamento.definirPastaTrabalho();
        msg(statusPastaEl, `Pasta definida: ${Armazenamento.nomePasta()}. Salvando os clientes atuais…`, 'ok');
        const r = await Armazenamento.salvarTodos((p, t) => barra(progPastaEl, p, t));
        msg(statusPastaEl, r.ok ? `Pasta definida e ${r.clientes} cliente(s) salvos.` : 'Pasta definida.', 'ok');
        render(container);
      } catch (e) {
        if (e.name === 'AbortError') return; // usuário cancelou
        msg(statusPastaEl, 'Erro: ' + e.message, 'erro');
      }
    };

    // ---- reconectar ----
    const btnRec = container.querySelector('#bk-reconectar');
    if (btnRec) btnRec.onclick = async () => {
      try {
        const h = await Armazenamento.reconectarPasta();
        if (h) { msg(statusPastaEl, 'Pasta reconectada.', 'ok'); render(container); }
        else msg(statusPastaEl, 'Não foi possível reconectar (permissão negada).', 'erro');
      } catch (e) { msg(statusPastaEl, 'Erro: ' + e.message, 'erro'); }
    };

    // ---- salvar todos ----
    const btnSalv = container.querySelector('#bk-salvar-todos');
    if (btnSalv) btnSalv.onclick = async () => {
      if (!Armazenamento.temPasta()) {
        const h = await Armazenamento.reconectarPasta().catch(() => null);
        if (!h) { msg(statusPastaEl, 'Defina ou reconecte a pasta primeiro.', 'erro'); return; }
      }
      try {
        const r = await Armazenamento.salvarTodos((p, t) => barra(progPastaEl, p, t));
        msg(statusPastaEl, r.ok ? `${r.clientes} cliente(s) salvos na pasta.` : `Falhou: ${r.motivo}`, r.ok ? 'ok' : 'erro');
      } catch (e) { msg(statusPastaEl, 'Erro: ' + e.message, 'erro'); }
    };

    // ---- carregar da pasta ----
    const btnCar = container.querySelector('#bk-carregar-pasta');
    if (btnCar) btnCar.onclick = async () => {
      // pede permissão DENTRO do clique (requestPermission exige gesto do usuário)
      const h = await Armazenamento.reconectarPasta().catch(() => null);
      if (!h) { msg(statusPastaEl, 'Defina ou reconecte a pasta primeiro (a permissão precisa ser concedida no clique).', 'erro'); return; }
      try {
        const res = await Armazenamento.carregarTodosDaPasta((p, t) => barra(progPastaEl, p, t));
        const ok = res.filter(r => r.ok);
        const falhas = res.filter(r => !r.ok);
        const comQuota = ok.filter(r => r.quota);
        let txt = `Carregados ${ok.length} cliente(s)` + (falhas.length ? `, ${falhas.length} com erro` : '') + '.';
        if (comQuota.length) {
          txt += ` Atenção: ${comQuota.length} cliente(s) não couberam inteiros no navegador (quota estourou em ${comQuota[0].anoFalha || '?'}). `
            + `Use "Carregar anos selecionados" para abrir um ano por vez — todos os anos continuam salvos no disco.`;
        }
        msg(statusPastaEl, txt, comQuota.length ? 'aviso' : (ok.length ? 'ok' : 'erro'));
        await atualizarSeletorGlobal();
        render(container);
      } catch (e) { msg(statusPastaEl, 'Erro: ' + e.message, 'erro'); }
    };

    // ---- diagnóstico ----
    const btnDiag = container.querySelector('#bk-diag');
    const diagSaida = container.querySelector('#bk-diag-saida');
    if (btnDiag && diagSaida) btnDiag.onclick = async () => {
      const L = []; const add = (k, v) => L.push(`${k}: ${v}`);
      diagSaida.value = 'rodando…';
      try {
        add('Suporte a pasta (File System Access)', Armazenamento.suportado());
        let cfg = null;
        try { cfg = await DB.get('rev_config', 'pasta_trabalho'); } catch (e) { add('ERRO ao ler config da pasta', e.message); }
        add('Handle da pasta salvo no app', !!(cfg && cfg.handle));
        if (cfg && cfg.handle) {
          add('Nome da pasta salva', cfg.nome || cfg.handle.name || '?');
          try { add('Permissão atual (query)', await cfg.handle.queryPermission({ mode: 'readwrite' })); }
          catch (e) { add('ERRO queryPermission', e.message); }
        }
        const at = Clientes.ativo();
        add('Cliente ativo', at ? `${at.cnpj} — ${at.razao_social || ''}` : 'NENHUM (selecione um cliente)');
        if (at) {
          try {
            const anos = await Armazenamento.listarAnosNaPasta(at.cnpj);
            add('Anos salvos no disco (pasta do cliente)', anos.length ? anos.join(', ') : 'nenhum / pasta não acessível');
          } catch (e) { add('ERRO ao listar anos no disco', e.message); }
        }
        add('--- BANCO ATUAL (no navegador) ---', '');
        for (const st of ['rev_itens', 'rev_apuracao_icms', 'rev_xml_itens', 'rev_documentos', 'rev_arquivos']) {
          try {
            const regs = at ? await DB.getByIndex(st, 'cnpj_empresa', at.cnpj) : await DB.getAll(st);
            const pers = [...new Set(regs.map(r => r.periodo).filter(Boolean))].sort();
            const span = pers.length ? `${pers[0]}..${pers[pers.length - 1]} (${pers.length} comp.)` : '—';
            add(`  ${st}`, `${regs.length} reg · ${span}`);
          } catch (e) { add(`  ${st}`, 'ERRO: ' + e.message); }
        }
        try {
          const est = await DB.estimarArmazenamento();
          add('Quota do navegador', `${(est.usage / 1048576).toFixed(0)} / ${(est.quota / 1048576).toFixed(0)} MB (${est.pct}%)`);
        } catch (e) { add('Quota', 'erro: ' + e.message); }
      } catch (e) { L.push('ERRO GERAL: ' + (e && (e.stack || e.message) || e)); }
      diagSaida.value = L.join('\n');
    };

    // ---- inspetor de disco (read-only) ----
    const btnInsp = container.querySelector('#bk-inspecionar');
    const inspSaida = container.querySelector('#bk-inspecionar-saida');
    if (btnInsp) btnInsp.onclick = async () => {
      if (!ativo) { inspSaida.value = 'Selecione um cliente no topo primeiro.'; return; }
      inspSaida.value = 'Lendo arquivos do disco…';
      const DADO = ['rev_itens', 'rev_xml_itens', 'rev_documentos', 'rev_apuracao_icms', 'rev_apuracao_pis_cofins'];
      try {
        const r = await Armazenamento.inspecionarDisco(ativo.cnpj);
        if (r.erro) { inspSaida.value = 'ERRO: ' + r.erro; return; }
        const L = [`Pasta do cliente ${ativo.cnpj}:`, ''];
        const anos = Object.keys(r.anos || {}).sort();
        if (!anos.length) L.push('(nenhuma parte de ano encontrada)');
        for (const ano of anos) {
          const a = r.anos[ano];
          const temDado = DADO.some(s => a.stores[s] > 0);
          L.push(`📅 ${ano} — ${a.kb} KB — ${temDado ? '✅ tem dado de transação' : '⚠️ SEM dado de transação (só log/cadastro)'}`);
          for (const k of Object.keys(a.stores).sort()) {
            const dst = DADO.includes(k) ? ' ←' : '';
            L.push(`     ${k}: ${a.stores[k]}${dst}`);
          }
          if (a.origem && Object.keys(a.origem).length) {
            L.push('       └ efd_staging por origem:');
            for (const [o, n] of Object.entries(a.origem)) L.push(`            ${o}: ${n}`);
          }
          L.push('');
        }
        if (r.cliente) {
          L.push(`📄 cliente.json — ${r.cliente.kb} KB — (cadastro)`);
          for (const k of Object.keys(r.cliente.stores).sort()) L.push(`     ${k}: ${r.cliente.stores[k]}`);
          if (r.cliente.rev_arquivos_tipo && Object.keys(r.cliente.rev_arquivos_tipo).length) {
            L.push('       └ rev_arquivos por tipo:');
            for (const [o, n] of Object.entries(r.cliente.rev_arquivos_tipo)) L.push(`            ${o}: ${n}`);
          }
          L.push('');
        }
        L.push('Legenda: linhas com ← são os dados pesados que a auditoria precisa.');
        L.push('Cada ano agora é vários arquivos (um por tipo). Se aparecem rev_itens/rev_xml_itens > 0, o dado está salvo.');
        inspSaida.value = L.join('\n');
      } catch (e) { inspSaida.value = 'ERRO: ' + (e && (e.stack || e.message) || e); }
    };

    const btnLimpaXml = container.querySelector('#bk-limpar-xml');
    const limpaXmlStatus = container.querySelector('#bk-limpar-xml-status');

    // botão do card "Reprocessar XMLs" — mesma operação, mensagem guiada
    const btnReproc = container.querySelector('#bk-reproc-xml');
    const reprocStatus = container.querySelector('#bk-reproc-xml-status');
    if (btnReproc) btnReproc.onclick = async () => {
      if (!ativo) { msg(reprocStatus, 'Selecione um cliente primeiro.', 'erro'); return; }
      if (!confirm(`Liberar a reimportação dos XMLs de ${ativo.razao_social || ativo.cnpj}?\n\nRemove só o registro de custódia dos XMLs (não apaga EFD, ECF nem os itens já importados). Em seguida, reimporte os MESMOS arquivos XML na aba Importar — eles serão atualizados no lugar com os campos novos.`)) return;
      msg(reprocStatus, 'Liberando…', '');
      try {
        const r = await Armazenamento.limparCustodiaXml(ativo.cnpj);
        if (r.erro) { msg(reprocStatus, 'Erro: ' + r.erro, 'erro'); return; }
        msg(reprocStatus, `✅ ${r.removidos} registro(s) de custódia removidos${r.salvou ? ' (disco atualizado)' : ''}. Agora vá em Importar e suba os mesmos XMLs.`, 'ok');
      } catch (e) { msg(reprocStatus, 'Erro: ' + e.message, 'erro'); }
    };

    if (btnLimpaXml) btnLimpaXml.onclick = async () => {
      if (!ativo) { msg(limpaXmlStatus, 'Selecione um cliente primeiro.', 'erro'); return; }
      if (!confirm('Remover a custódia órfã de XML deste cliente?\n\nIsso apaga só o registro de custódia dos XMLs (rev_arquivos), para destravar a reimportação. NÃO apaga EFD, ECF nem os dados por ano. Confirmar?')) return;
      msg(limpaXmlStatus, 'Limpando…', '');
      try {
        const r = await Armazenamento.limparCustodiaXml(ativo.cnpj);
        if (r.erro) { msg(limpaXmlStatus, 'Erro: ' + r.erro, 'erro'); return; }
        msg(limpaXmlStatus, `Removidos ${r.removidos} registros de custódia de XML${r.salvou ? ' e disco atualizado' : ''}. Agora pode reimportar os XMLs.`, 'ok');
      } catch (e) { msg(limpaXmlStatus, 'Erro: ' + e.message, 'erro'); }
    };

    // ---- carga por ano ----
    const statusAnosEl = container.querySelector('#bk-status-anos');
    const btnMarcar = container.querySelector('#bk-marcar-todos');
    if (btnMarcar) btnMarcar.onclick = () => {
      container.querySelectorAll('.bk-ano').forEach(c => { c.checked = true; });
    };
    const btnCargaAnos = container.querySelector('#bk-carregar-anos');
    if (btnCargaAnos && ativo) btnCargaAnos.onclick = async () => {
      const anos = Array.from(container.querySelectorAll('.bk-ano:checked')).map(c => c.value);
      if (anos.length === 0) { msg(statusAnosEl, 'Marque pelo menos um ano.', 'erro'); return; }
      msg(statusAnosEl, `Carregando ${anos.join(', ')}… (salvando o atual antes)`, '');
      try {
        const r = await Armazenamento.carregarAnos(ativo.cnpj, anos);
        msg(statusAnosEl, `Carregados os anos ${r.anos.join(', ')} — ${r.total.toLocaleString('pt-BR')} registros no banco. Os demais anos seguem salvos na pasta.`, 'ok');
        await atualizarSeletorGlobal();
        render(container);
      } catch (e) { msg(statusAnosEl, 'Erro: ' + e.message, 'erro'); }
    };

    // ---- exportar cliente ativo ----
    const btnExp = container.querySelector('#bk-exportar');
    if (btnExp && ativo) btnExp.onclick = async () => {
      try {
        const r = await Armazenamento.exportarClienteDownload(ativo.cnpj);
        msg(statusManualEl, `Exportado: ${r.arquivo}`, 'ok');
      } catch (e) { msg(statusManualEl, 'Erro: ' + e.message, 'erro'); }
    };

    // ---- exportar por linha da tabela ----
    container.querySelectorAll('[data-exp]').forEach(b => {
      b.onclick = async () => {
        try {
          const r = await Armazenamento.exportarClienteDownload(b.dataset.exp);
          msg(statusManualEl, `Exportado: ${r.arquivo}`, 'ok');
        } catch (e) { msg(statusManualEl, 'Erro: ' + e.message, 'erro'); }
      };
    });

    // ---- importar de arquivo ----
    const inpImp = container.querySelector('#bk-importar');
    if (inpImp) inpImp.onchange = async () => {
      const arquivos = Array.from(inpImp.files || []);
      if (!arquivos.length) return;
      let okN = 0, regs = 0;
      for (const f of arquivos) {
        try { const r = await Armazenamento.importarClienteArquivo(f); okN++; regs += r.registros; }
        catch (e) { msg(statusManualEl, `Erro em ${f.name}: ${e.message}`, 'erro'); }
      }
      if (okN) {
        msg(statusManualEl, `Importado(s) ${okN} arquivo(s) — ${regs.toLocaleString('pt-BR')} registros restaurados.`, 'ok');
        await atualizarSeletorGlobal();
        render(container);
      }
      inpImp.value = '';
    };
  }

  // atualiza o seletor de clientes do topo, se exposto
  async function atualizarSeletorGlobal() {
    try { if (window.App && window.App.atualizarSeletor) await window.App.atualizarSeletor(); }
    catch (e) {}
  }

  return { render };
})();

window.UIBackup = UIBackup;


// ===================== tabelas_mg.js =====================
// =====================================================================
// Revisor Fiscal Prime — tabelas_mg.js
// DICIONÁRIOS TABELARES de Minas Gerais (editáveis, igual ao layouts_sped.js).
// Centraliza o que varia por norma/portaria e o que classifica produtos:
//   - NCM de cerveja e produtos supérfluos (FEM 2%)
//   - alíquota interna e FEM
//   - classificação de insumo por TIPO_ITEM do SPED (dá crédito?)
//   - conjuntos de CFOP nomeados (ST, exportação, transferência, importação…)
//   - tabela marca/produto → PMPF por período  (VOCÊ PREENCHE das Portarias SUTRI)
//   - códigos de ajuste E111 relevantes em MG
//
// As auditorias estaduais (auditorias_mg.js) consultam só este módulo para os
// dados tabelares. Quando faltar dado (ex.: PMPF não cadastrado), a auditoria
// reporta "requer dicionário" em vez de chutar.
// =====================================================================

const TabelasMG = (function () {
  'use strict';

  // ------------------------------------------------------------------
  // ALÍQUOTAS
  // ------------------------------------------------------------------
  const ALIQ_INTERNA = 18;     // % alíquota interna padrão MG (mercadoria geral)
  const ALIQ_CERVEJA = 23;     // % alíquota interna de cerveja/chope alcoólico em MG (RICMS Anexo I)
  const FEM_PCT = 2;           // % adicional FEM sobre supérfluos (cerveja) — POR CIMA dos 23%, recolhido em DAE/ajuste
  const ALIQ_INTERESTADUAL_SUL_SUDESTE = 12;
  const ALIQ_INTERESTADUAL_OUTRAS = 7;
  const ALIQ_IMPORTADO = 4;

  // Vigência do adicional FEM (2%) em MG:
  //  - até 31/12/2022: ativo (Decreto 46.927/2015)
  //  - ano de 2023: SUSPENSO (não exigido)
  //  - 01/01/2024 a 31/12/2026: reinstituído (Lei 24.471/2023, Decreto 48.736/2023)
  // Só incide em operação destinada a CONSUMIDOR FINAL; na ST é recolhido como FEM antecipado.
  function femAtivoNoPeriodo(periodo) {
    const ano = String(periodo || '').slice(0, 4);
    if (!ano) return false;
    if (ano === '2023') return false;             // suspenso o ano inteiro de 2023
    if (ano >= '2024' && ano <= '2026') return true;  // reinstituído 2024-2026
    if (ano <= '2022') return true;               // vigência original (dados começam em 2021)
    return false;                                 // 2027+ expira, salvo prorrogação
  }

  // Alíquota interna conforme a mercadoria (cerveja = 23%, demais = 18%).
  function aliqInternaPara(ncm) { return ehCerveja(ncm) ? ALIQ_CERVEJA : ALIQ_INTERNA; }

  // ------------------------------------------------------------------
  // NCM — cerveja e supérfluos sujeitos ao FEM
  // ------------------------------------------------------------------
  // Cerveja de malte e chope = 2203.00.00 ; cerveja sem álcool = 2202.91.00
  const NCM_CERVEJA = ['22030000', '2203.00.00', '2203', '22029100', '2202.91.00'];
  // Supérfluos com FEM em MG (cerveja, refrigerante, água, energéticos, fumo, etc.).
  // Para a cervejaria o que importa é a cerveja; os demais ficam como referência.
  const NCM_SUPERFLUO_FEM = [
    '2203',      // cerveja/chope
    '220291',    // cerveja sem álcool
    '2202',      // refrigerante/água aromatizada
    '2106907',   // preparações p/ refrigerante
    '2402',      // cigarros
    '2403',      // fumo
  ];

  const soNum = (s) => String(s || '').replace(/\D/g, '');

  function ehCerveja(ncm) {
    const n = soNum(ncm);
    return n.startsWith('2203') || n.startsWith('220291');
  }
  function ehSuperfluoFEM(ncm) {
    const n = soNum(ncm);
    return NCM_SUPERFLUO_FEM.some(p => n.startsWith(soNum(p)));
  }

  // ------------------------------------------------------------------
  // CLASSIFICAÇÃO DE INSUMO pelo TIPO_ITEM do registro 0200 do SPED
  //   00 Revenda · 01 MP · 02 Embalagem · 03 Em processo · 04 Acabado
  //   05 Subproduto · 06 Prod. intermediário · 07 Uso e consumo
  //   08 Ativo imobilizado · 09 Serviços · 10 Outros insumos · 99 Outras
  // ------------------------------------------------------------------
  const TIPO_ITEM_ROTULO = {
    '00': 'Mercadoria para revenda', '01': 'Matéria-prima', '02': 'Embalagem',
    '03': 'Produto em processo', '04': 'Produto acabado', '05': 'Subproduto',
    '06': 'Produto intermediário', '07': 'Uso e consumo', '08': 'Ativo imobilizado',
    '09': 'Serviços', '10': 'Outros insumos', '99': 'Outras',
  };
  const TIPOS_INSUMO = ['01', '02', '06', '10'];   // dão direito a crédito (consumidos no processo)
  const TIPO_USO_CONSUMO = '07';                   // NÃO dá crédito (regra atual)
  const TIPO_ATIVO = '08';                         // crédito via CIAP (1/48)
  const TIPO_REVENDA = '00';

  const norm2 = (t) => String(t == null ? '' : t).padStart(2, '0').slice(-2);
  function ehInsumoCreditavel(tipoItem) { return TIPOS_INSUMO.includes(norm2(tipoItem)); }
  function ehUsoConsumo(tipoItem) { return norm2(tipoItem) === TIPO_USO_CONSUMO; }
  function ehAtivo(tipoItem) { return norm2(tipoItem) === TIPO_ATIVO; }
  function ehRevenda(tipoItem) { return norm2(tipoItem) === TIPO_REVENDA; }
  function tipoItemRotulo(tipoItem) { return TIPO_ITEM_ROTULO[norm2(tipoItem)] || ('tipo ' + tipoItem); }

  // Insumos típicos de cervejaria, por palavra-chave (reforço quando o TIPO_ITEM
  // estiver mal classificado). NÃO é a fonte primária — o TIPO_ITEM é.
  const PALAVRAS_INSUMO_CERVEJA = [
    'malte', 'lupulo', 'lúpulo', 'levedura', 'fermento', 'gelatina', 'co2', 'dioxido de carbono',
    'dióxido de carbono', 'garrafa', 'lata', 'tampa', 'tampinha', 'rotulo', 'rótulo', 'rolha',
    'caixa', 'cevada', 'trigo', 'gritz', 'enzima', 'terra diatomacea', 'kieselguhr', 'finings',
  ];
  const PALAVRAS_USO_CONSUMO = [
    'detergente', 'soda', 'cip', 'sanitizante', 'lubrificante', 'graxa', 'epi', 'luva',
    'limpeza', 'peca', 'peça', 'reposicao', 'reposição', 'manutencao', 'manutenção',
  ];
  const PALAVRAS_ENERGIA = ['energia eletrica', 'energia elétrica', 'energia'];
  const PALAVRAS_EMBALAGEM_TRANSPORTE = ['stretch', 'strech', 'filme', 'pallet', 'palete', 'fita', 'cinta'];

  function temPalavra(desc, lista) {
    const d = String(desc || '').toLowerCase();
    return lista.some(p => d.includes(p));
  }

  // ------------------------------------------------------------------
  // CFOP — conjuntos nomeados
  // ------------------------------------------------------------------
  const CFOP = {
    // saída com ST (substituto)
    saida_st: ['5401', '6401', '5403', '6403', '5405', '6404'],
    // venda a consumidor final / varejo no estabelecimento
    venda_consumidor: ['5101', '5102', '5103', '5104', '5405', '5656', '5667'],
    // exportação
    exportacao: ['7101', '7102', '7105', '7106', '7127', '7949'],
    // transferência entre estabelecimentos do mesmo titular
    transferencia: ['5151', '5152', '6151', '6152', '5409', '6409'],
    // importação direta
    importacao: ['3101', '3102', '3126', '3127', '3551', '3556'],
    // baixa de estoque / perda / brinde / consumo
    baixa_estoque: ['5927'],
    consumo_interno: ['5949', '5927', '5910', '5911'],
    // entrada de insumo para industrialização

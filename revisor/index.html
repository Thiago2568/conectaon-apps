    // persiste o handle (é clonável pelo IndexedDB) para reconectar depois
    try { await DB.put('rev_config', { id_config: 'pasta_trabalho', handle, nome: handle.name }); } catch (e) {}
    return handle;
  }

  /** Recupera o handle salvo (NÃO re-permissiona — isso exige garantirPermissao). */
  async function restaurarPastaSalva() {
    try {
      const cfg = await DB.get('rev_config', 'pasta_trabalho');
      if (cfg && cfg.handle) { _pasta = cfg.handle; return cfg; }
    } catch (e) {}
    return null;
  }

  /** Garante permissão de leitura/escrita no handle (pode exigir clique). */
  async function garantirPermissao(handle, modo) {
    handle = handle || _pasta;
    if (!handle) return false;
    const opts = { mode: modo || 'readwrite' };
    if ((await handle.queryPermission(opts)) === 'granted') return true;
    if ((await handle.requestPermission(opts)) === 'granted') return true;
    return false;
  }

  /** Reconecta a pasta salva pedindo permissão (use a partir de um clique). */
  async function reconectarPasta() {
    // se o handle já está em memória (carregado por estadoPasta no render), NÃO refaz o DB.get
    // antes do requestPermission — isso preserva o gesto do usuário (exigência do File System Access).
    if (!_pasta) { await restaurarPastaSalva(); }
    if (!_pasta) return null;
    const ok = await garantirPermissao(_pasta, 'readwrite');
    return ok ? _pasta : null;
  }

  /**
   * Estado real da pasta de trabalho: carrega o handle salvo (SEM pedir permissão) e checa se a
   * permissão está de fato concedida. 'conectada' = permissão ativa, não apenas handle em memória.
   * Corrige o caso em que o handle é restaurado mas a permissão expirou (recarregar a página).
   */
  async function estadoPasta() {
    if (!_pasta) {
      try { const cfg = await DB.get('rev_config', 'pasta_trabalho'); if (cfg && cfg.handle) _pasta = cfg.handle; } catch (e) {}
    }
    if (!_pasta) return { temPasta: false, conectada: false, nome: null };
    let conectada = false;
    try { conectada = (await _pasta.queryPermission({ mode: 'readwrite' })) === 'granted'; } catch (e) {}
    return { temPasta: true, conectada, nome: _pasta.name };
  }

  function temPasta() { return !!_pasta; }
  function nomePasta() { return _pasta ? _pasta.name : null; }

  // ------------------------------------------------------------------
  // Nome seguro de pasta/arquivo
  // ------------------------------------------------------------------
  function sanitizar(s) {
    return String(s || '')
      .replace(/[\/\\:*?"<>|]/g, ' ')   // caracteres proibidos em nomes
      .replace(/\s+/g, ' ')
      .trim()
      .slice(0, 80);
  }

  async function pastaDoCliente(cnpj, criar) {
    if (!_pasta) throw new Error('Defina a pasta de trabalho primeiro.');
    const cliente = await DB.get('rev_clientes', cnpj);
    const razao = sanitizar((cliente && cliente.razao_social) || '');
    const nome = razao ? `${cnpj} - ${razao}` : `${cnpj}`;
    return _pasta.getDirectoryHandle(nome, { create: !!criar });
  }

  // ------------------------------------------------------------------
  // Salvar / carregar cliente em arquivo (na pasta de trabalho)
  // ------------------------------------------------------------------
  async function escreverJSON(dir, nome, obj) {
    const txt = JSON.stringify(obj);
    const fh = await dir.getFileHandle(nome, { create: true });
    const w = await fh.createWritable();
    await w.write(txt);
    await w.close();
    return txt.length;
  }

  /**
   * Grava o cliente na pasta organizado por ANO:
   *   cliente.json  → cadastro + cadastros globais (De/Para acumulado)
   *   ano_AAAA__<store>.json → um arquivo por store daquele ano
   *   ano_AAAA__efd_staging__<origem>.json → efd_staging dividido por tipo de SPED
   * Cada arquivo é independente: salvar só toca nos arquivos dos dados presentes no banco,
   * nunca apaga os outros tipos. Permite carregar só o que precisa (cota não estoura).
   */
  // nome de uma parte de um ano
  function nomeParte(ano, store, origem) {
    if (store === 'efd_staging' && origem) return `ano_${ano}__efd_staging__${origem}.json`;
    return `ano_${ano}__${store}.json`;
  }
  // detecta a que ano/store pertence um arquivo (novo formato por partes ou legado)
  function parseParte(nome) {
    let m = /^ano_(\d{4})__efd_staging__(.+)\.json$/i.exec(nome);
    if (m) return { ano: m[1], store: 'efd_staging', origem: m[2] };
    m = /^ano_(\d{4})__(.+)\.json$/i.exec(nome);
    if (m) return { ano: m[1], store: m[2] };
    m = /^ano_(\d{4})\.json$/i.exec(nome);
    if (m) return { ano: m[1], store: null, legado: true };
    return null;
  }
  // divide o porAno do dump em partes graváveis [{nome, stores}]
  function dividirPartes(porAno) {
    const partes = [];
    for (const [ano, stores] of Object.entries(porAno)) {
      for (const [store, regs] of Object.entries(stores)) {
        if (!Array.isArray(regs) || regs.length === 0) continue;
        if (store === 'efd_staging') {
          const porOrigem = {};
          for (const r of regs) { const o = r.origem || 'sem_origem'; (porOrigem[o] = porOrigem[o] || []).push(r); }
          for (const [o, rr] of Object.entries(porOrigem)) partes.push({ ano, nome: nomeParte(ano, 'efd_staging', o), stores: { efd_staging: rr } });
        } else {
          partes.push({ ano, nome: nomeParte(ano, store), stores: { [store]: regs } });
        }
      }
    }
    return partes;
  }

  async function salvarCliente(cnpj) {
    if (!_pasta) return { ok: false, motivo: 'sem-pasta' };
    if (!(await garantirPermissao(_pasta, 'readwrite'))) return { ok: false, motivo: 'sem-permissao' };
    const dir = await pastaDoCliente(cnpj, true);
    const { global, porAno, versao_db } = await DB.dumpClientePorAno(cnpj);
    let bytes = 0;
    bytes += await escreverJSON(dir, 'cliente.json', { _formato: 'revisor_cliente', _versao_db: versao_db, _cnpj: cnpj, cliente: global.cliente, stores: global.stores });
    // grava uma parte por (store) e, no caso do efd_staging, uma por (origem). Só grava o que tem
    // registro no banco; não apaga nenhum arquivo. Assim um banco parcial nunca derruba outro tipo.
    const partes = dividirPartes(porAno);
    const anosSet = new Set();
    for (const p of partes) {
      bytes += await escreverJSON(dir, p.nome, { _formato: 'revisor_parte', _versao_db: versao_db, _cnpj: cnpj, _ano: p.ano, stores: p.stores });
      anosSet.add(p.ano);
    }
    const anos = [...anosSet].sort();
    return { ok: true, pasta: dir.name, arquivo: anos.length ? `cliente.json + ${partes.length} parte(s) em ${anos.length} ano(s)` : 'cliente.json', anos, partes: partes.length, bytes };
  }

  /**
   * Inspeciona (somente leitura) os arquivos da pasta do cliente, agrupando as partes por ano e
   * somando a contagem de registros por store. NÃO escreve nada. Serve para verificar se o dado
   * de transação ainda está salvo no disco.
   */
  async function inspecionarDisco(cnpj) {
    if (!_pasta) return { erro: 'sem-pasta' };
    if (!(await garantirPermissao(_pasta, 'read'))) return { erro: 'sem-permissao' };
    let dir;
    try { dir = await pastaDoCliente(cnpj, false); } catch (e) { return { erro: 'pasta do cliente inacessível: ' + e.message }; }
    const anos = {};        // ano -> { kb, stores:{store:count}, origem:{} }
    let clienteInfo = null;
    let outros = 0;
    for await (const [nome, h] of dir.entries()) {
      if (h.kind !== 'file' || !/\.json$/i.test(nome)) continue;
      let j, kb;
      try { const f = await h.getFile(); kb = Math.round(f.size / 1024); j = JSON.parse(await f.text()); }
      catch (e) { continue; }
      const stores = j.stores || {};
      if (nome === 'cliente.json') {
        const counts = {};
        for (const k of Object.keys(stores)) counts[k] = Array.isArray(stores[k]) ? stores[k].length : '?';
        const tipo = {};
        if (Array.isArray(stores.rev_arquivos)) for (const r of stores.rev_arquivos) { const k = r.origem || r.tipo || '(sem tipo)'; tipo[k] = (tipo[k] || 0) + 1; }
        clienteInfo = { kb, stores: counts, rev_arquivos_tipo: tipo };
        continue;
      }
      const p = parseParte(nome);
      if (!p) { outros++; continue; }
      const a = (anos[p.ano] = anos[p.ano] || { kb: 0, stores: {}, origem: {} });
      a.kb += kb;
      for (const [k, v] of Object.entries(stores)) {
        const n = Array.isArray(v) ? v.length : 0;
        a.stores[k] = (a.stores[k] || 0) + n;
        if (k === 'efd_staging') { const o = p.origem || (p.legado ? '(legado)' : '?'); a.origem[o] = (a.origem[o] || 0) + n; }
      }
    }
    return { anos, cliente: clienteInfo, outros };
  }

  /**
   * Remove a custódia órfã de XML (registros rev_arquivos tipo xml_nfe) do banco E do disco
   * (reescrevendo cliente.json). Necessário quando o log dos XMLs sobreviveu mas o dado
   * (rev_xml_itens) se perdeu: sem isso, a dedup por SHA bloqueia a reimportação dos mesmos XMLs.
   * NÃO toca em nenhum dado de transação nem nos arquivos por ano.
   */
  async function limparCustodiaXml(cnpj) {
    // funciona com ou sem pasta de trabalho: sem pasta, limpa só o banco
    // (o objetivo é liberar a REIMPORTAÇÃO dos XMLs — o dedup por SHA olha
    // a custódia; removida, os mesmos arquivos reprocessam e os itens são
    // sobrescritos pelo mesmo id, ganhando os campos novos do parser)
    const temPastaOk = _pasta && (await garantirPermissao(_pasta, 'readwrite').catch(() => false));
    let regs = [];
    try { regs = await DB.getByIndex('rev_arquivos', 'cnpj_empresa', cnpj); } catch (e) { return { erro: 'falha lendo rev_arquivos: ' + e.message }; }
    const xmls = regs.filter(a => a.tipo === 'xml_nfe');
    let removidos = 0;
    for (const a of xmls) { try { await DB.deleteOne('rev_arquivos', a.id_arquivo); removidos++; } catch (e) {} }
    // reescreve o disco (cliente.json deixa de listar os xml_nfe; anos não mudam)
    let salvou = false;
    if (temPastaOk) {
      try { const r = await salvarCliente(cnpj); salvou = !!(r && r.ok); } catch (e) {}
    }
    return { removidos, total_xml: xmls.length, salvou, sem_pasta: !temPastaOk };
  }


  async function listarAnosNaPasta(cnpj) {
    if (!_pasta) return [];
    if (!(await garantirPermissao(_pasta, 'read'))) return [];
    let dir;
    try { dir = await pastaDoCliente(cnpj, false); } catch (e) { return []; }
    const anos = new Set();
    for await (const [nome, h] of dir.entries()) {
      if (h.kind !== 'file') continue;
      const p = parseParte(nome);
      if (p) anos.add(p.ano);
    }
    return [...anos].sort();
  }

  /**
   * Lê o registro de importações (rev_arquivos) de TODOS os anos salvos na pasta do cliente.
   * No modo ano-a-ano o banco operacional só tem o ano carregado; o disco tem todos. Usado pelo
   * inventário para enxergar a cobertura completa. Lê um arquivo por vez (memória limitada).
   */
  async function arquivosNaPasta(cnpj) {
    if (!_pasta) return [];
    if (!(await garantirPermissao(_pasta, 'read'))) return [];
    let dir;
    try { dir = await pastaDoCliente(cnpj, false); } catch (e) { return []; }
    const handles = [];
    for await (const [nome, h] of dir.entries()) {
      if (h.kind !== 'file') continue;
      // só arquivos que podem conter rev_arquivos: cliente.json, partes rev_arquivos, ou legado
      if (nome === 'cliente.json' || /__rev_arquivos\.json$/i.test(nome) || /^ano_\d{4}\.json$/i.test(nome)) handles.push(h);
    }
    const out = [];
    for (const h of handles) {
      try {
        const j = JSON.parse(await (await h.getFile()).text());
        const arr = (j.stores && j.stores.rev_arquivos) || [];
        for (const a of arr) if (a && a.periodo) out.push({ periodo: a.periodo, tipo: a.tipo, origem: a.origem });
      } catch (e) { /* ilegível: ignora */ }
    }
    return out;
  }

  /**
   * CARGA SELETIVA: descarrega o cliente do banco operacional e carrega só
   * os anos pedidos (mais o cliente.json com cadastro + De/Para, sempre).
   * Antes de descarregar, salva o estado atual no disco (não perde nada).
   */
  async function carregarAnos(cnpj, anos, opts) {
    if (!_pasta) throw new Error('Defina a pasta de trabalho primeiro.');
    if (!(await garantirPermissao(_pasta, 'readwrite'))) throw new Error('Sem permissão na pasta.');
    const dir = await pastaDoCliente(cnpj, false);
    if (!opts || opts.salvarAntes !== false) { try { await salvarCliente(cnpj); } catch (e) {} }
    await DB.limparCliente(cnpj);
    const alvo = new Set((anos || []).map(String));
    let total = 0;
    try {
      const fhC = await dir.getFileHandle('cliente.json');
      const cj = JSON.parse(await (await fhC.getFile()).text());
      total += await DB.restaurarStores(cj);
    } catch (e) {}
    // coleta as partes (e arquivos legado) dos anos pedidos
    const handles = [];
    for await (const [nome, h] of dir.entries()) {
      if (h.kind !== 'file') continue;
      const p = parseParte(nome);
      if (p && alvo.has(p.ano)) handles.push(h);
    }
    handles.sort((a, b) => a.name.localeCompare(b.name));
    for (const h of handles) {
      try { const aj = JSON.parse(await (await h.getFile()).text()); total += await DB.restaurarStores(aj); }
      catch (e) { if (e && (e.name === 'QuotaExceededError' || /quota/i.test(e.message || ''))) throw e; }
    }
    return { total, anos };
  }

  /** Salva todos os clientes existentes no banco. */
  async function salvarTodos(onProgress) {
    const prog = onProgress || (() => {});
    if (!_pasta) return { ok: false, motivo: 'sem-pasta' };
    if (!(await garantirPermissao(_pasta, 'readwrite'))) return { ok: false, motivo: 'sem-permissao' };
    const clientes = await DB.getAll('rev_clientes');
    let n = 0;
    for (const c of clientes) {
      prog(Math.round((n / Math.max(clientes.length, 1)) * 100), `Salvando ${c.razao_social || c.cnpj}…`);
      await salvarCliente(c.cnpj);
      n++;
    }
    prog(100, 'Concluído.');
    return { ok: true, clientes: n };
  }

  /** Restaura um cliente de sua subpasta. Aceita formato por-ano (cliente.json
   *  + ano_*.json) e o formato antigo de arquivo único (revisor_*.json). */
  async function carregarClienteDeDir(dirHandle) {
    let temNovo = false, antigo = null;
    const partesH = [];     // partes por ano (novo formato) e arquivos de ano legado
    for await (const [nome, h] of dirHandle.entries()) {
      if (h.kind !== 'file') continue;
      if (nome === 'cliente.json') { temNovo = true; continue; }
      const p = parseParte(nome);
      if (p) { partesH.push(h); continue; }
      if (/^revisor_.*\.json$/i.test(nome)) antigo = h;
    }
    if (temNovo || partesH.length) {
      let total = 0, cnpj = null, partesOk = 0; let quota = false; let parteFalha = null;
      try {
        const fhC = await dirHandle.getFileHandle('cliente.json');
        const cj = JSON.parse(await (await fhC.getFile()).text());
        cnpj = cj._cnpj; total += await DB.restaurarStores(cj);
      } catch (e) {}
      // carrega parte a parte; se a cota estourar, para e avisa (não corrompe o resto)
      partesH.sort((a, b) => a.name.localeCompare(b.name));
      for (const h of partesH) {
        try {
          const aj = JSON.parse(await (await h.getFile()).text());
          if (!cnpj && aj._cnpj) cnpj = aj._cnpj;
          total += await DB.restaurarStores(aj);
          partesOk++;
        } catch (e) {
          if (e && (e.name === 'QuotaExceededError' || /quota/i.test(e.message || ''))) { quota = true; parteFalha = h.name; break; }
          throw e;
        }
      }
      return { cnpj, registros: total, anos: partesOk, total_anos: partesH.length, quota, anoFalha: parteFalha };
    }
    if (antigo) {
      const dump = JSON.parse(await (await antigo.getFile()).text());
      const total = await DB.restaurarCliente(dump);
      return { cnpj: dump._cnpj, registros: total };
    }
    throw new Error(`Nenhum arquivo de banco em "${dirHandle.name}".`);
  }

  /** Varre a pasta de trabalho e restaura TODOS os clientes encontrados. */
  async function carregarTodosDaPasta(onProgress) {
    const prog = onProgress || (() => {});
    if (!_pasta) throw new Error('Defina a pasta de trabalho primeiro.');
    if (!(await garantirPermissao(_pasta, 'read'))) throw new Error('Sem permissão de leitura na pasta.');
    const dirs = [];
    for await (const [nome, h] of _pasta.entries()) {
      if (h.kind === 'directory') dirs.push(h);
    }
    const resultados = [];
    let n = 0;
    for (const d of dirs) {
      prog(Math.round((n / Math.max(dirs.length, 1)) * 100), `Carregando ${d.name}…`);
      try {
        const r = await carregarClienteDeDir(d);
        resultados.push({ pasta: d.name, ...r, ok: true });
      } catch (e) {
        resultados.push({ pasta: d.name, ok: false, erro: e.message });
      }
      n++;
    }
    prog(100, 'Concluído.');
    return resultados;
  }

  // ------------------------------------------------------------------
  // Fallback manual: exportar/importar .json (download/upload)
  // Funciona em QUALQUER navegador — backup avulso e confiável.
  // ------------------------------------------------------------------
  async function exportarClienteDownload(cnpj) {
    const dump = await DB.dumpCliente(cnpj);
    const cliente = dump.cliente || {};
    const razao = sanitizar(cliente.razao_social || '');
    const nomeArq = `revisor_${cnpj}${razao ? '_' + razao.replace(/\s+/g, '_') : ''}.json`;
    baixar(JSON.stringify(dump), nomeArq);
    return { ok: true, arquivo: nomeArq };
  }

  /**
   * Serializa o dump como ARRAY de pedaços de string (JSON válido ao concatenar),
   * sem NUNCA criar a string única gigante — evita o limite de tamanho de string do
   * V8 ("Invalid string length", ~512MB) em bancos grandes. O Blob junta os pedaços
   * em bytes. Mantém o mesmo formato do dump (reimportável por DB.restaurarCliente).
   */
  async function dumpParaPartes(dump) {
    const partes = [];
    const stores = dump.stores || {};
    const meta = {};
    for (const k of Object.keys(dump)) if (k !== 'stores') meta[k] = dump[k];
    let cab = JSON.stringify(meta);            // cabeçalho (cliente + flags), sempre pequeno
    cab = cab.slice(0, -1);                     // remove o "}" final pra continuar o objeto
    partes.push(cab + (Object.keys(meta).length ? ',' : '') + '"stores":{');
    const nomes = Object.keys(stores);
    let desde = 0;                              // respiro: solta o event loop a cada 50k registros
    for (let si = 0; si < nomes.length; si++) {
      const nome = nomes[si];
      partes.push(JSON.stringify(nome) + ':[');
      const arr = stores[nome] || [];
      for (let i = 0; i < arr.length; i++) {
        partes.push((i ? ',' : '') + JSON.stringify(arr[i]));
        if (++desde >= 50000) { desde = 0; await new Promise(r => setTimeout(r, 0)); }
      }
      partes.push(']' + (si < nomes.length - 1 ? ',' : ''));
    }
    partes.push('}}');                          // fecha "stores" e o objeto raiz
    return partes;
  }

  /**
   * Pacote de auditoria: dump COMPLETO de dados-linha (todas as stores do
   * cliente), porém ENXUTO — sem a custódia (rev_arquivos, dezenas de milhares
   * de hashes) e sem o log. Mantém o _formato do banco, então pode ser
   * reimportado normalmente pelo próprio app (DB.restaurarCliente) e também
   * carregado fora dele para rodar as auditorias sobre o dado real.
   */
  /**
   * Dump de GRUPO: junta os dumps de várias filiais num pacote só. Os registros
   * de cada store já carregam cnpj_empresa, então o merge é uma concatenação —
   * reconstruível por filial em qualquer ponta. `clientes` guarda o cadastro de
   * cada filial (o campo `cliente` continua com a primeira, por compatibilidade
   * com leitores antigos).
   */
  async function dumpGrupo(cnpjs) {
    const lista = Array.isArray(cnpjs) ? cnpjs : [cnpjs];
    if (lista.length === 1) return DB.dumpCliente(lista[0]);
    const raiz = Utils.raizCNPJ(lista[0]);
    const out = {
      _formato: 'revisor_fiscal_prime_db',
      _versao_db: DB.DB_VERSION,
      _cnpj: raiz,
      _grupo: true,
      _filiais: lista.slice(),
      _exportado_em: new Date().toISOString(),
      cliente: null,
      clientes: [],
      stores: {},
    };
    for (const c of lista) {
      const d = await DB.dumpCliente(c);
      if (d.cliente) out.clientes.push(d.cliente);
      if (!out.cliente && d.cliente) out.cliente = d.cliente;   // compat: primeira filial
      for (const [nome, regs] of Object.entries(d.stores || {})) {
        if (!Array.isArray(regs) || !regs.length) continue;
        const arr = (out.stores[nome] = out.stores[nome] || []);
        for (const r of regs) arr.push(r);   // loop: spread estoura a pilha com stores grandes
      }
    }
    return out;
  }

  async function exportarPacoteAuditoria(cnpj) {
    const lista = Array.isArray(cnpj) ? cnpj : [cnpj];
    const dump = await dumpGrupo(lista);
    // remove o que só serve pra custódia/trilha e incha o arquivo
    for (const lixo of ['rev_arquivos', 'rev_log']) {
      if (dump.stores) delete dump.stores[lixo];
    }
    dump._pacote = 'auditoria';
    let linhas = 0;
    for (const regs of Object.values(dump.stores || {})) linhas += (regs && regs.length) || 0;
    const partes = await dumpParaPartes(dump);
    let bytes = 0; for (const p of partes) bytes += p.length;   // estimativa (sem montar a string gigante)
    const mb = (bytes / (1024 * 1024)).toFixed(1);
    const cliente = dump.cliente || {};
    const razao = sanitizar(cliente.razao_social || '');
    const idNome = lista.length > 1 ? `grupo_${Utils.raizCNPJ(lista[0])}_${lista.length}filiais` : lista[0];
    const nomeArq = `auditoria_${idNome}${razao ? '_' + razao.replace(/\s+/g, '_') : ''}.json`;
    baixar(partes, nomeArq);
    return { ok: true, arquivo: nomeArq, linhas, mb };
  }

  /**
   * Igual ao pacote de auditoria, mas QUEBRADO em vários arquivos pequenos que
   * cabem no limite de upload do chat. Os pedaços (de dumpParaPartes, sempre no
   * boundary de um registro) são agrupados em blocos de até `alvoMB` MB, medindo
   * bytes UTF-8. Concatenar os arquivos NA ORDEM do nome (parte01, parte02, …)
   * reconstrói EXATAMENTE o mesmo JSON do pacote único — basta um `cat`. Sem
   * compressão de propósito: nenhum modo de falha novo.
   */
  async function exportarPacoteAuditoriaPartes(cnpj, alvoMB) {
    const lista = Array.isArray(cnpj) ? cnpj : [cnpj];
    const dump = await dumpGrupo(lista);
    for (const lixo of ['rev_arquivos', 'rev_log']) { if (dump.stores) delete dump.stores[lixo]; }
    dump._pacote = 'auditoria';
    let linhas = 0;
    for (const regs of Object.values(dump.stores || {})) linhas += (regs && regs.length) || 0;
    const partes = await dumpParaPartes(dump);
    const alvo = Math.max(1, (alvoMB || 24)) * 1024 * 1024;
    const enc = new TextEncoder();
    const blocos = []; let atual = []; let tam = 0; let cont = 0;
    for (const p of partes) {
      const b = enc.encode(p).length;
      if (tam + b > alvo && atual.length) { blocos.push(atual); atual = []; tam = 0; }
      atual.push(p); tam += b;
      if (++cont >= 50000) { cont = 0; await new Promise(r => setTimeout(r, 0)); }
    }
    if (atual.length) blocos.push(atual);
    const cliente = dump.cliente || {};
    const razao = sanitizar(cliente.razao_social || '');
    const idNome = lista.length > 1 ? `grupo_${Utils.raizCNPJ(lista[0])}_${lista.length}filiais` : lista[0];
    const base = `auditoria_${idNome}${razao ? '_' + razao.replace(/\s+/g, '_') : ''}`;
    const total = blocos.length;
    const larg = Math.max(2, String(total).length);
    const arquivos = [];
    for (let i = 0; i < total; i++) {
      const idx = String(i + 1).padStart(larg, '0');
      const nome = `${base}.parte${idx}-de-${total}.json`;
      arquivos.push(nome);
      baixar(blocos[i], nome);
      // espaça os downloads: navegadores bloqueiam vários "a.click()" seguidos
      await new Promise((r) => setTimeout(r, 350));
    }
    return { ok: true, partes: total, arquivos, linhas, alvoMB: Math.max(1, (alvoMB || 24)) };
  }

  /** Recebe um File (de <input type=file>) e restaura. */
  async function importarClienteArquivo(file) {
    const txt = await file.text();
    const dump = JSON.parse(txt);
    const total = await DB.restaurarCliente(dump);
    return { cnpj: dump._cnpj, registros: total };
  }

  /**
   * Exporta SÓ o RESULTADO da auditoria (o que aparece na tela): os achados
   * (rev_achados) + os metadados de cada rodada (rev_auditorias). Arquivo pequeno,
   * sem o dado-linha (XML/EFD), para conferência externa sem subir o banco inteiro.
   * Rodar a auditoria no app grava rev_achados; depois é só exportar aqui.
   */
  async function exportarResultadoAuditoria(cnpj) {
    const lista = Array.isArray(cnpj) ? cnpj : [cnpj];
    const dump = await dumpGrupo(lista);
    const achados = (dump.stores && dump.stores.rev_achados) || [];
    const auditorias = (dump.stores && dump.stores.rev_auditorias) || [];
    const cliente = dump.cliente || {};
    const porNatureza = achados.reduce((m, a) => { const k = a.natureza || 'outro'; m[k] = (m[k] || 0) + (Number(a.valor) || 0); return m; }, {});
    const out = {
      _formato: 'revisor_fiscal_prime_resultado',
      _versao_db: dump._versao_db,
      _cnpj: lista.length > 1 ? Utils.raizCNPJ(lista[0]) : lista[0],
      _grupo: lista.length > 1 || undefined,
      _filiais: lista.length > 1 ? lista.slice() : undefined,
      _exportado_em: new Date().toISOString(),
      cliente: { cnpj: cliente.cnpj || lista[0], razao_social: cliente.razao_social || '', uf: cliente.uf || '' },
      clientes: (dump.clientes && dump.clientes.length) ? dump.clientes.map(c => ({ cnpj: c.cnpj, razao_social: c.razao_social || '', uf: c.uf || '', ie: c.ie || '' })) : undefined,
      resumo: { total_achados: achados.length, valor_total: achados.reduce((s, a) => s + (Number(a.valor) || 0), 0), por_natureza: porNatureza },
      auditorias,
      achados,
    };
    const texto = JSON.stringify(out);
    const mb = (texto.length / (1024 * 1024)).toFixed(2);
    const razao = sanitizar(cliente.razao_social || '');
    const idNome = lista.length > 1 ? `grupo_${Utils.raizCNPJ(lista[0])}_${lista.length}filiais` : lista[0];
    const nomeArq = `resultado_auditoria_${idNome}${razao ? '_' + razao.replace(/\s+/g, '_') : ''}.json`;
    baixar(texto, nomeArq);
    return { ok: true, arquivo: nomeArq, achados: achados.length, mb };
  }

  function baixar(conteudo, nomeArquivo) {
    const partes = Array.isArray(conteudo) ? conteudo : [conteudo];
    const blob = new Blob(partes, { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = nomeArquivo;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 2000);
  }

  return {
    suportado, solicitarPersistencia,
    definirPastaTrabalho, restaurarPastaSalva, reconectarPasta, estadoPasta,
    garantirPermissao, temPasta, nomePasta,
    salvarCliente, salvarTodos,
    listarAnosNaPasta, carregarAnos, arquivosNaPasta, inspecionarDisco, limparCustodiaXml,
    carregarClienteDeDir, carregarTodosDaPasta,
    exportarClienteDownload, importarClienteArquivo,
    exportarPacoteAuditoria, exportarPacoteAuditoriaPartes, exportarResultadoAuditoria, dumpGrupo,
  };
})();

window.Armazenamento = Armazenamento;


// ===================== parser_sped.js =====================
// =====================================================================
// Revisor Fiscal Prime — parser_sped.js
// Motor de leitura dos arquivos SPED (EFD ICMS/IPI e EFD Contribuições).
//
// FLUXO:
//   1. Detecta a origem pelo registro 0000 (layouts diferentes).
//   2. Lê linha a linha, parseia pelo layout, mantém hierarquia (pai/filho).
//   3. Grava em efd_staging cada registro relevante, com vínculo ao pai.
//   4. Mantém cadeia de custódia: número da linha física + hash do arquivo.
//
// A normalização (staging → rev_documentos/rev_itens) fica em normalizador.js
// =====================================================================

const ParserSped = (function () {
  'use strict';

  // ------------------------------------------------------------------
  // DETECÇÃO DE ORIGEM
  // ------------------------------------------------------------------
  // EFD ICMS/IPI  0000: |0000|COD_VER|COD_FIN|DT_INI|DT_FIN|NOME|CNPJ|...
  // EFD Contrib   0000: |0000|COD_VER|TIPO_ESCRIT|IND_SIT_ESP|NUM_REC_ANTERIOR|DT_INI|DT_FIN|NOME|CNPJ|...
  //
  // Diferença-chave: na Contrib, os campos 3 e 4 são TIPO_ESCRIT (0/1) e
  // IND_SIT_ESP, e a DT_INI vem深 mais à frente. Detectamos pela posição
  // da data (8 dígitos DDMMAAAA).
  function detectarOrigem(linha0000) {
    const p = linha0000.split('|');
    // p[1]=REG, p[2]=identificador
    // ECD: p[2] = "LECD" ; ECF: p[2] = "LECF"
    if ((p[2] || '').toUpperCase() === 'LECD') return 'ecd';
    if ((p[2] || '').toUpperCase() === 'LECF') return 'ecf';
    // EFD ICMS/IPI: p[4] é DT_INI (8 dígitos). Contrib: DT_INI vem em p[6].
    const ehData = (s) => /^\d{8}$/.test(s || '');
    if (ehData(p[4]) && !ehData(p[6])) return 'efd_fiscal';
    if (ehData(p[6]) && !ehData(p[4])) return 'efd_contrib';
    return ehData(p[4]) ? 'efd_fiscal' : 'efd_contrib';
  }

  // ------------------------------------------------------------------
  // HIERARQUIA — quais registros são "pais" de quais
  // Usado para vincular itens (C170) ao documento (C100), etc.
  // ------------------------------------------------------------------
  const PAIS = {
    // filho: pai
    'C170': 'C100', 'C175': 'C100', 'C190': 'C100', 'C101': 'C100',
    'C181': 'C180', 'C185': 'C180',
    'D101': 'D100', 'D105': 'D100', 'D190': 'D100',
    'A170': 'A100',
    'E111': 'E110', 'E112': 'E110', 'E113': 'E110', 'E115': 'E110', 'E116': 'E110',
    'E210': 'E200', 'E250': 'E210',
    'H010': 'H005', 'H020': 'H010',
    'M105': 'M100', 'M210': 'M200', 'M505': 'M500', 'M610': 'M600',
    'G125': 'G110',
    'K230': 'K100', 'K235': 'K230',
    '1210': '1200',
    'F120': 'F010', 'F130': 'F010', 'F100': 'F010',
    // ECD: saldos vinculados ao período (I150) e ao resultado (I350)
    'I155': 'I150', 'I355': 'I350',
    // ECF: Lalur/Lacs parte A vinculados à conta (M010)
    'M300': 'M010', 'M350': 'M010',
  };

  // ------------------------------------------------------------------
  // PARSING PRINCIPAL
  // ------------------------------------------------------------------
  /**
   * Processa o conteúdo de um SPED.
   * @param {string} conteudo - texto completo do arquivo
   * @param {object} ctx - { cnpj, periodo, id_arquivo, sha256 }
   * @param {function} onProgress - callback(pct, msg) opcional
   * @returns {object} { origem, totais, registros: [...] }
   */
  async function processar(conteudo, ctx, onProgress) {
    const linhas = conteudo.split(/\r?\n/);
    const total = linhas.length;

    // acha o 0000 pra detectar origem
    const linha0000 = linhas.find(l => l.startsWith('|0000|'));
    if (!linha0000) {
      throw new Error('Arquivo não contém registro 0000 — não é um SPED válido.');
    }
    const origem = detectarOrigem(linha0000);

    // contexto de hierarquia: guarda o último id de cada tipo de registro pai
    const ultimoPai = {};   // { 'C100': id_staging, ... }
    const registros = [];
    const contagem = {};     // contagem por tipo de registro
    let seq = 0;

    for (let i = 0; i < linhas.length; i++) {
      const linha = linhas[i];
      if (!linha || linha[0] !== '|') continue;

      const partes = linha.split('|');
      const reg = partes[1];
      if (!reg) continue;

      contagem[reg] = (contagem[reg] || 0) + 1;

      // parseia pelo layout
      const dados = LayoutsSped.parsearLinha(origem, linha);
      if (!dados) continue;

      seq++;
      const id_staging = `${ctx.id_arquivo}_${seq}`;

      // resolve o pai (se houver)
      const tipoPai = PAIS[reg];
      const id_pai = tipoPai ? (ultimoPai[tipoPai] || null) : null;

      const registro = {
        id_staging,
        cnpj_empresa: ctx.cnpj,
        periodo: ctx.periodo,
        origem,
        registro: reg,
        id_pai,
        linha_fisica: i + 1,         // custódia: número da linha no arquivo
        id_arquivo: ctx.id_arquivo,
        dados,                        // objeto {campo: valor}
      };

      registros.push(registro);

      // se este registro pode ser pai de outros, memoriza
      ultimoPai[reg] = id_staging;

      if (onProgress && i % 5000 === 0) {
        onProgress(Math.round((i / total) * 100), `Lendo linha ${i}/${total}…`);
      }
    }

    return {
      origem,
      totais: {
        linhas: total,
        registros: registros.length,
        tipos: Object.keys(contagem).length,
        contagem,
      },
      registros,
    };
  }

  /**
   * Persiste os registros parseados no staging, em lotes.
   */
  async function salvarStaging(registros, onProgress) {
    const LOTE = 2000;
    let salvos = 0;
    for (let i = 0; i < registros.length; i += LOTE) {
      const lote = registros.slice(i, i + LOTE);
      await DB.putBatch('efd_staging', lote);
      salvos += lote.length;
      if (onProgress) {
        onProgress(Math.round((salvos / registros.length) * 100),
          `Gravando ${salvos}/${registros.length} registros…`);
      }
    }
    return salvos;
  }

  return {
    detectarOrigem, processar, salvarStaging, PAIS,
  };
})();

window.ParserSped = ParserSped;


// ===================== normalizador.js =====================
// =====================================================================
// Revisor Fiscal Prime — normalizador.js
// Transforma os registros brutos do staging nas stores unificadas.
//
// staging (efd_staging)  →  rev_empresas, rev_participantes, rev_produtos,
//                           rev_documentos, rev_itens, rev_apuracao_icms,
//                           rev_apuracao_pis_cofins, rev_estoque
//
// A linkagem SPED-Fiscal × SPED-Contribuições × XML é feita em linkador.js.
// Aqui cada SPED é normalizado para o modelo comum.
// =====================================================================

const Normalizador = (function () {
  'use strict';

  const U = () => (typeof window !== 'undefined' ? window.Utils : globalThis.Utils);

  /**
   * Normaliza todos os registros de um cliente+período que estão no staging.
   * @param {string} cnpj
   * @param {string} periodo
   * @param {function} onProgress
   */
  async function normalizar(cnpj, periodo, onProgress) {
    const prog = onProgress || (() => {});

    prog(5, 'Carregando registros do staging…');
    const registros = await DB.getByIndex('efd_staging', 'cnpj_periodo', [cnpj, periodo]);
    if (registros.length === 0) {
      return { erro: 'Nenhum registro no staging para este cliente/período.' };
    }

    // indexa por id_staging pra resolver pais rapidamente
    const porId = {};
    for (const r of registros) porId[r.id_staging] = r;

    // separa por origem e registro
    const fiscal = registros.filter(r => r.origem === 'efd_fiscal');
    const contrib = registros.filter(r => r.origem === 'efd_contrib');

    const stats = {
      empresas: 0, participantes: 0, produtos: 0, unidades: 0,
      documentos: 0, itens: 0, apuracao_icms: 0, apuracao_pis_cofins: 0,
      estoque: 0,
    };

    // ---- 1) CADASTROS (de ambas as origens; fiscal tem prioridade) ----
    prog(15, 'Normalizando cadastros…');
    await normalizarEmpresa(fiscal, contrib, cnpj, periodo, stats);
    await normalizarParticipantes(registros, cnpj, periodo, stats);
    await normalizarProdutos(registros, cnpj, periodo, stats);
    await normalizarUnidades(registros, cnpj, periodo, stats);

    // ---- 2) DOCUMENTOS E ITENS (núcleo) ----
    prog(40, 'Normalizando documentos e itens fiscais…');
    await normalizarDocumentosItens(fiscal, contrib, porId, cnpj, periodo, stats);

    // ---- 3) APURAÇÃO ----
    prog(70, 'Normalizando apuração de ICMS…');
    await normalizarApuracaoICMS(fiscal, porId, cnpj, periodo, stats);
    prog(80, 'Normalizando apuração de PIS/COFINS…');
    await normalizarApuracaoPisCofins(contrib, porId, cnpj, periodo, stats);

    // ---- 4) ESTOQUE ----
    prog(90, 'Normalizando inventário e estoque…');
    await normalizarEstoque(fiscal, cnpj, periodo, stats);

    prog(100, 'Normalização concluída.');
    return { stats };
  }

  // ------------------------------------------------------------------
  // CADASTROS
  // ------------------------------------------------------------------
  async function normalizarEmpresa(fiscal, contrib, cnpj, periodo, stats) {
    const reg0000f = fiscal.find(r => r.registro === '0000');
    const reg0000c = contrib.find(r => r.registro === '0000');
    const d = reg0000f ? reg0000f.dados : (reg0000c ? reg0000c.dados : null);
    if (!d) return;

    const empresa = {
      id_empresa: `${cnpj}_${periodo}`,
      cnpj_empresa: cnpj,
      periodo,
      razao_social: d.NOME || '',
      uf: d.UF || '',
      ie: d.IE || '',
      cod_mun: d.COD_MUN || '',
      cod_ver: d.COD_VER || '',
      ind_perfil: d.IND_PERFIL || '',   // só fiscal (A/B/C)
      ind_ativ: d.IND_ATIV || '',
      // dados da Contribuições, se houver
      cod_inc_trib: null,
      tem_efd_fiscal: !!reg0000f,
      tem_efd_contrib: !!reg0000c,
    };

    // regime de PIS/COFINS vem do 0110 da Contribuições
    const reg0110 = contrib.find(r => r.registro === '0110');
    if (reg0110) {
      empresa.cod_inc_trib = reg0110.dados.COD_INC_TRIB || '';
      empresa.ind_apro_cred = reg0110.dados.IND_APRO_CRED || '';
      empresa.cod_tipo_cont = reg0110.dados.COD_TIPO_CONT || '';
    }

    await DB.put('rev_empresas', empresa);
    stats.empresas++;
  }

  async function normalizarParticipantes(registros, cnpj, periodo, stats) {
    const parts = registros.filter(r => r.registro === '0150');
    // dedup por COD_PART (pode vir nas duas EFDs)
    const vistos = {};
    const lote = [];
    for (const r of parts) {
      const d = r.dados;
      const cod = d.COD_PART;
      if (!cod || vistos[cod]) continue;
      vistos[cod] = true;
      lote.push({
        id_participante: `${cnpj}_${cod}`,
        cnpj_empresa: cnpj,
        periodo,
        cod_part: cod,
        nome: d.NOME || '',
        cnpj_part: U().soDigitos(d.CNPJ || ''),
        cpf_part: U().soDigitos(d.CPF || ''),
        ie_part: d.IE || '',
        uf_part: inferirUF(d),
        cod_mun: d.COD_MUN || '',
        cod_pais: d.COD_PAIS || '',
      });
    }
    await DB.putBatch('rev_participantes', lote);
    stats.participantes += lote.length;
  }

  function inferirUF(dados) {
    // 0150 não tem UF direto; infere pelo código do município (2 primeiros díg = UF IBGE)
    const mun = dados.COD_MUN || '';
    const codUF = mun.slice(0, 2);
    const mapa = {
      '11':'RO','12':'AC','13':'AM','14':'RR','15':'PA','16':'AP','17':'TO',
      '21':'MA','22':'PI','23':'CE','24':'RN','25':'PB','26':'PE','27':'AL','28':'SE','29':'BA',
      '31':'MG','32':'ES','33':'RJ','35':'SP',
      '41':'PR','42':'SC','43':'RS',
      '50':'MS','51':'MT','52':'GO','53':'DF',
    };
    return mapa[codUF] || '';
  }

  async function normalizarProdutos(registros, cnpj, periodo, stats) {
    const prods = registros.filter(r => r.registro === '0200');
    const vistos = {};
    const lote = [];
    for (const r of prods) {
      const d = r.dados;
      const cod = d.COD_ITEM;
      if (!cod || vistos[cod]) continue;
      vistos[cod] = true;
      lote.push({
        id_produto: `${cnpj}_${cod}_${periodo}`,
        cnpj_empresa: cnpj,
        periodo,
        cod_item: cod,
        descricao: d.DESCR_ITEM || '',
        ncm: d.COD_NCM || '',
        cest: d.CEST || '',
        tipo_item: d.TIPO_ITEM || '',
        unid_inv: d.UNID_INV || '',
        cod_barra: d.COD_BARRA || '',
        ean: U().limparEAN(d.COD_BARRA || ''),  // EAN normalizado p/ cotejo XML×SPED
        aliq_icms: U().parseNum(d.ALIQ_ICMS),
      });
    }
    await DB.putBatch('rev_produtos', lote);
    stats.produtos += lote.length;
  }

  async function normalizarUnidades(registros, cnpj, periodo, stats) {
    const unids = registros.filter(r => r.registro === '0190');
    const convs = registros.filter(r => r.registro === '0220');
    const vistos = {};
    const lote = [];
    for (const r of unids) {
      const d = r.dados;
      const u = d.UNID;
      if (!u || vistos[u]) continue;
      vistos[u] = true;
      lote.push({
        id_unidade: `${cnpj}_${u}_${periodo}`,
        cnpj_empresa: cnpj,
        periodo,
        unidade: u,
        descricao: d.DESCR || '',
      });
    }
    await DB.putBatch('rev_unidades', lote);
    stats.unidades += lote.length;
  }

  // ------------------------------------------------------------------
  // DOCUMENTOS E ITENS — o núcleo
  // ------------------------------------------------------------------
  async function normalizarDocumentosItens(fiscal, contrib, porId, cnpj, periodo, stats) {
    // Documentos vêm do C100 (ambas EFDs escrituram, mas Fiscal é a base p/ ICMS).
    // Estratégia: monta documentos a partir do C100 do FISCAL.
    // Itens a partir do C170 do FISCAL (tem ICMS) enriquecidos com PIS/COFINS
    // do C170 do CONTRIB quando casarem pela chave+item.

    const docsFiscal = fiscal.filter(r => r.registro === 'C100');
    const itensFiscal = fiscal.filter(r => r.registro === 'C170');
    const docsContrib = contrib.filter(r => r.registro === 'C100');
    const itensContrib = contrib.filter(r => r.registro === 'C170');

    // índice de itens do contrib por (chave + num_item) pra enriquecimento
    const idxContrib = {};
    for (const it of itensContrib) {
      const pai = porId[it.id_pai];
      if (!pai) continue;
      const chave = U().soDigitos(pai.dados.CHV_NFE || '');
      const num = it.dados.NUM_ITEM;
      if (chave) idxContrib[`${chave}_${num}`] = it.dados;
    }

    // ---- documentos ----
    const loteDocs = [];
    const docPorChave = {};   // chave → id_documento (pra itens)
    for (const doc of docsFiscal) {
      const d = doc.dados;
      const chave = U().soDigitos(d.CHV_NFE || '');
      const id_documento = chave
        ? `${cnpj}_${chave}`
        : `${cnpj}_${d.COD_MOD}_${d.SER || 'X'}_${d.NUM_DOC}_${periodo}`;
      docPorChave[chave || id_documento] = id_documento;

      loteDocs.push({
        id_documento,
        cnpj_empresa: cnpj,
        periodo,
        chave,
        tipo_operacao: d.IND_OPER === '0' ? 'entrada' : 'saida',
        ind_emit: d.IND_EMIT,
        modelo: d.COD_MOD || '',
        serie: d.SER || '',
        num_doc: d.NUM_DOC || '',
        cod_part: d.COD_PART || '',
        cod_sit: d.COD_SIT || '',
        dt_doc: U().dataSpedParaISO(d.DT_DOC),
        dt_es: U().dataSpedParaISO(d.DT_E_S),
        vl_doc: U().parseNum(d.VL_DOC),
        vl_merc: U().parseNum(d.VL_MERC),
        vl_desc: U().parseNum(d.VL_DESC),
        vl_bc_icms: U().parseNum(d.VL_BC_ICMS),
        vl_icms: U().parseNum(d.VL_ICMS),
        vl_bc_icms_st: U().parseNum(d.VL_BC_ICMS_ST),
        vl_icms_st: U().parseNum(d.VL_ICMS_ST),
        vl_ipi: U().parseNum(d.VL_IPI),
        vl_pis: U().parseNum(d.VL_PIS),
        vl_cofins: U().parseNum(d.VL_COFINS),
        // custódia
        linha_c100_fiscal: doc.linha_fisica,
        id_arquivo_fiscal: doc.id_arquivo,
        tem_efd_fiscal: true,
        tem_efd_contrib: false,  // atualizado abaixo se casar
      });
    }

    // marca documentos que também existem no contrib
    const chavesContrib = new Set(
      docsContrib.map(dc => U().soDigitos(dc.dados.CHV_NFE || '')).filter(Boolean)
    );
    for (const doc of loteDocs) {
      if (doc.chave && chavesContrib.has(doc.chave)) doc.tem_efd_contrib = true;
    }

    await DB.putBatch('rev_documentos', loteDocs);
    stats.documentos += loteDocs.length;

    // ---- itens ----
    const loteItens = [];
    for (const it of itensFiscal) {
      const pai = porId[it.id_pai];
      if (!pai) continue;
      const dp = pai.dados;
      const d = it.dados;
      const chave = U().soDigitos(dp.CHV_NFE || '');
      const num = d.NUM_ITEM;
      const id_documento = docPorChave[chave] ||
        `${cnpj}_${dp.COD_MOD}_${dp.SER || 'X'}_${dp.NUM_DOC}_${periodo}`;

      // enriquecimento PIS/COFINS do contrib
      const contribItem = chave ? idxContrib[`${chave}_${num}`] : null;

      // entrada/saída pelo CFOP (1,2,3 = entrada; 5,6,7 = saída)
      const cfop = d.CFOP || '';
      const tipo_operacao = /^[123]/.test(cfop) ? 'entrada' : 'saida';
      // costura universal com o XML
      const id_pareamento = U().gerarIdPareamento(cnpj, periodo, chave, num);

      const item = {
        id_item: `${cnpj}_${chave || dp.NUM_DOC}_${num}_${periodo}`,
        cnpj_empresa: cnpj,
        periodo,
        id_documento,
        chave,
        nItem: num,
        tipo_operacao,
        id_pareamento,
        cod_item: d.COD_ITEM || '',
        descricao: d.DESCR_COMPL || '',
        ncm: '',  // preenchido via join com rev_produtos depois
        cfop,
        unidade: d.UNID || '',
        qtd: U().parseNum(d.QTD),
        vl_item: U().parseNum(d.VL_ITEM),
        vl_desc: U().parseNum(d.VL_DESC),
        // ICMS (do fiscal)
        cst_icms: d.CST_ICMS || '',
        vl_bc_icms: U().parseNum(d.VL_BC_ICMS),
        aliq_icms: U().parseNum(d.ALIQ_ICMS),
        vl_icms: U().parseNum(d.VL_ICMS),
        vl_bc_icms_st: U().parseNum(d.VL_BC_ICMS_ST),
        aliq_st: U().parseNum(d.ALIQ_ST),
        vl_icms_st: U().parseNum(d.VL_ICMS_ST),
        // IPI
        cst_ipi: d.CST_IPI || '',
        vl_bc_ipi: U().parseNum(d.VL_BC_IPI),
        aliq_ipi: U().parseNum(d.ALIQ_IPI),
        vl_ipi: U().parseNum(d.VL_IPI),
        // PIS/COFINS — do próprio fiscal OU enriquecido do contrib
        cst_pis: (contribItem && contribItem.CST_PIS) || d.CST_PIS || '',
        vl_bc_pis: U().parseNum((contribItem && contribItem.VL_BC_PIS) || d.VL_BC_PIS),
        aliq_pis: U().parseNum((contribItem && contribItem.ALIQ_PIS) || d.ALIQ_PIS),
        vl_pis: U().parseNum((contribItem && contribItem.VL_PIS) || d.VL_PIS),
        cst_cofins: (contribItem && contribItem.CST_COFINS) || d.CST_COFINS || '',
        vl_bc_cofins: U().parseNum((contribItem && contribItem.VL_BC_COFINS) || d.VL_BC_COFINS),
        aliq_cofins: U().parseNum((contribItem && contribItem.ALIQ_COFINS) || d.ALIQ_COFINS),
        vl_cofins: U().parseNum((contribItem && contribItem.VL_COFINS) || d.VL_COFINS),
        // flags de origem
        tem_efd_fiscal: true,
        tem_efd_contrib: !!contribItem,
        tem_xml: false,            // preenchido pelo cotejo XML×SPED
        id_pareamento_xml: null,   // qual item XML casou
        confianca_xml: null,       // alta / media / baixa
        metodo_xml: null,          // qual fase casou
        // custódia
        linha_c170_fiscal: it.linha_fisica,
        linha_c170_contrib: contribItem ? '(casado)' : null,
        id_arquivo_fiscal: it.id_arquivo,
      };
      loteItens.push(item);
    }

    await DB.putBatch('rev_itens', loteItens);
    stats.itens += loteItens.length;
  }

  // ------------------------------------------------------------------
  // APURAÇÃO ICMS (bloco E)
  // ------------------------------------------------------------------
  async function normalizarApuracaoICMS(fiscal, porId, cnpj, periodo, stats) {
    const e110 = fiscal.find(r => r.registro === 'E110');
    if (!e110) return;
    const d = e110.dados;

    // ajustes E111 vinculados
    const ajustes = fiscal
      .filter(r => r.registro === 'E111')
      .map(r => ({
        cod: r.dados.COD_AJ_APUR,
        descr: r.dados.DESCR_COMPL_AJ,
        valor: U().parseNum(r.dados.VL_AJ_APUR),
      }));

    // ST (E210) — há UM E210 por UF (ST interna de MG + ST interestadual de cada destino).
    // Pegar só o primeiro (.find) subdimensiona a ST. Somamos TODOS e guardamos o detalhe por UF.
    const e210s = fiscal.filter(r => r.registro === 'E210');
    const somaE210 = (campo) => e210s.reduce((s, r) => s + U().parseNum(r.dados[campo]), 0);
    const stPorUf = (() => {
      const out = []; let ufAtual = null;
      for (const r of fiscal) {
        if (r.registro === 'E200') ufAtual = (r.dados && r.dados.UF) || null;
        else if (r.registro === 'E210') out.push({
          uf: ufAtual,
          retido: U().parseNum(r.dados.VL_RETID_ST),
          recolher: U().parseNum(r.dados.VL_ICMS_RECOL_ST),
          aj_debitos: U().parseNum(r.dados.VL_AJ_DEBITOS_ST),
        });
      }
      return out;
    })();

    // Energia elétrica (C500 = conta de energia, modelo 06/66; C590 = analítico de ICMS).
    // Soma a operação e o ICMS destacado das contas de energia, separando o que veio com CFOP de
    // estabelecimento industrial (1252/1253/1257/2252/2253/2257). O crédito efetivo é o % industrial
    // (laudo técnico) sobre o ICMS — apurado na regra INS-8.
    const energia = (() => {
      const c500 = fiscal.filter(r => r.registro === 'C500');
      const c590 = fiscal.filter(r => r.registro === 'C590');
      const CFOP_ENERGIA = new Set(['1252', '1253', '1257', '2252', '2253', '2257']);
      let oper = 0, icms = 0, operInd = 0, icmsInd = 0;
      for (const r of c590) {
        const cfop = String((r.dados && r.dados.CFOP) || '');
        const vo = U().parseNum(r.dados.VL_OPR), vi = U().parseNum(r.dados.VL_ICMS);
        oper += vo; icms += vi;
        if (CFOP_ENERGIA.has(cfop)) { operInd += vo; icmsInd += vi; }
      }
      // se não houver C590, usa o total dos C500 (modelo 06/66)
      if (!c590.length && c500.length) {
        for (const r of c500) { oper += U().parseNum(r.dados.VL_DOC); icms += U().parseNum(r.dados.VL_ICMS); }
      }
      return { docs: c500.length, vl_oper: oper, vl_icms: icms, vl_oper_industrial: operInd, vl_icms_industrial: icmsInd };
    })();

    const apur = {
      id_apuracao: `${cnpj}_${periodo}_icms`,
      cnpj_empresa: cnpj,
      periodo,
      // débitos/créditos próprios
      vl_tot_debitos: U().parseNum(d.VL_TOT_DEBITOS),
      vl_tot_creditos: U().parseNum(d.VL_TOT_CREDITOS),
      vl_estornos_cred: U().parseNum(d.VL_ESTORNOS_CRED),
      vl_estornos_deb: U().parseNum(d.VL_ESTORNOS_DEB),
      vl_sld_credor_ant: U().parseNum(d.VL_SLD_CREDOR_ANT),
      vl_sld_apurado: U().parseNum(d.VL_SLD_APURADO),
      vl_tot_ded: U().parseNum(d.VL_TOT_DED),
      vl_icms_recolher: U().parseNum(d.VL_ICMS_RECOLHER),
      vl_sld_credor_transportar: U().parseNum(d.VL_SLD_CREDOR_TRANSPORTAR),
      ajustes,
      // ST (soma de todos os E210, por UF)
      tem_st: e210s.length > 0,
      vl_icms_recol_st: somaE210('VL_ICMS_RECOL_ST'),
      vl_icms_retid_st: somaE210('VL_RETID_ST'),
      vl_aj_debitos_st: somaE210('VL_AJ_DEBITOS_ST'),
      vl_sld_cred_st_transportar: somaE210('VL_SLD_CRED_ST_TRANSPORTAR'),
      st_por_uf: stPorUf,
      // Energia elétrica (C500/C590)
      energia,
      linha_e110: e110.linha_fisica,
    };
    await DB.put('rev_apuracao_icms', apur);
    stats.apuracao_icms++;
  }

  // ------------------------------------------------------------------
  // APURAÇÃO PIS/COFINS (bloco M)
  // ------------------------------------------------------------------
  async function normalizarApuracaoPisCofins(contrib, porId, cnpj, periodo, stats) {
    const m200 = contrib.find(r => r.registro === 'M200');
    const m600 = contrib.find(r => r.registro === 'M600');
    if (!m200 && !m600) return;

    const apur = {
      id_apuracao: `${cnpj}_${periodo}_piscofins`,
      cnpj_empresa: cnpj,
      periodo,
    };
    if (m200) {
      const d = m200.dados;
      apur.pis = {
        vl_tot_cont_nc_per: U().parseNum(d.VL_TOT_CONT_NC_PER),
        vl_tot_cred_desc: U().parseNum(d.VL_TOT_CRED_DESC),
        vl_cont_nc_rec: U().parseNum(d.VL_CONT_NC_REC),
        vl_tot_cont_rec: U().parseNum(d.VL_TOT_CONT_REC),
      };
      apur.linha_m200 = m200.linha_fisica;
    }
    if (m600) {
      const d = m600.dados;
      apur.cofins = {
        vl_tot_cont_nc_per: U().parseNum(d.VL_TOT_CONT_NC_PER),
        vl_tot_cred_desc: U().parseNum(d.VL_TOT_CRED_DESC),
        vl_cont_nc_rec: U().parseNum(d.VL_CONT_NC_REC),
        vl_tot_cont_rec: U().parseNum(d.VL_TOT_CONT_REC),
      };
      apur.linha_m600 = m600.linha_fisica;
    }
    await DB.put('rev_apuracao_pis_cofins', apur);
    stats.apuracao_pis_cofins++;
  }

  // ------------------------------------------------------------------
  // ESTOQUE (bloco H — inventário)
  // ------------------------------------------------------------------
  async function normalizarEstoque(fiscal, cnpj, periodo, stats) {
    const itensInv = fiscal.filter(r => r.registro === 'H010');
    if (itensInv.length === 0) return;
    const lote = [];
    for (const r of itensInv) {
      const d = r.dados;
      lote.push({
        id_estoque: `${cnpj}_${periodo}_${d.COD_ITEM}_inv`,
        cnpj_empresa: cnpj,
        periodo,
        cod_item: d.COD_ITEM || '',
        unidade: d.UNID || '',
        qtd: U().parseNum(d.QTD),
        vl_unit: U().parseNum(d.VL_UNIT),
        vl_item: U().parseNum(d.VL_ITEM),
        ind_prop: d.IND_PROP || '',
        tipo: 'inventario',
        linha_fisica: r.linha_fisica,
      });
    }
    await DB.putBatch('rev_estoque', lote);
    stats.estoque += lote.length;
  }

  return { normalizar };
})();

window.Normalizador = Normalizador;


// ===================== normalizador_contabil.js =====================
// =====================================================================
// Revisor Fiscal Prime — normalizador_contabil.js
// Lê o staging de ECD/ECF e popula as stores contábeis:
//   rev_plano_contas       (ECD I050 / ECF J050)
//   rev_saldos_contabeis   (ECD I155/I355, ECF K155/K355) — o balancete
//   rev_apuracao_irpj_csll (ECF M300/M350) — Lalur/Lacs Parte A
//
// periodo = ANO (ECD/ECF são anuais).
// =====================================================================

const NormalizadorContabil = (function () {
  'use strict';

  const U = () => (typeof window !== 'undefined' ? window.Utils : globalThis.Utils);

  function parseNumBR(s) {
    if (s == null || s === '') return 0;
    return parseFloat(String(s).replace(/\./g, '').replace(',', '.')) || 0;
  }

  /**
   * Normaliza ECD ou ECF de um cliente/período(ano).
   * @param {string} cnpj
   * @param {string} periodo  (ano "AAAA")
   * @param {string} origem   'ecd' | 'ecf'
   */
  async function normalizar(cnpj, periodo, origem, onProgress) {
    const prog = onProgress || (() => {});
    prog(10, 'Carregando staging contábil…');
    const registros = (await DB.getByIndex('efd_staging', 'cnpj_periodo', [cnpj, periodo]))
      .filter(r => r.origem === origem);
    if (registros.length === 0) {
      return { erro: 'Nenhum registro contábil no staging para este período.' };
    }

    const porId = {};
    for (const r of registros) porId[r.id_staging] = r;
    const dados = (r) => r.dados || {};

    const stats = { plano: 0, saldos: 0, apuracao: 0 };

    // ---- 1) PLANO DE CONTAS (I050 / J050) ----
    prog(30, 'Normalizando plano de contas…');
    const regPlano = registros.filter(r => r.registro === 'I050' || r.registro === 'J050');
    const lotePlano = [];
    const vistos = {};
    for (const r of regPlano) {
      const d = dados(r);
      const cod = d.COD_CTA;
      if (!cod || vistos[cod]) continue;
      vistos[cod] = true;
      lotePlano.push({
        id_conta: `${cnpj}_${periodo}_${origem}_${cod}`,
        cnpj_empresa: cnpj, periodo, origem,
        cod_conta: cod,
        nome: d.CTA || '',
        natureza: d.COD_NAT || '',            // 01 ativo, 02 passivo, 03 PL, 04 resultado...
        tipo: d.IND_CTA || '',                // S sintética / A analítica
        nivel: d.NIVEL || '',
        conta_sup: d.COD_CTA_SUP || '',
      });
    }
    if (lotePlano.length) await DB.putBatch('rev_plano_contas', lotePlano);
    stats.plano = lotePlano.length;

    // nomes por conta (pra enriquecer saldos)
    const nomePorConta = {};
    for (const c of lotePlano) nomePorConta[c.cod_conta] = c.nome;
    const natPorConta = {};
    for (const c of lotePlano) natPorConta[c.cod_conta] = c.natureza;

    // ---- 2) SALDOS / BALANCETE (I155/K155 patrimonial, I355/K355 resultado) ----
    prog(55, 'Normalizando saldos contábeis…');
    const loteSaldos = [];
    const regSaldoPatr = registros.filter(r => r.registro === 'I155' || r.registro === 'K155');
    for (const r of regSaldoPatr) {
      const d = dados(r);
      const cod = d.COD_CTA;
      if (!cod) continue;
      loteSaldos.push({
        id_saldo: `${cnpj}_${periodo}_${origem}_P_${cod}_${d.COD_CCUS || ''}`,
        cnpj_empresa: cnpj, periodo, origem,
        cod_conta: cod, cod_ccus: d.COD_CCUS || '',
        nome: nomePorConta[cod] || '',
        natureza: natPorConta[cod] || '',
        tipo_saldo: 'patrimonial',
        saldo_ini: parseNumBR(d.VL_SLD_INI), dc_ini: d.IND_DC_INI || '',
        debitos: parseNumBR(d.VL_DEB), creditos: parseNumBR(d.VL_CRED),
        saldo_fin: parseNumBR(d.VL_SLD_FIN), dc_fin: d.IND_DC_FIN || '',
        linha_sped: r.linha_fisica,
      });
    }
    const regSaldoRes = registros.filter(r => r.registro === 'I355' || r.registro === 'K355');
    for (const r of regSaldoRes) {
      const d = dados(r);
      const cod = d.COD_CTA;
      if (!cod) continue;
      loteSaldos.push({
        id_saldo: `${cnpj}_${periodo}_${origem}_R_${cod}_${d.COD_CCUS || ''}`,
        cnpj_empresa: cnpj, periodo, origem,
        cod_conta: cod, cod_ccus: d.COD_CCUS || '',
        nome: nomePorConta[cod] || '',
        natureza: natPorConta[cod] || '04',
        tipo_saldo: 'resultado',
        saldo_ini: 0, dc_ini: '',
        debitos: 0, creditos: 0,
        saldo_fin: parseNumBR(d.VL_CTA) || parseNumBR(d.VL_SLD_FIN),
        dc_fin: d.IND_DC || '',
        linha_sped: r.linha_fisica,
      });
    }
    if (loteSaldos.length) await DB.putBatch('rev_saldos_contabeis', loteSaldos);
    stats.saldos = loteSaldos.length;

    // ---- 3) APURAÇÃO IRPJ/CSLL — Lalur/Lacs (ECF M300/M350) ----
    if (origem === 'ecf') {
      prog(80, 'Normalizando Lalur/Lacs…');
      const loteApur = [];
      // mapa M010 (conta da parte A) → descrição
      const m010 = {};
      for (const r of registros.filter(r => r.registro === 'M010')) {
        const d = dados(r);
        if (d.COD_CTA_B) m010[d.COD_CTA_B] = { desc: d.DESC_CTA_B || '', tipo: d.TIPO_LANC_B || '' };
      }
      const mapM = [{ reg: 'M300', tributo: 'IRPJ' }, { reg: 'M350', tributo: 'CSLL' }];
      for (const m of mapM) {
        for (const r of registros.filter(r => r.registro === m.reg)) {
          const d = dados(r);
          const cod = d.CODIGO || '';
          const info = m010[cod] || {};
          const tipoLanc = (d.TIPO_LANC || info.tipo || '').toUpperCase();
          // A = adição, E = exclusão (quando informado)
          const especie = tipoLanc.startsWith('A') ? 'adicao'
                        : tipoLanc.startsWith('E') ? 'exclusao' : 'outro';
          const seq = Math.random().toString(36).slice(2, 7);
          loteApur.push({
            id_apur: `${cnpj}_${periodo}_${m.tributo}_${cod}_${seq}`,
            cnpj_empresa: cnpj, periodo,
            tributo: m.tributo,
            codigo: cod,
            especie,
            descricao: info.desc || d.HIST_LANC || '',
            historico: d.HIST_LANC || '',
            ind_relacao: d.IND_RELACAO || '',
            valor: parseNumBR(d.VL_LANC),
            linha_sped: r.linha_fisica,
          });
        }
      }
      if (loteApur.length) await DB.putBatch('rev_apuracao_irpj_csll', loteApur);
      stats.apuracao = loteApur.length;
    }

    prog(100, 'Concluído.');
    return { stats };
  }

  return { normalizar };
})();

window.NormalizadorContabil = NormalizadorContabil;


// ===================== parser_xml.js =====================
// =====================================================================
// Revisor Fiscal Prime — parser_xml.js
// Parser de XMLs NF-e (modelo 55) e NFC-e (modelo 65).
// Portado e adaptado do Apurador ICMS-ST v7 (parser testado com nota real).
//
// Usa DOMParser nativo do navegador. Detecta entrada/saída pela posição
// do CNPJ da empresa, trata cancelamento, extrai todos os tipos de ICMS.
// Saída mapeia para o modelo rev_xml_itens do Revisor.
// =====================================================================

const ParserXML = (function () {
  'use strict';

  const U = () => (typeof window !== 'undefined' ? window.Utils : globalThis.Utils);

  /**
   * Parseia um XML NF-e/NFC-e e extrai cabeçalho + itens.
   * @param {string} xmlTexto - conteúdo do XML
   * @param {object} opts - { nomeArquivo, cnpjEmpresa (obrigatório) }
   * @returns {Promise<{meta, itens, tipo, cancelada}>}
   */
  async function parsear(xmlTexto, opts) {
    opts = opts || {};
    const cnpjEmpresa = opts.cnpjEmpresa;
    if (!cnpjEmpresa) throw new Error('ParserXML.parsear: cnpjEmpresa é obrigatório');

    const sha256 = await U().sha256(xmlTexto);

    let doc;
    try {
      const parser = new DOMParser();
      doc = parser.parseFromString(xmlTexto, 'application/xml');
      const erros = doc.getElementsByTagName('parsererror');
      if (erros && erros.length > 0) {
        throw new Error('Erro de parse XML: ' + (erros[0].textContent || '').slice(0, 200));
      }
    } catch (e) {
      throw new Error('Falha ao parsear XML: ' + e.message);
    }

    // pega texto de um elemento, ignorando namespace
    const t = (parent, tag) => {
      if (!parent) return '';
      const els = parent.getElementsByTagName(tag);
      return els.length === 0 ? '' : (els[0].textContent || '').trim();
    };

    const infNFe = doc.getElementsByTagName('infNFe')[0];
    if (!infNFe) throw new Error('XML sem <infNFe> — não é uma NF-e válida');

    let chave = (infNFe.getAttribute('Id') || '').replace(/^NFe/, '');
    chave = U().normalizarChaveNFe(chave);

    const ide = infNFe.getElementsByTagName('ide')[0];
    const modelo = t(ide, 'mod');
    const serie = t(ide, 'serie');
    const numNF = t(ide, 'nNF');
    const tpNF = t(ide, 'tpNF');           // 0=entrada, 1=saída (do ponto de vista do emitente)
    const dhEmi = t(ide, 'dhEmi') || t(ide, 'dEmi');
    const dtEmi = U().parseDataXML(dhEmi);
    const periodo = dtEmi ? dtEmi.slice(0, 7) : 'sem-periodo';

    // data de saída/entrada EFETIVA (circulação) — é dela que conta o prazo de
    // suspensão da industrialização (180 dias), não da emissão
    const dhSaiEnt = t(ide, 'dhSaiEnt') || t(ide, 'dSaiEnt');
    const dtSaiEnt = dhSaiEnt ? U().parseDataXML(dhSaiEnt) : '';

    // NOTAS REFERENCIADAS (ide > NFref > refNFe) — amarração documental:
    // retorno de industrialização referencia a remessa original; devolução
    // referencia a venda. Pode haver várias por nota.
    const refsNFe = [];
    const nfrefList = ide ? ide.getElementsByTagName('NFref') : [];
    for (let ri = 0; ri < nfrefList.length; ri++) {
      const rch = t(nfrefList[ri], 'refNFe');
      if (rch) refsNFe.push(U().normalizarChaveNFe(rch));
    }

    const emitEl = infNFe.getElementsByTagName('emit')[0];
    const emitCNPJ = U().normalizarCnpj(t(emitEl, 'CNPJ') || t(emitEl, 'CPF'));
    const emitNome = t(emitEl, 'xNome');

    const destEl = infNFe.getElementsByTagName('dest')[0];
    const destCNPJ = U().normalizarCnpj(t(destEl, 'CNPJ') || t(destEl, 'CPF'));
    const destNome = t(destEl, 'xNome');

    // LOCAL DE ENTREGA/RETIRADA diverso (industrialização por conta e ordem:
    // a compra 1122/2122 tem o industrializador no bloco <entrega>)
    const entregaEl = infNFe.getElementsByTagName('entrega')[0];
    const entregaCNPJ = entregaEl ? U().normalizarCnpj(t(entregaEl, 'CNPJ') || t(entregaEl, 'CPF')) : '';
    const entregaNome = entregaEl ? (t(entregaEl, 'xNome') || '') : '';
    const retiradaEl = infNFe.getElementsByTagName('retirada')[0];
    const retiradaCNPJ = retiradaEl ? U().normalizarCnpj(t(retiradaEl, 'CNPJ') || t(retiradaEl, 'CPF')) : '';

    // informações complementares da nota (texto livre: "ref. NF nº…", lote, OP)
    const infAdicEl = infNFe.getElementsByTagName('infAdic')[0];
    const infCpl = infAdicEl ? (t(infAdicEl, 'infCpl') || '').slice(0, 500) : '';

    // entrada ou saída pra ESTA empresa; TRIANGULAR quando a empresa aparece
    // só no local de entrega/retirada ou como autorizada (autXML) — caso típico:
    // remessa por conta e ordem (5.923/6.923) do fornecedor pro industrializador,
    // acobertando mercadoria que a empresa comprou via 1122/2122
    let tipo;
    if (emitCNPJ === cnpjEmpresa) tipo = 'saida';        // empresa emitiu → vendeu
    else if (destCNPJ === cnpjEmpresa) tipo = 'entrada'; // empresa é destinatária → comprou
    else {
      const autXML = infNFe.getElementsByTagName('autXML');
      let autorizada = false;
      for (let ai = 0; ai < autXML.length; ai++) {
        if (U().normalizarCnpj(t(autXML[ai], 'CNPJ')) === cnpjEmpresa) { autorizada = true; break; }
      }
      if (entregaCNPJ === cnpjEmpresa || retiradaCNPJ === cnpjEmpresa || autorizada) tipo = 'triangular';
      else tipo = 'desconhecido';
    }

    // cancelamento (protNFe.infProt.cStat)
    let cancelada = false, cStat = '';
    const infProt = doc.getElementsByTagName('infProt');
    if (infProt.length > 0) {
      cStat = t(infProt[0], 'cStat');
      if (['101', '102', '135', '155'].includes(cStat)) cancelada = true;
    }

    // itens (<det nItem="N">)
    const detList = infNFe.getElementsByTagName('det');
    const itens = [];

    for (let i = 0; i < detList.length; i++) {
      const det = detList[i];
      const nItemRaw = det.getAttribute('nItem') || String(i + 1);
      const nItem = String(parseInt(nItemRaw, 10)).padStart(3, '0'); // "001" como no SPED

      const prod = det.getElementsByTagName('prod')[0];
      const imposto = det.getElementsByTagName('imposto')[0];
      if (!prod) continue;

      const cProd = t(prod, 'cProd');
      const cEAN = (t(prod, 'cEAN') || '').replace(/\D/g, '');
      const xProd = t(prod, 'xProd');
      const NCM = t(prod, 'NCM');
      const CEST = t(prod, 'CEST');
      const CFOP = t(prod, 'CFOP');
      const uCom = (t(prod, 'uCom') || '').toUpperCase().trim();
      const qCom = parseFloat(t(prod, 'qCom') || '0');
      const vUnCom = parseFloat(t(prod, 'vUnCom') || '0');
      const vProd = parseFloat(t(prod, 'vProd') || '0');
      const cBenef = t(prod, 'cBenef');
      // informação adicional do ITEM (lote, OP, "ref. remessa nº…")
      const infAdProd = (t(det, 'infAdProd') || '').slice(0, 300);

      // ICMS — vários tipos possíveis (ICMS00, ICMS10, ICMS60, ICMSSN500, etc.)
      let CST = '', CSOSN = '', pICMS = 0, vICMS = 0, vBC = 0;
      let pST = 0, vBCST = 0, vICMSST = 0, vBCSTRet = 0, vICMSSTRet = 0, vICMSSubstituto = 0;
      // FCP / FEM (Fundo de Erradicação da Miséria) — operação própria, ST e ST retido
      let pFCP = 0, vFCP = 0, vBCFCP = 0;
      let pFCPST = 0, vFCPST = 0, vBCFCPST = 0, vFCPSTRet = 0, vBCFCPSTRet = 0;
      if (imposto) {
        const icms = imposto.getElementsByTagName('ICMS')[0];
        if (icms) {
          for (let j = 0; j < icms.children.length; j++) {
            const ic = icms.children[j];
            CST = t(ic, 'CST');
            CSOSN = t(ic, 'CSOSN');
            pICMS = parseFloat(t(ic, 'pICMS') || '0');
            vICMS = parseFloat(t(ic, 'vICMS') || '0');
            vBC = parseFloat(t(ic, 'vBC') || '0');
            pST = parseFloat(t(ic, 'pST') || '0') || parseFloat(t(ic, 'pICMSST') || '0');
            vBCST = parseFloat(t(ic, 'vBCST') || '0');
            vICMSST = parseFloat(t(ic, 'vICMSST') || '0');
            vBCSTRet = parseFloat(t(ic, 'vBCSTRet') || '0');
            vICMSSTRet = parseFloat(t(ic, 'vICMSSTRet') || '0');
            vICMSSubstituto = parseFloat(t(ic, 'vICMSSubstituto') || '0');
            // FCP/FEM — operação própria
            pFCP = parseFloat(t(ic, 'pFCP') || '0');
            vFCP = parseFloat(t(ic, 'vFCP') || '0');
            vBCFCP = parseFloat(t(ic, 'vBCFCP') || '0');
            // FCP/FEM — ST
            pFCPST = parseFloat(t(ic, 'pFCPST') || '0');
            vFCPST = parseFloat(t(ic, 'vFCPST') || '0');
            vBCFCPST = parseFloat(t(ic, 'vBCFCPST') || '0');
            // FCP/FEM — ST retido anteriormente
            vFCPSTRet = parseFloat(t(ic, 'vFCPSTRet') || '0');
            vBCFCPSTRet = parseFloat(t(ic, 'vBCFCPSTRet') || '0');
          }
        }
      }

      // PIS/COFINS do item (úteis pra cruzamento futuro)
      let cstPIS = '', vPIS = 0, cstCOFINS = '', vCOFINS = 0;
      if (imposto) {
        const pis = imposto.getElementsByTagName('PIS')[0];
        if (pis && pis.children.length) {
          const p = pis.children[0];
          cstPIS = t(p, 'CST'); vPIS = parseFloat(t(p, 'vPIS') || '0');
        }
        const cof = imposto.getElementsByTagName('COFINS')[0];
        if (cof && cof.children.length) {
          const c = cof.children[0];
          cstCOFINS = t(c, 'CST'); vCOFINS = parseFloat(t(c, 'vCOFINS') || '0');
        }
      }

      // id_pareamento só faz sentido amarrado ao período/empresa; na saída já
      // dá pra gerar (codItem = cProd). Na entrada fica null até a cascata casar.
      const id_pareamento = (tipo === 'saida')
        ? U().gerarIdPareamento(cnpjEmpresa, periodo, chave, nItem)
        : null;

      itens.push({
        id_xml_item: `${cnpjEmpresa}_${chave}_${nItem}`,
        cnpj_empresa: cnpjEmpresa,
        periodo,
        chave,
        tipo_operacao: tipo,
        nItem,
        cProd,
        cEAN,
        descricao: xProd,
        ncm: NCM,
        cest: CEST,
        cfop: CFOP,
        cBenef,
        unidade: uCom,
        qtd: qCom,
        vl_unit: vUnCom,
        vl_item: vProd,
        // ICMS
        cst_icms: CST,
        csosn: CSOSN,
        aliq_icms: pICMS,
        vl_bc_icms: vBC,
        vl_icms: vICMS,
        aliq_st: pST,
        vl_bc_icms_st: vBCST,
        vl_icms_st: vICMSST,
        vl_bc_st_ret: vBCSTRet,
        vl_icms_st_ret: vICMSSTRet,
        vl_icms_substituto: vICMSSubstituto,
        // FCP / FEM (Fundo de Erradicação da Miséria — 2% na cerveja em MG)
        aliq_fcp: pFCP,
        vl_fcp: vFCP,
        vl_bc_fcp: vBCFCP,
        aliq_fcp_st: pFCPST,
        vl_fcp_st: vFCPST,
        vl_bc_fcp_st: vBCFCPST,
        vl_fcp_st_ret: vFCPSTRet,
        vl_bc_fcp_st_ret: vBCFCPSTRet,
        // PIS/COFINS
        cst_pis: cstPIS,
        vl_pis: vPIS,
        cst_cofins: cstCOFINS,
        vl_cofins: vCOFINS,
        // cabeçalho denormalizado
        modelo,
        serie,
        num_doc: numNF,
        tpNF,
        dt_emi: dtEmi,
        dt_sai_ent: dtSaiEnt,               // data de circulação (prazo da suspensão conta daqui)
        refs_nfe: refsNFe,                   // chaves das notas referenciadas (amarração retorno→remessa)
        entrega_cnpj: entregaCNPJ,           // industrializador nas compras por conta e ordem (1122/2122)
        entrega_nome: entregaNome,
        retirada_cnpj: retiradaCNPJ,
        inf_cpl: infCpl,                     // informações complementares da nota
        inf_ad_prod: infAdProd,              // informação adicional do item (lote/OP/ref)
        emit_cnpj: emitCNPJ,
        emit_nome: emitNome,
        dest_cnpj: destCNPJ,
        dest_nome: destNome,
        // status
        cStat,
        cancelada,
        // cotejo
        cod_item: tipo === 'saida' ? cProd : null,  // entrada: descoberto pela cascata
        id_pareamento,
        confianca_cotejo: tipo === 'saida' ? 'alta' : null,
        metodo_cotejo: tipo === 'saida' ? 'saida_direto' : null,
        status_cotejo: null,  // pareado / sem_sped / sem_match — preenchido no cotejo
        // custódia
        arquivo_xml: opts.nomeArquivo || '',
        sha256_xml: sha256,
      });
    }

    const meta = {
      chave, modelo, serie, numNF, tpNF, dt_emi: dtEmi, periodo,
      emit_cnpj: emitCNPJ, emit_nome: emitNome,
      dest_cnpj: destCNPJ, dest_nome: destNome,
      cStat, cancelada, arquivo_xml: opts.nomeArquivo || '', sha256,
    };

    return { meta, itens, tipo, cancelada };
  }

  /**
   * Parseia vários XMLs e separa entrada/saída.
   * @param {Array<{nome, conteudo}>} arquivos
   * @param {string} cnpjEmpresa
   * @param {function} onProgresso(proc, total)
   */
  async function parsearLote(arquivos, cnpjEmpresa, onProgresso) {
    const itens = [];            // todos os itens (entrada + saída + triangular/desconhecida)
    const cancelados = [];
    const erros = [];
    let nEntrada = 0, nSaida = 0, nOutros = 0;

    for (let i = 0; i < arquivos.length; i++) {
      const arq = arquivos[i];
      try {
        const r = await parsear(arq.conteudo, { nomeArquivo: arq.nome, cnpjEmpresa });
        if (r.cancelada) {
          cancelados.push({ arquivo: arq.nome, chave: r.meta.chave, cStat: r.meta.cStat });
          // mesmo cancelada, guardamos os itens marcados (útil pra auditoria)
        }
        if (r.tipo === 'entrada') { itens.push(...r.itens); nEntrada += r.itens.length; }
        else if (r.tipo === 'saida') { itens.push(...r.itens); nSaida += r.itens.length; }
        else {
          // triangular (conta e ordem) ou desconhecida: GUARDA mesmo assim —
          // estava no acervo da empresa e é prova em auditoria (industrialização,
          // operações por conta e ordem). Não polui as telas de entrada/saída
          // (elas filtram por tipo_operacao) e sai íntegra no export.
          itens.push(...r.itens); nOutros += r.itens.length;
        }
      } catch (e) {
        erros.push({ arquivo: arq.nome, motivo: e.message });
      }
      if (onProgresso && (i + 1) % 50 === 0) onProgresso(i + 1, arquivos.length);
    }
    if (onProgresso) onProgresso(arquivos.length, arquivos.length);

    return { itens, nEntrada, nSaida, nOutros, cancelados, erros };
  }

  return { parsear, parsearLote };
})();

window.ParserXML = ParserXML;


// ===================== parser_reinf.js =====================
// =====================================================================
// Revisor Fiscal Prime — parser_reinf.js
// Parser de eventos da EFD-Reinf (XML). Extrai retenções dos eventos:
//   R-2010 (evtServTom)  — serviços tomados, INSS retido do prestador (a recolher)
//   R-2020 (evtServPrest)— serviços prestados, INSS sofrido pelo tomador (sofrida)
//   R-4010 (evtRetPF)    — retenção IR de beneficiário PF (a recolher)
//   R-4020 (evtRetPJ)    — retenção IR/CSLL/PIS/COFINS de beneficiário PJ (a recolher)
// Outros eventos (R-1000, R-2098/99, R-5001/11, R-9000) são reconhecidos
// mas não geram retenção.
//
// Tolerante a namespace (compara localName) e a campos ausentes.
// =====================================================================

const ParserReinf = (function () {
  'use strict';

  const U = () => (typeof window !== 'undefined' ? window.Utils : globalThis.Utils);

  // ---- navegação tolerante a namespace ----
  function localName(el) {
    return el.localName || (el.nodeName || '').split(':').pop();
  }
  function filhosPorNome(root, nome) {
    const out = [];
    if (!root) return out;
    const todos = root.getElementsByTagName('*');
    for (let i = 0; i < todos.length; i++) {
      if (localName(todos[i]) === nome) out.push(todos[i]);
    }
    return out;
  }
  function primeiro(root, nome) {
    const l = filhosPorNome(root, nome);
    return l.length ? l[0] : null;
  }
  function txt(root, nome) {
    const el = primeiro(root, nome);
    return el ? (el.textContent || '').trim() : '';
  }
  function num(root, nome) {
    const s = txt(root, nome);
    if (!s) return 0;
    return parseFloat(s.replace(',', '.')) || 0;
  }

  const EVENTOS_RETENCAO = {
    evtServTom: 'R-2010',
    evtServPrest: 'R-2020',
    evtRetPF: 'R-4010',
    evtRetPJ: 'R-4020',
  };
  const EVENTOS_OUTROS = {
    evtInfoContri: 'R-1000', evtTabRubrica: 'R-1070',
    evtReabreEvPer: 'R-2098', evtFechaEvPer: 'R-2099',
    evtTotal: 'R-5001', evtTotalContrib: 'R-5011', evtRet: 'R-5011',
    evtExclusao: 'R-9000', evtExclusaoEvtsR4000: 'R-9015',
  };

  /**
   * Parseia um XML de evento Reinf.
   * @returns {Promise<{meta, retencoes, tipo_evento, evento_tag}>}
   */
  async function parsear(xmlTexto, opts) {
    opts = opts || {};
    const cnpjEmpresa = opts.cnpjEmpresa;
    const sha256 = await U().sha256(xmlTexto);

    let doc;
    try {
      doc = new DOMParser().parseFromString(xmlTexto, 'application/xml');
      const erros = doc.getElementsByTagName('parsererror');
      if (erros && erros.length > 0) throw new Error((erros[0].textContent || '').slice(0, 200));
    } catch (e) {
      throw new Error('Falha ao parsear XML Reinf: ' + e.message);
    }

    // acha o elemento de evento (primeira tag que começa com "evt")
    let evtEl = null, evtTag = '';
    const todos = doc.getElementsByTagName('*');
    for (let i = 0; i < todos.length; i++) {
      const ln = localName(todos[i]);
      if (ln && ln.startsWith('evt')) { evtEl = todos[i]; evtTag = ln; break; }
    }
    if (!evtEl) throw new Error('XML não parece ser um evento Reinf (sem tag evt*)');

    const tipoEvento = EVENTOS_RETENCAO[evtTag] || EVENTOS_OUTROS[evtTag] || evtTag;

    // campos comuns
    const ideEvento = primeiro(evtEl, 'ideEvento');
    const perApur = txt(ideEvento, 'perApur');           // "AAAA-MM" ou "AAAA"
    const periodo = (perApur && perApur.length >= 7) ? perApur.slice(0, 7) : (perApur || 'sem-periodo');
    const ideContri = primeiro(evtEl, 'ideContri');
    const nrInscContri = U().soDigitos(txt(ideContri, 'nrInsc'));

    const meta = {
      evento_tag: evtTag, tipo_evento: tipoEvento, periodo, perApur,
      cnpj_contribuinte: nrInscContri, arquivo_reinf: opts.nomeArquivo || '', sha256,
    };

    // se não é evento de retenção, retorna sem retenções
    if (!EVENTOS_RETENCAO[evtTag]) {
      return { meta, retencoes: [], tipo_evento: tipoEvento, evento_tag: evtTag };
    }

    let retencoes = [];
    if (evtTag === 'evtServTom') retencoes = extrairServ(evtEl, meta, cnpjEmpresa, 'tomador');
    else if (evtTag === 'evtServPrest') retencoes = extrairServ(evtEl, meta, cnpjEmpresa, 'prestador');
    else if (evtTag === 'evtRetPJ') retencoes = extrairRet4000(evtEl, meta, cnpjEmpresa, 'PJ');
    else if (evtTag === 'evtRetPF') retencoes = extrairRet4000(evtEl, meta, cnpjEmpresa, 'PF');

    return { meta, retencoes, tipo_evento: tipoEvento, evento_tag: evtTag };
  }

  // ---- R-2010 / R-2020 (INSS sobre serviços) ----
  function extrairServ(evtEl, meta, cnpjEmpresa, papel) {
    const out = [];
    const sentido = papel === 'tomador' ? 'a_recolher' : 'sofrida';
    // estabelecimentos prestadores (R-2010) ou tomadores (R-2020)
    // R-2010: ideEstabPrest > nfs > infoTpServ ; contraparte = prestador
    // R-2020: ideEstabPrest > ideTomador > nfs > infoTpServ ; contraparte = tomador
    const blocosContraparte = papel === 'tomador'
      ? filhosPorNome(evtEl, 'ideEstabPrest')
      : filhosPorNome(evtEl, 'ideTomador');

    const processarBloco = (bloco, cnpjContra) => {
      const nfsList = filhosPorNome(bloco, 'nfs');
      if (nfsList.length === 0) {
        // sem detalhamento por NF: usa totais do bloco
        const base = num(bloco, 'vlrTotalBaseRet') || num(bloco, 'vlrBaseRet');
        const ret = num(bloco, 'vlrTotalRetPrinc') || num(bloco, 'vlrRetencao');
        if (ret > 0 || base > 0) {
          out.push(montarServ(meta, sentido, papel, cnpjContra, '', '', '', 0, '', base, ret));
        }
        return;
      }
      for (const nf of nfsList) {
        const serie = txt(nf, 'serie');
        const numDoc = txt(nf, 'numDocto');
        const dt = txt(nf, 'dtEmissaoNF');
        const vlrBruto = num(nf, 'vlrBruto');
        const servs = filhosPorNome(nf, 'infoTpServ');
        if (servs.length === 0) {

          <div class="k-sub">${T.erro.n} achado(s)</div>
        </div>
        <div class="aud-kpi k-tot" data-nat="" title="Clique para ver todos os achados">
          <div class="k-rot">📋 Achados</div>
          <div class="k-val">${ativosTot.length}</div>
          <div class="k-sub">${regras.length} regras avaliadas${_temasOff.size ? ` · <span style="color:#b26a00">${_temasOff.size} tema(s) fora do totalizador</span>` : (persistido ? ' · última execução' : '')}</div>
        </div>
      </div>`;

    const suspBox = suspItens.length ? suspBoxHtml(suspItens, suspTotal, incluiSusp, fmt) : '';

    const vtabs = `
      <div class="aud-vtabs">
        <button data-view="resumo" class="${_view === 'resumo' ? 'ativa' : ''}">📊 Resumo</button>
        <button data-view="detalhe" class="${_view === 'detalhe' ? 'ativa' : ''}">📋 Detalhe (${achados.length})</button>
      </div>`;

    const resumoView = `
      <div id="aud-view-resumo"${_view === 'resumo' ? '' : ' hidden'}>
        ${totalizadorEsferasHtml(ativosTot, fmt)}
        ${blocoEsferaHtml(achados, 'estadual', fmt)}
        ${blocoEsferaHtml(achados, 'federal', fmt)}
        ${aberturaFilialV2Html(ativosTot, fmt)}
        <details style="margin-top:16px">
          <summary style="cursor:pointer;font-weight:700;color:var(--primaria)">🔬 Diagnóstico das regras avaliadas (${regras.length})</summary>
          <div style="margin-top:8px">${tabelaRegrasHtml(regras)}</div>
        </details>
      </div>`;

    const detalheView = `
      <div id="aud-view-detalhe"${_view === 'detalhe' ? '' : ' hidden'}>
        ${filtrosBarHtml(achados)}
        <div class="aud-det-contador" id="aud-det-contador"></div>
        <div class="aud-lista" id="aud-det-lista"></div>
      </div>`;

    alvo.innerHTML = kpis + suspBox + vtabs + resumoView + detalheView;
    attachResultadoHandlers(alvo);
    if (_view === 'detalhe') aplicarFiltrosDetalhe(alvo);
  }

  // ---- seção "por tese" do Resumo ----
  function temasSecaoHtml(achados, nat, fmt) {
    const meta = NAT_META[nat];
    const grupos = {};
    for (const a of achados) {
      if ((a.natureza || 'risco') !== nat) continue;
      const g = (grupos[a._regra] = grupos[a._regra] || { v: 0, vc: 0, n: 0, fil: new Set(), per: new Set(), nome: '' });
      g.v += Number(a.valor) || 0; g.vc += corrigidoDe(a); g.n++;
      if (a.cnpj_empresa) g.fil.add(a.cnpj_empresa);
      if (a.periodo) g.per.add(a.periodo);
      if (!g.nome) g.nome = TIPO_ROTULO[a.tipo] || a.titulo || a.tipo;
    }
    const ids = Object.keys(grupos);
    if (!ids.length) return '';
    ids.sort((x, y) => Math.abs(grupos[y].v) - Math.abs(grupos[x].v));
    const totalNat = ids.reduce((s, id) => s + (_temasOff.has(id) ? 0 : grupos[id].v), 0);
    const nForaCount = ids.filter(id => _temasOff.has(id)).length;
    const cards = ids.map(id => {
      const g = grupos[id];
      const doc = docDe(id);
      const esf = esferaDe(id);
      const off = _temasOff.has(id);
      return `
        <div class="aud-tema t-${meta.cor}${off ? ' t-off' : ''}" data-regra="${Utils.escapeHtml(id)}">
          <div class="aud-tema-top">
            <span class="aud-tema-id">${Utils.escapeHtml(id)}</span>
            <span style="display:flex;align-items:center;gap:6px">
              <span class="aud-tema-esf ${esf === 'federal' ? 'fed' : 'est'}">${esf === 'federal' ? 'FEDERAL' : 'ICMS · MG'}</span>
              <button class="aud-tema-toggle${off ? ' off' : ''}" data-toggle="${Utils.escapeHtml(id)}"
                title="${off ? 'Tema fora do totalizador — clique para reincluir' : 'Clique para excluir este tema do totalizador'}">⏻</button>
            </span>
          </div>
          <div class="aud-tema-val">${fmt(g.v)}</div>
          ${g.vc > g.v + 0.005 ? `<div class="aud-tema-corr">💹 corrigido (Selic): ${fmt(g.vc)}</div>` : ''}
          <div class="aud-tema-nome">${Utils.escapeHtml((doc && doc.nome) || g.nome || id)}</div>
          <div class="aud-tema-meta">${g.n} achado(s) · ${g.fil.size || 1} filial(is) · ${g.per.size} período(s)${off ? ' · <b>fora do totalizador</b>' : ''}</div>
          <div class="aud-tema-cta">clique para ver a tese →</div>
        </div>`;
    }).join('');
    return `
      <h3 class="aud-sec-tit ${meta.cor}">${meta.ico} ${meta.rot} por tese
        <span class="n">· ${ids.length} tese(s) · total ${fmt(totalNat)}${nForaCount ? ` · ${nForaCount} fora do totalizador` : ''}</span></h3>
      <div class="aud-temas">${cards}</div>`;
  }

  // ---- bloco por esfera (Estadual × Federal), com subtotal do bloco ----
  function blocoEsferaHtml(achados, esf, fmt) {
    const doEsf = achados.filter(a => esferaDe(a._regra) === esf);
    if (!doEsf.length) return '';
    const meta = ESFERA_META[esf];
    const at = doEsf.filter(a => !_temasOff.has(a._regra));
    const st = { credito: 0, risco: 0, erro: 0 };
    for (const a of at) { const v = Number(a.valor) || 0; st[a.natureza === 'credito' ? 'credito' : a.natureza === 'erro' ? 'erro' : 'risco'] += v; }
    return `
      <div class="aud-esf-bloco ${esf === 'federal' ? 'fed' : 'est'}">
        <div class="aud-esf-tit">
          <span>${esf === 'federal' ? '🇧🇷 Federal · PIS/COFINS · IRPJ/CSLL · IPI' : '🏛️ Estadual · ICMS/MG'}</span>
          <span class="aud-esf-tot">💰 ${fmt(st.credito)} &nbsp;·&nbsp; ⚠️ ${fmt(st.risco)}${st.erro ? ` &nbsp;·&nbsp; 🛠️ ${fmt(st.erro)}` : ''} &nbsp;·&nbsp; ${at.length} achado(s)</span>
        </div>
        ${temasSecaoHtml(doEsf, 'credito', fmt)}
        ${temasSecaoHtml(doEsf, 'risco', fmt)}
        ${temasSecaoHtml(doEsf, 'erro', fmt)}
      </div>`;
  }

  // ---- correção Selic de um achado (memoizada por render) ----
  // POLÍTICA: crédito ESCRITURAL de ICMS não se corrige (aproveitamento pelo
  // valor nominal — RICMS/MG, art. 67, § 2º do Dec. 43.080/2002, regra mantida
  // no Dec. 48.589/2023; STF: correção de crédito escritural exige lei estadual).
  // Débitos/riscos estaduais e TODOS os valores federais corrigem pela Selic.
  function selicAplicavel(a) {
    return !(a && a.natureza === 'credito' && esferaDe(a._regra) === 'estadual');
  }
  function corrigidoDe(a) {
    if (!window.Selic) return Number(a.valor) || 0;
    if (!selicAplicavel(a)) return Number(a.valor) || 0;
    if (a.__sel == null) a.__sel = Selic.corrigirAchado(a).corrigido;
    return a.__sel;
  }

  // ---- totalizador Estadual × Federal do topo do Resumo (original × corrigido Selic) ----
  function totalizadorEsferasHtml(ativos, fmt) {
    const M = { estadual: { credito: 0, creditoC: 0, risco: 0, riscoC: 0, erro: 0, n: 0 },
                federal: { credito: 0, creditoC: 0, risco: 0, riscoC: 0, erro: 0, n: 0 } };
    for (const a of ativos) {
      const e = esferaDe(a._regra); const v = Number(a.valor) || 0; const vc = corrigidoDe(a);
      if (a.natureza === 'credito') { M[e].credito += v; M[e].creditoC += vc; }
      else if (a.natureza === 'erro') { M[e].erro += v; }
      else { M[e].risco += v; M[e].riscoC += vc; }
      M[e].n++;
    }
    const linha = (rot, m, cls, esf) => `<tr class="${cls}${esf ? ' aud-tot-esf' : ''}"${esf ? ` data-esf="${esf}" title="Clique para ir até o bloco ${esf}"` : ''}>
      <td style="font-weight:700">${rot}${esf ? ' <span style="font-weight:400;color:var(--texto-fraco);font-size:11px">↓</span>' : ''}</td>
      <td style="text-align:right;color:#1a7f4b;font-weight:700">${fmt(m.credito)}</td>
      <td style="text-align:right;color:#1a7f4b">${fmt(m.creditoC)}</td>
      <td style="text-align:right;color:#c0392b;font-weight:600">${fmt(m.risco)}</td>
      <td style="text-align:right;color:#c0392b">${fmt(m.riscoC)}</td>
      <td style="text-align:right;color:#b26a00">${m.erro ? fmt(m.erro) : '—'}</td>
      <td style="text-align:right">${m.n}</td></tr>`;
    const tot = { credito: M.estadual.credito + M.federal.credito, creditoC: M.estadual.creditoC + M.federal.creditoC,
      risco: M.estadual.risco + M.federal.risco, riscoC: M.estadual.riscoC + M.federal.riscoC,
      erro: M.estadual.erro + M.federal.erro, n: M.estadual.n + M.federal.n };
    const falt = window.Selic ? Selic.faltantesAte() : [];
    const notaSelic = `<p style="font-size:11.5px;color:var(--texto-fraco);margin:6px 0 0">📈 Corrigido pela Selic acumulada (regra RFB: soma das taxas do mês seguinte à competência + 1% no mês atual). <strong>Créditos estaduais NÃO corrigem</strong>: o aproveitamento escritural de ICMS é pelo valor nominal (RICMS/MG, art. 67, § 2º). Consolidados/sem competência mensal também não.</p>`
      + (falt.length ? `<p style="font-size:11.5px;color:#b26a00;margin:4px 0 0">⚠️ A tabela Selic está sem taxa em: ${falt.join(', ')} — inclua no editor para a correção ficar completa.</p>` : '');
    const nota = _temasOff.size
      ? `<p style="font-size:11.5px;color:#b26a00;margin:6px 0 0">⏻ ${_temasOff.size} tema(s) excluído(s) do totalizador pelo auditor: ${[..._temasOff].join(', ')} — clique no ⏻ do tema para reincluir. O laudo respeita esta seleção.</p>`
      : '';
    return `
      <h3 class="aud-sec-tit">🧮 Totalizador — Estadual × Federal
        <button class="aud-btn-selic" id="btn-tab-selic" title="Editar a tabela Selic (inclusive meses futuros)">📈 Tabela Selic</button>
        <button class="aud-btn-selic" id="btn-mem-calc" title="Baixar o relatório Excel com a memória de cálculo da correção">📥 Memória de cálculo (Excel)</button></h3>
      <div class="card" style="padding:12px 16px">
        <table class="tabela-dados">
          <thead><tr><th>Esfera</th><th style="text-align:right">💰 Oportunidades</th><th style="text-align:right">💹 corrigido</th><th style="text-align:right">⚠️ Riscos</th><th style="text-align:right">💹 corrigido</th><th style="text-align:right">🛠️ Erros</th><th style="text-align:right">Achados</th></tr></thead>
          <tbody>
            ${linha('🏛️ Estadual — ICMS/MG', M.estadual, '', 'est')}
            ${linha('🇧🇷 Federal', M.federal, '', 'fed')}
            ${linha('TOTAL', tot, 'aud-tot-linha')}
          </tbody>
        </table>
        ${notaSelic}
        ${nota}
      </div>`;
  }

  // ---- editor da tabela Selic (meses embutidos + inclusão manual de futuros) ----
  function abrirEditorSelic() {
    if (!window.Selic) return;
    const T = Selic.tabela();
    const anos = [...new Set(Object.keys(T).map(p => p.slice(0, 4)))].sort();
    const anoMax = Math.max(...anos.map(Number), new Date().getFullYear() + 1);
    for (let a = Number(anos[anos.length - 1]) + 1; a <= anoMax; a++) anos.push(String(a));
    const linhas = anos.map(ano => {
      const cels = [];
      for (let m = 1; m <= 12; m++) {
        const per = `${ano}-${String(m).padStart(2, '0')}`;
        const v = T[per];
        const marca = Selic.ehOverride(per) ? ' selic-ov' : (v == null ? ' selic-vazio' : '');
        cels.push(`<td><input class="selic-inp${marca}" data-per="${per}" type="number" step="0.01" min="0" value="${v == null ? '' : v}" placeholder="—"></td>`);
      }
      return `<tr><td style="font-weight:700">${ano}</td>${cels.join('')}</tr>`;
    }).join('');
    // aba de conferência: acumulada de cada competência até o mês atual (regra RFB)
    const mesAt = Selic.mesAtual();
    const linhasAcum = anos.map(ano => {
      const cels = [];
      for (let m = 1; m <= 12; m++) {
        const per = `${ano}-${String(m).padStart(2, '0')}`;
        if (per >= mesAt) { cels.push('<td style="color:var(--texto-fraco)">—</td>'); continue; }
        const a = Selic.acumuladoPct(per, mesAt);
        cels.push(`<td style="text-align:right${a.faltantes.length ? ';color:#b26a00' : ''}" title="${a.faltantes.length ? 'faltam taxas: ' + a.faltantes.join(', ') : 'competência ' + per + ' → ' + mesAt}">${a.pct.toFixed(2)}</td>`);
      }
      return `<tr><td style="font-weight:700">${ano}</td>${cels.join('')}</tr>`;
    }).join('');
    const corpo = `
      <div class="aud-vtabs" style="margin:0 0 10px">
        <button class="ativa" data-selic-aba="taxas">Taxas mensais</button>
        <button data-selic-aba="acum">Acumulada até ${mesAt} (conferência)</button>
      </div>
      <div id="selic-aba-taxas">
      <p style="font-size:12px;color:var(--texto-fraco);margin:0 0 8px">
        Taxas mensais em % — tabela divulgada pela RFB, <strong>conferida contra a fonte oficial em 09/07/2026</strong> (2019-01 a 2026-06). Meses novos: preencha aqui conforme a RFB divulgar (até o 5º dia útil do mês seguinte), e
        preencha os futuros: campos editados ficam <span class="selic-ov" style="padding:1px 6px;border-radius:4px">destacados</span> e salvos neste navegador.
        A correção usa a regra da RFB: soma das taxas do mês seguinte à competência até o mês anterior ao atual, + 1% no mês atual.</p>
      <div style="overflow:auto;max-height:48vh">
        <table class="tabela-dados selic-grid">
          <thead><tr><th>Ano</th>${['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'].map(m => `<th>${m}</th>`).join('')}</tr></thead>
          <tbody>${linhas}</tbody>
        </table>
      </div>
      </div>
      <div id="selic-aba-acum" hidden>
      <p style="font-size:12px;color:var(--texto-fraco);margin:0 0 8px">
        <strong>Selic acumulada por competência</strong> até ${mesAt}, já pela regra da RFB (soma do mês seguinte + 1% do mês atual) —
        é o percentual que multiplica o valor original. Use para conferir com a tabela de juros da Receita.</p>
      <div style="overflow:auto;max-height:48vh">
        <table class="tabela-dados selic-grid">
          <thead><tr><th>Ano</th>${['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'].map(m => `<th>${m}</th>`).join('')}</tr></thead>
          <tbody>${linhasAcum}</tbody>
        </table>
      </div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
        <button class="btn btn-primario" id="selic-salvar">Salvar alterações</button>
        <button class="btn" id="selic-restaurar" title="Remove todos os ajustes manuais e volta à tabela embutida">Restaurar padrão</button>
      </div>`;
    abrirModal('📈 Tabela Selic mensal', corpo);
    const m = document.getElementById('aud-modal');
    if (!m) return;
    m.querySelectorAll('[data-selic-aba]').forEach(bt => bt.onclick = () => {
      m.querySelectorAll('[data-selic-aba]').forEach(b => b.classList.toggle('ativa', b === bt));
      m.querySelector('#selic-aba-taxas').hidden = bt.dataset.selicAba !== 'taxas';
      m.querySelector('#selic-aba-acum').hidden = bt.dataset.selicAba !== 'acum';
    });
    m.querySelector('#selic-salvar').onclick = () => {
      m.querySelectorAll('.selic-inp').forEach(inp => {
        const per = inp.dataset.per, novo = inp.value;
        const atual = Selic.tabela()[per];

        if (novo !== '' && Number(novo) === Number(oficial) && !Selic.ehOverride(per)) return;
        if (novo === '') { if (Selic.ehOverride(per)) Selic.salvar(per, null); return; }
        if (Number(novo) !== Number(atual) || (oficial == null)) Selic.salvar(per, Number(novo));
        else if (Selic.ehOverride(per) && Number(novo) !== Number(oficial)) Selic.salvar(per, Number(novo));
      });
      fecharModal();
      if (_ultimoRender) {
        for (const a of (_ultimoRender.res.achados || [])) delete a.__sel;
        renderResultado(_ultimoRender.alvo, _ultimoRender.res, _ultimoRender.persistido);
      }
    };
    m.querySelector('#selic-restaurar').onclick = () => {
      if (!confirm('Remover todos os ajustes manuais da tabela Selic?')) return;
      Selic.restaurarPadrao(); fecharModal();
      if (_ultimoRender) {
        for (const a of (_ultimoRender.res.achados || [])) delete a.__sel;
        renderResultado(_ultimoRender.alvo, _ultimoRender.res, _ultimoRender.persistido);
      }
    };
  }

  // ---- abertura por filial v2 (linhas clicáveis + totais completos) ----
  function aberturaFilialV2Html(achados, fmt) {
    const porFil = {};
    for (const a of achados) {
      const c = a.cnpj_empresa || '(sem CNPJ)';
      const f = (porFil[c] = porFil[c] || { credito: 0, risco: 0, erro: 0, n: 0 });
      const v = Number(a.valor) || 0;
      if (a.natureza === 'credito') f.credito += v;
      else if (a.natureza === 'erro') f.erro += v;
      else f.risco += v;
      f.n++;
    }
    const cnpjs = Object.keys(porFil).sort();
    if (cnpjs.length <= 1) return '';
    const rot = (c) => (c.length === 14) ? Utils.formatarCNPJ(c) + (c.slice(8, 12) === '0001' ? ' (matriz)' : '') : c;
    const tot = { credito: 0, risco: 0, erro: 0, n: 0 };
    const linhas = cnpjs.map(c => {
      const f = porFil[c];
      tot.credito += f.credito; tot.risco += f.risco; tot.erro += f.erro; tot.n += f.n;
      return `<tr class="aud-fil-linha" data-filial="${c}" title="Clique para filtrar os achados desta filial">
        <td class="mono">${rot(c)}</td>
        <td style="text-align:right;color:#1a7f4b;font-weight:700">${f.credito ? fmt(f.credito) : '—'}</td>
        <td style="text-align:right;color:#c0392b;font-weight:600">${f.risco ? fmt(f.risco) : '—'}</td>
        <td style="text-align:right;color:#b26a00">${f.erro ? fmt(f.erro) : '—'}</td>
        <td style="text-align:right">${f.n}</td>
      </tr>`;
    }).join('');
    return `
      <h3 class="aud-sec-tit">🏢 Abertura por filial <span class="n">· ${cnpjs.length} CNPJ(s) · clique na linha para filtrar</span></h3>
      <div class="card" style="padding:14px 16px">
        <p style="font-size:12px;color:var(--texto-fraco);margin:0 0 8px">ICMS: o total consolidado é visão de apresentação; o <strong>aproveitamento é por inscrição estadual</strong>. Tributos federais consolidam no CNPJ raiz.</p>
        <table class="tabela-dados">
          <thead><tr><th>Filial</th><th style="text-align:right">💰 Oportunidades</th><th style="text-align:right">⚠️ Riscos</th><th style="text-align:right">🛠️ Erros</th><th style="text-align:right">Achados</th></tr></thead>
          <tbody>${linhas}
            <tr style="font-weight:800;background:var(--bg-destaque)">
              <td>Consolidado</td>
              <td style="text-align:right;color:#1a7f4b">${fmt(tot.credito)}</td>
              <td style="text-align:right;color:#c0392b">${fmt(tot.risco)}</td>
              <td style="text-align:right;color:#b26a00">${tot.erro ? fmt(tot.erro) : '—'}</td>
              <td style="text-align:right">${tot.n}</td>
            </tr>
          </tbody>
        </table>
      </div>`;
  }

  // ---- barra de filtros do Detalhe ----
  function filtrosBarHtml(achados) {
    const filiais = [...new Set(achados.map(a => a.cnpj_empresa).filter(Boolean))].sort();
    const regrasIds = [...new Set(achados.map(a => a._regra).filter(Boolean))].sort();
    const periodos = [...new Set(achados.map(a => a.periodo).filter(Boolean))].sort().reverse();
    const opt = (v, rot, sel) => `<option value="${Utils.escapeHtml(v)}"${v === sel ? ' selected' : ''}>${Utils.escapeHtml(rot)}</option>`;
    const chips = [['', 'Todos', 'c-todos'], ['credito', '💰 Oportunidades', 'c-cred'], ['risco', '⚠️ Riscos', 'c-risco'], ['erro', '🛠️ Erros', 'c-erro']]
      .map(([v, rot, cls]) => `<button class="aud-chip ${cls}${_filtros.nat === v ? ' ativa' : ''}" data-nat="${v}">${rot}</button>`).join('');
    return `
      <div class="aud-filtros">
        ${chips}
        <select id="aud-f-filial"><option value="">Todas as filiais</option>${filiais.map(c => opt(c, Utils.formatarCNPJ(c), _filtros.filial)).join('')}</select>
        <select id="aud-f-regra"><option value="">Todas as teses</option>${regrasIds.map(r => { const d = docDe(r); return opt(r, r + (d ? ' — ' + d.nome : ''), _filtros.regra); }).join('')}</select>
        <select id="aud-f-periodo"><option value="">Todos os períodos</option>${periodos.map(p => opt(p, p, _filtros.periodo)).join('')}</select>
        <input type="text" id="aud-f-busca" placeholder="buscar no título/descrição…" value="${Utils.escapeHtml(_filtros.busca)}">
        <button class="aud-f-limpar" id="aud-f-limpar">limpar filtros ✕</button>
      </div>`;
  }

  function aplicarFiltrosDetalhe(alvo) {
    const res = (_ultimoRender && _ultimoRender.res) || _ultimoResultado || {};
    const achados = _achadosVisiveis(res, _incluiSusp);
    const b = _filtros.busca.trim().toLowerCase();
    const lista = achados.filter(a =>
      (!_filtros.nat || (a.natureza || 'risco') === _filtros.nat)
      && (!_filtros.filial || a.cnpj_empresa === _filtros.filial)
      && (!_filtros.regra || a._regra === _filtros.regra)
      && (!_filtros.periodo || a.periodo === _filtros.periodo)
      && (!b || ((a.titulo || '') + ' ' + (a.descricao || '') + ' ' + (a.tipo || '')).toLowerCase().includes(b))
    ).sort((x, y) => {
      const ex = esferaDe(x._regra) === 'federal' ? 1 : 0, ey = esferaDe(y._regra) === 'federal' ? 1 : 0;
      if (ex !== ey) return ex - ey;   // bloco estadual primeiro, depois o federal
      return Math.abs(Number(y.valor) || 0) - Math.abs(Number(x.valor) || 0);
    });
    const total = lista.reduce((s, a) => s + (Number(a.valor) || 0), 0);
    const porEsf = { estadual: { n: 0, v: 0 }, federal: { n: 0, v: 0 } };
    for (const a of lista) { const e = esferaDe(a._regra); porEsf[e].n++; porEsf[e].v += Number(a.valor) || 0; }
    const cont = alvo.querySelector('#aud-det-contador');
    if (cont) cont.textContent = `${lista.length} achado(s) · total ${Utils.fmtBRL(total)} · 🏛️ estadual ${porEsf.estadual.n} (${Utils.fmtBRL(porEsf.estadual.v)}) · 🇧🇷 federal ${porEsf.federal.n} (${Utils.fmtBRL(porEsf.federal.v)})`;
    const box = alvo.querySelector('#aud-det-lista');
    if (!box) return;
    const visiveis = lista.slice(0, _detLimite);
    const cab = (esf) => esf === 'federal'
      ? `<div class="aud-det-bloco fed">🇧🇷 FEDERAL — ${porEsf.federal.n} achado(s) · ${Utils.fmtBRL(porEsf.federal.v)}</div>`
      : `<div class="aud-det-bloco est">🏛️ ESTADUAL · ICMS/MG — ${porEsf.estadual.n} achado(s) · ${Utils.fmtBRL(porEsf.estadual.v)}</div>`;
    let htmlLista = '', esfAtual = null;
    for (const a of visiveis) {
      const e = esferaDe(a._regra);
      if (e !== esfAtual) { htmlLista += cab(e); esfAtual = e; }
      htmlLista += achadoCard(a);
    }
    box.innerHTML = htmlLista
      + (lista.length > _detLimite ? `<button class="aud-vermais" id="aud-vermais">mostrar mais ${Math.min(150, lista.length - _detLimite)} de ${lista.length - _detLimite} restantes</button>` : '');
    box.querySelectorAll('.aud-achado.clicavel').forEach(el => {
      el.onclick = () => abrirDetalheAchado(el.dataset.achado);
    });
    const vm = box.querySelector('#aud-vermais');
    if (vm) vm.onclick = () => { _detLimite += 150; aplicarFiltrosDetalhe(alvo); };
  }

  function setView(alvo, v) {
    _view = v; _detLimite = 150;
    alvo.querySelectorAll('.aud-vtabs button').forEach(bt => bt.classList.toggle('ativa', bt.dataset.view === v));
    const r = alvo.querySelector('#aud-view-resumo'); const d = alvo.querySelector('#aud-view-detalhe');
    if (r) r.hidden = v !== 'resumo';
    if (d) d.hidden = v !== 'detalhe';
    if (v === 'detalhe') {
      // re-render da barra de filtros pra refletir seleção programática
      const res = (_ultimoRender && _ultimoRender.res) || {};
      const achados = _achadosVisiveis(res, _incluiSusp);
      const wrap = alvo.querySelector('#aud-view-detalhe');
      if (wrap) {
        wrap.innerHTML = filtrosBarHtml(achados)
          + '<div class="aud-det-contador" id="aud-det-contador"></div><div class="aud-lista" id="aud-det-lista"></div>';
        attachFiltroHandlers(alvo);
        aplicarFiltrosDetalhe(alvo);
      }
    }
  }

  // ---- popup da TESE (explica o número/tema) ----
  function abrirDetalheTese(regraId) {
    const res = _ultimoResultado || (_ultimoRender && _ultimoRender.res) || {};
    const achados = _achadosVisiveis(res, _incluiSusp).filter(a => a._regra === regraId);
    const doc = docDe(regraId);
    const rg = ((res.regras) || []).find(r => r.id === regraId) || {};
    const nome = (doc && doc.nome) || rg.nome || regraId;
    const total = achados.reduce((s, a) => s + (Number(a.valor) || 0), 0);
    const nat = achados.length ? (achados[0].natureza || 'risco') : 'risco';
    const esf = esferaDe(regraId);
    const porFil = {}; const porPer = {};
    for (const a of achados) {
      const c = a.cnpj_empresa || '—'; porFil[c] = (porFil[c] || 0) + (Number(a.valor) || 0);
      const p = a.periodo || '—'; porPer[p] = (porPer[p] || 0) + (Number(a.valor) || 0);
    }
    const mini = (obj, rotCol, fmtRot) => {
      const ks = Object.keys(obj).sort((x, y) => Math.abs(obj[y]) - Math.abs(obj[x])).slice(0, 8);
      if (ks.length < 2) return '';
      return `<table class="aud-modal-mini"><thead><tr><th>${rotCol}</th><th style="text-align:right">Valor</th></tr></thead><tbody>`
        + ks.map(k => `<tr><td>${Utils.escapeHtml(fmtRot ? fmtRot(k) : k)}</td><td style="text-align:right">${Utils.fmtBRL(obj[k])}</td></tr>`).join('')
        + `</tbody></table>`;
    };
    const bl = (achados.find(a => a.base_legal) || {}).base_legal || (doc && doc.fundamento) || '';
    const corpo = `
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <span class="aud-tema-esf ${esf === 'federal' ? 'fed' : 'est'}">${esf === 'federal' ? 'FEDERAL' : 'ICMS · MG'}</span>
        <span class="badge nat-badge-${nat}">${NAT_ROTULO[nat] || nat}</span>
      </div>
      <div class="aud-modal-sumario">${achados.length} achado(s) · total ${Utils.fmtBRL(total)}</div>
      ${doc && doc.regra ? `<div class="aud-modal-tese"><strong>A tese:</strong> ${Utils.escapeHtml(doc.regra)}</div>` : ''}
      ${doc && doc.le ? `<p style="font-size:12.5px;color:var(--texto-fraco);margin:6px 0"><strong>O que a regra cruza:</strong> ${Utils.escapeHtml(doc.le)}</p>` : ''}
      ${bl ? `<div class="aud-modal-legal"><strong>Embasamento legal:</strong> ${Utils.escapeHtml(bl)}</div>` : ''}
      ${mini(porFil, 'Por filial', (c) => c.length === 14 ? Utils.formatarCNPJ(c) : c)}
      ${mini(porPer, 'Por período (top 8)')}
      <button class="aud-modal-cta" id="aud-cta-detalhe">Ver os ${achados.length} achado(s) no Detalhe →</button>`;
    abrirModal(`${Utils.escapeHtml(regraId)} — ${Utils.escapeHtml(nome)}`, corpo);
    const cta = document.getElementById('aud-cta-detalhe');
    if (cta) cta.onclick = () => {
      fecharModal();
      _filtros = { nat: '', filial: '', regra: regraId, periodo: '', busca: '' };
      if (_ultimoRender) setView(_ultimoRender.alvo, 'detalhe');
    };
  }

  // ---- popup de UM achado ----
  function abrirDetalheAchado(idAchado) {
    const res = _ultimoResultado || (_ultimoRender && _ultimoRender.res) || {};
    const a = (res.achados || []).find(x => x.id_achado === idAchado);
    if (!a) return;
    const doc = docDe(a._regra);
    const corpo = detalheAchadoHtml(a)
      + (doc && doc.regra ? `<div class="aud-modal-tese"><strong>A tese por trás:</strong> ${Utils.escapeHtml(doc.regra)}</div>` : '')
      + `<button class="aud-modal-cta" id="aud-cta-tese">Ver a tese completa (${Utils.escapeHtml(a._regra || '')}) →</button>`;
    abrirModal(Utils.escapeHtml(TIPO_ROTULO[a.tipo] || a.titulo || a.tipo), corpo);
    const bt = document.getElementById('aud-cta-tese');
    if (bt) bt.onclick = () => abrirDetalheTese(a._regra);
  }

  function attachFiltroHandlers(alvo) {
    alvo.querySelectorAll('.aud-chip').forEach(ch => ch.onclick = () => {
      _filtros.nat = ch.dataset.nat; _detLimite = 150;
      alvo.querySelectorAll('.aud-chip').forEach(c2 => c2.classList.toggle('ativa', c2 === ch));
      aplicarFiltrosDetalhe(alvo);
    });
    const wire = (id, campo) => {
      const el = alvo.querySelector(id);
      if (el) el.onchange = () => { _filtros[campo] = el.value; _detLimite = 150; aplicarFiltrosDetalhe(alvo); };
    };
    wire('#aud-f-filial', 'filial'); wire('#aud-f-regra', 'regra'); wire('#aud-f-periodo', 'periodo');
    const bq = alvo.querySelector('#aud-f-busca');
    if (bq) bq.oninput = () => { _filtros.busca = bq.value; _detLimite = 150; aplicarFiltrosDetalhe(alvo); };
    const lp = alvo.querySelector('#aud-f-limpar');
    if (lp) lp.onclick = () => { _filtros = { nat: '', filial: '', regra: '', periodo: '', busca: '' }; setView(alvo, 'detalhe'); };
  }

  /**
   * ABERTURA POR FILIAL — como o crédito se aproveita:
   *   estadual: consolidado é só APRESENTAÇÃO; o aproveitamento é por
   *             inscrição estadual, então mostra o valor por filial.
   *   federal:  crédito é UM SÓ no CNPJ raiz — mostra a origem por filial só
   *             como rastreio, com a observação de que a apuração é única.
   * Só aparece quando os achados vêm de 2+ CNPJs.
   */
  function aberturaPorFilialHtml(achados, esfera, incluiSusp, fmt) {
    const porFil = {};
    for (const a of achados) {
      if (suspensaoDe(a) && !incluiSusp) continue;
      const c = a.cnpj_empresa || '(sem CNPJ)';
      (porFil[c] = porFil[c] || { credito: 0, risco: 0, n: 0 });
      const v = Number(a.valor) || 0;
      if (a.natureza === 'credito') porFil[c].credito += v;
      else if (a.natureza === 'risco') porFil[c].risco += v;
      porFil[c].n++;
    }
    const cnpjs = Object.keys(porFil);
    if (cnpjs.length <= 1) return '';
    cnpjs.sort();
    const rot = (c) => (c.length === 14)
      ? Utils.formatarCNPJ(c) + (c.slice(8, 12) === '0001' ? ' (matriz)' : '')
      : c;
    const linhas = cnpjs.map(c => `
      <tr>
        <td class="mono">${rot(c)}</td>
        <td style="text-align:right;color:var(--success);font-weight:600">${fmt(porFil[c].credito)}</td>
        <td style="text-align:right">${porFil[c].risco ? fmt(porFil[c].risco) : '—'}</td>
        <td style="text-align:right">${porFil[c].n}</td>
      </tr>`).join('');
    const totCred = cnpjs.reduce((s, c) => s + porFil[c].credito, 0);
    const nota = esfera === 'estadual'
      ? 'ICMS: o total consolidado é a visão de apresentação; o <strong>aproveitamento é por inscrição estadual</strong> — cada filial usa o próprio crédito na própria apuração.'
      : 'Tributos federais: a apuração é <strong>única no CNPJ raiz</strong> (matriz consolida). A quebra abaixo é só rastreio da origem, não divisão do crédito.';
    return `
      <div class="card">
        <h3 style="margin-top:0">Abertura por filial <span style="font-size:12px;font-weight:400;color:var(--texto-fraco)">— ${cnpjs.length} CNPJ(s) na seleção</span></h3>
        <p style="font-size:12.5px;color:var(--texto-fraco);margin:4px 0 10px">${nota}</p>
        <table class="tabela-dados">
          <thead><tr><th>Filial</th><th style="text-align:right">Créditos</th><th style="text-align:right">Riscos</th><th style="text-align:right">Achados</th></tr></thead>
          <tbody>${linhas}
            <tr style="font-weight:700;background:var(--fundo-suave,#f5f8fb)">
              <td>Consolidado</td>
              <td style="text-align:right;color:var(--success)">${fmt(totCred)}</td>
              <td style="text-align:right">—</td>
              <td style="text-align:right">${achados.length}</td>
            </tr>
          </tbody>
        </table>
      </div>`;
  }

  function suspBoxHtml(itens, total, incluiSusp, fmt) {
    const lista = itens.map(a => `
      <div class="aud-susp-item">
        <div class="aud-susp-item-top">
          <span class="aud-tipo">${TIPO_ROTULO[a.tipo] || a.tipo}</span>
          <span class="aud-periodo">${a.periodo || ''}</span>
          <span class="aud-susp-val">${fmt(a.valor || 0)}</span>
        </div>
        <div class="aud-susp-item-tit">${Utils.escapeHtml(a.titulo || '')}</div>
      </div>`).join('');

      <div class="aud-susp-box">
        <div class="aud-susp-head">

            <div class="aud-susp-rot">⏸ Em suspensão · estorno do regime especial (E111)</div>

            <div class="aud-susp-nota">O E111 da apuração descreve estes estornos de crédito como regime especial (e-PTA). Ficam separados do total até a análise do documento do regime — a solicitação está na aba Pendências. Só este estorno é suspenso: os demais créditos de ICMS seguem no total normalmente.</div>

  function tabelaRegrasHtml(regras) {
    if (!regras.length) return '<div class="card"><p class="aud-modal-vazio">Nenhuma regra desta esfera foi avaliada.</p></div>';
    const linhas = regras.map(rg => {
      const st = rg.status === 'achados' ? `${rg.n} achado(s)`
               : rg.status === 'limpo' ? '<span style="color:var(--success)">sem achados</span>'
               : rg.status === 'sem_dados' ? '<span style="color:var(--texto-fraco)">sem dados</span>'
               : rg.status === 'erro' ? '<span style="color:var(--danger)">erro</span>'
               : (rg.status || '—');
      const val = rg.valor ? Utils.fmtBRL(rg.valor) : '';
      const obs = rg.motivo ? `<br><span style="font-size:11px;color:var(--texto-fraco)">${Utils.escapeHtml(rg.motivo)}</span>` : '';
      return `<tr class="aud-regra-linha" data-regra="${Utils.escapeHtml(rg.id)}" title="Clique para ver a explicação e a base legal">`
        + `<td><strong>${rg.id}</strong></td><td>${Utils.escapeHtml(rg.nome || '')}${obs}</td>`
        + `<td>${st}</td><td style="text-align:right">${val} <span class="aud-chevron">›</span></td></tr>`;
    }).join('');
    return `
      <div class="card">
        <h3 style="margin-top:0">Resumo por regra <span style="font-size:12px;font-weight:400;color:var(--texto-fraco)">— clique numa linha para ver o detalhe e a base legal</span></h3>
        <table class="tabela-dados aud-tabela-regras">
          <thead><tr><th>Regra</th><th>Descrição</th><th>Resultado</th><th style="text-align:right">Valor</th></tr></thead>
          <tbody>${linhas}</tbody>
        </table>
      </div>`;
  }

  function listaAchadosHtml(achados, persistido, esfera) {
    const nome = esfera === 'federal' ? 'federal' : 'estadual';
    if (!achados.length) {
      return `<div class="card"><div class="construcao">
        <div class="construcao-icone">✅</div>
        <h3>Nenhum achado ${nome}</h3>
        <p>As regras desta esfera não encontraram divergências nos dados importados.</p>
      </div></div>`;
    }
    return `<div class="card">
      <h3 style="margin-top:0">Achados (${achados.length}) ${persistido ? '<span style="font-size:12px;font-weight:400;color:var(--texto-fraco)">— da última execução</span>' : ''}</h3>
      <div class="aud-lista">${achados.map(achadoCard).join('')}</div>
    </div>`;
  }

  function attachAbas(alvo) {
    const abas = [...alvo.querySelectorAll('.aud-aba')];
    const conts = [...alvo.querySelectorAll('.aud-aba-conteudo')];
    abas.forEach(b => {
      b.onclick = () => {
        abas.forEach(x => x.classList.toggle('ativa', x === b));
        const e = b.dataset.esfera;
        conts.forEach(c => { c.hidden = c.dataset.esfera !== e; });
      };
    });
  }

  // ------------------------------------------------------------------
  // Interação: clique na linha da regra (detalhe) + botão de inventário
  // ------------------------------------------------------------------
  function attachResultadoHandlers(alvo) {
    // KPIs → detalhe filtrado por natureza
    alvo.querySelectorAll('.aud-kpi').forEach(k => k.onclick = () => {
      _filtros = { nat: k.dataset.nat || '', filial: '', regra: '', periodo: '', busca: '' };
      setView(alvo, 'detalhe');
    });
    // abas de visão
    alvo.querySelectorAll('.aud-vtabs button').forEach(bt => bt.onclick = () => setView(alvo, bt.dataset.view));
    // editor da tabela Selic
    const btnSelic = alvo.querySelector('#btn-tab-selic');
    if (btnSelic) btnSelic.onclick = (ev) => { ev.stopPropagation(); abrirEditorSelic(); };
    // memória de cálculo em Excel
    const btnMem = alvo.querySelector('#btn-mem-calc');
    if (btnMem) btnMem.onclick = (ev) => {
      ev.stopPropagation();
      if (!window.MemoriaCalculo) return;
      const res = (_ultimoRender && _ultimoRender.res) || {};
      const achados = _achadosVisiveis(res, _incluiSusp);
      if (!achados.length) { alert('Sem achados para exportar — rode as auditorias primeiro.'); return; }
      MemoriaCalculo.baixar(achados, esferaDe, _temasOff);
    };
    // linhas do totalizador → rola até o bloco da esfera
    alvo.querySelectorAll('.aud-tot-esf').forEach(tr => tr.onclick = () => {
      const bloco = alvo.querySelector('.aud-esf-bloco.' + tr.dataset.esf);
      if (bloco && bloco.scrollIntoView) bloco.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    // toggle de tema: entra/sai do totalizador (não abre o popup)
    alvo.querySelectorAll('.aud-tema-toggle').forEach(bt => bt.onclick = (ev) => {
      ev.stopPropagation();
      const id = bt.dataset.toggle;
      if (_temasOff.has(id)) _temasOff.delete(id); else _temasOff.add(id);
      salvarTemasOff();
      if (_ultimoRender) renderResultado(_ultimoRender.alvo, _ultimoRender.res, _ultimoRender.persistido);
    });
    // cards de tese → popup
    alvo.querySelectorAll('.aud-tema').forEach(t => t.onclick = () => abrirDetalheTese(t.dataset.regra));
    // linhas de filial → detalhe filtrado
    alvo.querySelectorAll('.aud-fil-linha').forEach(tr => tr.onclick = () => {
      _filtros = { nat: '', filial: tr.dataset.filial, regra: '', periodo: '', busca: '' };
      setView(alvo, 'detalhe');
    });
    // diagnóstico das regras (tabela dentro do <details>)
    alvo.querySelectorAll('.aud-regra-linha').forEach(tr => {
      tr.onclick = () => abrirDetalheRegra(tr.dataset.regra);
    });
    // filtros do detalhe (quando a visão já nasce em detalhe)
    attachFiltroHandlers(alvo);
    const btnInv = alvo.querySelector('#btn-inventario');
    if (btnInv) btnInv.onclick = abrirInventario;
    const chk = alvo.querySelector('#chk-incl-susp');
    if (chk) chk.onchange = () => {
      _incluiSusp = chk.checked;
      if (_ultimoRender) renderResultado(_ultimoRender.alvo, _ultimoRender.res, _ultimoRender.persistido);
    };
  }

  // ---- modal genérico ----
  function _escClose(e) { if (e.key === 'Escape') fecharModal(); }
  function fecharModal() {
    const m = document.getElementById('aud-modal');
    if (m) m.remove();
    document.removeEventListener('keydown', _escClose);
  }
  function abrirModal(titulo, corpoHtml) {
    fecharModal();
    const ov = document.createElement('div');
    ov.id = 'aud-modal';
    ov.className = 'aud-modal-overlay';
    ov.innerHTML = `
      <div class="aud-modal-box" role="dialog" aria-modal="true">
        <div class="aud-modal-head">
          <h3>${titulo}</h3>
          <button class="aud-modal-x" aria-label="Fechar">✕</button>
        </div>

      </div>`;

    ov.querySelector('.aud-modal-x').onclick = fecharModal;
    document.body.appendChild(ov);
    document.addEventListener('keydown', _escClose);
  }

  // ---- detalhe de uma regra (toda a explicação + base legal) ----
  function abrirDetalheRegra(id) {
    const res = _ultimoResultado || {};
    const rg = (res.regras || []).find(r => r.id === id) || { id };
    const achados = (res.achados || []).filter(a => a._regra === id);
    let corpo;
    if (achados.length) {
      const total = achados.reduce((s, a) => s + (Number(a.valor) || 0), 0);
      corpo = `<div class="aud-modal-sumario">${achados.length} achado(s) · total ${Utils.fmtBRL(total)}</div>`
        + achados.map(detalheAchadoHtml).join('');
    } else {
      const ic = rg.status === 'limpo' ? '✅' : rg.status === 'sem_dados' ? 'ℹ️' : rg.status === 'erro' ? '⚠️' : '';
      const msg = rg.status === 'limpo' ? 'Sem divergências nesta regra.'
                : rg.status === 'sem_dados' ? 'Sem dados suficientes para avaliar esta regra.'
                : rg.status === 'erro' ? 'A regra falhou ao executar.'
                : 'Sem achados para esta regra.';
      corpo = `<p class="aud-modal-vazio">${ic} ${msg}</p>`
        + (rg.motivo ? `<p class="aud-modal-vazio">${Utils.escapeHtml(rg.motivo)}</p>` : '');
    }
    abrirModal(`${Utils.escapeHtml(id)} — ${Utils.escapeHtml(rg.nome || '')}`, corpo);
  }
  function detalheAchadoHtml(a) {
    const refs = (a.referencias || []).map(rf =>
      Object.entries(rf).map(([k, v]) => `<span class="aud-ref-k">${Utils.escapeHtml(k)}:</span> ${formatarRefValor(k, v)}`).join(' · ')
    ).join('<br>');
    return `
      <div class="aud-modal-achado">
        <div class="aud-modal-achado-top">
          <span class="aud-periodo">${Utils.escapeHtml(a.periodo || '')}</span>
          <span class="aud-valor">${Utils.fmtBRL(a.valor || 0)}</span>
        </div>
        <div class="aud-modal-achado-titulo">${Utils.escapeHtml(a.titulo || '')}</div>
        <p class="aud-modal-achado-desc">${Utils.escapeHtml(a.descricao || '')}</p>
        ${a.base_legal ? `<div class="aud-modal-legal"><strong>Embasamento legal:</strong> ${Utils.escapeHtml(a.base_legal)}</div>` : ''}
        ${refs ? `<div class="aud-modal-refs">${refs}</div>` : ''}
      </div>`;
  }

  // ------------------------------------------------------------------
  // Inventário de declarações importadas (períodos contínuos + faltantes)
  // ------------------------------------------------------------------
  const TIPO_DECL = {
    efd_fiscal:  { rotulo: 'EFD ICMS/IPI',      freq: 'mensal' },
    efd_contrib: { rotulo: 'EFD Contribuições', freq: 'mensal' },
    ecd:         { rotulo: 'ECD (contábil)',    freq: 'anual'  },
    ecf:         { rotulo: 'ECF',               freq: 'anual'  },
    reinf:       { rotulo: 'EFD-Reinf',         freq: 'mensal' },
    xml_nfe:     { rotulo: 'XML NF-e/NFC-e',    freq: 'mensal' },
  };
  function classeDecl(arq) {
    if (arq.origem && TIPO_DECL[arq.origem]) return arq.origem;
    if (arq.tipo === 'reinf') return 'reinf';
    if (arq.tipo === 'xml_nfe') return 'xml_nfe';
    if (arq.tipo && TIPO_DECL[arq.tipo]) return arq.tipo;
    return arq.origem || arq.tipo || 'outro';
  }
  const MESES = ['jan', 'fev', 'mar', 'abr', 'mai', 'jun', 'jul', 'ago', 'set', 'out', 'nov', 'dez'];
  function rotuloMes(idx) { return `${MESES[idx % 12]}/${Math.floor(idx / 12)}`; }
  // comprime um array ordenado de índices inteiros em faixas contíguas ("a – b" / "a")
  function _comprimir(indices, rotulo) {
    if (!indices.length) return [];
    const out = []; let ini = indices[0], prev = indices[0];
    for (let i = 1; i < indices.length; i++) {
      if (indices[i] === prev + 1) { prev = indices[i]; }
      else { out.push(ini === prev ? rotulo(ini) : `${rotulo(ini)} – ${rotulo(prev)}`); ini = indices[i]; prev = indices[i]; }
    }
    out.push(ini === prev ? rotulo(ini) : `${rotulo(ini)} – ${rotulo(prev)}`);
    return out;
  }
  const idxMes = (p) => { const m = String(p).match(/^(\d{4})-(\d{2})/); return m ? Number(m[1]) * 12 + (Number(m[2]) - 1) : null; };
  // janela: {min,max} de referência (período de atividade). Faltantes = janela sem aquela declaração,
  // não apenas os buracos internos. Imported = o que de fato veio. Tudo comprimido em faixas.
  function coberturaPeriodos(periodos, freq, janela) {
    if (freq === 'anual') {
      const anos = [...new Set(periodos.map(p => Number(String(p).slice(0, 4))).filter(Boolean))].sort((a, b) => a - b);
      const set = new Set(anos);
      const lo = janela ? janela.min : (anos[0] != null ? anos[0] : null);
      const hi = janela ? janela.max : (anos.length ? anos[anos.length - 1] : null);
      const faltam = [];
      if (lo != null && hi != null) for (let y = lo; y <= hi; y++) if (!set.has(y)) faltam.push(y);
      return { faixas: _comprimir(anos, y => String(y)), faltantes: _comprimir(faltam, y => String(y)) };
    }
    const idxs = [...new Set(periodos.map(idxMes).filter(v => v != null))].sort((a, b) => a - b);
    const set = new Set(idxs);
    const lo = janela ? janela.min : (idxs.length ? idxs[0] : null);
    const hi = janela ? janela.max : (idxs.length ? idxs[idxs.length - 1] : null);
    const faltam = [];
    if (lo != null && hi != null) for (let k = lo; k <= hi; k++) if (!set.has(k)) faltam.push(k);
    return { faixas: _comprimir(idxs, rotuloMes), faltantes: _comprimir(faltam, rotuloMes) };
  }
  async function abrirInventario() {
    const ativo = (typeof Clientes !== 'undefined' && Clientes.ativo) ? Clientes.ativo() : null;
    if (!ativo) { abrirModal('Inventário de declarações', '<p class="aud-modal-vazio">Selecione um cliente ativo.</p>'); return; }
    abrirModal('Inventário de declarações', '<p class="aud-modal-vazio">Carregando…</p>');
    let arquivos = [];
    try { arquivos = await DB.getByIndex('rev_arquivos', 'cnpj_empresa', ativo.cnpj); } catch (e) { arquivos = []; }
    // No modo ano-a-ano o banco só tem o ano carregado; os outros estão salvos no disco.
    // Lemos a custódia de todos os anos da pasta de trabalho e somamos.
    let leuDisco = false;
    if (typeof Armazenamento !== 'undefined' && Armazenamento.temPasta && Armazenamento.temPasta()) {
      abrirModal('Inventário de declarações', '<p class="aud-modal-vazio">Lendo declarações salvas no disco…</p>');
      try {
        const doDisco = await Armazenamento.arquivosNaPasta(ativo.cnpj);
        if (doDisco && doDisco.length) { arquivos = arquivos.concat(doDisco); leuDisco = true; }
      } catch (e) { /* sem permissão ou pasta indisponível: usa só o banco */ }
    }
    const porClasse = {};
    for (const a of arquivos) {
      if (!a.periodo || a.periodo === 'sem-periodo') continue;
      const c = classeDecl(a);
      (porClasse[c] = porClasse[c] || new Set()).add(a.periodo);
    }
    const ordem = ['efd_fiscal', 'efd_contrib', 'reinf', 'ecd', 'ecf', 'xml_nfe'];
    // mostra SEMPRE o checklist completo (mesmo o que não foi importado, p/ aparecer como faltando)
    const classes = [...new Set([...ordem, ...Object.keys(porClasse)])];

    // Janela de atividade = união de TODAS as competências mensais importadas (XML costuma ser a
    // mais ampla). É contra ela que medimos o que falta de cada declaração, não só os buracos internos.
    const todasMensais = [];
    for (const c of Object.keys(porClasse)) {
      const fr = (TIPO_DECL[c] || {}).freq || 'mensal';
      if (fr === 'mensal') for (const p of porClasse[c]) { const i = idxMes(p); if (i != null) todasMensais.push(i); }
    }
    todasMensais.sort((a, b) => a - b);
    const janelaMes = todasMensais.length ? { min: todasMensais[0], max: todasMensais[todasMensais.length - 1] } : null;
    if (!janelaMes && !Object.keys(porClasse).length) {
      abrirModal('Inventário de declarações', '<p class="aud-modal-vazio">Nenhuma declaração importada para este cliente.</p>');
      return;
    }
    const anoAtual = new Date().getFullYear();
    // anual (ECD/ECF): a do ano corrente ainda não venceu, então o teto é ano atual − 1
    const janelaAno = janelaMes
      ? { min: Math.floor(janelaMes.min / 12), max: Math.min(Math.floor(janelaMes.max / 12), anoAtual - 1) }
      : null;
    const refTxt = janelaMes ? `${rotuloMes(janelaMes.min)} a ${rotuloMes(janelaMes.max)}` : '—';

    const linhas = classes.map(c => {
      const meta = TIPO_DECL[c] || { rotulo: c, freq: 'mensal' };
      const periodos = porClasse[c] ? [...porClasse[c]] : [];
      const naoImp = periodos.length === 0;
      const janela = meta.freq === 'anual' ? janelaAno : janelaMes;
      const cob = coberturaPeriodos(periodos, meta.freq, janela);
      const faixas = naoImp ? '<span class="inv-naoimp">não importada</span>'
        : (cob.faixas.length ? cob.faixas.map(f => `<span class="inv-faixa">${f}</span>`).join(' ') : '—');
      const faltam = cob.faltantes.length
        ? cob.faltantes.map(f => `<span class="inv-falta">${f}</span>`).join(' ')
        : '<span class="inv-ok">nenhuma</span>';
      return `<tr${naoImp ? ' class="inv-linha-naoimp"' : ''}>
        <td><strong>${Utils.escapeHtml(meta.rotulo)}</strong><br><span class="inv-freq">${meta.freq} · ${naoImp ? 'não importada' : periodos.length + ' período(s)'}</span></td>
        <td>${faixas}</td>
        <td>${faltam}</td>
      </tr>`;
    }).join('');
    const corpo = `
      <p class="inv-intro">Período de atividade (pelas competências importadas): <strong>${refTxt}</strong>. ${leuDisco ? 'Cobertura lida do <strong>disco</strong> (todos os anos salvos na pasta de trabalho) somada ao banco carregado. ' : ''}A coluna "Importados" mostra o que de fato veio (faixas quebram quando falta um período no meio). A coluna "Faltantes" mostra o que falta <strong>dentro do período de atividade</strong> para cada declaração, não só os buracos internos. Mensais em mês/ano; ECD/ECF em ano (o ano corrente é ignorado por ainda não ter vencido).</p>
      <table class="inv-tabela">
        <thead><tr><th>Declaração</th><th>Importados</th><th>Faltantes (no período de atividade)</th></tr></thead>
        <tbody>${linhas}</tbody>
      </table>`;
    abrirModal('Inventário de declarações', corpo);
  }

  function achadoCard(a) {
    const sev = a.severidade || 'media';
    const nat = a.natureza || 'risco';
    const susp = suspensaoDe(a);
    const refs = (a.referencias || []).map(rf =>
      Object.entries(rf).map(([k, v]) => `${k}: ${formatarRefValor(k, v)}`).join(' · ')
    ).join('<br>');
    return `
      <div class="aud-achado clicavel sev-${sev}${susp ? ' aud-achado-susp' : ''}" data-achado="${Utils.escapeHtml(a.id_achado || '')}" title="Clique para abrir o detalhe">
        <div class="aud-achado-top">
          <span class="aud-tipo">${TIPO_ROTULO[a.tipo] || a.tipo}</span>
          ${susp ? `<span class="badge badge-susp">⏸ Suspenso · ${susp.rotulo}</span>` : ''}
          <span class="badge sev-badge-${sev}">${SEV_ROTULO[sev] || sev}</span>
          <span class="badge nat-badge-${nat}">${NAT_ROTULO[nat] || nat}</span>
          <span class="aud-periodo">${a.periodo || ''}</span>
          <span class="aud-valor">${Utils.fmtBRL(a.valor || 0)}${(() => { const c = corrigidoDe(a); return c > (Number(a.valor) || 0) + 0.005 ? ` <span class="aud-valor-corr" title="Corrigido pela Selic até o mês atual">💹 ${Utils.fmtBRL(c)}</span>` : ''; })()}</span>
        </div>
        <div class="aud-achado-titulo">${Utils.escapeHtml(a.titulo || '')}</div>
        <div class="aud-achado-desc">${Utils.escapeHtml(a.descricao || '')}</div>
        ${a.base_legal ? `<div class="aud-achado-legal"><strong>Base legal:</strong> ${Utils.escapeHtml(a.base_legal)}</div>` : ''}
        ${refs ? `<div class="aud-achado-refs">${refs}</div>` : ''}
      </div>`;
  }

  function formatarRefValor(k, v) {
    if (typeof v === 'number' && /vl_|valor|recuper|credito|diferenca|lucro|receita|fatur|icms|pis|cofins|ir|csll|inss|base/i.test(k)) {
      return Utils.fmtBRL(v);
    }
    if (typeof v === 'boolean') return v ? 'sim' : 'não';
    return Utils.escapeHtml(String(v));
  }

  function statBox(rotulo, valor, classe) {
    const cor = classe === 'cred' ? 'background:#e7f1ea'
              : classe === 'sev' ? 'background:#fbe9e9'
              : 'background:var(--bg-destaque)';
    return `<div class="stat-box" style="${cor}">
      <div style="font-size:22px;font-weight:700;color:var(--primaria)">${valor}</div>
      <div style="font-size:12px;color:var(--texto-fraco)">${rotulo}</div>
    </div>`;
  }

  function formatarData(iso) {
    if (!iso) return '—';
    try { return new Date(iso).toLocaleString('pt-BR'); } catch (e) { return iso; }
  }

  return { render };
})();

  }

  // ---- cards ----
  function cardSetor(s) {

        <div class="esp-card-obs">${Utils.escapeHtml(s.obs || '')}</div>
      </div>`;
  }

  function cardUF(u) {
    return `
      <div class="esp-card">
        <div class="esp-card-top">
          <strong>${Utils.escapeHtml(u.nome)} (${u.id})</strong>
          ${NIVEL_BADGE[u.nivel] || ''}
        </div>

  function cardCapacidade(c) {
    return `
      <div class="esp-cap">
        <span class="esp-cap-check">✓</span>
        <div>
          <strong>${Utils.escapeHtml(c.nome)}</strong>
          <span class="esp-cap-desc">${Utils.escapeHtml(c.desc || '')}</span>
        </div>
      </div>`;
  }

  function linhaCobertura(x) {
    const pct = x.total ? Math.round((x.implementadas / x.total) * 100) : 0;
    const pctDoc = 100 - pct;
    return `
      <div class="esp-cob-linha">
        <div class="esp-cob-rotulo">${Utils.escapeHtml(x.area.nome)}</div>
        <div class="esp-cob-barra">
          <div class="esp-cob-impl" style="width:${pct}%"></div>
          <div class="esp-cob-doc" style="width:${pctDoc}%"></div>
        </div>
        <div class="esp-cob-conta">${x.implementadas}/${x.total}</div>
      </div>`;

  function statBox(num, rotulo, classe) {
    const cor = classe === 'ok'    ? 'color:var(--success)'
              : classe === 'cred'  ? 'color:var(--success)'
              : classe === 'risco' ? 'color:var(--accent)'
              : classe === 'doc'   ? 'color:var(--primaria-clara)'

    return `<div class="stat-box">
      <div class="stat-num" style="${cor}">${num}</div>
      <div class="stat-label">${rotulo}</div>
    </div>`;

  return { render };

  function cnpjsExportSelecionados() {
    const marcados = [...document.querySelectorAll('.dprog-fil:checked')].map(i => i.value);
    if (marcados.length) return marcados;
    const cli = (window.Clientes && Clientes.ativo && Clientes.ativo()) || null;

  async function exportarResultadoAuditoria() {
    const status = document.getElementById('dprog-resultado-status');
    const setMsg = (txt) => { if (status) status.textContent = txt; };
    const cnpjs = cnpjsExportSelecionados();
    if (!cnpjs.length) { setMsg('⚠️ Selecione um cliente ativo primeiro (aba Clientes).'); return; }
    setMsg('Gerando resultado…');
    try {
      const r = await Armazenamento.exportarResultadoAuditoria(cnpjs);
      if (!r.achados) { setMsg('⚠️ Nenhum achado salvo. Rode a auditoria primeiro (aba Auditorias) e exporte de novo.'); return; }
      setMsg(`✅ ${r.arquivo} · ${r.achados.toLocaleString('pt-BR')} achados · ${r.mb} MB. Suba esse arquivo no chat.`);
    } catch (e) {
      setMsg('❌ Falhou: ' + (e && e.message ? e.message : e));

  // ==================================================================
  // EXPORTAÇÃO
  // ==================================================================
  function gerarMarkdown() {
    const K = window.Conhecimento;
    const t = K.totais();
    const L = [];

    L.push(`# Dossiê do Programa — Revisor Fiscal Prime`);
    L.push('');
    L.push(`> Documentação viva da ferramenta. Base de conhecimento ${K.VERSAO_BASE} (atualizado ${K.ATUALIZADO}).`);
    L.push(`> ${K.TELAS.length} telas · ${t.total} auditorias (${t.implementadas} implementadas, ${t.planejadas} documentadas) · ${t.capacidades} capacidades.`);
    L.push('');

    // Especialização
    L.push(`## Especialização`);
    L.push('');
    L.push(`**Setores:**`);
    K.SETORES.forEach(s => L.push(`- ${s.nome} (CNAE ${s.cnae}) — _${s.nivel}_. ${s.obs || ''}`));
    L.push('');
    L.push(`**Estados:**`);
    K.UFS.forEach(u => L.push(`- ${u.nome} (${u.id}) — _${u.nivel}_.${u.base ? ' ' + u.base : ''}`));
    L.push('');

    // Telas
    L.push(`## Telas do programa`);
    L.push('');
    K.TELAS.forEach(tela => {
      L.push(`### ${tela.icone} ${tela.nome}  _(${tela.grupo})_`);
      L.push(tela.desc || '');
      L.push('');
    });

    // Capacidades
    L.push(`## Capacidades do motor`);
    L.push('');
    L.push(`| Capacidade | Descrição | Status |`);
    L.push(`|---|---|---|`);
    K.CAPACIDADES.forEach(c => L.push(`| ${c.nome} | ${c.desc || ''} | ${STATUS_ROTULO[c.status] || c.status} |`));
    L.push('');

    // Auditorias por área
    L.push(`## Auditorias em detalhe`);
    L.push('');
    K.contagemPorArea().forEach(x => {
      L.push(`### ${x.area.nome}  _(${x.implementadas}/${x.total} implementada(s))_`);
      L.push('');
      K.auditoriasPorArea(x.area.id).forEach(a => {
        L.push(`#### ${a.id} — ${a.nome}`);
        L.push(`- **Tipo:** ${TIPO_ROTULO[a.tipo] || a.tipo} · **Severidade:** ${SEV_ROTULO[a.sev] || a.sev} · **Status:** ${STATUS_ROTULO[a.status] || a.status}`);
        L.push(`- **Regra:** ${a.regra || ''}`);
        L.push(`- **Fundamento:** ${a.fundamento || ''}`);
        L.push(`- **Lê:** ${a.le || ''}`);
        L.push(`- **Base:** ${BASE_ROTULO[a.base] || a.base}${a.parte ? ` (Parte ${a.parte})` : ''}`);
        L.push('');
      });
    });

    L.push(`---`);
    L.push(`_Gerado pelo Revisor Fiscal Prime em ${new Date().toLocaleString('pt-BR')}._`);
    return L.join('\n');
  }

  function baixarMarkdown() {
    const md = gerarMarkdown();
    const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `dossie-programa-revisor-${hoje()}.md`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function abrirHTML() {
    const K = window.Conhecimento;
    const md = gerarMarkdown();
    // HTML simples e imprimível (converte títulos/listas básicas do Markdown)
    const corpo = md
      .split('\n')
      .map(linhaParaHTML)
      .join('\n');
    const html = `<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<title>Dossiê do Programa — Revisor Fiscal Prime</title>
<style>
  body{font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;max-width:820px;margin:32px auto;padding:0 20px;color:#1a1a1a;line-height:1.55}
  h1{color:#13343b;border-bottom:3px solid #b3611c;padding-bottom:8px}
  h2{color:#13343b;margin-top:28px;border-bottom:1px solid #cdd8d8;padding-bottom:4px}
  h3{color:#2c5f6a;margin-top:20px}
  h4{color:#13343b;margin-top:14px;margin-bottom:4px}
  blockquote{color:#5a6a6a;border-left:3px solid #cdd8d8;margin:0;padding:4px 14px;font-size:14px}
  table{border-collapse:collapse;width:100%;font-size:13px;margin:10px 0}
  th{background:#13343b;color:#fff;text-align:left;padding:7px 10px}
  td{border-bottom:1px solid #cdd8d8;padding:6px 10px}
  ul{margin:6px 0 12px}
  code{background:#eef2f2;padding:1px 5px;border-radius:3px;font-size:12px}
  @media print{body{margin:0}}
</style></head><body>
${corpo}
</body></html>`;
    const win = window.open('', '_blank');
    if (win) { win.document.write(html); win.document.close(); }
    else { alert('Permita pop-ups para abrir a versão imprimível.'); }
  }

  // conversão linha-a-linha bem simples de Markdown → HTML (títulos, listas, tabela, citação)
  let _emLista = false, _emTabela = false;
  function linhaParaHTML(ln) {
    let out = '';
    const fechaLista = () => { if (_emLista) { out += '</ul>'; _emLista = false; } };
    const fechaTabela = () => { if (_emTabela) { out += '</tbody></table>'; _emTabela = false; } };

    if (/^\| *---/.test(ln)) return ''; // separador de tabela
    if (/^\|/.test(ln)) {
      const cels = ln.split('|').slice(1, -1).map(c => c.trim());
      if (!_emTabela) { fechaLista(); out += '<table><tbody>'; _emTabela = true; }
      out += '<tr>' + cels.map(c => `<td>${inline(c)}</td>`).join('') + '</tr>';
      return out;
    } else fechaTabela();

    if (/^#### /.test(ln)) { fechaLista(); return `<h4>${inline(ln.slice(5))}</h4>`; }
    if (/^### /.test(ln))  { fechaLista(); return `<h3>${inline(ln.slice(4))}</h3>`; }
    if (/^## /.test(ln))   { fechaLista(); return `<h2>${inline(ln.slice(3))}</h2>`; }
    if (/^# /.test(ln))    { fechaLista(); return `<h1>${inline(ln.slice(2))}</h1>`; }
    if (/^> /.test(ln))    { fechaLista(); return `<blockquote>${inline(ln.slice(2))}</blockquote>`; }
    if (/^---$/.test(ln))  { fechaLista(); return '<hr>'; }
    if (/^- /.test(ln)) {
      if (!_emLista) { out += '<ul>'; _emLista = true; }
      out += `<li>${inline(ln.slice(2))}</li>`;
      return out;
    }
    fechaLista();
    return ln.trim() ? `<p>${inline(ln)}</p>` : '';
  }

  function inline(s) {
    return Utils.escapeHtml(s)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/_(.+?)_/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>');
  }

  function hoje() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  }

  return { render };
})();

(function () {

  const n = (v) => {

  const PISO = 1000;

  // lê um registro do staging: campos nomeados ou _raw posicional
  function campos(rec, nomes) {

  const L1920 = ['REG','VL_TOT_TRANSF_DEBITOS_OA','VL_TOT_AJ_DEBITOS_OA','VL_ESTORNOS_CRED_OA','VL_TOT_TRANSF_CREDITOS_OA','VL_TOT_AJ_CREDITOS_OA','VL_ESTORNOS_DEB_OA','VL_SLD_CREDOR_ANT_OA','VL_SLD_APURADO_OA','VL_TOT_DED','VL_ICMS_RECOLHER_OA','VL_SLD_CREDOR_TRANSP_OA','DEB_ESP_OA'];

  const LE110 = ['REG','VL_TOT_DEBITOS','VL_AJ_DEBITOS','VL_TOT_AJ_DEBITOS','VL_ESTORNOS_CRED','VL_TOT_CREDITOS','VL_AJ_CREDITOS','VL_TOT_AJ_CREDITOS','VL_ESTORNOS_DEB','VL_SLD_CREDOR_ANT','VL_SLD_APURADO','VL_TOT_DED','VL_ICMS_RECOLHER','VL_SLD_CREDOR_TRANSPORTAR','DEB_ESP'];
  const LE210 = ['REG','IND_MOV_ST','VL_SLD_CRED_ANT_ST','VL_DEVOL_ST','VL_RESSARC_ST','VL_OUT_CRED_ST','VL_AJ_CREDITOS_ST','VL_RETENCAO_ST','VL_OUT_DEB_ST','VL_AJ_DEBITOS_ST','VL_SLD_DEV_ANT_ST','VL_DEDUCOES_ST','VL_ICMS_RECOL_ST','VL_SLD_CRED_ST_TRANSPORTAR','DEB_ESP_ST'];

  // linha de bloco N da ECF (dinâmica: |REG|linha|DESCRIÇÃO|VALOR|)
  function linhaEcf(rec) {

    if (d._raw) {
      const c = String(d._raw).trim().replace(/^\|/, '').replace(/\|$/, '').split('|');

  function histLalur(rec) {

    if (d._raw) return String(d._raw);

  }

  // ------------------------------------------------------------------
  // classificação de família de insumo e volume em litros
  // ------------------------------------------------------------------
  const FAMILIAS = [
    ['LATA', /\bLATA\b|LTA\b/], ['TAMPA', /\bTAMPA/], ['MALTE', /\bMALTE|\bPILSEN 2RS|\bMALT\b/],
    ['LUPULO', /L[UÚ]PULO|LUPUL/], ['GARRAFA', /GARRAFA|GFA\b|VASILHAME/], ['ROTULO', /R[OÓ]TULO/],
    ['FILME', /FILME|SHRINK|STRETCH/], ['CHAPA_GRAFICA', /CHAPA/], ['FERMENTO', /FERMENTO|LEVEDURA/],

  ];
  function familiaDe(desc) {
    const d = String(desc || '').toUpperCase();
    for (const [fam, re] of FAMILIAS) if (re.test(d)) return fam;

  }
  function litrosDe(desc) {
    const d = String(desc || '').toUpperCase();
    let m = d.match(/(\d{3,4})\s*ML/);

  const mesIdx = (per) => { const m = /^(\d{4})-(\d{2})/.exec(per || ''); return m ? (+m[1]) * 12 + (+m[2]) - 1 : null; };

  // ------------------------------------------------------------------
  // MOTOR DE TERCEIROS: idas × voltas por família, FIFO com aging (>6 meses)

  // voltas: retornos de insumo 1902/2902/1903/2903 (EFD)
  // ------------------------------------------------------------------
  const IDA_C170 = new Set(['1122', '2122']);
  const IDA_XML = new Set(['5901', '6901']);
  const VOLTA = new Set(['1902', '2902', '1903', '2903']);

  function descDe(ctx, it) {
    return it.descricao || (ctx.prodPorCod[it.cod_item] && ctx.prodPorCod[it.cod_item].descricao) || '';
  }

  function motorTerceiros(ctx) {
    if (ctx.__terc) return ctx.__terc;
    const trans = [];
    for (const it of (ctx.itens || [])) {
      const cf = it.cfop;
      if (!cf) continue;
      const eIda = IDA_C170.has(cf), eVolta = VOLTA.has(cf);
      if (!eIda && !eVolta) continue;
      const idx = mesIdx(it.periodo);
      if (idx == null) continue;
      trans.push({ idx, fam: familiaDe(descDe(ctx, it)), dir: eIda ? 'ida' : 'volta',

    for (const x of (ctx.xmlItens || [])) {
      if (x.tipo_operacao !== 'saida' || !IDA_XML.has(x.cfop) || x.cancelada) continue;
      const idx = mesIdx(x.periodo);
      if (idx == null) continue;
      trans.push({ idx, fam: familiaDe(x.descricao), dir: 'ida',

    }
    trans.sort((a, b) => a.idx - b.idx);
    const mesMax = trans.length ? trans[trans.length - 1].idx : null;

    // fator de conversão de unidade (MI→UN) por preço implícito, por família×direção×unidade
    const preco = {};
    for (const t of trans) {
      if (t.qtd <= 0) continue;
      const k = t.fam + '|' + t.dir + '|' + t.unid;
      (preco[k] = preco[k] || [0, 0]); preco[k][0] += t.val; preco[k][1] += t.qtd;
    }
    const fator = (t) => {
      const kV = t.fam + '|volta|', kAtual = t.fam + '|' + t.dir + '|' + t.unid;
      // unidade de referência: a mais movimentada nas voltas da família
      let ref = null, refQ = -1;
      for (const k in preco) if (k.startsWith(kV) && preco[k][1] > refQ) { refQ = preco[k][1]; ref = k; }
      if (!ref || ref === kAtual || !preco[kAtual]) return 1;
      const pA = preco[kAtual][0] / preco[kAtual][1], pR = preco[ref][0] / preco[ref][1];
      if (pR > 0) { const r = pA / pR; if (r > 300 && r < 3000) return 1000; }
      return 1;
    };

    // FIFO duplo (valor e quantidade) por família
    const fams = {};
    const F = (fam) => (fams[fam] = fams[fam] || { lotes: [], vVal: 0, vQtd: 0, compraVal: 0, compraIcms: 0 });
    for (const t of trans) {
      const f = F(t.fam);
      const q = t.qtd * fator(t);
      if (t.dir === 'ida') {
        f.lotes.push({ idx: t.idx, remVal: t.val, remQtd: q });
        if (t.compra) { f.compraVal += t.val; f.compraIcms += t.icms; }
      } else {
        let rv = t.val, rq = q;
        for (const L of f.lotes) {
          if (rv > 0 && L.remVal > 0) { const c = Math.min(rv, L.remVal); L.remVal -= c; rv -= c; }
          if (rq > 0 && L.remQtd > 0) { const c = Math.min(rq, L.remQtd); L.remQtd -= c; rq -= c; }
          if (rv <= 0 && rq <= 0) break;
        }
      }
    }
    const out = { mesMax, familias: {} };
    for (const fam in fams) {
      const f = fams[fam];
      let idaVal = 0, idaQtd = 0;
      for (const t of trans) if (t.fam === fam && t.dir === 'ida') { idaVal += t.val; idaQtd += t.qtd * fator(t); }
      const cu = idaQtd > 0 ? idaVal / idaQtd : 0;
      const aliq = f.compraVal > 0 ? f.compraIcms / f.compraVal : 0.12;
      let vencVal = 0, vencFis = 0, vencQtd = 0, okVal = 0, okFis = 0;
      for (const L of f.lotes) {
        const baseFis = L.remQtd * cu;

        if (mesMax != null && (mesMax - L.idx) > 6) { vencVal += L.remVal; vencFis += fisLote; vencQtd += L.remQtd; }
        else { okVal += L.remVal; okFis += fisLote; }

      out.familias[fam] = { vencVal, vencFis, vencQtd, okVal, okFis, custoUnit: cu, aliq };
    }

    return out;
  }

  function mgTerc1(ctx, idAud, api) {

  const VENDA_NCM = new Set(['5101', '5401', '6101', '6401', '6107', '6408', '5910', '6910']);

  function mgReg1(ctx, idAud, api) {

  function fedSubv1(ctx, idAud, api) {

    if (!fl || !fl.credito_presumido) return { achados: [], resumo: 'sem regime de crédito presumido configurado', status: 'sem_dados' };
    // benefício por ano: destaque 18%/12% − recolhimento efetivo da sub-apuração

      if (String(x.ncm || '').indexOf(fl.ncm_beneficiado || '2203') !== 0) continue;
      const ano = String(x.periodo || '').slice(0, 4);
      if (x.cfop === '5101' || x.cfop === '5401') vi[ano] = (vi[ano] || 0) + n(x.vl_item);
      else if (['6101', '6401', '6107', '6408'].includes(x.cfop)) ve[ano] = (ve[ano] || 0) + n(x.vl_item);
    }
    const rec = {};
    for (const r of ((ctx.apuracao && ctx.apuracao.r1920) || [])) {
      const ano = String(r.periodo || '').slice(0, 4);
      rec[ano] = (rec[ano] || 0) + n(campos(r, L1920).VL_ICMS_RECOLHER_OA);
    }
    let benefTotal = 0; const porAno = {};
    const anos = new Set([...Object.keys(vi), ...Object.keys(ve)]);
    for (const ano of anos) {
      const b = Math.max((vi[ano] || 0) * 0.18 + (ve[ano] || 0) * 0.12 - (rec[ano] || 0), 0);
      porAno[ano] = Math.round(b); benefTotal += b;
    }
    if (benefTotal < PISO * 100) return { achados: [], resumo: 'benefício de presumido imaterial nos dados' };
    // e-Lalur: alguma exclusão de subvenção?
    const temExclusao = ((ctx.ecf && ctx.ecf.m300) || []).some(r => /SUBVEN|INCENTIV|PRESUMIDO/i.test(histLalur(r)));
    if (temExclusao) return { achados: [], resumo: 'exclusão de subvenção já praticada no e-Lalur' };
    // caixa imediato: IRPJ/CSLL "a pagar" nos exercícios até 2023 (parcela pacificada)
    let pagos = 0; const bases = [];
    const varre = (recs) => { for (const r of (recs || [])) {
      const L = linhaEcf(r); const ano = String(r.periodo || '');
      if (/A PAGAR/i.test(L.desc) && +ano <= 2023) pagos += Math.max(L.valor, 0);
      if (/BASE DE C/i.test(L.desc)) bases.push({ ano, base: L.valor });
    } };
    varre(ctx.ecf && ctx.ecf.n630); varre(ctx.ecf && ctx.ecf.n670);
    const a = api.novoAchado(ctx.cnpj, idAud, 'fed_subvencao', {
      periodo: '(consolidado)', natureza: 'credito', severidade: 'alta',
      titulo: 'Subvenção (crédito presumido de ICMS) não excluída do IRPJ/CSLL — Tema 1182/STJ',
      descricao: `Benefício de crédito presumido de R$ ${Math.round(benefTotal).toLocaleString('pt-BR')} no período, sem qualquer exclusão de subvenção no e-Lalur (M300). Até 2023 a exclusão é pacífica (STJ Tema 1182); o caixa imediato corresponde ao IRPJ/CSLL pagos nos exercícios com lucro (R$ ${Math.round(pagos).toLocaleString('pt-BR')}); o excedente forma prejuízo fiscal compensável. De 2024 em diante, via Lei 14.789/habilitação ou judicial.`,
      valor: pagos,
      base_legal: 'STJ EREsp 1.517.492 e Tema 1182 (crédito presumido de ICMS fora da base de IRPJ/CSLL, sem exigência de requisitos, até 2023); Lei 14.789/2023 (regime a partir de 2024).',
      referencias: [{ beneficio_total: Math.round(benefTotal), irpj_csll_pagos_ate_2023: Math.round(pagos) }, porAno],
    });
    return { achados: [a], resumo: 'subvenção não excluída — oportunidade' };
  }

  function fedIpi1(ctx, idAud, api) {
    const regs = (ctx.apuracao && ctx.apuracao.e520) || [];
    if (!regs.length) return { achados: [], resumo: 'sem apuração de IPI (E520) nos dados', status: 'sem_dados' };
    let ult = null;
    for (const r of regs) if (!ult || String(r.periodo || '') > String(ult.periodo || '')) ult = r;
    const c = campos(ult, LE520);
    const saldo = n(c.VL_SC_IPI);

    let credAno = 0, debAno = 0;
    const anoUlt = String(ult.periodo || '').slice(0, 4);

      descricao: `Saldo credor de IPI de R$ ${Math.round(saldo).toLocaleString('pt-BR')} na última apuração (${ult.periodo}); no ano: créditos R$ ${Math.round(credAno).toLocaleString('pt-BR')} × débitos R$ ${Math.round(debAno).toLocaleString('pt-BR')}. Saldo credor trimestral de insumos é ressarcível/compensável via PER/DCOMP (art. 11 da Lei 9.779/99), mediante análise de composição.`,
      valor: saldo,

      referencias: [{ saldo_credor: saldo, periodo: ult.periodo, creditos_ano: credAno, debitos_ano: debAno }],
    });
    return { achados: [a], resumo: 'saldo credor relevante' };
  }

  const REGRAS = [
    { meta: { id: 'MG-TERC-1', tipo: 'mg_terc_vencido', nome: 'Suspensão vencida — insumos em terceiros >180 dias', fontes: ['rev_itens', 'rev_xml_itens'] }, fn: mgTerc1 },

  const VERSAO_APP = '3.19.2';
  function cmpVersao(a, b) {
    const pa = String(a).split('.').map(n => parseInt(n, 10) || 0);
    const pb = String(b).split('.').map(n => parseInt(n, 10) || 0);
    for (let i = 0; i < Math.max(pa.length, pb.length); i++) {
      const x = pa[i] || 0, y = pb[i] || 0;
      if (x !== y) return x > y ? 1 : -1;
    }
    return 0;
  }
  async function checarVersao() {
    // mostra a versão embutida no chip e no título
    try {

      if (chip) chip.textContent = 'v' + VERSAO_APP + ' · MG';
      document.title = 'Revisor Fiscal Prime v' + VERSAO_APP;
    } catch (e) {}
    // só compara com o servidor quando aberto pelo site (http/https), não no arquivo local
    if (location.protocol !== 'http:' && location.protocol !== 'https:') return;
    try {
      const r = await fetch('versao.txt?ts=' + Date.now(), { cache: 'no-store' });
      if (!r.ok) return;
      const servidor = (await r.text()).trim();
      if (servidor && cmpVersao(servidor, VERSAO_APP) > 0) mostrarBannerVersao(servidor);

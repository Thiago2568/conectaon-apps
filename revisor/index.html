// ===================== ui_upload.js =====================
// =====================================================================
// Revisor Fiscal Prime — ui_upload.js
// Tela de importação. Recebe SPEDs (.txt) e XMLs (.xml ou .zip), calcula
// SHA-256 (custódia), parseia, normaliza e roda o cotejo XML×SPED.
// =====================================================================

const UIUpload = (function () {
  'use strict';

  let _fila = [];  // arquivos selecionados aguardando processamento
  let _ultimoResumoCotejo = [];  // resumo do último cotejo, mostrado nos importados
  let _ignoradosPorExt = {};  // {extensão: contagem} dos arquivos descartados ao selecionar pasta
  let _periodosParaRecotejar = new Set();  // períodos retificados que precisam re-cotejo
  let _ultimoBackup = null;                // status do último backup automático

  // Recursão em pastas arrastadas (drag-drop não entra em subpastas sozinho):
  // usa webkitGetAsEntry + readEntries para juntar todos os arquivos da árvore.
  async function coletarArquivosDeItems(items) {
    const out = [];
    const raizes = [];
    for (const it of items) {
      const entry = it.webkitGetAsEntry && it.webkitGetAsEntry();
      if (entry) raizes.push(entry);
      else { const f = it.getAsFile && it.getAsFile(); if (f) out.push(f); }
    }
    async function walk(entry) {
      if (entry.isFile) {
        try { out.push(await new Promise((res, rej) => entry.file(res, rej))); } catch (e) {}
      } else if (entry.isDirectory) {
        const reader = entry.createReader();
        let lote;
        do {
          lote = await new Promise((res) => reader.readEntries(res, () => res([])));
          for (const e of lote) await walk(e);
        } while (lote.length > 0);
      }
    }
    for (const e of raizes) await walk(e);
    return out;
  }

  // Separa o que interessa (.txt/.xml/.zip) e conta o resto por extensão (transparência).
  function filtrarRelevantes(files) {
    const relevantes = [];
    const ignoradosPorExt = {};
    for (const f of files) {
      if (/\.(txt|xml|zip)$/i.test(f.name)) relevantes.push(f);
      else {
        const m = /\.([^.\\/]+)$/.exec(f.name);
        const ext = m ? '.' + m[1].toLowerCase() : '(sem extensão)';
        ignoradosPorExt[ext] = (ignoradosPorExt[ext] || 0) + 1;
      }
    }
    return { relevantes, ignoradosPorExt };
  }

  async function render(container) {
    container.innerHTML = `
      <div class="etapa-header">
        <h2>Importar arquivos fiscais</h2>
        <p class="etapa-desc">
          Carregue SPEDs (EFD ICMS/IPI e EFD Contribuições) e XMLs (NF-e, NFC-e, CT-e).
          Cada arquivo recebe hash SHA-256 para cadeia de custódia. O cliente é
          identificado automaticamente pelo registro 0000 do SPED.
        </p>
      </div>

      <div class="card">
        <div class="dropzone" id="dropzone">
          <div class="dropzone-icon">📂</div>
          <p><strong>Arraste arquivos aqui</strong> ou clique para selecionar</p>
          <p class="dropzone-hint">.txt (SPED) · .xml (notas) · .zip (lote de XMLs) · vários de uma vez</p>
          <input type="file" id="file-input" multiple accept=".txt,.xml,.zip" style="display:none" />
        </div>
        <div style="margin-top:12px;text-align:center">
          <button class="btn" id="btn-pasta">📁 Selecionar pasta inteira</button>
          <input type="file" id="dir-input" webkitdirectory directory multiple style="display:none" />
          <p class="dropzone-hint" style="margin-top:6px">
            Aponta uma pasta com todos os SPEDs e XMLs — importa tudo de uma vez, ignora duplicados
            e mantém a versão mais recente (retificações).
          </p>
        </div>
      </div>

      <div class="card" id="fila-card" style="display:none">
        <h3>Arquivos na fila (<span id="fila-count">0</span>)</h3>
        <p id="fila-resumo" style="font-size:13px;color:#46586a;margin:-4px 0 10px"></p>
        <table class="tabela-dados" id="fila-tabela">
          <thead>
            <tr><th>Arquivo</th><th>Tipo</th><th>Tamanho</th><th>Status</th></tr>
          </thead>
          <tbody></tbody>
        </table>
        <div style="margin-top:14px;display:flex;gap:10px">
          <button class="btn btn-primary" id="btn-processar">Processar fila</button>
          <button class="btn" id="btn-limpar-fila">Limpar fila</button>
        </div>
      </div>

      <div class="card" id="resultado-card" style="display:none">
        <h3>Arquivos importados</h3>
        <div id="resultado-conteudo"></div>
      </div>`;

    const dropzone = container.querySelector('#dropzone');
    const fileInput = container.querySelector('#file-input');

    dropzone.onclick = () => fileInput.click();
    dropzone.ondragover = (e) => { e.preventDefault(); dropzone.classList.add('dragover'); };
    dropzone.ondragleave = () => dropzone.classList.remove('dragover');
    dropzone.ondrop = async (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      let files;
      // se vier pasta(s), entra nas subpastas; senão, lista direta
      if (e.dataTransfer.items && e.dataTransfer.items.length && e.dataTransfer.items[0].webkitGetAsEntry) {
        dropzone.classList.add('dragover');
        files = await coletarArquivosDeItems(Array.from(e.dataTransfer.items));
        dropzone.classList.remove('dragover');
      } else {
        files = Array.from(e.dataTransfer.files);
      }
      const { relevantes, ignoradosPorExt } = filtrarRelevantes(files);
      adicionarArquivos(relevantes, container, ignoradosPorExt);
    };
    fileInput.onchange = (e) => {
      const { relevantes, ignoradosPorExt } = filtrarRelevantes(Array.from(e.target.files));
      adicionarArquivos(relevantes, container, ignoradosPorExt);
    };

    // seletor de pasta inteira (webkitdirectory já entra em subpastas)
    const dirInput = container.querySelector('#dir-input');
    container.querySelector('#btn-pasta').onclick = () => dirInput.click();
    dirInput.onchange = (e) => {
      const { relevantes, ignoradosPorExt } = filtrarRelevantes(Array.from(e.target.files));
      adicionarArquivos(relevantes, container, ignoradosPorExt);
    };

    container.querySelector('#btn-processar').onclick = () => processarFila(container);
    container.querySelector('#btn-limpar-fila').onclick = () => {
      _fila = [];
      _ignoradosPorExt = {};
      atualizarFila(container);
    };

    await mostrarImportados(container);
  }

  function detectarTipo(nome, conteudoInicio) {
    const lower = nome.toLowerCase();
    if (lower.endsWith('.zip')) return 'zip';
    if (lower.endsWith('.xml')) {
      if (conteudoInicio && conteudoInicio.includes('infCte')) return 'xml_cte';
      if (conteudoInicio && conteudoInicio.includes('NFe')) return 'xml_nfe';
      return 'xml';
    }
    if (lower.endsWith('.txt')) {
      // SPED: primeira linha começa com |0000|
      if (conteudoInicio && conteudoInicio.startsWith('|0000|')) {
        // distingue Fiscal vs Contribuições pela estrutura do 0000
        // (heurística refinada no parser real; aqui marca genérico)
        return 'efd';
      }
      return 'txt';
    }
    return 'desconhecido';
  }

  async function adicionarArquivos(files, container, ignoradosPorExt) {
    // Para lotes grandes (pasta), evita ler o início de milhares de arquivos:
    // detecta por extensão e só dá uma espiada nos .txt (pra distinguir SPED).
    for (const f of files) {
      const lower = f.name.toLowerCase();
      let tipo;
      if (lower.endsWith('.zip')) tipo = 'zip';
      else if (lower.endsWith('.xml')) tipo = 'xml_nfe';
      else if (lower.endsWith('.txt')) {
        const inicio = await lerInicio(f, 64);
        // tolera BOM/espaços/quebras antes do |0000|
        const limpo = (inicio || '').replace(/^\uFEFF/, '').replace(/^\s+/, '');
        tipo = limpo.startsWith('|0000|') ? 'efd' : 'txt';
      } else tipo = 'desconhecido';

      _fila.push({ file: f, nome: f.name, tamanho: f.size, tipo, status: 'aguardando' });
    }
    if (ignoradosPorExt) {
      for (const [ext, n] of Object.entries(ignoradosPorExt)) _ignoradosPorExt[ext] = (_ignoradosPorExt[ext] || 0) + n;
    }
    atualizarFila(container);
  }

  function lerInicio(file, nbytes) {
    return new Promise((resolve) => {
      const blob = file.slice(0, nbytes);
      const r = new FileReader();
      r.onload = (e) => resolve(e.target.result);
      r.onerror = () => resolve('');
      r.readAsText(blob);
    });
  }

  function atualizarFila(container) {
    const card = container.querySelector('#fila-card');
    const tbody = container.querySelector('#fila-tabela tbody');
    const count = container.querySelector('#fila-count');
    if (_fila.length === 0) {
      card.style.display = 'none';
      return;
    }
    card.style.display = 'block';
    count.textContent = _fila.length;

    // resumo por tipo + status (útil quando a fila é enorme)
    const porTipo = {};
    const porStatus = {};
    for (const i of _fila) {
      const t = i.tipo === 'zip' ? 'ZIP' : i.tipo.startsWith('xml') ? 'XML' : (i.tipo === 'efd' || i.tipo === 'txt') ? 'SPED' : 'outro';
      porTipo[t] = (porTipo[t] || 0) + 1;
      porStatus[i.status] = (porStatus[i.status] || 0) + 1;
    }
    const resumoTipos = Object.entries(porTipo).map(([t, n]) => `${n} ${t}`).join(' · ');
    const resumoCard = container.querySelector('#fila-resumo');
    if (resumoCard) {
      let txt = resumoTipos;
      const exts = Object.entries(_ignoradosPorExt);
      if (exts.length) {
        const totalIgn = exts.reduce((s, [, n]) => s + n, 0);
        const detalhe = exts.sort((a, b) => b[1] - a[1]).map(([e, n]) => `${n} ${e}`).join(', ');
        txt += ` · ${totalIgn} ignorados (${detalhe})`;
      }
      const sumStatus = Object.entries(porStatus)
        .filter(([s]) => s !== 'aguardando')
        .map(([s, n]) => `${n} ${rotuloStatusTexto(s)}`).join(', ');
      resumoCard.innerHTML = txt + (sumStatus ? ` — ${sumStatus}` : '');
    }

    // tabela: limita a 200 linhas pra não travar a UI com milhares de arquivos
    const LIM = 200;
    const mostra = _fila.slice(0, LIM);
    tbody.innerHTML = mostra.map(item => `
      <tr>
        <td>${Utils.escapeHtml(item.nome)}</td>
        <td><span class="badge badge-${item.tipo.startsWith('xml') || item.tipo === 'zip' ? 'xml' : 'sped'}">${rotuloTipo(item.tipo)}</span></td>
        <td>${(item.tamanho / 1024).toFixed(1)} KB</td>
        <td>${rotuloStatus(item.status)}${item.detalhe ? ` <span style="color:#888;font-size:11px">(${item.detalhe})</span>` : ''}</td>
      </tr>`).join('') +
      (_fila.length > LIM ? `<tr><td colspan="4" style="text-align:center;color:#888">… e mais ${_fila.length - LIM} arquivo(s)</td></tr>` : '');
  }

  function rotuloStatusTexto(s) {
    const m = { ok: 'importados', erro: 'com erro', duplicado: 'duplicados', processando: 'processando', cotejando: 'em cotejo', extraindo: 'extraindo' };
    return m[s] || s;
  }

  function rotuloTipo(t) {
    const m = { efd: 'SPED EFD', xml_nfe: 'XML NF-e', xml_cte: 'XML CT-e', xml: 'XML', reinf: 'EFD-Reinf', zip: 'ZIP (lote)', txt: 'TXT?', desconhecido: '?' };
    return m[t] || t;
  }
  function rotuloStatus(s) {
    const m = {
      aguardando: '<span style="color:#888">aguardando</span>',
      processando: '<span style="color:#b3611c">processando…</span>',
      normalizando: '<span style="color:#b3611c">normalizando…</span>',
      extraindo: '<span style="color:#b3611c">extraindo XMLs…</span>',
      cotejando: '<span style="color:#b3611c">cotejando XML×SPED…</span>',
      duplicado: '<span style="color:#888">↩ duplicado (ignorado)</span>',
      ok: '<span style="color:#2a6b3a">✓ importado</span>',
      erro: '<span style="color:#9b2c2c">✗ erro</span>',
    };
    return m[s] || s;
  }

  /**
   * Processa UM arquivo SPED (EFD/ECD/ECF): dedup, retificação, staging,
   * normalização. Define item.status. Reutilizado pelo fluxo normal e ano-a-ano.
   */
  async function processarUmSped(item, container) {
    item.status = 'processando';
    atualizarFila(container);
    const conteudo = await Utils.lerArquivoTexto(item.file);
    const sha = await Utils.sha256(conteudo);
    if (await DB.arquivoPorSha(sha)) {
      item.status = 'duplicado'; item.detalhe = 'mesmo conteúdo já importado';
      atualizarFila(container); return;
    }
    const meta = extrairMetaSped(conteudo, item.tipo);
    const cnpj = meta.cnpj;
    if (!cnpj || !Utils.validarCNPJ(cnpj)) throw new Error('SPED sem CNPJ válido no registro 0000.');
    const existente = await Clientes.obter(cnpj);
    if (!existente) {
      await Clientes.salvar({ cnpj, razao_social: meta.razao_social || '', uf: meta.uf || '', ie: meta.ie || '', ultima_importacao: new Date().toISOString() });
    }
    const id_arquivo = Utils.shortHash(sha + item.nome);
    const ctx = { cnpj, periodo: meta.periodo || 'sem-periodo', id_arquivo, sha256: sha };
    const resultado = await ParserSped.processar(conteudo, ctx);
    const ehContabil = (resultado.origem === 'ecd' || resultado.origem === 'ecf');
    const codFinNovo = ehContabil ? '0' : lerCodFin(conteudo);
    const anteriores = (await DB.getByIndex('rev_arquivos', 'cnpj_periodo', [cnpj, ctx.periodo])).filter(a => a.origem === resultado.origem);
    let substituindo = false;
    if (anteriores.length > 0) {
      const codFinAnterior = Math.max(...anteriores.map(a => Number(a.cod_fin) || 0));
      if (!ehContabil && (Number(codFinNovo) || 0) < codFinAnterior) {
        item.status = 'duplicado'; item.detalhe = 'versão anterior à já importada (retificadora mantida)';
        await DB.registrarLog(cnpj, 'aviso', 'SPED ignorado (versão antiga)', `${item.nome}: COD_FIN ${codFinNovo} < ${codFinAnterior} já importado para ${ctx.periodo}`);
        atualizarFila(container); return;
      }
      substituindo = true;
      item.status = 'normalizando'; item.detalhe = 'substituindo versão anterior';
      atualizarFila(container);
      await DB.limparStagingOrigemPeriodo(cnpj, resultado.origem, ctx.periodo);
      await DB.limparUnificadasPeriodo(cnpj, ctx.periodo);
      for (const a of anteriores) await DB.deleteOne('rev_arquivos', a.id_arquivo);
    }
    await ParserSped.salvarStaging(resultado.registros);
    await DB.put('rev_arquivos', { id_arquivo, cnpj_empresa: cnpj, periodo: ctx.periodo, nome: item.nome, tipo: item.tipo, origem: resultado.origem, cod_fin: codFinNovo, tamanho: item.tamanho, sha256: sha, qtd_linhas: resultado.totais.linhas, qtd_registros: resultado.totais.registros, importado_em: new Date().toISOString(), parseado: true });
    item.status = 'normalizando';
    atualizarFila(container);
    if (ehContabil) await NormalizadorContabil.normalizar(cnpj, ctx.periodo, resultado.origem);
    else await Normalizador.normalizar(cnpj, ctx.periodo);
    item.status = 'ok'; item.cnpj = cnpj; item.periodo = ctx.periodo; item.origem = resultado.origem; item.registros = resultado.totais.registros;
    if (substituindo && !ehContabil) { item.detalhe = 'retificação aplicada'; _periodosParaRecotejar.add(`${cnpj}|${ctx.periodo}`); }
    else if (substituindo) { item.detalhe = 'substituída versão anterior'; }
    const nomeOrigem = { ecd: 'ECD', ecf: 'ECF', efd_fiscal: 'EFD ICMS/IPI', efd_contrib: 'EFD Contrib' }[resultado.origem] || resultado.origem;
    await DB.registrarLog(cnpj, 'info', substituindo ? `${nomeOrigem} reimportada` : `${nomeOrigem} importada`, `${item.nome} (período ${ctx.periodo}): ${resultado.totais.registros} registros${substituindo ? ' — substituiu versão anterior' : ''}`);
  }

  // --- triagem por ano (descobre o ano de cada arquivo SEM carregar tudo) ---
  function anoDaChaveNoNome(nome) {
    const m = /\d{44}/.exec(nome || '');
    if (!m) return null;
    const aa = m[0].slice(2, 4);           // chave NF-e: cUF(2) + AAMM(4) + ...
    const ano = 2000 + parseInt(aa, 10);
    return (ano >= 2000 && ano <= 2099) ? String(ano) : null;
  }
  function anoDoSniffXml(conteudo) {
    let m = /<dhEmi>(\d{4})-/.exec(conteudo) || /<dEmi>(\d{4})-/.exec(conteudo);
    if (m) return m[1];
    m = /<chNFe>(\d{44})</.exec(conteudo) || /Id="NFe(\d{44})"/.exec(conteudo);
    if (m) { const ch = m[1]; const ano = 2000 + parseInt(ch.slice(2, 4), 10); return (ano >= 2000 && ano <= 2099) ? String(ano) : null; }
    return null;
  }
  async function anoDoSped(file, tipo) {
    try { const head = await file.slice(0, 8192).text(); const meta = extrairMetaSped(head, tipo); return meta.periodo ? String(meta.periodo).slice(0, 4) : null; }
    catch (e) { return null; }
  }

  /** Agrupa os arquivos pendentes por ano (leve: nome da chave ou sniff). */
  async function triarPorAno(spedItems, xmlItems, container) {
    const anos = {};            // ano -> { speds:[], xmls:[] }
    const semAno = { speds: [], xmls: [] };
    const add = (ano, tipo, item) => {
      if (!ano) { semAno[tipo].push(item); return; }
      (anos[ano] = anos[ano] || { speds: [], xmls: [] })[tipo].push(item);
    };
    const marcar = (txt) => { for (const i of _fila) if (i.status !== 'ok') i.detalhe = txt; atualizarFila(container); };

    let n = 0;
    for (const item of spedItems) {
      marcar(`triando SPEDs ${++n}/${spedItems.length}`);
      add(await anoDoSped(item.file, item.tipo), 'speds', item);
    }
    n = 0;
    for (const item of xmlItems) {
      if (++n % 500 === 0 || n === xmlItems.length) marcar(`triando notas por ano ${n}/${xmlItems.length}`);
      let ano = anoDaChaveNoNome(item.nome);
      if (!ano) { try { ano = anoDoSniffXml(await Utils.lerArquivoTexto(item.file)); } catch (e) {} }
      add(ano, 'xmls', item);
    }
    return { anos, semAno };
  }

  /**
   * MODO ANO A ANO: processa cada ano completo (SPED + XML + cotejo), salva no
   * disco e LIBERA o banco antes do próximo ano (mantendo só o De/Para via
   * cliente.json). A cota nunca segura mais que um ano por vez.
   */
  async function processarAnoAAno(container) {
    const pend = _fila.filter(i => i.status !== 'ok');
    const spedItems = pend.filter(i => i.tipo === 'efd' || i.tipo === 'txt');
    const xmlItems = pend.filter(i => i.tipo.startsWith('xml'));
    const zipItems = pend.filter(i => i.tipo === 'zip');
    const marcarTudo = (txt) => { for (const i of _fila) if (i.status !== 'ok' && i.status !== 'erro' && i.status !== 'duplicado') i.detalhe = txt; atualizarFila(container); };

    const triagem = await triarPorAno(spedItems, xmlItems, container);
    const anos = Object.keys(triagem.anos).sort();
    let idx = 0;

    for (const ano of anos) {
      idx++;
      marcarTudo(`═══ Processando ${ano} (${idx}/${anos.length}) ═══`);
      const grupo = triagem.anos[ano];

      // 0) MERGE: se esse ano já está salvo no disco, carrega antes de adicionar os novos arquivos,
      //    pra não sobrescrever o que já existia (ex.: reimportar EFD ICMS/XML sem perder a EFD
      //    Contribuições já salva). Só roda quando já há cliente ativo (reimportação).
      const cnpjMerge = Clientes.ativo() && Clientes.ativo().cnpj;
      if (cnpjMerge) {
        try {
          const naPasta = await Armazenamento.listarAnosNaPasta(cnpjMerge);
          if (naPasta.includes(ano)) {
            marcarTudo(`carregando ${ano} já salvo (merge, não sobrescreve)…`);
            await Armazenamento.carregarAnos(cnpjMerge, [ano], { salvarAntes: false });
          }
        } catch (e) { console.warn('merge-load falhou', e); }
      }

      // 1) SPEDs do ano
      for (const item of grupo.speds) {
        try { await processarUmSped(item, container); }
        catch (e) { item.status = 'erro'; item.erro = e.message; await DB.registrarLog(Clientes.ativo()?.cnpj, 'erro', 'Falha SPED', `${item.nome}: ${e.message}`); }
        atualizarFila(container);
      }
      const primeiroOk = _fila.find(i => i.status === 'ok' && i.cnpj);
      if (primeiroOk && !Clientes.temContexto()) await Clientes.definirAtivo(primeiroOk.cnpj);
      const ativo = Clientes.ativo();

      // 2) XMLs do ano (streaming + cotejo dos períodos do ano)
      if (grupo.xmls.length) {
        if (ativo) {
          for (const i of grupo.xmls) i._aguardaCotejo = true;
          await processarNotasStreaming(grupo.xmls.map(i => ({ nome: i.nome, file: i.file, tamanho: i.tamanho })), [], container);
        } else {
          for (const i of grupo.xmls) { i.status = 'erro'; i.erro = 'Sem cliente (SPED) para definir entrada/saída.'; i._aguardaCotejo = false; }
        }
      }

      // 3) salva o ano no disco
      if (ativo) {
        marcarTudo(`salvando ${ano} no disco…`);
        try { await Armazenamento.salvarCliente(ativo.cnpj); await DB.registrarLog(ativo.cnpj, 'info', 'Ano salvo na pasta', `${ano}`); }
        catch (e) { console.warn('save ano falhou', e); }
      }

      // 4) LIBERA o banco antes do próximo ano (mantém De/Para via cliente.json)
      if (ativo && idx < anos.length) {
        marcarTudo('liberando memória (De/Para preservado)…');
        try { await Armazenamento.carregarAnos(ativo.cnpj, [], { salvarAntes: false }); }
        catch (e) { console.warn('descarga falhou', e); }
      }
      atualizarFila(container);
    }

    // 5) arquivos sem ano detectável + ZIPs → fluxo streaming normal ao final
    for (const item of triagem.semAno.speds) {
      try { await processarUmSped(item, container); } catch (e) { item.status = 'erro'; item.erro = e.message; }
      atualizarFila(container);
    }
    const ativoFim = Clientes.ativo();
    const semAnoXml = triagem.semAno.xmls;
    if ((semAnoXml.length || zipItems.length) && ativoFim) {
      for (const i of semAnoXml) i._aguardaCotejo = true;
      for (const i of zipItems) i._aguardaCotejo = true;
      await processarNotasStreaming(semAnoXml.map(i => ({ nome: i.nome, file: i.file, tamanho: i.tamanho })), zipItems, container);
      try { await Armazenamento.salvarCliente(ativoFim.cnpj); } catch (e) {}
    }

    if (Clientes.ativo() && anos.length) {
      _ultimoBackup = `Importação processada e salva ano a ano (${anos.join(', ')}). Banco carregado: ${anos[anos.length - 1]}. Use "Carga por ano" para trocar.`;
    }
  }

  async function processarFila(container) {
    if (_fila.length === 0) return;

    _ultimoBackup = null;
    // aviso preventivo: se o armazenamento do navegador já está cheio,
    // alerta antes de começar (e reforça a importância da pasta de trabalho)
    try {
      const est = await DB.estimarArmazenamento();
      if (est.ok && est.pct >= 80) {
        const semPasta = !(Armazenamento.suportado() && Armazenamento.temPasta());
        await DB.registrarLog(Clientes.ativo()?.cnpj, 'aviso', 'Armazenamento do navegador quase cheio',
          `Uso em ${est.pct}% da cota (${(est.usage/1048576).toFixed(0)} MB). ${semPasta ? 'Defina uma pasta de trabalho para não perder dados.' : ''}`);
        if (semPasta && est.pct >= 90) {
          alert(`Atenção: o armazenamento do navegador está em ${est.pct}% da cota.\n\nDefina uma pasta de trabalho (aba "Backup / Pasta") antes de importar em massa, senão há risco de perder dados.`);
        }
      }
    } catch (e) {}

    _periodosParaRecotejar = new Set();

    // MODO ANO A ANO: com pasta de trabalho definida, processa cada ano
    // completo e libera o banco antes do próximo (cota nunca estoura).
    const temPasta = Armazenamento.suportado() && Armazenamento.temPasta();
    const pendentes = _fila.filter(i => i.status !== 'ok');
    const temSpedOuXml = pendentes.some(i => i.tipo === 'efd' || i.tipo === 'txt' || i.tipo.startsWith('xml'));
    if (temPasta && temSpedOuXml) {
      await processarAnoAAno(container);
      App.atualizarSeletor();
      await mostrarImportados(container);
      return;
    }

    const xmlRefs = [];   // referências leves a XMLs avulsos (File, não conteúdo)
    const zipRefs = [];   // arquivos .zip (extraídos sob demanda no streaming)

    for (const item of _fila) {
      if (item.status === 'ok') continue;
      item.status = 'processando';
      atualizarFila(container);

      try {
        if (item.tipo === 'efd' || item.tipo === 'txt') {
          await processarUmSped(item, container);
        } else if (item.tipo === 'zip') {
          // ZIP: extraído sob demanda no streaming (não carrega tudo agora)
          zipRefs.push(item);
          item._aguardaCotejo = true;
        } else if (item.tipo.startsWith('xml')) {
          // XML avulso: guarda só a REFERÊNCIA (File é leve; conteúdo lido no lote)
          xmlRefs.push({ nome: item.nome, file: item.file, tamanho: item.tamanho });
          item._aguardaCotejo = true;
        }
      } catch (e) {
        console.error('Erro ao processar', item.nome, e);
        item.status = 'erro';
        item.erro = e.message;
        await DB.registrarLog(Clientes.ativo()?.cnpj, 'erro', 'Falha ao processar arquivo',
          `${item.nome}: ${e.message}`);
      }
      atualizarFila(container);
    }

    // Atualiza contexto (SPED define o cliente ativo se ainda não houver)
    const primeiroOk = _fila.find(i => i.status === 'ok' && i.cnpj);
    if (primeiroOk && !Clientes.temContexto()) {
      await Clientes.definirAtivo(primeiroOk.cnpj);
    }

    // Processa XMLs/ZIPs coletados em STREAMING (lê em lotes, não tudo de uma vez)
    if (xmlRefs.length > 0 || zipRefs.length > 0) {
      await processarNotasStreaming(xmlRefs, zipRefs, container);
    }

    // Re-cotejo de períodos retificados (a normalização reconstruiu o C170,
    // zerando as flags de XML). Só roda se ainda não foi cotejado pelos XMLs acima.
    const ativoRec = Clientes.ativo();
    if (ativoRec && _periodosParaRecotejar.size > 0) {
      for (const chave of _periodosParaRecotejar) {
        const [cnpj, periodo] = chave.split('|');
        const temXml = (await DB.getByIndex('rev_xml_itens', 'cnpj_periodo', [cnpj, periodo])).length > 0;
        if (temXml) {
          const rc = await Cotejo.executar(cnpj, periodo);
          if (rc.stats) {
            await DB.registrarLog(cnpj, 'info', 'Re-cotejo pós-retificação',
              `${periodo}: cotejo refeito após substituição do SPED`);
          }
        }
      }
    }

    App.atualizarSeletor();

    // SALVAMENTO AUTOMÁTICO EM ARQUIVO (se houver pasta de trabalho).
    // Roda UMA vez ao fim da importação, não por arquivo. Garante que o
    // banco no disco reflita o que acabou de entrar — nada se perde.
    try {
      if (Armazenamento.suportado() && Armazenamento.temPasta()) {
        const cnpjsTocados = [...new Set(_fila.filter(i => i.status === 'ok' && i.cnpj).map(i => i.cnpj))];
        let salvos = 0;
        for (const cnpj of cnpjsTocados) {
          const r = await Armazenamento.salvarCliente(cnpj);
          if (r.ok) { salvos++; await DB.registrarLog(cnpj, 'info', 'Backup em arquivo', `Salvo em ${r.pasta}/${r.arquivo} (${(r.bytes/1024).toFixed(0)} KB)`); }
        }
        if (salvos) _ultimoBackup = `${salvos} cliente(s) salvos na pasta de trabalho.`;
      } else if (Armazenamento.suportado() && window._temPastaSalva) {
        _ultimoBackup = 'pasta-desconectada';
      }
    } catch (e) {
      console.error('Falha no backup automático', e);
      await DB.registrarLog(Clientes.ativo()?.cnpj, 'aviso', 'Backup automático falhou', e.message);
    }

    await mostrarImportados(container);
  }


  /**
   * Ingestão de XMLs/ZIPs em STREAMING — lê em lotes, grava e descarta,
   * sem acumular tudo na memória. Aguenta anos de notas. Faz checkpoint em
   * disco a cada bloco e para com segurança se a cota do navegador estourar.
   * Exige cliente ativo (o XML sozinho não diz qual CNPJ é "a empresa").
   */
  async function processarNotasStreaming(xmlRefs, zipRefs, container) {
    const ativo = Clientes.ativo();
    if (!ativo) {
      for (const item of _fila) {
        if (item._aguardaCotejo) { item.status = 'erro'; item.erro = 'Selecione ou importe um cliente (SPED) antes de importar XMLs — é o que define entrada vs. saída.'; item._aguardaCotejo = false; }
      }
      atualizarFila(container);
      return;
    }
    const cnpj = ativo.cnpj;
    // ROTEAMENTO POR FILIAL: se o grupo do cliente ativo tem 2+ CNPJs, cada
    // nota é atribuída à filial que aparece como emitente ou destinatário
    // (sniff por regex, sem custo de DOM). Nota sem filial do grupo → cliente
    // ativo (comportamento anterior).
    const grupoFiliais = await Clientes.filiaisDoGrupo().catch(() => []);
    const cnpjsGrupo = new Set(grupoFiliais.map(c => c.cnpj));
    const raizGrupo = Utils.raizCNPJ(cnpj);
    function filialDaNota(conteudo) {
      if (cnpjsGrupo.size <= 1) return cnpj;
      // CNPJs do XML na ordem em que aparecem (emit vem antes de dest na NF-e)
      const re = /<CNPJ>(\d{14})<\/CNPJ>/g;
      let m, emitCnpj = null;
      const doGrupo = [];
      while ((m = re.exec(conteudo)) !== null) {
        if (!emitCnpj) emitCnpj = m[1];
        if (m[1].slice(0, 8) === raizGrupo && cnpjsGrupo.has(m[1]) && !doGrupo.includes(m[1])) doGrupo.push(m[1]);
        if (doGrupo.length >= 2) break;
      }
      if (!doGrupo.length) return cnpj;                       // nenhum CNPJ do grupo: mantém ativo
      if (doGrupo.length === 1) return doGrupo[0];            // uma filial do grupo na nota
      // transferência entre filiais: fica com o EMITENTE (a nota é a saída dele)
      return (emitCnpj && doGrupo.includes(emitCnpj)) ? emitCnpj : doGrupo[0];
    }
    const temPastaXml = Armazenamento.suportado() && Armazenamento.temPasta();
    const CHUNK = 300;            // arquivos por lote de leitura/gravação
    const CHECKPOINT_BLOCOS = 4;  // salva em disco a cada N blocos

    // estado acumulado LEVE (não guarda conteúdo nem itens em memória)
    const idsCancelados = new Set();   // só ids de notas canceladas (minoria)
    const periodosAfetados = new Set();
    let totalItens = 0, totalNotas = 0, dupArq = 0, dupItem = 0, errosN = 0, reinfN = 0;
    let accEntrada = 0, accSaida = 0, accCancel = 0;
    let abortadoCota = false, blocosFeitos = 0;

    const marcar = (txt) => { for (const item of _fila) if (item._aguardaCotejo) item.detalhe = txt; atualizarFila(container); };

    // processa um lote de notas já lidas: {nome, conteudo, tamanho}
    async function processarLote(lote, rotulo) {
      if (!lote.length || abortadoCota) return;
      blocosFeitos++;
      marcar(rotulo);

      // dedup de arquivo por SHA + separa Reinf de NF-e
      const notas = [];
      for (const x of lote) {
        const sha = await Utils.sha256(x.conteudo);
        if (await DB.arquivoPorSha(sha)) { dupArq++; continue; }
        x.sha = sha;
        if (ParserReinf.ehReinf(x.conteudo)) {
          const rr = await ParserReinf.parsearLote([{ nome: x.nome, conteudo: x.conteudo }], cnpj);
          if (rr.retencoes.length) {
            try { await DB.putBatch('rev_retencoes', rr.retencoes); reinfN += rr.retencoes.length; }
            catch (e) { if (e.cotaEstourada) { abortadoCota = true; return; } else throw e; }
          }
          const per = (rr.retencoes[0] || {}).periodo || 'sem-periodo';
          await DB.put('rev_arquivos', { id_arquivo: Utils.shortHash(sha + x.nome), cnpj_empresa: cnpj, periodo: per, nome: x.nome, tipo: 'reinf', tamanho: x.tamanho, sha256: sha, importado_em: new Date().toISOString(), parseado: true });
        } else {
          notas.push(x);
        }
      }
      if (!notas.length) return;

      // parseia as notas do lote, AGRUPADAS POR FILIAL (o parser precisa do
      // CNPJ certo pra classificar entrada/saída)
      const porFilial = new Map();
      for (const x of notas) {
        const cf = filialDaNota(x.conteudo);
        if (!porFilial.has(cf)) porFilial.set(cf, []);
        porFilial.get(cf).push(x);
      }
      const r = { itens: [], cancelados: [], erros: [], nEntrada: 0, nSaida: 0, nOutros: 0 };
      for (const [cnpjFil, notasFil] of porFilial) {
        const rf = await ParserXML.parsearLote(notasFil.map(x => ({ nome: x.nome, conteudo: x.conteudo })), cnpjFil);
        r.itens.push(...rf.itens); r.cancelados.push(...rf.cancelados); r.erros.push(...rf.erros);
        r.nEntrada += rf.nEntrada; r.nSaida += rf.nSaida; r.nOutros += (rf.nOutros || 0);
        if (cnpjFil !== cnpj && notasFil.length) {
          await DB.registrarLog(cnpjFil, 'info', 'XMLs roteados para esta filial',
            `${notasFil.length} nota(s) importadas com o cliente ativo ${cnpj} foram atribuídas a ${cnpjFil} (CNPJ na nota).`);
        }
      }
      accEntrada += r.nEntrada; accSaida += r.nSaida; accCancel += r.cancelados.length; errosN += r.erros.length;
      for (const err of r.erros) await DB.registrarLog(cnpj, 'erro', 'XML não parseado', `${err.arquivo}: ${err.motivo}`);

      // dedup "cancelada prevalece" com memória mínima (só ids cancelados)
      const aGravar = [];
      for (const it of r.itens) {
        if (it.cancelada) { idsCancelados.add(it.id_xml_item); aGravar.push(it); }
        else if (idsCancelados.has(it.id_xml_item)) { dupItem++; }
        else aGravar.push(it);
        if (it.periodo && it.periodo !== 'sem-periodo') periodosAfetados.add(it.periodo);
      }
      totalNotas += notas.length;

      try { if (aGravar.length) totalItens += await DB.putBatch('rev_xml_itens', aGravar); }
      catch (e) { if (e.cotaEstourada) { abortadoCota = true; return; } else throw e; }

      // custódia dos arquivos do lote (cnpj da filial roteada, quando houver)
      const custodia = notas.map(x => {
        const itensArq = r.itens.filter(i => i.arquivo_xml === x.nome);
        const cnpjArq = (itensArq[0] && itensArq[0].cnpj_empresa) || cnpj;
        return { id_arquivo: Utils.shortHash(x.sha + x.nome), cnpj_empresa: cnpjArq, periodo: itensArq.length ? itensArq[0].periodo : 'sem-periodo', nome: x.nome, tipo: 'xml_nfe', tamanho: x.tamanho, sha256: x.sha, importado_em: new Date().toISOString(), parseado: true, qtd_itens: itensArq.length };
      });
      try { await DB.putBatch('rev_arquivos', custodia); }
      catch (e) { if (e.cotaEstourada) { abortadoCota = true; return; } else throw e; }

      // CHECKPOINT em disco a cada N blocos
      if (temPastaXml && blocosFeitos % CHECKPOINT_BLOCOS === 0) {
        marcar('salvando backup…');
        try { await Armazenamento.salvarCliente(cnpj); } catch (e) { console.warn('checkpoint falhou', e); }
      }
      await new Promise(res => setTimeout(res, 0));  // respiro pro navegador
    }

    // 1) XMLs avulsos — lê o conteúdo em lotes SOB DEMANDA (memória controlada)
    const totalAvulsos = xmlRefs.length;
    for (let i = 0; i < xmlRefs.length && !abortadoCota; i += CHUNK) {
      const fatiaRefs = xmlRefs.slice(i, i + CHUNK);
      const lote = [];
      for (const ref of fatiaRefs) {
        try { const conteudo = await Utils.lerArquivoTexto(ref.file); lote.push({ nome: ref.nome, conteudo, tamanho: ref.tamanho }); }
        catch (e) { errosN++; await DB.registrarLog(cnpj, 'erro', 'Falha ao ler XML', `${ref.nome}: ${e.message}`); }
      }
      await processarLote(lote, `notas avulsas ${Math.min(i + CHUNK, totalAvulsos)}/${totalAvulsos}`);
    }

    // 2) ZIPs — extrai um por vez, processa em lotes, descarta antes do próximo
    for (const item of zipRefs) {
      if (abortadoCota) break;
      try {
        item.status = 'extraindo'; atualizarFila(container);
        const xmls = await extrairXmlsDeZip(item.file);
        for (let i = 0; i < xmls.length && !abortadoCota; i += CHUNK) {
          const lote = xmls.slice(i, i + CHUNK).map(x => ({ nome: x.nome, conteudo: x.conteudo, tamanho: x.conteudo.length }));
          await processarLote(lote, `${item.nome}: ${Math.min(i + CHUNK, xmls.length)}/${xmls.length}`);
        }
        item.status = abortadoCota ? 'erro' : 'ok'; item._aguardaCotejo = false;
        item.detalhe = `${xmls.length} XML(s)`;
      } catch (e) { item.status = 'erro'; item.erro = e.message; item._aguardaCotejo = false; await DB.registrarLog(cnpj, 'erro', 'Falha no ZIP', `${item.nome}: ${e.message}`); }
    }

    await DB.registrarLog(cnpj, 'info', 'XMLs importados',
      `${totalNotas} nota(s): ${accEntrada} entrada, ${accSaida} saída, ${accCancel} cancelados, ${dupArq} arquivo(s) duplicado(s), ${dupItem} item(ns) dup, ${errosN} erro(s)${reinfN ? `, ${reinfN} retenções Reinf` : ''}`);

    // parada por cota: salva o que entrou e avisa (mas ainda coteja o que há)
    if (abortadoCota) {
      if (temPastaXml) { try { await Armazenamento.salvarCliente(cnpj); } catch (e) {} }
      await DB.registrarLog(cnpj, 'erro', 'Cota do navegador estourada',
        `Importação interrompida com ${totalItens} itens gravados. ${temPastaXml ? 'Backup salvo na pasta.' : 'SEM pasta de trabalho.'}`);
      for (const item of _fila) {
        if (item._aguardaCotejo) { item.status = totalItens > 0 ? 'ok' : 'erro'; item.cnpj = cnpj; item._aguardaCotejo = false; item.detalhe = 'interrompido (cota)'; }
      }
    }

    // 3) cotejo por período afetado (lê do banco) — roda pro que entrou
    marcar('cotejando períodos…');
    const periodos = [...periodosAfetados];
    const resumoCotejo = [];
    for (const periodo of periodos) {
      const rc = await Cotejo.executar(cnpj, periodo);
      if (rc.stats) {
        const s = rc.stats;
        const casados = s.f35 + s.f4 + s.f5 + s.f6 + s.saida;
        resumoCotejo.push(`${periodo}: ${casados} casados, ${s.sem_sped} sem SPED, ${s.sem_match} sem match`);
        await DB.registrarLog(cnpj, 'info', 'Cotejo executado',
          `${periodo}: ${casados} casados (3.5=${s.f35}, EAN=${s.f4}, contexto=${s.f5}, descrição=${s.f6}, saída=${s.saida}), ${s.sem_sped} sem SPED, ${s.sem_match} sem match, ${s.depara_novos} novos no De/Para`);
      } else if (rc.erro) {
        await DB.registrarLog(cnpj, 'aviso', 'Cotejo não executado', `${periodo}: ${rc.erro}`);
      }
      _periodosParaRecotejar.delete(`${cnpj}|${periodo}`);
    }

    if (abortadoCota) {
      _ultimoResumoCotejo = [
        `⚠️ A cota de armazenamento do navegador estourou após ${totalItens.toLocaleString('pt-BR')} itens.`,
        temPastaXml ? 'O que entrou está salvo na pasta de trabalho.' : 'Defina uma pasta de trabalho (aba Backup) e reimporte para não perder nada.',
        'Para 5 anos de notas, importe por ano (ou por semestre) — cada parte é salva no disco e não acumula risco.',
      ].concat(resumoCotejo);
    } else {
      _ultimoResumoCotejo = resumoCotejo;
    }

    // finaliza status na fila
    for (const item of _fila) {
      if (item._aguardaCotejo) { item.status = 'ok'; item.cnpj = cnpj; item._aguardaCotejo = false; }
    }
    atualizarFila(container);
  }

  /** Extrai os arquivos .xml de dentro de um .zip usando JSZip. */
  async function extrairXmlsDeZip(file) {
    if (typeof JSZip === 'undefined') {
      throw new Error('JSZip não carregado — não é possível ler arquivos .zip.');
    }
    const buffer = await Utils.lerArquivoBuffer(file);
    const zip = await JSZip.loadAsync(buffer);
    const xmls = [];
    const entradas = Object.values(zip.files);
    for (const entry of entradas) {
      if (entry.dir) continue;
      if (!entry.name.toLowerCase().endsWith('.xml')) continue;
      const conteudo = await entry.async('string');
      // só nome do arquivo (ignora pastas internas do zip)
      const nome = entry.name.split('/').pop();
      xmls.push({ nome, conteudo });
    }
    return xmls;
  }

  /** Leitura leve do SPED só pra pegar cnpj/período/uf do registro 0000. */
  /**
   * Lê o COD_FIN (EFD ICMS/IPI) ou TIPO_ESCRIT (EFD Contribuições) do registro
   * 0000 — ambos no campo p[3]. 0=original, 1=retificadora. Usado para decidir
   * qual versão é a mais recente quando o mesmo período é reimportado.
   */
  function lerCodFin(conteudo) {
    if (!conteudo) return '0';
    const l0000 = conteudo.split(/\r?\n/).find(l => l.startsWith('|0000|'));
    if (!l0000) return '0';
    const p = l0000.split('|');
    return (p[3] || '0').trim() || '0';
  }

  function extrairMetaSped(conteudo, tipo) {
    const meta = { cnpj: null, periodo: null, uf: null, razao_social: null, ie: null, qtd_linhas: 0 };
    if (!conteudo) return meta;

    const linhas = conteudo.split(/\r?\n/);
    meta.qtd_linhas = linhas.length;

    if (tipo === 'efd' || tipo === 'txt') {
      const l0000 = linhas.find(l => l.startsWith('|0000|'));
      if (l0000) {
        const campos = l0000.split('|');
        const id = (campos[2] || '').toUpperCase();
        const ehContabil = (id === 'LECD' || id === 'LECF');

        // CNPJ: primeiro campo com exatamente 14 dígitos (robusto a layout)
        let cnpj = '';
        for (const c of campos) {
          const dig = Utils.soDigitos(c || '');
          if (dig.length === 14) { cnpj = dig; break; }
        }
        // data inicial: primeiro campo DDMMAAAA (8 dígitos)
        let dtIni = '';
        for (let i = 3; i < campos.length; i++) {
          if (/^\d{8}$/.test(campos[i] || '')) { dtIni = campos[i]; break; }
        }
        // nome: campo logo após o identificador (heurística) ou maior campo textual
        const nome = ehContabil ? (campos[5] || campos[9] || '') : (campos[6] || '');

        if (cnpj) {
          meta.cnpj = cnpj;
          meta.razao_social = nome;
          if (!ehContabil) { meta.uf = campos[9]; meta.ie = campos[10]; }
        }
        if (dtIni && /^\d{8}$/.test(dtIni)) {
          const ano = dtIni.slice(4, 8), mes = dtIni.slice(2, 4);
          // ECD/ECF são anuais → período = ano; EFD mensais → AAAA-MM
          meta.periodo = ehContabil ? ano : `${ano}-${mes}`;
        }
      }
    } else if (tipo.startsWith('xml')) {
      // XML: extrai chave/emitente via regex leve (parser real depois)
      const mCnpj = conteudo.match(/<CNPJ>(\d{14})<\/CNPJ>/);
      if (mCnpj) meta.cnpj = mCnpj[1];
      const mData = conteudo.match(/<dhEmi>(\d{4})-(\d{2})/);
      if (mData) meta.periodo = `${mData[1]}-${mData[2]}`;
    }
    return meta;
  }

  async function mostrarImportados(container) {
    const card = container.querySelector('#resultado-card');
    const conteudo = container.querySelector('#resultado-conteudo');
    const ativo = Clientes.ativo();
    if (!ativo) {
      card.style.display = 'none';
      return;
    }
    const arquivos = await DB.getByIndex('rev_arquivos', 'cnpj_empresa', ativo.cnpj);
    if (arquivos.length === 0) {
      card.style.display = 'none';
      return;
    }
    card.style.display = 'block';
    arquivos.sort((a, b) => (b.importado_em || '').localeCompare(a.importado_em || ''));

    const backupHtml = (() => {
      if (_ultimoBackup === 'pasta-desconectada') {
        return `<div style="background:#fdf3e3;border:1px solid #f0d9a8;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px">
          ⚠️ Você tem uma pasta de trabalho salva mas <strong>desconectada</strong> nesta sessão, então o backup automático não rodou.
          Vá em <strong>Backup / Pasta</strong> e clique em <em>Reconectar pasta</em> para proteger os dados.</div>`;
      }
      if (_ultimoBackup) {
        return `<div style="background:#eef6f0;border:1px solid #cfe4d6;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px">
          💾 <strong>Backup salvo:</strong> ${Utils.escapeHtml(_ultimoBackup)}</div>`;
      }
      if (Armazenamento.suportado() && !Armazenamento.temPasta() && !window._temPastaSalva) {
        return `<div style="background:#fdf3e3;border:1px solid #f0d9a8;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:13px">
          ⚠️ <strong>Nenhuma pasta de trabalho definida.</strong> Os dados estão só no navegador e podem se perder.
          Vá em <strong>Backup / Pasta</strong> e defina uma pasta para salvar o banco em arquivo automaticamente.</div>`;
      }
      return '';
    })();

    const resumoCotejoHtml = _ultimoResumoCotejo.length ? `
      <div style="background:#eef6f0;border:1px solid #cfe4d6;border-radius:8px;padding:10px 12px;margin-bottom:12px">
        <strong style="color:#2a6b3a">Cotejo XML × SPED</strong>
        <ul style="margin:6px 0 0;padding-left:18px;font-size:13px;color:#345">
          ${_ultimoResumoCotejo.map(r => `<li>${Utils.escapeHtml(r)}</li>`).join('')}
        </ul>
      </div>` : '';

    conteudo.innerHTML = `
      ${backupHtml}
      ${resumoCotejoHtml}
      <table class="tabela-dados">
        <thead>
          <tr><th>Arquivo</th><th>Tipo</th><th>Período</th><th>Linhas/Itens</th><th>SHA-256</th><th>Status</th></tr>
        </thead>
        <tbody>
          ${arquivos.map(a => `
            <tr>
              <td>${Utils.escapeHtml(a.nome)}</td>
              <td>${rotuloTipo(a.tipo)}</td>
              <td>${a.periodo || '—'}</td>
              <td>${a.qtd_linhas || a.qtd_itens || '—'}</td>
              <td><span class="mono" title="${a.sha256}">${a.sha256.slice(0, 12)}…</span></td>
              <td>${a.parseado ? '<span style="color:#2a6b3a">parseado</span>' : '<span style="color:#b3611c">só custódia</span>'}</td>
            </tr>`).join('')}
        </tbody>
      </table>
      <p style="font-size:12px;color:#5a6a6a;margin-top:10px">
        Cada arquivo é registrado com cadeia de custódia (SHA-256). SPEDs são parseados e
        normalizados; XMLs são parseados, gravados e cotejados item a item contra o C170.
      </p>`;
  }

  return { render };
})();

const UIDados = (function () {
  'use strict';

  let _aba = 'documentos';

  async function render(container) {
    const ativo = Clientes.ativo();

    if (!ativo) {
      container.innerHTML = avisoSemCliente();
      return;
    }
    if (!periodo) {
      container.innerHTML = `
        <div class="etapa-header"><h2>Dados fiscais</h2></div>

    }

    container.innerHTML = `
      <div class="etapa-header">
        <h2>Dados fiscais — ${Utils.escapeHtml(ativo.razao_social || ativo.cnpj)}</h2>
        <p class="etapa-desc">Banco unificado do período ${periodo}. Documentos e itens com tributos conciliados.</p>
      </div>

      <div class="abas">
        <button class="aba ${_aba === 'documentos' ? 'ativa' : ''}" data-aba="documentos">Documentos</button>
        <button class="aba ${_aba === 'itens' ? 'ativa' : ''}" data-aba="itens">Itens</button>
        <button class="aba ${_aba === 'participantes' ? 'ativa' : ''}" data-aba="participantes">Participantes</button>
        <button class="aba ${_aba === 'produtos' ? 'ativa' : ''}" data-aba="produtos">Produtos</button>
        <button class="aba ${_aba === 'apuracao' ? 'ativa' : ''}" data-aba="apuracao">Apuração</button>
      </div>

      <div id="aba-conteudo"></div>`;

    container.querySelectorAll('.aba').forEach(btn => {
      btn.onclick = () => {
        _aba = btn.dataset.aba;
        render(container);
      };
    });

    const alvo = container.querySelector('#aba-conteudo');
    const cnpj = await Clientes.cnpjsAtivos();   // lista de filiais selecionadas (consolidado)

    try {
      if (_aba === 'documentos') await renderDocumentos(alvo, cnpj, periodo);
      else if (_aba === 'itens') await renderItens(alvo, cnpj, periodo);
      else if (_aba === 'participantes') await renderParticipantes(alvo, cnpj, periodo);
      else if (_aba === 'produtos') await renderProdutos(alvo, cnpj, periodo);
      else if (_aba === 'apuracao') await renderApuracao(alvo, cnpj, periodo);
    } catch (e) {
      console.error('Erro ao renderizar a aba', _aba, 'período', periodo, e);
      alvo.innerHTML = `
        <div class="card" style="border-left:4px solid var(--danger)">
          <h3 style="margin-top:0;color:var(--danger)">Não foi possível carregar a aba "${Utils.escapeHtml(_aba)}" (período ${Utils.escapeHtml(periodo)})</h3>
          <p style="color:var(--texto-fraco);margin:6px 0">${Utils.escapeHtml((e && e.message) || String(e))}</p>
          <p style="font-size:12.5px;color:var(--texto-fraco);margin:6px 0">As outras abas acima continuam funcionando. Tente outro período no seletor do topo ou recarregue a página. Se persistir, me mande exatamente esta mensagem.</p>
          <pre style="font-size:11px;background:#f6f8fa;padding:10px;border-radius:8px;overflow:auto;max-height:170px;margin-top:8px">${Utils.escapeHtml(((e && e.stack) || '').slice(0, 700))}</pre>
        </div>`;
    }
  }

  // ------------------------------------------------------------------
  /** Busca por período respeitando a seleção de filiais (cnpj = string ou lista). */
  async function buscarPeriodo(store, cnpj, periodo) {
    const lista = Array.isArray(cnpj) ? cnpj : [cnpj];
    const out = [];
    for (const c of lista) {
      try {
        const regs = await DB.getByIndex(store, 'cnpj_periodo', [c, periodo]);
        for (const r of regs) out.push(r);
      } catch (e) {}
    }
    return out;
  }

      </div>`;

    alvo.querySelector('#exp-docs').onclick = () => Utils.exportarParaExcel(docs, 'Documentos', 'documentos');
  }

  // ------------------------------------------------------------------
  async function renderApuracao(alvo, cnpj, periodo) {
    const lista = Array.isArray(cnpj) ? cnpj : [cnpj];
    // carrega a apuração de cada filial selecionada no período
    const blocos = [];
    for (const c of lista) {
      const icms = await DB.get('rev_apuracao_icms', `${c}_${periodo}_icms`);
      const pc = await DB.get('rev_apuracao_pis_cofins', `${c}_${periodo}_piscofins`);
      if (icms || pc) blocos.push({ cnpj: c, icms, pc });
    }
    if (!blocos.length) { alvo.innerHTML = vazio('apuração'); return; }

    const ehGrupo = lista.length > 1;
    let html = '';

    // consolidado do ICMS quando há 2+ filiais com apuração (visão de apresentação;
    // o recolhimento/aproveitamento é por inscrição estadual)
    if (ehGrupo && blocos.filter(b => b.icms).length > 1) {
      const somaC = (campo) => blocos.reduce((s, b) => s + (b.icms ? (Number(b.icms[campo]) || 0) : 0), 0);
      html += `
        <div class="card" style="border-left:4px solid #FF6B35">
          <h3>ICMS consolidado do grupo — ${blocos.filter(b => b.icms).length} filial(is) <span style="font-size:12px;font-weight:400;color:var(--texto-fraco)">(apresentação; o recolhimento é por inscrição estadual)</span></h3>
          <table class="tabela-dados">

              <tr><td>Total de créditos</td><td style="text-align:right">${Utils.fmtBRL(somaC('vl_tot_creditos'))}</td></tr>
              <tr style="font-weight:600;background:#e3eef0"><td>ICMS a recolher (soma)</td><td style="text-align:right">${Utils.fmtBRL(somaC('vl_icms_recolher'))}</td></tr>

          </table>
        </div>`;
    }

    for (const b of blocos) {
      const rotuloFil = ehGrupo ? ` — ${Utils.formatarCNPJ(b.cnpj)}${b.cnpj.slice(8, 12) === '0001' ? ' (matriz)' : ''}` : '';
      const icms = b.icms, pc = b.pc;
      if (icms) {
        html += `
        <div class="card">
          <h3>Apuração do ICMS${rotuloFil}</h3>
          <table class="tabela-dados">
            <tbody>
              <tr><td>Total de débitos</td><td style="text-align:right">${Utils.fmtBRL(icms.vl_tot_debitos)}</td></tr>
              <tr><td>Total de créditos</td><td style="text-align:right">${Utils.fmtBRL(icms.vl_tot_creditos)}</td></tr>
              <tr><td>Saldo credor anterior</td><td style="text-align:right">${Utils.fmtBRL(icms.vl_sld_credor_ant)}</td></tr>
              <tr><td>Estornos de crédito</td><td style="text-align:right">${Utils.fmtBRL(icms.vl_estornos_cred)}</td></tr>
              <tr style="font-weight:600;background:#e3eef0"><td>ICMS a recolher</td><td style="text-align:right">${Utils.fmtBRL(icms.vl_icms_recolher)}</td></tr>

          const base = num(nf, 'vlrBaseRet');
          const ret = num(nf, 'vlrRetencao');
          out.push(montarServ(meta, sentido, papel, cnpjContra, serie, numDoc, dt, vlrBruto, '', base, ret));
        } else {
          for (const sv of servs) {
            const tpServico = txt(sv, 'tpServico');
            const base = num(sv, 'vlrBaseRet');
            const ret = num(sv, 'vlrRetencao');
            out.push(montarServ(meta, sentido, papel, cnpjContra, serie, numDoc, dt, vlrBruto, tpServico, base, ret));
          }
        }
      }
    };

    if (blocosContraparte.length === 0) {
      // fallback: sem o bloco esperado, tenta achar nfs direto
      processarBloco(evtEl, '');
    } else {
      for (const bloco of blocosContraparte) {
        const cnpjContra = U().soDigitos(
          txt(bloco, 'nrInscEstabPrest') || txt(bloco, 'nrInscTomador') || txt(bloco, 'nrInsc')
        );
        processarBloco(bloco, cnpjContra);
      }
    }
    return out;
  }

  function montarServ(meta, sentido, papel, cnpjContra, serie, numDoc, dt, vlrBruto, tpServico, base, ret) {
    const seq = Math.random().toString(36).slice(2, 7);
    return {
      id_retencao: U().shortHash(`${meta.cnpj_contribuinte}|${meta.periodo}|${meta.tipo_evento}|${cnpjContra}|${numDoc}|${tpServico}|${seq}`),
      cnpj_empresa: meta.cnpj_contribuinte,
      periodo: meta.periodo,
      tipo_evento: meta.tipo_evento,
      papel, sentido,
      cnpj_contraparte: cnpjContra, nome_contraparte: '',
      serie, num_doc: numDoc, dt_doc: dt, vl_bruto: vlrBruto,
      natureza: tpServico, tipo_natureza: 'servico_inss',
      vl_base: base,
      vl_inss: ret, vl_ir: 0, vl_csll: 0, vl_pis: 0, vl_cofins: 0,
      arquivo_reinf: meta.arquivo_reinf, sha256_reinf: meta.sha256,
    };
  }

  // ---- R-4010 / R-4020 (IR/CSLL/PIS/COFINS) ----
  function extrairRet4000(evtEl, meta, cnpjEmpresa, tipoBenef) {
    const out = [];
    const benefs = filhosPorNome(evtEl, 'ideBenef');
    const blocos = benefs.length ? benefs : [evtEl];
    for (const benef of blocos) {
      const cnpjContra = U().soDigitos(
        txt(benef, 'cnpjBenef') || txt(benef, 'cpfBenef') || txt(benef, 'nrInsc')
      );
      const nome = txt(benef, 'nmBenef');
      // rendimentos: cada ideRend/ideRendimento/pgto gera uma linha;
      // se não houver repetição clara, consolida no nível do beneficiário.
      let rends = filhosPorNome(benef, 'ideRendimento');
      if (rends.length === 0) rends = filhosPorNome(benef, 'ideRend');
      if (rends.length === 0) rends = filhosPorNome(benef, 'pgto');
      const alvos = rends.length ? rends : [benef];
      for (const rend of alvos) {
        const natRend = txt(rend, 'natRend');
        const infoIR = primeiro(rend, 'infoIR');
        const infoCSLL = primeiro(rend, 'infoCSLL');
        const infoCofins = primeiro(rend, 'infoCofins');
        const infoPis = primeiro(rend, 'infoPisPasep') || primeiro(rend, 'infoPis');
        const vlrIR = num(infoIR, 'vlrIR') || num(rend, 'vlrIR');
        const vlrCSLL = num(infoCSLL, 'vlrCSLL') || num(rend, 'vlrCSLL');
        const vlrCofins = num(infoCofins, 'vlrCofins') || num(rend, 'vlrCofins');
        const vlrPis = num(infoPis, 'vlrPisPasep') || num(rend, 'vlrPisPasep');
        const base = num(rend, 'vlrBaseIR') || num(infoIR, 'vlrBaseIR') ||
                     num(rend, 'vlrRendBruto') || num(rend, 'vlrBaseCSLL');
        const vlrBruto = num(rend, 'vlrRendBruto') || num(rend, 'vlrBruto');
        if (vlrIR + vlrCSLL + vlrCofins + vlrPis === 0 && base === 0) continue;
        const seq = Math.random().toString(36).slice(2, 7);
        out.push({
          id_retencao: U().shortHash(`${meta.cnpj_contribuinte}|${meta.periodo}|${meta.tipo_evento}|${cnpjContra}|${natRend}|${seq}`),
          cnpj_empresa: meta.cnpj_contribuinte,
          periodo: meta.periodo,
          tipo_evento: meta.tipo_evento,
          papel: 'fonte_pagadora', sentido: 'a_recolher',
          cnpj_contraparte: cnpjContra, nome_contraparte: nome,
          serie: '', num_doc: '', dt_doc: '', vl_bruto: vlrBruto,
          natureza: natRend, tipo_natureza: 'rendimento_' + tipoBenef.toLowerCase(),
          vl_base: base,
          vl_inss: 0, vl_ir: vlrIR, vl_csll: vlrCSLL, vl_pis: vlrPis, vl_cofins: vlrCofins,
          arquivo_reinf: meta.arquivo_reinf, sha256_reinf: meta.sha256,
        });
      }
    }
    return out;
  }

  /**
   * Parseia vários XMLs Reinf.
   * @returns {Promise<{retencoes, porTipo, naoRetencao, erros}>}
   */
  async function parsearLote(arquivos, cnpjEmpresa, onProgresso) {
    const retencoes = [];
    const porTipo = {};
    const naoRetencao = [];
    const erros = [];
    for (let i = 0; i < arquivos.length; i++) {
      const arq = arquivos[i];
      try {
        const r = await parsear(arq.conteudo, { nomeArquivo: arq.nome, cnpjEmpresa });
        porTipo[r.tipo_evento] = (porTipo[r.tipo_evento] || 0) + 1;
        if (r.retencoes.length) retencoes.push(...r.retencoes);
        else naoRetencao.push({ arquivo: arq.nome, tipo: r.tipo_evento });
      } catch (e) {
        erros.push({ arquivo: arq.nome, motivo: e.message });
      }
      if (onProgresso && (i + 1) % 50 === 0) onProgresso(i + 1, arquivos.length);
    }
    if (onProgresso) onProgresso(arquivos.length, arquivos.length);
    return { retencoes, porTipo, naoRetencao, erros };
  }

  /** Detecta se um conteúdo XML é um evento Reinf (e não NF-e). */
  function ehReinf(conteudo) {
    if (!conteudo) return false;
    return /<Reinf[\s>]|<evtServTom|<evtServPrest|<evtRetP[FJ]|reinf\.esocial/i.test(conteudo);
  }

  return { parsear, parsearLote, ehReinf };
})();

window.ParserReinf = ParserReinf;


// ===================== cotejo.js =====================
// =====================================================================
// Revisor Fiscal Prime — cotejo.js
// Cotejo XML × SPED: casa cada item de XML (NF-e/NFC-e) com o item
// escriturado no C170. Cascata de 6 estratégias portada do Apurador v7.
//
// O problema: na ENTRADA, o fornecedor usa o código dele (cProd) e a
// empresa escritura com o código dela (cod_item). São diferentes. A
// cascata descobre a correspondência por EAN, contexto e descrição.
//
// SAÍDA é direta (a empresa emite, cProd = cod_item).
//
// Resultado:
//   - rev_itens.tem_xml / id_pareamento_xml / confianca_xml / metodo_xml
//   - rev_xml_itens.status_cotejo (pareado / sem_sped / sem_match) + cod_item
//   - rev_depara: De/Para acumulativo (aprende entre períodos)
// =====================================================================

const Cotejo = (function () {
  'use strict';

  const U = () => (typeof window !== 'undefined' ? window.Utils : globalThis.Utils);

  // Tolerâncias (parametrizáveis)
  const TOL_VALOR = 0.05;        // Fase 5 R2
  const TOL_NITEM_VALOR = 0.10;  // Fase 5 R4
  const SCORE_DESC = 0.85;       // Fase 6 alta confiança

  /**
   * Executa o cotejo completo para um cliente+período.
   * @param {string} cnpj
   * @param {string} periodo
   * @param {function} onProgress(pct, msg)
   */
  async function executar(cnpj, periodo, onProgress) {
    const prog = onProgress || (() => {});

    prog(5, 'Carregando dados para cotejo…');
    const est = await carregar(cnpj, periodo);
    if (est.xmlEntrada.length === 0 && est.xmlSaida.length === 0) {
      return { erro: 'Nenhum item de XML para este cliente/período. Importe XMLs primeiro.' };
    }

    const stats = {
      xml_entrada: est.xmlEntrada.length,
      xml_saida: est.xmlSaida.length,
      c170_entrada: est.c170Entrada.length,
      f35: 0, f4: 0, f5: 0, f6: 0, saida: 0,
      sem_sped: 0, sem_match: 0,
      depara_novos: 0,
    };

    prog(20, 'Fase 1 — De/Para a partir do XML de saída…');
    fase1_deparaSaida(est, stats);

    prog(30, 'Fase 2 — EANs possíveis por item escriturado…');
    fase2_enriquecerC170(est);

    prog(40, 'Fase 3 — De/Para de fornecedor via XML de entrada…');
    fase3_deparaFornecedor(est, stats);

    prog(50, 'Fase 3.5 — casamento via De/Para…');
    fase35_matchDepara(est, stats);

    prog(60, 'Fase 4 — casamento por EAN direto…');
    fase4_matchEAN(est, stats);

    prog(70, 'Fase 5 — dedução por contexto da nota…');
    fase5_contexto(est, stats);

    prog(80, 'Fase 6 — casamento por descrição…');
    fase6_descricao(est, stats);

    prog(88, 'Casando notas de saída…');
    casarSaida(est, stats);

    prog(94, 'Gravando resultado do cotejo…');
    await finalizar(est, stats, cnpj);

    prog(100, 'Cotejo concluído.');
    return { stats };
  }

  // ------------------------------------------------------------------
  // CARGA
  // ------------------------------------------------------------------
  async function carregar(cnpj, periodo) {
    const xmlItens = await DB.getByIndex('rev_xml_itens', 'cnpj_periodo', [cnpj, periodo]);
    const itens = await DB.getByIndex('rev_itens', 'cnpj_periodo', [cnpj, periodo]);
    const produtos = await DB.getByIndex('rev_produtos', 'cnpj_periodo', [cnpj, periodo]);
    // De/Para é acumulativo: carrega TODO o histórico do cliente
    const deparaAll = await DB.getByIndex('rev_depara', 'cnpj_empresa', cnpj);

    const xmlEntrada = xmlItens.filter(x => x.tipo_operacao === 'entrada' && !x.cancelada);
    const xmlSaida = xmlItens.filter(x => x.tipo_operacao === 'saida' && !x.cancelada);
    const c170Entrada = itens.filter(i => i.tipo_operacao === 'entrada');
    const c170Saida = itens.filter(i => i.tipo_operacao === 'saida');

    // índice produto por cod_item
    const prodPorCod = {};
    for (const p of produtos) prodPorCod[p.cod_item] = p;

    // De/Para em memória: mapa por id_depara
    const deparaMap = new Map();
    for (const d of deparaAll) deparaMap.set(d.id_depara, d);

    // reseta marcação de cotejo em memória
    for (const x of xmlEntrada) { x._codItem = null; x._idPar = null; x._conf = null; x._metodo = null; }
    for (const c of c170Entrada) { c._temXml = false; c._idParXml = null; c._confXml = null; c._metodoXml = null; }

    return {
      cnpj, periodo,
      xmlEntrada, xmlSaida, c170Entrada, c170Saida,
      prodPorCod, deparaMap,
      _deparaModificados: new Set(),
    };
  }

  function deparaUpsert(est, cnpj, codItem, cnpjForn, dados) {
    const id = `${cnpj}_${codItem}_${cnpjForn || ''}`;
    let reg = est.deparaMap.get(id);
    if (!reg) {
      reg = {
        id_depara: id, cnpj_empresa: cnpj, codItem,
        cnpj_fornecedor: cnpjForn || '', cProd_fornecedor: null, nome_fornecedor: null,
        eans_observados: [], metodo: dados.metodo, confianca: dados.confianca,
        atualizado_em: new Date().toISOString(),
      };
      est.deparaMap.set(id, reg);
    }
    if (dados.cProd_fornecedor) reg.cProd_fornecedor = dados.cProd_fornecedor;
    if (dados.nome_fornecedor) reg.nome_fornecedor = dados.nome_fornecedor;
    if (dados.eans) {
      for (const ean of dados.eans) {
        if (!ean || ean === '0') continue;
        let e = reg.eans_observados.find(x => x.EAN === ean);
        if (!e) { e = { EAN: ean, ocorrencias: 0 }; reg.eans_observados.push(e); }
        e.ocorrencias++;
      }
    }
    reg.atualizado_em = new Date().toISOString();
    est._deparaModificados.add(id);
    return reg;
  }

  // ------------------------------------------------------------------
  // FASE 1 — De/Para a partir do XML de saída (codItem → EANs)
  // ------------------------------------------------------------------
  function fase1_deparaSaida(est, stats) {
    for (const x of est.xmlSaida) {
      const codItem = x.cod_item || x.cProd;
      if (!codItem) continue;
      const ean = U().limparEAN(x.cEAN);
      deparaUpsert(est, est.cnpj, codItem, '', {
        metodo: 'xml_saida_direto', confianca: 'alta',
        eans: (ean && ean !== '0' && ean.length >= 8) ? [ean] : [],
      });
    }
  }

  // ------------------------------------------------------------------
  // FASE 2 — enriquece C170 entrada com EANs possíveis (em memória)
  // ------------------------------------------------------------------
  function fase2_enriquecerC170(est) {
    // mapa cnpj|codItem → eans (dos registros De/Para sem fornecedor = Fase 1)
    const deparaSemForn = new Map();
    for (const d of est.deparaMap.values()) {
      if (d.cnpj_fornecedor) continue;
      deparaSemForn.set(d.codItem, (d.eans_observados || []).map(e => e.EAN));
    }
    for (const c of est.c170Entrada) {
      const eans = new Set();
      for (const e of (deparaSemForn.get(c.cod_item) || [])) eans.add(e);
      const prod = est.prodPorCod[c.cod_item];
      if (prod && prod.ean && prod.ean !== '0') eans.add(prod.ean);
      c._eansPossiveis = [...eans];
    }
  }

  // ------------------------------------------------------------------
  // FASE 3 — De/Para de fornecedor (aprende cProd_fornecedor → codItem via EAN)
  // ------------------------------------------------------------------
  function fase3_deparaFornecedor(est, stats) {
    // índice: EAN → codItem(s) conhecidos (da Fase 1)
    const eanParaCod = new Map();
    for (const d of est.deparaMap.values()) {
      if (d.cnpj_fornecedor) continue;
      for (const e of (d.eans_observados || [])) {
        if (!eanParaCod.has(e.EAN)) eanParaCod.set(e.EAN, new Set());
        eanParaCod.get(e.EAN).add(d.codItem);
      }
    }
    for (const x of est.xmlEntrada) {
      const ean = U().limparEAN(x.cEAN);
      if (!ean || ean === '0') continue;
      // acha codItem cujo EAN bate
      let codItemMatch = null;
      for (const [eanConhecido, cods] of eanParaCod.entries()) {
        if (U().eansBatem(ean, eanConhecido) && cods.size === 1) {
          codItemMatch = [...cods][0]; break;
        }
      }
      if (codItemMatch && x.emit_cnpj) {
        const antes = est.deparaMap.size;
        deparaUpsert(est, est.cnpj, codItemMatch, x.emit_cnpj, {
          metodo: 'xml_entrada_ean', confianca: 'alta',
          cProd_fornecedor: x.cProd, nome_fornecedor: x.emit_nome,
          eans: [ean],
        });
        if (est.deparaMap.size > antes) stats.depara_novos++;
      }
    }
  }

  // ------------------------------------------------------------------
  // FASE 3.5 — casamento via De/Para (emit_cnpj + cProd → codItem → C170)
  // ------------------------------------------------------------------
  function fase35_matchDepara(est, stats) {
    // índice De/Para com fornecedor: (cnpj_forn, cProd_forn) → codItem
    const idx = new Map();
    for (const d of est.deparaMap.values()) {
      if (!d.cnpj_fornecedor || !d.cProd_fornecedor) continue;
      idx.set(`${d.cnpj_fornecedor}|${d.cProd_fornecedor}`, d.codItem);
    }
    const c170PorNF = indexarC170PorNF(est);
    for (const x of est.xmlEntrada) {
      if (x._idPar) continue;
      const codItem = idx.get(`${x.emit_cnpj}|${x.cProd}`);
      if (!codItem) continue;
      const candidatos = (c170PorNF.get(x.chave) || []).filter(c => !c._temXml && c.cod_item === codItem);
      if (candidatos.length >= 1) {
        aplicarMatch(x, candidatos[0], 'fase_3.5_depara', 'alta', stats, 'f35');
      }
    }
  }

  // ------------------------------------------------------------------
  // FASE 4 — casamento por EAN direto (cEAN do XML ↔ eans_possiveis do C170)
  // ------------------------------------------------------------------
  function fase4_matchEAN(est, stats) {
    const c170PorNF = indexarC170PorNF(est);
    for (const x of est.xmlEntrada) {
      if (x._idPar) continue;
      const ean = U().limparEAN(x.cEAN);
      if (!ean || ean === '0') continue;
      const livres = (c170PorNF.get(x.chave) || []).filter(c => !c._temXml);
      const casam = livres.filter(c => (c._eansPossiveis || []).some(e => U().eansBatem(ean, e)));
      if (casam.length === 1) {
        aplicarMatch(x, casam[0], 'fase_4_ean_direto', 'alta', stats, 'f4');
      }
    }
  }

  // ------------------------------------------------------------------
  // FASE 5 — dedução por contexto da NF (4 regras, iterativo)
  // ------------------------------------------------------------------
  function fase5_contexto(est, stats) {
    const c170PorNF = indexarC170PorNF(est);
    const xmlPorNF = new Map();
    for (const x of est.xmlEntrada) {
      if (x._idPar) continue;
      if (!xmlPorNF.has(x.chave)) xmlPorNF.set(x.chave, []);
      xmlPorNF.get(x.chave).push(x);
    }

    let mudou = true, iter = 0;
    while (mudou && iter < 10) {
      mudou = false; iter++;
      for (const [chave, xmls] of xmlPorNF.entries()) {
        const xmlLivres = xmls.filter(x => !x._idPar);
        const c170Livres = (c170PorNF.get(chave) || []).filter(c => !c._temXml);
        if (xmlLivres.length === 0 || c170Livres.length === 0) continue;

        // R1/R3: 1 XML livre e 1 C170 livre → match
        if (xmlLivres.length === 1 && c170Livres.length === 1) {
          aplicarMatch(xmlLivres[0], c170Livres[0], 'fase_5_r1_item_unico', 'alta', stats, 'f5');
          mudou = true; continue;
        }
        // R2: valor único (tol 5%), candidato único
        for (const x of xmlLivres) {
          if (x._idPar) continue;
          const v = x.vl_item || 0; if (v <= 0) continue;
          const cands = c170Livres.filter(c => !c._temXml && c.vl_item > 0 &&
            Math.abs(c.vl_item - v) / Math.max(c.vl_item, v) <= TOL_VALOR);
          if (cands.length === 1) {
            aplicarMatch(x, cands[0], 'fase_5_r2_valor', 'alta', stats, 'f5');
            mudou = true;
          }
        }
        // R4: nItem + valor (tol 10%)
        for (const x of xmlLivres) {
          if (x._idPar) continue;
          const v = x.vl_item || 0;
          const cands = c170Livres.filter(c => !c._temXml && c.nItem === x.nItem &&
            c.vl_item > 0 && Math.abs(c.vl_item - v) / Math.max(c.vl_item, v) <= TOL_NITEM_VALOR);
          if (cands.length === 1) {
            aplicarMatch(x, cands[0], 'fase_5_r4_nitem_valor', 'media', stats, 'f5');
            mudou = true;
          }
        }
      }
    }
  }

  // ------------------------------------------------------------------
  // FASE 6 — casamento por descrição (similaridade Jaccard ponderada)
  // ------------------------------------------------------------------
  function fase6_descricao(est, stats) {
    const c170PorNF = indexarC170PorNF(est);
    for (const x of est.xmlEntrada) {
      if (x._idPar) continue;
      const livres = (c170PorNF.get(x.chave) || []).filter(c => !c._temXml);
      let melhor = null, melhorScore = 0;
      for (const c of livres) {
        const descC = c.descricao || (est.prodPorCod[c.cod_item]?.descricao) || '';
        const score = U().compararDescricoes(x.descricao, descC);
        if (score > melhorScore) { melhorScore = score; melhor = c; }
      }
      if (melhor && melhorScore >= SCORE_DESC) {
        aplicarMatch(x, melhor, 'fase_6_descricao', 'media', stats, 'f6');
      }
    }
  }

  // ------------------------------------------------------------------
  // SAÍDA — casamento direto (empresa emite: cProd = cod_item, mesmo nItem)
  // ------------------------------------------------------------------
  function casarSaida(est, stats) {
    // índice C170 saída por id_pareamento (chave+nItem) e por (chave, cod_item)
    const porIdPar = new Map();
    const porChaveCod = new Map();
    for (const c of est.c170Saida) {
      porIdPar.set(c.id_pareamento, c);
      porChaveCod.set(`${c.chave}|${c.cod_item}`, c);
      c._temXml = c._temXml || false;
    }
    for (const x of est.xmlSaida) {
      let c = porIdPar.get(x.id_pareamento) || porChaveCod.get(`${x.chave}|${x.cProd}`);
      if (c) {
        c._temXml = true; c._idParXml = x.id_xml_item; c._confXml = 'alta'; c._metodoXml = 'saida_direto';
        x._codItem = c.cod_item; x._idPar = c.id_pareamento; x._conf = 'alta'; x._metodo = 'saida_direto';
        x._status = 'pareado';
        stats.saida++;
      }
    }
  }

  // ------------------------------------------------------------------
  // HELPERS
  // ------------------------------------------------------------------
  function indexarC170PorNF(est) {
    if (est._c170PorNF) return est._c170PorNF;
    const m = new Map();
    for (const c of est.c170Entrada) {
      if (!m.has(c.chave)) m.set(c.chave, []);
      m.get(c.chave).push(c);
    }
    est._c170PorNF = m;
    return m;
  }

  function aplicarMatch(xml, c170, metodo, confianca, stats, contador) {
    xml._codItem = c170.cod_item;
    xml._idPar = c170.id_pareamento;
    xml._conf = confianca;
    xml._metodo = metodo;
    xml._status = 'pareado';
    c170._temXml = true;
    c170._idParXml = xml.id_xml_item;
    c170._confXml = confianca;
    c170._metodoXml = metodo;
    if (contador) stats[contador]++;
  }

  // ------------------------------------------------------------------
  // FINALIZAÇÃO — grava resultados nas stores
  // ------------------------------------------------------------------
  async function finalizar(est, stats, cnpj) {
    // chaves que existem no SPED (pra distinguir sem_sped de sem_match)
    const chavesSped = new Set(est.c170Entrada.map(c => c.chave).filter(Boolean));

    // 1) atualiza rev_xml_itens com status do cotejo
    const xmlAtualizar = [];
    for (const x of [...est.xmlEntrada, ...est.xmlSaida]) {
      let status = x._status || null;
      if (x.tipo_operacao === 'entrada' && !x._idPar) {
        status = chavesSped.has(x.chave) ? 'sem_match' : 'sem_sped';
        if (status === 'sem_sped') stats.sem_sped++; else stats.sem_match++;
      }
      xmlAtualizar.push({
        ...x,
        cod_item: x._codItem || x.cod_item,
        id_pareamento: x._idPar || x.id_pareamento,
        confianca_cotejo: x._conf || x.confianca_cotejo,
        metodo_cotejo: x._metodo || x.metodo_cotejo,
        status_cotejo: status,
      });
    }
    // limpa campos temporários (prefixo _)
    const limpar = (o) => { const r = {}; for (const k in o) if (!k.startsWith('_')) r[k] = o[k]; return r; };
    await DB.putBatch('rev_xml_itens', xmlAtualizar.map(limpar));

    // 2) atualiza rev_itens (C170) com tem_xml e dados do casamento
    const itensAtualizar = [];
    for (const c of [...est.c170Entrada, ...est.c170Saida]) {
      if (c._temXml) {
        itensAtualizar.push(limpar({
          ...c,
          tem_xml: true,
          id_pareamento_xml: c._idParXml,
          confianca_xml: c._confXml,
          metodo_xml: c._metodoXml,
        }));
      }
    }
    if (itensAtualizar.length) await DB.putBatch('rev_itens', itensAtualizar);

    // 3) persiste o De/Para modificado/novo (acumulativo)
    const deparaGravar = [];
    for (const id of est._deparaModificados) {
      const reg = est.deparaMap.get(id);
      if (reg) deparaGravar.push(reg);
    }
    if (deparaGravar.length) await DB.putBatch('rev_depara', deparaGravar);
  }

  return { executar };
})();

window.Cotejo = Cotejo;


// ===================== dossie.js =====================
// =====================================================================
// Revisor Fiscal Prime — dossie.js
// Monta um dossiê COMPLETO do estado do banco para um cliente: custódia,
// cobertura de fontes, panorama, resultado do cotejo, achados/divergências,
// De/Para, log de processamento e amostras de dados.
//
// Gera 3 formatos:
//   - Markdown  → para colar numa conversa (análise, laudo, apresentação)
//   - JSON      → dados brutos completos (arquivo / reimportação)
//   - Excel     → abas navegáveis (custódia, cotejo, achados)
// =====================================================================

const Dossie = (function () {
  'use strict';

  const U = () => (typeof window !== 'undefined' ? window.Utils : globalThis.Utils);

  // limites de amostragem (achados saem completos; dados volumosos, amostrados)
  const LIM_AMOSTRA = 25;
  const LIM_C170_SEM_XML = 100;
  const LIM_DEPARA = 100;
  const LIM_LOG = 200;

  /**
   * Coleta todo o estado do banco para um cliente.
   * Não usa DOM — testável isoladamente.
   */
  async function coletar(cnpj, opts) {
    opts = opts || {};
    const versao = opts.versao || '?';

    // aceita CNPJ único ou lista (grupo de filiais): merge das stores.
    const cnpjs = Array.isArray(cnpj) ? cnpj : [cnpj];
    const ehGrupo = cnpjs.length > 1;
    const cnpjRef = ehGrupo ? cnpjs[0] : cnpjs[0];

    let cliente;
    const filiais = [];
    for (const c of cnpjs) {
      const cli = await DB.get('rev_clientes', c) || { cnpj: c };
      filiais.push({ cnpj: c, razao_social: cli.razao_social || '', uf: cli.uf || '', ie: cli.ie || '' });
    }
    if (ehGrupo) {
      const base = await DB.get('rev_clientes', cnpjRef) || { cnpj: cnpjRef };
      cliente = {
        cnpj: (window.Utils || globalThis.Utils).raizCNPJ(cnpjRef),
        razao_social: (base.razao_social || cnpjRef) + ` — GRUPO (${cnpjs.length} filiais)`,
        uf: base.uf || '', _grupo: true, _filiais: filiais,
      };
    } else {
      cliente = await DB.get('rev_clientes', cnpjRef) || { cnpj: cnpjRef };
    }

    const arquivos = await DB.getByIndexCnpjs('rev_arquivos', cnpjs);
    const documentos = await DB.getByIndexCnpjs('rev_documentos', cnpjs);
    const itens = await DB.getByIndexCnpjs('rev_itens', cnpjs);
    const produtos = await DB.getByIndexCnpjs('rev_produtos', cnpjs);
    const xmlItens = await DB.getByIndexCnpjs('rev_xml_itens', cnpjs);
    const depara = await DB.getByIndexCnpjs('rev_depara', cnpjs);
    const retencoes = await DB.getByIndexCnpjs('rev_retencoes', cnpjs).catch(() => []);
    const planoContas = await DB.getByIndexCnpjs('rev_plano_contas', cnpjs).catch(() => []);
    const saldos = await DB.getByIndexCnpjs('rev_saldos_contabeis', cnpjs).catch(() => []);
    const apurFiscal = await DB.getByIndexCnpjs('rev_apuracao_irpj_csll', cnpjs).catch(() => []);
    const achadosStore = await DB.getByIndexCnpjs('rev_achados', cnpjs).catch(() => []);
    let log = [];
    for (const c of cnpjs) {
      try { log.push(...await DB.lerLog(c, Math.ceil(LIM_LOG / cnpjs.length))); } catch (e) {}
    }

    // períodos cobertos
    const periodosTodos = [...new Set([
      ...arquivos.map(a => a.periodo),
      ...documentos.map(d => d.periodo),
    ].filter(p => p && p !== 'sem-periodo'))].sort();
    // mensais (AAAA-MM) alimentam cobertura/cotejo; anuais (AAAA) são ECD/ECF
    const periodos = periodosTodos.filter(p => /^\d{4}-\d{2}$/.test(p));

    // ---- custódia ----
    const custodia = arquivos
      .slice().sort((a, b) => (a.periodo || '').localeCompare(b.periodo || ''))
      .map(a => ({
        nome: a.nome, tipo: a.tipo, periodo: a.periodo || '—',
        sha256: a.sha256, tamanho: a.tamanho,
        importado_em: a.importado_em,
        linhas: a.qtd_linhas || null, itens: a.qtd_itens || null,
        status: a.parseado ? 'parseado' : 'só custódia',
      }));

    // ---- cobertura de fontes por período ----
    const cobertura = periodos.map(p => {
      const arqP = arquivos.filter(a => a.periodo === p);
      const temFiscal = itens.some(i => i.periodo === p && i.tem_efd_fiscal);
      const temContrib = itens.some(i => i.periodo === p && i.tem_efd_contrib);
      const nXml = xmlItens.filter(x => x.periodo === p).length;
      return {
        periodo: p,
        tem_efd_fiscal: temFiscal,
        tem_efd_contrib: temContrib,
        tem_xml: nXml > 0,
        n_arquivos: arqP.length,
        n_documentos: documentos.filter(d => d.periodo === p).length,
        n_itens: itens.filter(i => i.periodo === p).length,
        n_xml_itens: nXml,
      };
    });

    // ---- panorama (contagens + totais financeiros) ----
    const soma = (arr, campo) => arr.reduce((s, x) => s + (Number(x[campo]) || 0), 0);
    const panoramaPorPeriodo = periodos.map(p => {
      const docsP = documentos.filter(d => d.periodo === p);
      return {
        periodo: p,
        docs_entrada: docsP.filter(d => d.tipo_operacao === 'entrada').length,
        docs_saida: docsP.filter(d => d.tipo_operacao === 'saida').length,
        itens: itens.filter(i => i.periodo === p).length,
        vl_doc_total: soma(docsP, 'vl_doc'),
        vl_icms: soma(docsP, 'vl_icms'),
        vl_icms_st: soma(docsP, 'vl_icms_st'),
        vl_ipi: soma(docsP, 'vl_ipi'),
        vl_pis: soma(docsP, 'vl_pis'),
        vl_cofins: soma(docsP, 'vl_cofins'),
      };
    });

    const panorama = {
      totais: {
        documentos: documentos.length,
        documentos_entrada: documentos.filter(d => d.tipo_operacao === 'entrada').length,
        documentos_saida: documentos.filter(d => d.tipo_operacao === 'saida').length,
        itens: itens.length,
        produtos: produtos.length,
        xml_itens: xmlItens.length,
        depara: depara.length,
      },
      por_periodo: panoramaPorPeriodo,
    };

    // ---- cotejo XML × SPED ----
    const xmlEntrada = xmlItens.filter(x => x.tipo_operacao === 'entrada');
    const xmlSaida = xmlItens.filter(x => x.tipo_operacao === 'saida');
    const cotejoPorPeriodo = periodos.map(p => {
      const xe = xmlEntrada.filter(x => x.periodo === p);
      const xs = xmlSaida.filter(x => x.periodo === p);
      const porMetodo = {};
      for (const x of [...xe, ...xs]) {
        if (x.status_cotejo === 'pareado') {
          const m = x.metodo_cotejo || 'outro';
          porMetodo[m] = (porMetodo[m] || 0) + 1;
        }
      }
      const semSped = xe.filter(x => x.status_cotejo === 'sem_sped').length;
      const semMatch = xe.filter(x => x.status_cotejo === 'sem_match').length;
      const c170EntP = itens.filter(i => i.periodo === p && i.tipo_operacao === 'entrada');
      const c170SemXml = c170EntP.filter(i => !i.tem_xml).length;
      const casados = xe.filter(x => x.status_cotejo === 'pareado').length;
      const cob = xe.length ? (casados / xe.length * 100) : null;
      return {
        periodo: p,
        xml_entrada: xe.length, xml_saida: xs.length,
        casados, sem_sped: semSped, sem_match: semMatch,
        c170_entrada: c170EntP.length, c170_sem_xml: c170SemXml,
        por_metodo: porMetodo,
        cobertura_entrada_pct: cob,
      };
    });

    // ---- achados / divergências (material de laudo) ----
    // A) Notas no XML não escrituradas (sem_sped) — agrupadas por chave
    const notasNaoEscrituradas = agruparNotas(xmlEntrada.filter(x => x.status_cotejo === 'sem_sped'));
    // B) Itens XML escriturados mas sem match de item
    const itensXmlSemMatch = xmlEntrada.filter(x => x.status_cotejo === 'sem_match').map(x => ({
      periodo: x.periodo, chave: x.chave, cProd: x.cProd, descricao: x.descricao,
      vl_item: x.vl_item, emit_cnpj: x.emit_cnpj, emit_nome: x.emit_nome,
    }));
    // C) Itens C170 de entrada sem XML correspondente
    const c170SemXml = itens.filter(i => i.tipo_operacao === 'entrada' && !i.tem_xml).map(i => ({
      periodo: i.periodo, chave: i.chave, cod_item: i.cod_item, descricao: i.descricao,
      cfop: i.cfop, vl_item: i.vl_item,
    }));
    // D) Divergência de valor entre itens casados (XML × C170)
    const idxC170 = {};
    for (const i of itens) if (i.tem_xml && i.id_pareamento_xml) idxC170[i.id_pareamento_xml] = i;
    const divergenciaValor = [];
    for (const x of [...xmlEntrada, ...xmlSaida]) {
      if (x.status_cotejo !== 'pareado') continue;
      const c = idxC170[x.id_xml_item];
      if (!c) continue;
      const vx = Number(x.vl_item) || 0, vc = Number(c.vl_item) || 0;
      const ref = Math.max(vx, vc);
      if (ref > 0 && Math.abs(vx - vc) / ref > 0.01) {
        divergenciaValor.push({
          periodo: x.periodo, chave: x.chave, cod_item: c.cod_item,
          descricao: c.descricao, vl_xml: vx, vl_sped: vc, diferenca: vx - vc,
        });
      }
    }

    const achados = {
      notas_nao_escrituradas: notasNaoEscrituradas,
      itens_xml_sem_match: itensXmlSemMatch,
      c170_sem_xml: c170SemXml,
      divergencia_valor: divergenciaValor,
      achados_persistidos: achadosStore,  // da store rev_achados (auditorias futuras)
    };

    // ---- De/Para (amostra) ----
    const deparaAmostra = depara.slice(0, LIM_DEPARA).map(d => ({
      codItem: d.codItem, cnpj_fornecedor: d.cnpj_fornecedor || '(da saída)',
      cProd_fornecedor: d.cProd_fornecedor || '—', nome_fornecedor: d.nome_fornecedor || '',
      eans: (d.eans_observados || []).map(e => e.EAN).join(', '),
      metodo: d.metodo, confianca: d.confianca,
    }));

    // ---- amostras de dados (pra ver estrutura) ----
    const amostras = {
      documentos: documentos.slice(0, LIM_AMOSTRA),
      itens: itens.slice(0, LIM_AMOSTRA),
      produtos: produtos.slice(0, LIM_AMOSTRA),
      xml_itens: xmlItens.slice(0, LIM_AMOSTRA),
    };

    // ---- retenções (EFD-Reinf) ----
    const somaRet = (arr, c) => arr.reduce((s, x) => s + (Number(x[c]) || 0), 0);
    const retPorPeriodo = periodos.map(p => {
      const rp = retencoes.filter(r => r.periodo === p);
      return {
        periodo: p,
        n: rp.length,
        a_recolher: rp.filter(r => r.sentido === 'a_recolher').length,
        sofrida: rp.filter(r => r.sentido === 'sofrida').length,
        vl_inss: somaRet(rp, 'vl_inss'),
        vl_ir: somaRet(rp, 'vl_ir'),
        vl_csll: somaRet(rp, 'vl_csll'),
        vl_pis: somaRet(rp, 'vl_pis'),
        vl_cofins: somaRet(rp, 'vl_cofins'),
      };
    }).filter(x => x.n > 0);
    const retPorTipo = {};
    for (const r of retencoes) retPorTipo[r.tipo_evento] = (retPorTipo[r.tipo_evento] || 0) + 1;
    const retencoesResumo = {
      total: retencoes.length,
      por_tipo: retPorTipo,
      por_periodo: retPorPeriodo,
      totais: {
        vl_inss: somaRet(retencoes, 'vl_inss'),
        vl_ir: somaRet(retencoes, 'vl_ir'),
        vl_csll: somaRet(retencoes, 'vl_csll'),
        vl_pis: somaRet(retencoes, 'vl_pis'),
        vl_cofins: somaRet(retencoes, 'vl_cofins'),
      },
      amostra: retencoes.slice(0, LIM_AMOSTRA).map(r => ({
        periodo: r.periodo, tipo_evento: r.tipo_evento, sentido: r.sentido,
        cnpj_contraparte: r.cnpj_contraparte, num_doc: r.num_doc,
        natureza: r.natureza, vl_base: r.vl_base,
        vl_inss: r.vl_inss, vl_ir: r.vl_ir, vl_csll: r.vl_csll, vl_pis: r.vl_pis, vl_cofins: r.vl_cofins,
      })),
    };

    // ---- contábil (ECD/ECF): plano, balancete, apuração ----
    const anosContabeis = [...new Set([...planoContas, ...saldos, ...apurFiscal].map(x => x.periodo))].sort();
    const contabilResumo = {
      anos: anosContabeis,
      plano_contas: planoContas.length,
      saldos: saldos.length,
      por_ano: anosContabeis.map(ano => {
        const sld = saldos.filter(s => s.periodo === ano);
        const patr = sld.filter(s => s.tipo_saldo === 'patrimonial');
        const res = sld.filter(s => s.tipo_saldo === 'resultado');
        return {
          ano,
          origem: [...new Set(sld.map(s => s.origem))].join('/'),
          contas_plano: planoContas.filter(p => p.periodo === ano).length,
          contas_patrimoniais: patr.length,
          contas_resultado: res.length,
          total_debitos: somaRet(patr, 'debitos'),
          total_creditos: somaRet(patr, 'creditos'),
        };
      }),
      // apuração IRPJ/CSLL (Lalur/Lacs)
      apuracao: ['IRPJ', 'CSLL'].map(trib => {
        const ap = apurFiscal.filter(a => a.tributo === trib);
        return {
          tributo: trib,
          n: ap.length,
          adicoes: somaRet(ap.filter(a => a.especie === 'adicao'), 'valor'),
          exclusoes: somaRet(ap.filter(a => a.especie === 'exclusao'), 'valor'),
        };
      }).filter(x => x.n > 0),
      // amostra do balancete (maiores saldos)
      balancete_amostra: saldos.slice().sort((a, b) => Math.abs(b.saldo_fin) - Math.abs(a.saldo_fin)).slice(0, LIM_AMOSTRA).map(s => ({
        periodo: s.periodo, cod_conta: s.cod_conta, nome: s.nome,
        tipo_saldo: s.tipo_saldo, saldo_fin: s.saldo_fin, dc_fin: s.dc_fin,
      })),
      apuracao_amostra: apurFiscal.slice(0, LIM_AMOSTRA).map(a => ({
        periodo: a.periodo, tributo: a.tributo, especie: a.especie,
        codigo: a.codigo, descricao: a.descricao, valor: a.valor,
      })),
    };

    return {
      meta: {
        programa: 'Revisor Fiscal Prime',
        versao,
        gerado_em: new Date().toISOString(),
        cnpj: cliente.cnpj,
        razao_social: cliente.razao_social || '',
        uf: cliente.uf || '',
        ie: cliente.ie || '',
        periodos: periodosTodos,
        grupo: ehGrupo,
        filiais: ehGrupo ? filiais : undefined,
      },
      custodia,
      cobertura,
      panorama,
      cotejo: { por_periodo: cotejoPorPeriodo },
      retencoes: retencoesResumo,
      contabil: contabilResumo,
      achados,
      depara: deparaAmostra,
      log: log.map(l => ({ ts: l.ts, nivel: l.nivel, evento: l.evento, detalhe: l.detalhe })),
      amostras,
      _limites: { LIM_AMOSTRA, LIM_C170_SEM_XML, LIM_DEPARA, LIM_LOG },
    };
  }

  /** Agrupa itens XML por chave de nota, somando valores. */
  function agruparNotas(itensXml) {
    const m = new Map();
    for (const x of itensXml) {
      if (!m.has(x.chave)) {
        m.set(x.chave, {
          periodo: x.periodo, chave: x.chave,
          emit_cnpj: x.emit_cnpj, emit_nome: x.emit_nome,
          num_doc: x.num_doc, dt_emi: x.dt_emi,
          n_itens: 0, vl_total: 0,
        });
      }
      const n = m.get(x.chave);
      n.n_itens++;
      n.vl_total += Number(x.vl_item) || 0;
    }
    return [...m.values()].sort((a, b) => (a.dt_emi || '').localeCompare(b.dt_emi || ''));
  }

  // ==================================================================
  // GERADOR MARKDOWN
  // ==================================================================
  function gerarMarkdown(d) {
    const L = [];
    const brl = (v) => U().fmtBRL(v);
    const sn = (b) => b ? 'sim' : 'não';

    L.push(`# DOSSIÊ — ${d.meta.programa} ${d.meta.versao}`);
    L.push('');
    L.push(`**Cliente:** ${d.meta.razao_social || '(sem razão social)'} — CNPJ ${U().formatarCNPJ(d.meta.cnpj)}`);
    L.push(`**UF/IE:** ${d.meta.uf || '—'} / ${d.meta.ie || '—'}`);
    L.push(`**Períodos:** ${d.meta.periodos.join(', ') || '—'}`);
    L.push(`**Gerado em:** ${d.meta.gerado_em}`);
    L.push('');
    L.push('> Dossiê gerado para análise. Contém cadeia de custódia, cobertura, cotejo XML×SPED, achados e amostras.');
    L.push('');

    // 1. CUSTÓDIA
    L.push('## 1. Cadeia de custódia');
    L.push('');
    if (d.custodia.length === 0) {
      L.push('_Nenhum arquivo importado._');
    } else {
      L.push('| Arquivo | Tipo | Período | Reg/Itens | SHA-256 | Status |');
      L.push('|---|---|---|---|---|---|');
      for (const a of d.custodia) {
        L.push(`| ${a.nome} | ${a.tipo} | ${a.periodo} | ${a.linhas || a.itens || '—'} | \`${(a.sha256 || '').slice(0, 16)}…\` | ${a.status} |`);
      }
    }
    L.push('');

    // 2. COBERTURA
    L.push('## 2. Cobertura de fontes por período');
    L.push('');
    L.push('| Período | EFD ICMS/IPI | EFD Contrib | XML | Docs | Itens | Itens XML |');
    L.push('|---|---|---|---|---|---|---|');
    for (const c of d.cobertura) {
      L.push(`| ${c.periodo} | ${sn(c.tem_efd_fiscal)} | ${sn(c.tem_efd_contrib)} | ${sn(c.tem_xml)} | ${c.n_documentos} | ${c.n_itens} | ${c.n_xml_itens} |`);
    }
    L.push('');

    // 3. PANORAMA
    L.push('## 3. Panorama do banco');
    L.push('');
    const t = d.panorama.totais;
    L.push(`Totais: **${t.documentos}** documentos (${t.documentos_entrada} entrada / ${t.documentos_saida} saída), **${t.itens}** itens, **${t.produtos}** produtos, **${t.xml_itens}** itens de XML, **${t.depara}** entradas no De/Para.`);
    L.push('');
    L.push('| Período | Docs entrada | Docs saída | Itens | Vl. documentos | ICMS | ICMS-ST |');
    L.push('|---|---|---|---|---|---|---|');
    for (const p of d.panorama.por_periodo) {
      L.push(`| ${p.periodo} | ${p.docs_entrada} | ${p.docs_saida} | ${p.itens} | ${brl(p.vl_doc_total)} | ${brl(p.vl_icms)} | ${brl(p.vl_icms_st)} |`);
    }
    L.push('');

    // 4. COTEJO
    L.push('## 4. Cotejo XML × SPED');
    L.push('');
    if (d.cotejo.por_periodo.length === 0) {
      L.push('_Sem cotejo (nenhum XML importado)._');
    } else {
      L.push('| Período | XML entrada | XML saída | Casados | Sem SPED | Sem match | C170 sem XML | Cobertura |');
      L.push('|---|---|---|---|---|---|---|---|');
      for (const c of d.cotejo.por_periodo) {
        const cob = c.cobertura_entrada_pct == null ? '—' : c.cobertura_entrada_pct.toFixed(1) + '%';
        L.push(`| ${c.periodo} | ${c.xml_entrada} | ${c.xml_saida} | ${c.casados} | ${c.sem_sped} | ${c.sem_match} | ${c.c170_sem_xml} | ${cob} |`);
      }
      L.push('');
      L.push('**Casamentos por método (estratégia da cascata):**');
      L.push('');
      for (const c of d.cotejo.por_periodo) {
        const det = Object.entries(c.por_metodo).map(([m, n]) => `${m}: ${n}`).join(', ');
        if (det) L.push(`- ${c.periodo} — ${det}`);
      }
    }
    L.push('');

    // 5. RETENÇÕES (EFD-Reinf)
    L.push('## 5. Retenções (EFD-Reinf)');
    L.push('');
    const ret = d.retencoes;
    if (!ret || ret.total === 0) {
      L.push('_Nenhuma retenção importada (sem arquivos EFD-Reinf)._');
    } else {
      const tp = Object.entries(ret.por_tipo).map(([t, n]) => `${t}: ${n}`).join(', ');
      L.push(`**${ret.total}** retenção(ões) importadas — ${tp}.`);
      L.push('');
      L.push('Totais por tributo: ' +
        `INSS ${brl(ret.totais.vl_inss)} · IR ${brl(ret.totais.vl_ir)} · CSLL ${brl(ret.totais.vl_csll)} · ` +
        `PIS ${brl(ret.totais.vl_pis)} · COFINS ${brl(ret.totais.vl_cofins)}.`);
      L.push('');
      if (ret.por_periodo.length) {
        L.push('| Período | Qtde | A recolher | Sofridas | INSS | IR | CSLL | PIS | COFINS |');
        L.push('|---|---|---|---|---|---|---|---|---|');
        for (const p of ret.por_periodo) {
          L.push(`| ${p.periodo} | ${p.n} | ${p.a_recolher} | ${p.sofrida} | ${brl(p.vl_inss)} | ${brl(p.vl_ir)} | ${brl(p.vl_csll)} | ${brl(p.vl_pis)} | ${brl(p.vl_cofins)} |`);
        }
        L.push('');
      }
      if (ret.amostra.length) {
        L.push('<details><summary>Amostra de retenções</summary>');
        L.push('');
        L.push('| Período | Evento | Sentido | Contraparte | Doc | Natureza | INSS | IR | CSLL | PIS | COFINS |');
        L.push('|---|---|---|---|---|---|---|---|---|---|---|');
        for (const r of ret.amostra) {
          L.push(`| ${r.periodo} | ${r.tipo_evento} | ${r.sentido} | ${r.cnpj_contraparte || '—'} | ${r.num_doc || '—'} | ${(r.natureza || '').slice(0, 12)} | ${brl(r.vl_inss)} | ${brl(r.vl_ir)} | ${brl(r.vl_csll)} | ${brl(r.vl_pis)} | ${brl(r.vl_cofins)} |`);

      }
    }

    // 6. CONTÁBIL (ECD/ECF)
    L.push('## 6. Contábil (ECD / ECF)');
    L.push('');
    const ct = d.contabil;
    if (!ct || (ct.plano_contas === 0 && ct.saldos === 0)) {
      L.push('_Nenhum dado contábil importado (sem ECD/ECF)._');
    } else {
      L.push(`Plano de contas: **${ct.plano_contas}** contas · Saldos: **${ct.saldos}** lançamentos · Anos: ${ct.anos.join(', ')}.`);

        L.push('| Ano | Origem | Contas | Patrimoniais | Resultado | Débitos | Créditos |');
        L.push('|---|---|---|---|---|---|---|');
        for (const a of ct.por_ano) {
          L.push(`| ${a.ano} | ${a.origem} | ${a.contas_plano} | ${a.contas_patrimoniais} | ${a.contas_resultado} | ${brl(a.total_debitos)} | ${brl(a.total_creditos)} |`);
        }
        L.push('');
      }
      if (ct.apuracao && ct.apuracao.length) {
        L.push('**Apuração fiscal (Lalur/Lacs):**');
        L.push('');
        L.push('| Tributo | Lançamentos | Adições | Exclusões |');
        L.push('|---|---|---|---|');
        for (const a of ct.apuracao) {
          L.push(`| ${a.tributo} | ${a.n} | ${brl(a.adicoes)} | ${brl(a.exclusoes)} |`);

      }
      if (ct.balancete_amostra && ct.balancete_amostra.length) {

        L.push('');
        L.push('| Período | Conta | Nome | Tipo | Saldo final | D/C |');
        L.push('|---|---|---|---|---|---|');
        for (const s of ct.balancete_amostra) {
          L.push(`| ${s.periodo} | ${s.cod_conta} | ${(s.nome || '').slice(0, 30)} | ${s.tipo_saldo} | ${brl(s.saldo_fin)} | ${s.dc_fin || '—'} |`);
        }
        L.push('</details>');
        L.push('');
      }
    }

    // 7. ACHADOS
    L.push('## 7. Achados e divergências');
    L.push('');

    L.push('### 7.1 Notas no XML não escrituradas no SPED');
    L.push('');
    const ne = d.achados.notas_nao_escrituradas;
    if (ne.length === 0) {
      L.push('_Nenhuma — todas as notas de XML têm correspondência no SPED._');
    } else {
      L.push(`**${ne.length} nota(s)** encontradas no XML sem registro no C170:`);
      L.push('');
      L.push('| Período | Chave | Fornecedor | Emissão | Itens | Valor |');
      L.push('|---|---|---|---|---|---|');
      for (const n of ne) {
        L.push(`| ${n.periodo} | \`${n.chave}\` | ${n.emit_nome || n.emit_cnpj} | ${n.dt_emi || '—'} | ${n.n_itens} | ${brl(n.vl_total)} |`);
      }
    }
    L.push('');

    L.push('### 7.2 Itens de XML sem casamento (nota escriturada, item não pareado)');
    L.push('');
    const sm = d.achados.itens_xml_sem_match;
    if (sm.length === 0) {
      L.push('_Nenhum._');
    } else {
      L.push(`**${sm.length} item(ns):**`);
      L.push('');
      L.push('| Período | Chave | cProd (forn.) | Descrição | Valor |');
      L.push('|---|---|---|---|---|');
      for (const i of sm) {
        L.push(`| ${i.periodo} | \`${(i.chave || '').slice(-8)}\` | ${i.cProd} | ${(i.descricao || '').slice(0, 40)} | ${brl(i.vl_item)} |`);
      }
    }
    L.push('');

    L.push('### 7.3 Itens do C170 (entrada) sem XML correspondente');
    L.push('');
    const cx = d.achados.c170_sem_xml;
    if (cx.length === 0) {
      L.push('_Nenhum — todos os itens de entrada do SPED têm XML._');
    } else {
      const mostra = cx.slice(0, LIM_C170_SEM_XML);
      L.push(`**${cx.length} item(ns)**${cx.length > mostra.length ? ` (mostrando ${mostra.length})` : ''}:`);
      L.push('');
      L.push('| Período | Cód. item | Descrição | CFOP | Valor |');
      L.push('|---|---|---|---|---|');
      for (const i of mostra) {
        L.push(`| ${i.periodo} | ${i.cod_item} | ${(i.descricao || '').slice(0, 40)} | ${i.cfop} | ${brl(i.vl_item)} |`);
      }
    }
    L.push('');

    L.push('### 7.4 Divergências de valor (item casado, valor XML ≠ SPED)');
    L.push('');
    const dv = d.achados.divergencia_valor;
    if (dv.length === 0) {
      L.push('_Nenhuma divergência de valor relevante (>1%) nos itens casados._');
    } else {
      L.push(`**${dv.length} divergência(s):**`);
      L.push('');
      L.push('| Período | Cód. item | Descrição | Valor XML | Valor SPED | Diferença |');
      L.push('|---|---|---|---|---|---|');
      for (const i of dv) {
        L.push(`| ${i.periodo} | ${i.cod_item} | ${(i.descricao || '').slice(0, 30)} | ${brl(i.vl_xml)} | ${brl(i.vl_sped)} | ${brl(i.diferenca)} |`);
      }
    }
    L.push('');

    // 7.5 ACHADOS DAS AUDITORIAS CRUZADAS (persistidos em rev_achados)
    L.push('### 7.5 Achados das auditorias cruzadas');
    L.push('');
    const ap = d.achados.achados_persistidos || [];
    if (ap.length === 0) {
      L.push('_Nenhuma auditoria cruzada executada ainda, ou nenhum achado registrado. Rode na aba **Auditorias**._');
    } else {
      const rotuloTipo = {
        xml_nao_escriturado: 'Nota não escriturada (XML × EFD-ICMS)',
        icms_base_pis_cofins: 'ICMS na base de PIS/COFINS (RE 574.706)',
        reinf_retencao: 'Retenção da EFD-Reinf a aproveitar',
        ecd_ecf: 'Consistência ECD × ECF',
        ecd_contrib: 'Receita contábil × faturamento fiscal',
      };
      // Classe + confirmação necessária por tipo. "Crédito possível" = depende de
      // confirmar informação (os "se"); fica separado do recuperável (que já tem dado).
      const META_TIPO = {
        ins_produto_intermediario: { classe: 'Crédito recuperável', conf: 'Anexar a lista real de coadjuvantes do processo + laudo de consumo (NCM 3201/3507/3905/2811). Base sólida.' },
        mg_ciap_difal_ativo: { classe: 'Crédito recuperável', conf: 'Confirmar que o DIFAL do ativo foi pago e ainda não compôs o CIAP (G125).' },
        mg_perda_estorno_indevido: { classe: 'Crédito possível', conf: 'Identificar o MOTIVO de cada estorno. Perda normal (evaporação/borra/filtro) recupera; perda anormal, saída isenta/NT, ST ou redução de base = estorno correto e não recupera.' },
        mg_pis_credito_insumo: { classe: 'Crédito possível', conf: 'Confirmar regime Lucro Real / não cumulativo e que as entradas são insumos creditáveis ainda não creditados. Tributo FEDERAL, 9,25% estimado.' },
        mg_exp_saldo_parado: { classe: 'Crédito possível', conf: 'Confirmar origem do acúmulo e a via de aproveitamento (DCA/transferência). É saldo credor (capital parado).' },
        ins_energia_credito: { classe: 'Crédito possível', conf: 'Laudo técnico do % de uso industrial da energia.' },
        mg_st_insumo_credito: { classe: 'Crédito possível', conf: 'Confirmar que é insumo industrializado (não revenda) e que a ST não foi creditada/restituída. Extemporâneo até 5 anos.' },
        ins_st_insumo: { classe: 'Crédito possível', conf: 'Insumo industrializado com ST retida: crédito do ICMS-ST ou restituição.' },
        ins_combustivel_caldeira: { classe: 'Crédito possível', conf: 'Confirmar uso na caldeira (biomassa costuma ser isenta = sem crédito; fóssil credita).' },
        ins_difal_uso_ativo: { classe: 'Exposição / contingência', conf: 'Conferir recolhimento do DIFAL. Pode ser débito a pagar, não crédito.' },
        mg_fem_ausente: { classe: 'Exposição / contingência', conf: 'vFCP=0 não prova não-pagamento. Conferir DAE/ajuste EFD do FEM (82.2/98.1/110.1).' },
        mg_cred_embalagem_transporte: { classe: 'Exposição / contingência', conf: 'Crédito já tomado. Se a embalagem é só de transporte (pallet/stretch/filme), estorno devido.' },
        mg_cred_uso_consumo: { classe: 'Exposição / contingência', conf: 'Crédito já tomado. Se o item é uso e consumo (não insumo), estorno devido.' },
        mg_energia_laudo: { classe: 'Exposição / contingência', conf: 'Laudo do % industrial. Parcela administrativa não credita.' },
        mg_stcalc_femst: { classe: 'Exposição / contingência', conf: 'FEM-ST pode ter sido recolhido em DAE/ajuste EFD. vFCPST=0 não prova falta.' },
        mg_st_encomenda: { classe: 'Exposição / contingência', conf: 'Confirmar se há industrialização por encomenda e o tratamento de ST/PIS-COFINS do executor vs encomendante.' },
        ins_fornecedor_simples: { classe: 'Exposição / contingência', conf: 'Conferir CSOSN das entradas do Simples (101/201 creditam o destacado; 102+ não).' },
        mg_rest_registros: { classe: 'Exposição / contingência', conf: 'Conferir registros obrigatórios do ressarcimento de ST (C180/.../1250/1255).' },
        mg_rest_complemento: { classe: 'Exposição / contingência', conf: 'Requer marca->PMPF e regime de definitividade para quantificar.' },
        ins_embalagem_classif: { classe: 'Exposição / contingência', conf: 'Cadastro: corrigir TIPO_ITEM no 0200 (embalagem = tipo 02).' },
        xml_nao_escriturado: { classe: 'Crédito possível / Exposição (misto)', conf: 'Notas com ICMS destacado: confirmar entrada creditável e escriturar C100/C170. Notas sem ICMS: regularizar escrituração. Atenção a notas da própria empresa (transferência entre filiais).' },
        ecd_ecf: { classe: 'Erro / dado a corrigir', conf: 'Conferir carga dupla de saldos ECD/ECF (deduplicar por período+conta) antes de tratar como inconsistência do cliente.' },
        mg_stcalc_deducao: { classe: 'Erro / dado a corrigir', conf: 'Recalcular ST: base × alíquota da própria nota − ICMS próprio (cerveja MG 23%).' },
      };
      const classeAchado = (a) => {
        if (a.tipo === 'xml_nao_escriturado') return a.natureza === 'credito' ? 'Crédito possível' : 'Exposição / contingência';
        const m = META_TIPO[a.tipo];
        if (m) return m.classe;
        return a.natureza === 'credito' ? 'Crédito possível' : a.natureza === 'erro' ? 'Erro / dado a corrigir' : 'Exposição / contingência';
      };
      const CLASSES = ['Crédito recuperável', 'Crédito possível', 'Exposição / contingência', 'Erro / dado a corrigir'];
      const bucket = {}; for (const c of CLASSES) bucket[c] = { n: 0, v: 0 };
      for (const a of ap) { const c = classeAchado(a); bucket[c].n++; bucket[c].v += (Number(a.valor) || 0); }
      const nAlta = ap.filter(a => a.severidade === 'alta').length;
      L.push(`**${ap.length} achado(s)**, ${nAlta} de alta severidade. Crédito recuperável (sólido) **${brl(bucket['Crédito recuperável'].v)}**; crédito possível (depende de confirmação) **${brl(bucket['Crédito possível'].v)}**.`);
      L.push('');
      L.push('| Classe | Achados | Valor |');
      L.push('|---|---|---|');
      for (const c of CLASSES) L.push(`| ${c} | ${bucket[c].n} | ${brl(bucket[c].v)} |`);
      L.push('');
      L.push('> _Crédito recuperável_ tem dado que confirma. _Crédito possível_ depende da confirmação indicada em cada bloco abaixo. _Exposição_ não é crédito a receber, é risco a conferir. _Erro/dado_ é correção (inclui suspeita de carga dupla no ECD×ECF).');
      L.push('');
      // agrupa por tipo
      const tipos = [...new Set(ap.map(a => a.tipo))];
      for (const tp of tipos) {
        const lista = ap.filter(a => a.tipo === tp)
          .sort((a, b) => (Math.abs(Number(b.valor) || 0) - (Math.abs(Number(a.valor) || 0))));
        const subtotal = lista.reduce((s, a) => s + (Number(a.valor) || 0), 0);
        const metaTp = META_TIPO[tp];
        const classeTp = metaTp ? metaTp.classe : (lista[0] ? classeAchado(lista[0]) : '—');
        L.push(`#### ${rotuloTipo[tp] || tp} — ${lista.length} achado(s), ${brl(subtotal)} · _${classeTp}_`);
        L.push('');
        L.push('| Período | Severidade | Natureza | Valor | Descrição |');
        L.push('|---|---|---|---|---|');
        for (const a of lista) {
          const desc = (a.descricao || a.titulo || '').replace(/\|/g, '/').slice(0, 180);
          L.push(`| ${a.periodo || '—'} | ${a.severidade || '—'} | ${a.natureza || '—'} | ${brl(a.valor)} | ${desc} |`);
        }
        L.push('');
        // base legal (uma vez por tipo)
        const bl = (lista.find(a => a.base_legal) || {}).base_legal;
        if (bl) { L.push(`> Base legal: ${bl}`); L.push(''); }
        if (metaTp && metaTp.conf) { L.push(`> Confirmação necessária: ${metaTp.conf}`); L.push(''); }
      }
    }
    L.push('');

    // 6. DE/PARA
    L.push('## 8. De/Para aprendido (produto fornecedor ↔ empresa)');
    L.push('');
    if (d.depara.length === 0) {
      L.push('_Vazio._');
    } else {
      L.push('| Cód. item | Fornecedor | cProd forn. | EANs | Método | Confiança |');
      L.push('|---|---|---|---|---|---|');
      for (const dp of d.depara) {
        L.push(`| ${dp.codItem} | ${dp.cnpj_fornecedor} | ${dp.cProd_fornecedor} | ${dp.eans || '—'} | ${dp.metodo || '—'} | ${dp.confianca || '—'} |`);
      }
    }
    L.push('');

    // 7. LOG
    L.push('## 9. Log de processamento');
    L.push('');
    if (d.log.length === 0) {
      L.push('_Sem eventos registrados._');
    } else {
      L.push('| Quando | Nível | Evento | Detalhe |');
      L.push('|---|---|---|---|');
      for (const l of d.log) {
        L.push(`| ${(l.ts || '').replace('T', ' ').slice(0, 19)} | ${l.nivel} | ${l.evento} | ${(l.detalhe || '').slice(0, 80)} |`);
      }
    }
    L.push('');

    // 8. AMOSTRAS
    L.push('## 10. Amostras de dados (estrutura)');
    L.push('');
    L.push(`Mostrando até ${d._limites.LIM_AMOSTRA} registros de cada tabela para referência de estrutura.`);
    L.push('');
    L.push('<details><summary>Amostra de itens do SPED (rev_itens)</summary>');
    L.push('');
    L.push('```json');
    L.push(JSON.stringify(d.amostras.itens.slice(0, 5), null, 2));
    L.push('```');
    L.push('</details>');
    L.push('');
    L.push('<details><summary>Amostra de itens de XML (rev_xml_itens)</summary>');
    L.push('');
    L.push('```json');
    L.push(JSON.stringify(d.amostras.xml_itens.slice(0, 5), null, 2));
    L.push('```');
    L.push('</details>');
    L.push('');
    L.push('---');
    L.push(`_Fim do dossiê — ${d.meta.programa} ${d.meta.versao}._`);

    return L.join('\n');
  }

  // ==================================================================
  // GERADOR JSON
  // ==================================================================
  function gerarJSON(d) {
    return JSON.stringify(d, null, 2);
  }

  // ==================================================================
  // GERADOR EXCEL (abas)
  // ==================================================================
  function gerarExcel(d) {
    if (typeof XLSX === 'undefined') throw new Error('SheetJS (XLSX) não carregado.');
    const wb = XLSX.utils.book_new();
    const add = (nome, linhas) => {
      const ws = XLSX.utils.json_to_sheet(linhas.length ? linhas : [{ vazio: '—' }]);
      XLSX.utils.book_append_sheet(wb, ws, nome.slice(0, 31));
    };

    add('Custodia', d.custodia);
    add('Cobertura', d.cobertura.map(c => ({
      periodo: c.periodo, efd_fiscal: c.tem_efd_fiscal, efd_contrib: c.tem_efd_contrib,
      xml: c.tem_xml, docs: c.n_documentos, itens: c.n_itens, itens_xml: c.n_xml_itens,
    })));
    add('Panorama', d.panorama.por_periodo);
    add('Cotejo', d.cotejo.por_periodo.map(c => ({
      periodo: c.periodo, xml_entrada: c.xml_entrada, xml_saida: c.xml_saida,
      casados: c.casados, sem_sped: c.sem_sped, sem_match: c.sem_match,
      c170_sem_xml: c.c170_sem_xml, cobertura_pct: c.cobertura_entrada_pct,
    })));
    add('Retencoes_periodo', (d.retencoes && d.retencoes.por_periodo) || []);
    add('Retencoes_amostra', (d.retencoes && d.retencoes.amostra) || []);
    add('Contabil_ano', (d.contabil && d.contabil.por_ano) || []);
    add('Balancete_amostra', (d.contabil && d.contabil.balancete_amostra) || []);
    add('Apuracao_fiscal', (d.contabil && d.contabil.apuracao_amostra) || []);
    add('Notas_nao_escrituradas', d.achados.notas_nao_escrituradas);
    add('XML_sem_match', d.achados.itens_xml_sem_match);
    add('C170_sem_XML', d.achados.c170_sem_xml.slice(0, 5000));
    add('Divergencia_valor', d.achados.divergencia_valor);
    add('Auditorias_achados', (d.achados.achados_persistidos || []).map(a => ({
      tipo: a.tipo, periodo: a.periodo, severidade: a.severidade, natureza: a.natureza,
      valor: a.valor, titulo: a.titulo, descricao: a.descricao, base_legal: a.base_legal,
    })));
    add('DePara', d.depara);
    add('Log', d.log);
    return wb;
  }

  return { coletar, gerarMarkdown, gerarJSON, gerarExcel };
})();

  // ------------------------------------------------------------------
  // AGREGAÇÕES
  // ------------------------------------------------------------------
  function areaNome(id) { const a = AREAS.find(x => x.id === id); return a ? a.nome : id; }

  function contagemPorArea() {
    return AREAS.map(area => {
      const lista = AUDITORIAS.filter(a => a.area === area.id);
      const impl = lista.filter(a => a.status === 'implementada').length;
      const dev = lista.filter(a => a.status === 'em_desenvolvimento').length;
      const plan = lista.filter(a => a.status === 'planejada').length;
      return { area, total: lista.length, implementadas: impl, em_dev: dev, planejadas: plan };
    }).filter(x => x.total > 0);
  }

  function totais() {
    const total = AUDITORIAS.length;
    const implementadas = AUDITORIAS.filter(a => a.status === 'implementada').length;
    const em_dev = AUDITORIAS.filter(a => a.status === 'em_desenvolvimento').length;
    const planejadas = AUDITORIAS.filter(a => a.status === 'planejada').length;
    const documentadas = AUDITORIAS.filter(a => a.base === 'documentada' || a.base === 'implementada').length;
    const recuperacao = AUDITORIAS.filter(a => a.tipo === 'recuperacao' || a.tipo === 'ambos').length;
    const risco = AUDITORIAS.filter(a => a.tipo === 'risco' || a.tipo === 'ambos').length;
    const partes = new Set(AUDITORIAS.map(a => a.parte).filter(Boolean)).size;
    return {
      total, implementadas, em_dev, planejadas, documentadas, recuperacao, risco, partes,
      capacidades: CAPACIDADES.length,
      setoresEspecialista: SETORES.filter(s => s.nivel === 'especialista').length,
      ufsEspecialista: UFS.filter(u => u.nivel === 'especialista').length,
      pctImplementado: total ? Math.round((implementadas / total) * 100) : 0,
    };
  }

  function auditoriasPorArea(areaId) {
    return AUDITORIAS.filter(a => a.area === areaId);
  }

  return {
    VERSAO_BASE, ATUALIZADO,
    SETORES, UFS, AREAS, CAPACIDADES, AUDITORIAS, TELAS,
    areaNome, contagemPorArea, totais, auditoriasPorArea,
  };
})();

if (typeof module !== 'undefined' && module.exports) module.exports = Conhecimento;

  async function renderSeletor(container) {
    const clientes = await Clientes.listar();
    const ativo = Clientes.ativo();
    const periodos = await Clientes.periodosDisponiveis();
    const periodoAtivo = Clientes.periodo();

    if (clientes.length === 0) {
      container.innerHTML = `
        <div class="seletor-vazio">
          Nenhum cliente cadastrado.
          <button class="btn btn-small btn-primary" id="sel-novo-cliente">+ Cadastrar cliente</button>
        </div>`;
      container.querySelector('#sel-novo-cliente').onclick = () => App.navegar('clientes');
      return;
    }

    const opcoesClientes = clientes.map(c =>
      `<option value="${c.cnpj}" ${ativo && ativo.cnpj === c.cnpj ? 'selected' : ''}>
        ${Utils.escapeHtml(c.razao_social || c.cnpj)} — ${Utils.formatarCNPJ(c.cnpj)}
      </option>`
    ).join('');

    const opcoesPeriodos = periodos.length
      ? periodos.map(p => `<option value="${p}" ${p === periodoAtivo ? 'selected' : ''}>${p}</option>`).join('')
      : '<option value="">— sem dados —</option>';

    // barra de filiais (só quando o grupo do cliente ativo tem 2+ CNPJs)
    const grupo = ativo ? await Clientes.filiaisDoGrupo() : [];
    const cnpjsSel = ativo ? await Clientes.cnpjsAtivos() : [];
    const selSet = new Set(cnpjsSel);
    const todas = Clientes.selecaoEhTodas();
    let barraFiliais = '';
    if (grupo.length > 1) {
      const apelido = (c) => {
        const suf = c.cnpj.slice(8, 12) + '-' + c.cnpj.slice(12);
        const rz = (c.razao_social || '').replace(/CERVEJARIA|LTDA|EIRELI|S\/?A/gi, '').trim();
        const curto = rz.split(/\s*[-–]\s*/).pop() || rz;
        return (c.cnpj.slice(8, 12) === '0001' ? 'Matriz' : (curto || 'Filial')) + ' ' + suf;
      };
      barraFiliais = `
        <div class="filiais-barra" id="sel-filiais">
          <span class="filiais-rotulo">Filiais (${grupo.length}):</span>
          <label class="filial-chip ${todas ? 'sel' : ''}">
            <input type="checkbox" id="fil-todas" ${todas ? 'checked' : ''}> Todas (consolidado)
          </label>
          ${grupo.map(c => `
            <label class="filial-chip ${(!todas && selSet.has(c.cnpj)) ? 'sel' : ''}" title="${Utils.escapeHtml(c.razao_social || '')} — ${Utils.formatarCNPJ(c.cnpj)}">
              <input type="checkbox" class="fil-item" value="${c.cnpj}" ${(!todas && selSet.has(c.cnpj)) ? 'checked' : ''} ${todas ? 'disabled' : ''}>
              ${Utils.escapeHtml(apelido(c))}
            </label>`).join('')}
        </div>`;
    }

    container.innerHTML = `
      <div class="seletor-grid">
        <div class="seletor-campo">
          <label>Cliente</label>
          <select id="sel-cliente">${opcoesClientes}</select>
        </div>
        <div class="seletor-campo">
          <label>Período</label>
          <select id="sel-periodo">${opcoesPeriodos}</select>
        </div>
        <button class="btn btn-small" id="sel-gerir">Gerir clientes</button>
      </div>
      ${barraFiliais}`;

    container.querySelector('#sel-cliente').onchange = async (e) => {
      await Clientes.definirAtivo(e.target.value);
      App.recarregarTelaAtual();
      renderSeletor(container);
    };
    container.querySelector('#sel-periodo').onchange = (e) => {
      Clientes.definirPeriodo(e.target.value);
      App.recarregarTelaAtual();
    };
    container.querySelector('#sel-gerir').onclick = () => App.navegar('clientes');

    // eventos da barra de filiais
    const boxTodas = container.querySelector('#fil-todas');
    if (boxTodas) {
      boxTodas.onchange = () => {
        if (boxTodas.checked) Clientes.definirFiliaisSelecionadas(null);       // todas
        else Clientes.definirFiliaisSelecionadas([Clientes.ativo().cnpj]);     // só a ativa, pra começar

        renderSeletor(container);

        </p>

    container.querySelector('#cli-salvar').onclick = async () => {
      const cnpj = container.querySelector('#cli-cnpj').value;
      const razao = container.querySelector('#cli-razao').value;
      const uf = container.querySelector('#cli-uf').value.toUpperCase();
      try {
        await Clientes.salvar({ cnpj, razao_social: razao, uf });
        await Clientes.definirAtivo(cnpj);

        // cria a pasta da empresa no disco JÁ no cadastro (se houver pasta de trabalho)
        const cnpjLimpo = Utils.soDigitos(cnpj);
        if (Armazenamento.suportado()) {
          if (Armazenamento.temPasta()) {
            try {
              const r = await Armazenamento.salvarCliente(cnpjLimpo);
              if (r.ok) _avisoCadastro = { tipo: 'ok', txt: `Cliente cadastrado e pasta criada no disco: "${r.pasta}".` };
              else _avisoCadastro = { tipo: 'aviso', txt: `Cliente cadastrado. Pasta não criada (${r.motivo}).` };
            } catch (e) { _avisoCadastro = { tipo: 'aviso', txt: 'Cliente cadastrado, mas não foi possível criar a pasta: ' + e.message }; }
          } else if (window._temPastaSalva) {
            _avisoCadastro = { tipo: 'aviso', txt: 'Cliente cadastrado. A pasta de trabalho está desconectada nesta sessão — vá em "Backup / Pasta", clique em Reconectar, e a pasta da empresa será criada.' };
          } else {
            _avisoCadastro = { tipo: 'aviso', txt: 'Cliente cadastrado. Para criar a pasta da empresa no disco, defina uma pasta de trabalho na aba "Backup / Pasta".' };
          }
        } else {
          _avisoCadastro = { tipo: 'ok', txt: 'Cliente cadastrado.' };
        }

        App.atualizarSeletor();
        render(container);
      } catch (e) {
        alert(e.message);
      }
    };

    container.querySelectorAll('[data-acao]').forEach(btn => {
      btn.onclick = async () => {
        const cnpj = btn.dataset.cnpj;
        const acao = btn.dataset.acao;
        if (acao === 'ativar') {
          await Clientes.definirAtivo(cnpj);
          App.atualizarSeletor();
          App.navegar('importar');
        } else if (acao === 'remover') {
          const c = await Clientes.obter(cnpj);
          if (confirm(`Remover ${c.razao_social || cnpj} e TODOS os seus dados? Esta ação é irreversível.`)) {
            await Clientes.remover(cnpj);
            App.atualizarSeletor();
            render(container);
          }
        }
      };
    });
  }

  return { render, renderSeletor };
})();
